<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Upload</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;padding:3rem 1.5rem 6rem 1.5rem;text-align:center;gap:1rem;overflow-y:auto; }
    .upload-card { background:rgba(255,255,255,0.05);border:2px dashed rgba(255,255,255,0.2);border-radius:1.5rem;padding:2rem 1.5rem;cursor:pointer;width:100%;max-width:280px;transition:all 0.3s; }
    .upload-card:hover { background:rgba(255,255,255,0.1);border-color:#3897f0;transform:translateY(-2px); }
    .upload-card i { font-size:2.2rem;margin-bottom:0.5rem; }
    .upload-card h3 { font-size:0.9rem;margin-bottom:0.2rem; }
    .upload-card p { font-size:0.6rem;color:#888; }
    .upload-card.post i { color:#3897f0; }
    .upload-card.reel i { color:#e91e63; }
    .preview-img, .preview-video { width:100%;max-width:280px;border-radius:1rem;max-height:250px;object-fit:cover;background:#111; }
    .btn { width:100%;max-width:280px;padding:0.7rem;border-radius:1.5rem;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.3s; }
    .btn-green { background:#4ade80;color:#000; }
    .btn-green:hover { background:#22c55e; }
    .btn-gray { background:#333;color:#fff; }
    .btn-gray:hover { background:#444; }
    .btn:disabled { opacity:0.5;cursor:not-allowed; }
    .caption-input {
      width:100%;max-width:280px;padding:0.6rem 0.8rem;
      border-radius:0.5rem;border:1px solid #333;
      background:#111;color:#fff;font-size:0.8rem;
      outline:none;text-align:center;
    }
    .caption-input:focus { border-color:#3897f0; }
    .status { font-size:0.7rem;color:#4ade80;min-height:1rem; }
    .error { color:#ef4444; }
    .progress-bar-container {
      width:100%;max-width:280px;height:4px;
      background:#1a1a1a;border-radius:2px;
      overflow:hidden;display:none;
    }
    .progress-bar {
      height:100%;background:#4ade80;
      width:0%;transition:width 0.3s ease;
    }
    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;padding:0.5rem 1.2rem;border-radius:2rem;font-size:0.75rem;z-index:400;opacity:0;transition:all 0.3s;font-weight:600; }
    .toast.show { opacity:1; }

    /* Glass effect floating navbar with 90% transparency */
    .floating-nav { 
      position:fixed;
      bottom:max(1rem,env(safe-area-inset-bottom,1rem));
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:500px;
      background:rgba(10, 10, 10, 0.1);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-radius:2.5rem;
      padding:0.7rem 1.5rem;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255, 255, 255, 0.05);
      z-index:100;
      box-shadow:0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
    }
    
    .floating-nav:hover {
      background:rgba(10, 10, 10, 0.15);
      box-shadow:0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    
    .nav-center { 
      display:flex;
      align-items:center;
      justify-content:space-between;
      width:100%;
      max-width:380px;
      gap:0.3rem;
    }
    
    .nav-center a { 
      color:rgba(255, 255, 255, 0.8);
      font-size:1.3rem;
      display:flex;
      align-items:center;
      justify-content:center;
      width:2.5rem;
      height:2.5rem;
      border-radius:50%;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration:none;
      position:relative;
      background:transparent;
    }
    
    .nav-center a:hover {
      color:#fff;
      background:rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .nav-center a::before { 
      content:'';
      position:absolute;
      bottom:-2px;
      left:50%;
      transform:translateX(-50%) scale(0);
      width:4px;
      height:4px;
      border-radius:50%;
      background:#fff;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .nav-center a.active { 
      color:#fff;
      background:rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }
    
    .nav-center a.active::before { 
      transform:translateX(-50%) scale(1);
    }

    @media (min-width:1024px) { 
      .floating-nav{
        position:fixed;
        top:50%;
        left:1.5rem;
        bottom:auto;
        transform:translateY(-50%);
        width:3.8rem;
        height:auto;
        max-width:none;
        border-radius:2.5rem;
        padding:1rem 0.6rem;
        flex-direction:column;
        background:rgba(10, 10, 10, 0.1);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);
        border:1px solid rgba(255, 255, 255, 0.05);
        box-shadow:0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}
      .nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}
      .nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .content{padding:3rem 2rem 3rem 6rem}
    }
    
    @media (max-width:380px) { 
      .floating-nav{
        width:94%;
        padding:0.5rem 0.8rem;
        bottom:max(0.8rem,env(safe-area-inset-bottom,0.8rem));
        background:rgba(10, 10, 10, 0.1);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);
      }
      .nav-center a{font-size:1.1rem;width:2rem;height:2rem}
    }
  </style>
</head>
<body>
  <div class="page" id="mainPage">
    <div class="content" id="mainContent">
      <h2 style="font-weight:500;">Create</h2>
      <p style="font-size:0.7rem;color:#888;margin-bottom:0.5rem;">Logged in as: <span id="currentUserLabel" style="color:#4ade80;"></span></p>
      <div class="upload-card post" onclick="selectType('post')"><i class="fas fa-image"></i><h3>Post</h3><p>Upload a photo (auto-compressed)</p></div>
      <div class="upload-card reel" onclick="selectType('reel')"><i class="fas fa-video"></i><h3>Reel</h3><p>Upload a video (max 20MB, compresses to 5MB)</p></div>
    </div>
    <div class="content" id="previewContent" style="display:none;">
      <h3 id="previewTitle" style="font-weight:500;">Preview</h3>
      <img id="previewImg" class="preview-img" style="display:none;">
      <video id="previewVideo" class="preview-video" controls style="display:none;"></video>
      <div class="progress-bar-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <input type="text" class="caption-input" id="captionInput" placeholder="Write a caption...">
      <p class="status" id="fileSizeText"></p>
      <button class="btn btn-green" id="saveBtn" onclick="saveToCloud()">Save to Cloud ☁️</button>
      <p class="status" id="saveStatus"></p>
      <button class="btn btn-gray" onclick="goBack()">Cancel</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="handleFile(event)">
    <div class="toast" id="toast"></div>
    <nav class="floating-nav">
      <div class="nav-center">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="web.html"><i class="fas fa-globe"></i></a>
        <a href="reel.html"><i class="fas fa-film"></i></a>
        <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
      </div>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf"
    });
    const db = getFirestore(app);
    const auth = getAuth(app);

    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    const currentUserId = currentUser.replace('@','');
    const MAX_PHOTO_SIZE = 2048;
    const PHOTO_QUALITY = 0.8;
    const MAX_REEL_SIZE = 20 * 1024 * 1024;
    const TARGET_REEL_SIZE = 5 * 1024 * 1024;

    let selectedType = null, fileData = null, originalFile = null;

    // ✅ Same auth pattern as index page - no buffering
    async function bootApp() {
      const hasLocalUid = localStorage.getItem("uid");
      if (!hasLocalUid && !auth.currentUser) {
        await new Promise(resolve => {
          const unsub = onAuthStateChanged(auth, (user) => {
            unsub();
            if (user) localStorage.setItem("uid", user.uid);
            resolve();
          });
        });
      }
      if (!localStorage.getItem("uid") && !auth.currentUser) {
        window.location.replace("login.html");
        return;
      }
      
      document.getElementById('currentUserLabel').textContent = currentUser;
    }

    window.selectType = function(type) {
      selectedType = type;
      document.getElementById('fileInput').accept = type==='post'?'image/*':'video/*';
      document.getElementById('fileInput').click();
    };

    // ✅ Compress image to standard size
    async function compressImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        
        reader.onload = (e) => {
          img.src = e.target.result;
        };
        
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > MAX_PHOTO_SIZE) {
              height *= MAX_PHOTO_SIZE / width;
              width = MAX_PHOTO_SIZE;
            }
          } else {
            if (height > MAX_PHOTO_SIZE) {
              width *= MAX_PHOTO_SIZE / height;
              height = MAX_PHOTO_SIZE;
            }
          }
          
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedDataUrl = canvas.toDataURL('image/jpeg', PHOTO_QUALITY);
          const compressedSize = Math.round((compressedDataUrl.length * 3) / 4);
          
          console.log(`📷 Photo compressed: ${(file.size/1024).toFixed(1)}KB → ${(compressedSize/1024).toFixed(1)}KB`);
          
          resolve({
            dataUrl: compressedDataUrl,
            originalSize: file.size,
            compressedSize: compressedSize,
            width: Math.round(width),
            height: Math.round(height)
          });
        };
        
        img.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ✅ Compress video
    async function compressVideo(file) {
      return new Promise((resolve, reject) => {
        const video = document.createElement('video');
        const url = URL.createObjectURL(file);
        video.src = url;
        video.muted = true;
        video.playsInline = true;
        
        video.onloadedmetadata = async () => {
          const duration = video.duration;
          
          if (file.size <= TARGET_REEL_SIZE) {
            URL.revokeObjectURL(url);
            const reader = new FileReader();
            reader.onload = (e) => {
              resolve({
                dataUrl: e.target.result,
                originalSize: file.size,
                compressedSize: file.size,
                duration: duration
              });
            };
            reader.readAsDataURL(file);
            return;
          }
          
          const targetBitrate = (TARGET_REEL_SIZE * 8) / duration;
          
          try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const maxWidth = 720;
            let width = video.videoWidth;
            let height = video.videoHeight;
            
            if (width > maxWidth) {
              height *= maxWidth / width;
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            const stream = canvas.captureStream(30);
            
            const chunks = [];
            const mediaRecorder = new MediaRecorder(stream, {
              mimeType: 'video/webm;codecs=vp8,opus',
              videoBitsPerSecond: Math.min(targetBitrate, 2000000)
            });
            
            mediaRecorder.ondataavailable = (e) => {
              if (e.data.size > 0) chunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
              const blob = new Blob(chunks, { type: 'video/webm' });
              const reader = new FileReader();
              reader.onload = (e) => {
                URL.revokeObjectURL(url);
                console.log(`🎬 Video compressed: ${(file.size/1024/1024).toFixed(1)}MB → ${(blob.size/1024/1024).toFixed(1)}MB`);
                resolve({
                  dataUrl: e.target.result,
                  originalSize: file.size,
                  compressedSize: blob.size,
                  duration: duration
                });
              };
              reader.readAsDataURL(blob);
            };
            
            mediaRecorder.start(100);
            video.currentTime = 0;
            video.play();
            
            video.ontimeupdate = () => {
              ctx.drawImage(video, 0, 0, width, height);
              if (video.currentTime >= duration) {
                video.pause();
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
              }
            };
            
          } catch(e) {
            console.error('Compression error:', e);
            URL.revokeObjectURL(url);
            const reader = new FileReader();
            reader.onload = (e) => {
              resolve({
                dataUrl: e.target.result,
                originalSize: file.size,
                compressedSize: file.size,
                duration: duration
              });
            };
            reader.readAsDataURL(file);
          }
        };
        
        video.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('Failed to load video'));
        };
      });
    }

    window.handleFile = async function(event) {
      const file = event.target.files[0];
      if(!file) return;
      originalFile = file;
      
      document.getElementById('mainContent').style.display='none';
      document.getElementById('previewContent').style.display='flex';
      
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      
      if(selectedType === 'post') {
        document.getElementById('previewTitle').textContent = 'Compressing Photo...';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('previewVideo').style.display = 'none';
        
        try {
          progressBar.style.width = '50%';
          const compressed = await compressImage(file);
          progressBar.style.width = '100%';
          
          fileData = compressed.dataUrl;
          document.getElementById('previewTitle').textContent = 'Photo Preview';
          document.getElementById('previewImg').src = fileData;
          document.getElementById('previewImg').style.display = 'block';
          document.getElementById('fileSizeText').textContent = 
            `Original: ${(compressed.originalSize/1024).toFixed(1)}KB • Compressed: ${(compressed.compressedSize/1024).toFixed(1)}KB • ${compressed.width}x${compressed.height}`;
        } catch(e) {
          console.error('Photo compression failed:', e);
          const reader = new FileReader();
          reader.onload = (ev) => {
            fileData = ev.target.result;
            document.getElementById('previewTitle').textContent = 'Photo Preview';
            document.getElementById('previewImg').src = fileData;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('fileSizeText').textContent = `Size: ${(file.size/1024).toFixed(1)}KB`;
          };
          reader.readAsDataURL(file);
        }
      } else {
        document.getElementById('previewTitle').textContent = 'Compressing Video...';
        document.getElementById('previewVideo').style.display = 'none';
        
        try {
          progressBar.style.width = '30%';
          const compressed = await compressVideo(file);
          progressBar.style.width = '100%';
          
          fileData = compressed.dataUrl;
          document.getElementById('previewTitle').textContent = 'Video Preview';
          document.getElementById('previewVideo').src = fileData;
          document.getElementById('previewVideo').style.display = 'block';
          document.getElementById('fileSizeText').textContent = 
            `Original: ${(compressed.originalSize/1024/1024).toFixed(1)}MB • Compressed: ${(compressed.compressedSize/1024/1024).toFixed(1)}MB • ${compressed.duration.toFixed(1)}s`;
        } catch(e) {
          console.error('Video compression failed:', e);
          const reader = new FileReader();
          reader.onload = (ev) => {
            fileData = ev.target.result;
            document.getElementById('previewTitle').textContent = 'Video Preview';
            document.getElementById('previewVideo').src = fileData;
            document.getElementById('previewVideo').style.display = 'block';
            document.getElementById('fileSizeText').textContent = `Size: ${(file.size/1024/1024).toFixed(1)}MB`;
          };
          reader.onprogress = (ev) => {
            if (ev.lengthComputable) {
              const percent = Math.round((ev.loaded / ev.total) * 100);
              progressBar.style.width = percent + '%';
            }
          };
          reader.readAsDataURL(file);
        }
      }
      
      setTimeout(() => {
        progressContainer.style.display = 'none';
      }, 500);
    };

    window.saveToCloud = async function() {
      if(!fileData) { showToast('Please select a file first!'); return; }
      
      const btn = document.getElementById('saveBtn');
      const status = document.getElementById('saveStatus');
      const caption = document.getElementById('captionInput').value.trim();
      btn.disabled = true; btn.textContent = 'Saving...'; status.textContent = '';
      
      try {
        const postData = {
          userId: currentUser,
          username: currentUser,
          type: selectedType,
          data: fileData,
          caption: caption || '',
          likes: 0,
          comments: 0,
          createdAt: serverTimestamp()
        };
        
        const docRef = await addDoc(collection(db, 'posts'), postData);
        console.log('✅ Saved to Firestore posts:', docRef.id);
        
        // Save to user profile
        const userRef = doc(db, 'users', currentUserId);
        const userSnap = await getDoc(userRef);
        let userPosts = userSnap.exists() ? (userSnap.data().posts || []) : [];
        userPosts.unshift({
          type: selectedType==='post'?'image':'video',
          src: fileData,
          caption: caption || '',
          likes: 0,
          liked: false,
          id: docRef.id,
          createdAt: new Date().toISOString()
        });
        await setDoc(userRef, { posts: userPosts }, { merge: true });
        console.log('✅ Saved to user profile');
        
        // Save to localStorage
        const profile = JSON.parse(localStorage.getItem('userProfile')||'{}');
        if(!profile.posts) profile.posts = [];
        if(!profile.username) profile.username = currentUser;
        profile.posts.unshift({ 
          type: selectedType==='post'?'image':'video', 
          src: fileData,
          caption: caption || '',
          id: docRef.id,
          username: currentUser,
          likes: 0,
          createdAt: new Date().toISOString()
        });
        localStorage.setItem('userProfile', JSON.stringify(profile));
        
        status.textContent = 'Uploaded successfully! ✅';
        status.className = 'status';
        showToast('Uploaded! 🎉');
        setTimeout(goBack, 1500);
      } catch(e) {
        console.error('Save error:', e);
        status.textContent = 'Error: ' + e.message;
        status.className = 'status error';
        showToast('Upload failed! ❌');
      }
      btn.disabled = false; btn.textContent = 'Save to Cloud ☁️';
    };

    window.goBack = function() {
      fileData=null; selectedType=null; originalFile=null;
      document.getElementById('fileInput').value='';
      document.getElementById('captionInput').value='';
      document.getElementById('mainContent').style.display='flex';
      document.getElementById('previewContent').style.display='none';
      document.getElementById('saveStatus').textContent='';
      document.getElementById('previewImg').style.display='none';
      document.getElementById('previewVideo').style.display='none';
    };

    function showToast(msg) {
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2000);
    }

    // ✅ Start app like index page - no loading screen, no buffering
    bootApp();
  </script>
</body>
</html>
