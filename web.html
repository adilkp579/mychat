<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web • Live Chat — Premium Glass | Functional Nav</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    
    /* ========== PREMIUM GLASS THEME — BLACK BACKGROUND ========== */
    :root {
      --glass-bg: rgba(20, 25, 45, 0.55);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-highlight: rgba(255, 255, 255, 0.06);
      --neon-purple: #a855f7;
      --neon-cyan: #06b6d4;
      --neon-green: #4ade80;
      --neon-red: #ef4444;
      --neon-orange: #f59e0b;
      --neon-blue: #3b82f6;
    }
    
    body { 
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overscroll-behavior: none;
      overflow: hidden;
    }
    
    /* Subtle animated gradient overlay on black (premium feel) */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 70% 30%, rgba(168,85,247,0.12) 0%, transparent 50%),
                  radial-gradient(circle at 20% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    
    .page { 
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: transparent;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    
    /* Animations */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse { 0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(168,85,247,0.6)} 50%{opacity:0.8; box-shadow:0 0 0 12px rgba(168,85,247,0)} }
    @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.7)} 50%{box-shadow:0 0 0 15px rgba(239,68,68,0)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes giftFloat { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-70px) scale(1.4);opacity:0} }
    
    /* Premium Glass Top Icons */
    .top-left-icon, .top-right-icon {
      position: fixed;
      top: max(1.2rem, env(safe-area-inset-top, 1.2rem));
      width: 2.6rem;
      height: 2.6rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
      z-index: 200;

    .top-left-icon { left: max(1rem, env(safe-area-inset-left, 1rem)); color: var(--neon-red); }
    .top-right-icon { right: max(1rem, env(safe-area-inset-right, 1rem)); color: var(--neon-green); }
    .top-left-icon:hover, .top-right-icon:hover {
      transform: scale(1.08);
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }
    
    /* Main Content Premium */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 4rem 1.2rem 1.2rem 1.2rem;
      gap: 14px;
      position: relative;
      z-index: 2;

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      display: inline-block;
      width: fit-content;
    }
    
    /* Camera Area Premium Glass Effect */

      align-items: flex-start;

      align-items: center;
      justify-content: center;

      transition: all 0.3s ease;
    }
    .stranger-camera::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left 0.6s;
      pointer-events: none;
    }
    .stranger-camera:hover::before { left: 100%; }
    .stranger-camera.connected { border-color: var(--neon-green); box-shadow: 0 0 35px rgba(74,222,128,0.3); }
    .stranger-camera.live-active { border-color: var(--neon-red); animation: livePulse 2s infinite; }
    
    .you-section { width: 35%; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .my-camera {

    .token-btn::after {
      content: '';

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

    .gift-float {

    /* Control Buttons Premium Glass */
    .control-row {

      align-items: center;
      margin-top: 6px;

    .ctrl-btn {

      letter-spacing: 0.5px;

    .mic-btn.muted { color: var(--neon-red); background: rgba(239,68,68,0.2); border-color: var(--neon-red); }

    .floating-nav {

      justify-content: center;

      z-index: 100;
    }
    .nav-center {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      gap: 0.3rem;
    }
    .nav-center a {
      color: rgba(255,255,255,0.7);
      font-size: 1.3rem;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.25s ease;
      text-decoration: none;
      cursor: pointer;
    }
    .nav-center a:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      color: white;
    }
    .nav-center a.active {
      background: rgba(168,85,247,0.35);
      color: white;
      box-shadow: 0 0 18px rgba(168,85,247,0.4);
      border: 1px solid rgba(168,85,247,0.4);
    }
    .nav-upload, .nav-search { display: none !important; }
    
    /* Toast notification for nav clicks */
    .nav-toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      color: #a855f7;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 1000;
      border: 1px solid rgba(168,85,247,0.5);
      white-space: nowrap;
      pointer-events: none;
      animation: fadeUp 0.3s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    /* Desktop refinement */
    @media (min-width: 1024px) {
      .nav-upload,.nav-search { display: flex !important; }
      .top-left-icon,.top-right-icon { display: none !important; }
      .floating-nav {
        position: fixed;
        top: 50%;
        left: 1.5rem;
        bottom: auto;
        transform: translateY(-50%);
        width: 3.8rem;
        height: auto;
        max-width: none;
        border-radius: 2.8rem;
        padding: 1rem 0.6rem;
        flex-direction: column;
      }
      .nav-center { flex-direction: column; gap: 1.2rem; max-width: none; }
      .nav-center a { width: 2.6rem; height: 2.6rem; font-size: 1.4rem; }
      .page { padding-left: 5rem; }
      .main-content { max-width: 800px; margin: 0 auto; width: 100%; padding-bottom: 1rem; }
      .nav-toast { bottom: auto; top: 20px; }
    }
    
    @media (max-width: 420px) {
      .token-btn { width: 80px; height: 34px; }
      .ctrl-btn { height: 38px; padding: 0 14px; font-size: 0.7rem; }
      .floating-nav { padding: 0.6rem 1rem; width: 94%; }
    }
    
    .https-warning { display: none; background: #ef4444; color: #fff; text-align: center; padding: 4px; font-size: 0.55rem; font-weight: 600; z-index: 200; width: 100%; position: fixed; top: 0; }
    .https-warning.show { display: block; }
    .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 500; flex-direction: column; gap: 8px; }
    .loading-screen i { font-size: 2rem; color: #a855f7; animation: spin 1s infinite; }
    .loading-screen span { font-size: 0.75rem; color: #888; }
  </style>

    // ========== FULLY FUNCTIONAL NAVBAR WITH ACTIVE STATES & TOAST ==========
    (function setupNavbar() {
      const navLinks = document.querySelectorAll('.nav-center a');
      const currentPageName = 'web'; // current page identifier
      
      // Function to show toast notification
      function showToast(pageName) {
        const toast = document.createElement('div');
        toast.className = 'nav-toast';
        toast.textContent = `✨ ${pageName} ✨`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
      }
      
      // Set active class based on data-page
      function setActiveNav(activeElement) {
        navLinks.forEach(link => link.classList.remove('active'));
        activeElement.classList.add('active');
      }
      
      // Add click handlers to each nav link
      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          
          const page = link.getAttribute('data-page');
          const pageName = link.getAttribute('data-name') || page.charAt(0).toUpperCase() + page.slice(1);
          
          // Update active state
          setActiveNav(link);
          
          // Show premium toast notification
          showToast(pageName);
          
          // Update URL hash without reloading (for history)
          window.location.hash = page;
          
          // Optional: You can add actual navigation logic here
          // For demo, we just show toast and update active state
          console.log(`Navigation to: ${pageName} (${page})`);
          
          // Visual feedback: subtle ripple effect
          link.style.transform = 'scale(0.95)';
          setTimeout(() => { link.style.transform = ''; }, 150);
        });
      });
      
      // Handle hash change for direct URL navigation
      function handleHashChange() {
        const hash = window.location.hash.replace('#', '');
        if (hash) {
          const targetLink = document.querySelector(`.nav-center a[data-page="${hash}"]`);
          if (targetLink) {
            setActiveNav(targetLink);
          }
        }
      }
      
      window.addEventListener('hashchange', handleHashChange);
      handleHashChange(); // initial check
    })();

      const currentUser=localStorage.getItem('currentUser')||'@anonymous',liveUserId=currentUser.replace('@','');
      let localStream,pc,roomId,unsubs=[],isMuted=false,isLive=false,strangerStream=null,liveViewers={},liveUnsub=null;
      const servers={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};
      
      liveBtn.onclick=toggleLive;startStopBtn.onclick=handleStartStop;nextBtn.onclick=()=>{stopChat();setTimeout(()=>startChat(),500);};micBtn.onclick=toggleMute;
      function setButtonState(state){startStopBtn.classList.remove('stop-state');if(state==='start'){startStopBtn.innerHTML='<i class="fas fa-play"></i><span>Start</span>';}else{startStopBtn.classList.add('stop-state');startStopBtn.innerHTML='<i class="fas fa-stop"></i><span>Stop</span>';}}
      function handleStartStop(){if(startStopBtn.classList.contains('stop-state')){stopChat();}else{startChat();}}
      function updateLiveButton(){if(isLive){liveBtn.innerHTML='<i class="fas fa-stop-circle"></i><span>End</span>';liveBtn.classList.add('active');}else{liveBtn.innerHTML='<i class="fas fa-circle"></i><span>Live</span>';liveBtn.classList.remove('active');}}
      async function startLive(){if(!localStream)return;isLive=true;updateLiveButton();try{await setDoc(doc(db,'live',liveUserId),{userId:currentUser,active:true,startedAt:serverTimestamp(),viewers:0});strangerCamera.classList.add('live-active');liveUnsub=onSnapshot(collection(db,'live_viewers'),(snap)=>{snap.docChanges().forEach(async(c)=>{const vd=c.doc.data();if(c.type==='added'&&vd.liveUser===currentUser&&vd.offer)await handleNewViewer(c.doc.id,vd);if(c.type==='modified'&&vd.streamEnded)cleanupViewer(c.doc.id);});});}catch(e){isLive=false;updateLiveButton();}}
      async function handleNewViewer(vid,vd){try{const vpc=new RTCPeerConnection(servers);if(localStream)localStream.getTracks().forEach(t=>vpc.addTrack(t,localStream));vpc.onicecandidate=async(e)=>{if(e.candidate){const s=await getDoc(doc(db,'live_viewers',vid));const ex=s.data()?.hostCandidates||[];ex.push(e.candidate.toJSON());await setDoc(doc(db,'live_viewers',vid),{hostCandidates:ex},{merge:true});}};await vpc.setRemoteDescription(new RTCSessionDescription(vd.offer));const a=await vpc.createAnswer();await vpc.setLocalDescription(a);await setDoc(doc(db,'live_viewers',vid),{answer:{type:a.type,sdp:a.sdp}},{merge:true});liveViewers[vid]=vpc;}catch(e){}}
      function cleanupViewer(vid){if(liveViewers[vid]){liveViewers[vid].close();delete liveViewers[vid];}}
      async function endLive(){isLive=false;updateLiveButton();Object.keys(liveViewers).forEach(id=>{if(liveViewers[id])liveViewers[id].close();});liveViewers={};await deleteDoc(doc(db,'live',liveUserId)).catch(()=>{});if(liveUnsub){liveUnsub();liveUnsub=null;}strangerCamera.classList.remove('live-active');}
      async function toggleLive(){if(isLive){await endLive();}else{if(!localStream){if(!await startCamera())return;}await startLive();}}
      async function startCamera(){try{if(localStream)localStream.getTracks().forEach(t=>t.stop());localStream=await navigator.mediaDevices.getUserMedia({video:{width:480,height:640,facingMode:'user'},audio:{echoCancellation:true,noiseSuppression:true}});myFeed.srcObject=localStream;await myFeed.play();myFeed.style.display='block';myPlaceholder.style.display='none';myCameraEl.classList.add('active');return true;}catch(e){return false;}}
      function stopCamera(){if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}myFeed.style.display='none';myFeed.srcObject=null;myPlaceholder.style.display='';myCameraEl.classList.remove('active');}
      function resetStranger(){strangerStream=null;strangerFeed.style.display='none';strangerFeed.srcObject=null;strangerPlaceholder.innerHTML='<i class="fas fa-user-astronaut"></i><span>???</span>';strangerPlaceholder.classList.remove('searching-text');strangerCamera.classList.remove('connected','live-active');}
      function showConnected(){setButtonState('stop');nextBtn.classList.add('visible');micBtn.classList.add('visible');}
      function showDisconnected(){setButtonState('start');nextBtn.classList.remove('visible');micBtn.classList.remove('visible');}
      function toggleMute(){if(!localStream)return;const t=localStream.getAudioTracks();if(t.length>0){isMuted=!isMuted;t.forEach(t=>t.enabled=!isMuted);micBtn.classList.toggle('muted',isMuted);micBtn.querySelector('i').className=isMuted?'fas fa-microphone-slash':'fas fa-microphone';}}
      async function createRoom(oId,isCaller){roomId=[myId,oId].sort().join('_');showConnected();if(pc){pc.close();pc=null;}unsubs.forEach(u=>u());unsubs=[];pc=new RTCPeerConnection(servers);localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=(e)=>{if(e.streams[0]){strangerStream=e.streams[0];strangerFeed.srcObject=e.streams[0];strangerFeed.style.display='block';strangerPlaceholder.innerHTML='';strangerCamera.classList.add('connected');}};pc.onicecandidate=async(e)=>{if(e.candidate)await addDoc(collection(doc(db,'rooms',roomId),'ice'),{sender:myId,candidate:e.candidate.toJSON()});};unsubs.push(onSnapshot(collection(doc(db,'rooms',roomId),'ice'),(snap)=>{snap.docChanges().forEach(async(c)=>{if(c.type==='added'&&c.doc.data().sender!==myId&&pc)try{await pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate));}catch(e){}});}));if(isCaller){const offer=await pc.createOffer({offerToReceiveVideo:true,offerToReceiveAudio:true});await pc.setLocalDescription(offer);await setDoc(doc(db,'invites',oId),{from:myId,offer:{type:offer.type,sdp:offer.sdp}});unsubs.push(onSnapshot(doc(db,'invites',oId),async(snap)=>{const d=snap.data();if(d?.answer&&!pc.currentRemoteDescription)await pc.setRemoteDescription(new RTCSessionDescription(d.answer));}));}}
      function listenForInvites(){unsubs.push(onSnapshot(doc(db,'invites',myId),async(snap)=>{if(!snap.exists())return;const d=snap.data();await deleteDoc(doc(db,'waiting',myId)).catch(()=>{});roomId=[myId,d.from].sort().join('_');showConnected();if(pc){pc.close();pc=null;}unsubs.forEach(u=>u());unsubs=[];pc=new RTCPeerConnection(servers);localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=(e)=>{if(e.streams[0]){strangerStream=e.streams[0];strangerFeed.srcObject=e.streams[0];strangerFeed.style.display='block';strangerPlaceholder.innerHTML='';strangerCamera.classList.add('connected');}};pc.onicecandidate=async(e)=>{if(e.candidate)await addDoc(collection(doc(db,'rooms',roomId),'ice'),{sender:myId,candidate:e.candidate.toJSON()});};if(d.offer&&pc.signalingState!=='closed'){await pc.setRemoteDescription(new RTCSessionDescription(d.offer));const answer=await pc.createAnswer();await pc.setLocalDescription(answer);await setDoc(doc(db,'invites',myId),{answer:{type:answer.type,sdp:answer.sdp}},{merge:true});}unsubs.push(onSnapshot(collection(doc(db,'rooms',roomId),'ice'),(snap)=>{snap.docChanges().forEach(async(c)=>{if(c.type==='added'&&c.doc.data().sender!==myId&&pc)try{await pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate));}catch(e){}});}));}));}
      async function startChat(){if(isLive){alert('Please END Live first.');return;}setButtonState('stop');strangerPlaceholder.innerHTML='<i class="fas fa-spinner fa-spin"></i><span style="color:#fbbf24;">Searching...</span>';strangerPlaceholder.classList.add('searching-text');if(!(await startCamera())){stopChat();return;}const snap=await getDocs(collection(db,'waiting'));let found=null;snap.forEach(d=>{if(d.data().userId!==myId&&!found)found=d.data().userId;});if(found){await deleteDoc(doc(db,'waiting',myId)).catch(()=>{});await deleteDoc(doc(db,'waiting',found)).catch(()=>{});await createRoom(found,true);}else{await setDoc(doc(db,'waiting',myId),{userId:myId});listenForInvites();}}
      function stopChat(){if(pc){pc.close();pc=null;}unsubs.forEach(u=>u());unsubs=[];if(roomId){deleteDoc(doc(db,'rooms',roomId)).catch(()=>{});roomId=null;}deleteDoc(doc(db,'waiting',myId)).catch(()=>{});deleteDoc(doc(db,'invites',myId)).catch(()=>{});if(isLive)endLive();resetStranger();stopCamera();showDisconnected();}
      window.addEventListener('beforeunload',()=>{if(isLive)endLive().catch(()=>{});if(pc)pc.close();if(localStream)localStream.getTracks().forEach(t=>t.stop());});
    }
  </script>
</body>
