  <!-- ... all HTML remains same ... -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch, limit, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    if (!localStorage.getItem("uid")) { window.location.replace("login.html"); }

    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    const currentUserId = currentUser.replace('@', '');
    let chatPartner = null, chatId = null, unsubMessages = null, unsubChatList = null;
    let allUsersList = [], chatListData = [], userProfiles = {};
    let mediaRecorder = null, audioChunks = [], voiceTimer = null, voiceSeconds = 0, isRecording = false;

    let localStream = null, peerConnection = null;
    let callType = null, callTimer = null, callSeconds = 0;
    let isCallActive = false, isCallConnected = false, isMuted = false, isVideoOff = false;
    let unsubCallSignal = null, unsubIncomingCall = null;
    let pendingIceCandidates = [];

    let servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" },{ urls: "stun:stun1.l.google.com:19302" }], iceCandidatePoolSize: 10 };

    async function fetchTurnServers() {
      try {
        const r = await fetch("https://adilchat.metered.live/api/v1/turn/credentials?apiKey=b62386e600aa4fd1a57f91dd569043e6d713");
        const ice = await r.json();
        if (ice && ice.length > 0) { servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" },{ urls: "stun:stun1.l.google.com:19302" },...ice], iceCandidatePoolSize: 10 }; }
      } catch(e) {}
    }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    fetchTurnServers();
    loadAllUsers();           // Load users FIRST (instant from cache)
    setupRealtimeChatList(); // Then start chat list listener
    listenForIncomingCalls();
    checkPendingCall();
    updateOnlineStatus();

    window.addEventListener('focus', () => { 
      loadAllUsers(); 
      if (chatListData.length > 0) renderChatList(chatListData); 
    });

    function updateOnlineStatus() {
      setDoc(doc(db, 'users_status', currentUserId), { online: true, lastSeen: serverTimestamp() }, { merge: true });
      window.addEventListener('beforeunload', () => { setDoc(doc(db, 'users_status', currentUserId), { online: false, lastSeen: serverTimestamp() }, { merge: true }); });
    }

    function cleanName(u) { return (u||'').replace(/^@/,''); }
    function formatDuration(s) { const m=Math.floor(s/60); const sec=Math.floor(s%60); return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }

    // ✅ FAST: Load users from cache + Firestore in parallel
    async function loadAllUsers() {
      // 1. Load from localStorage instantly
      userProfiles = {};
      allUsersList = [];
      
      // Own profile
      const ownProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (ownProfile.friends) {
        ownProfile.friends.forEach(f => {
          const u = f.name;
          if (u && u !== currentUser) {
            userProfiles[u] = { name: cleanName(u), avatar: f.avatar || null };
            allUsersList.push({ username: u, displayName: cleanName(u), avatar: f.avatar || null });
          }
        });
      }
      if (ownProfile.besties) {
        ownProfile.besties.forEach(f => {
          const u = f.name;
          if (u && u !== currentUser && !userProfiles[u]) {
            userProfiles[u] = { name: cleanName(u), avatar: f.avatar || null };
            allUsersList.push({ username: u, displayName: cleanName(u), avatar: f.avatar || null });
          }
        });
      }
      
      // Load from profile_ cache
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('profile_')) {
          try {
            const data = JSON.parse(localStorage.getItem(key));
            const un = data.username;
            if (un && un !== currentUser && !userProfiles[un]) {
              userProfiles[un] = { name: data.name || cleanName(un), avatar: data.avatar || null };
              allUsersList.push({ username: un, displayName: data.name || cleanName(un), avatar: data.avatar || null });
            }
          } catch(e) {}
        }
      }

      // 2. Firestore fetch in background (don't wait for it)
      fetchUsersFromFirestore();
    }
    
    async function fetchUsersFromFirestore() {
      try {
        const snap = await getDocs(collection(db, 'users'));
        snap.forEach(doc => {
          const d = doc.data();
          if (d.username && d.username !== currentUser) {
            const c = cleanName(d.username);
            if (!userProfiles[d.username]) {
              userProfiles[d.username] = { name: c, avatar: d.avatar || null };
              allUsersList.push({ username: d.username, displayName: c, avatar: d.avatar || null });
            } else {
              // Update avatar if Firestore has newer
              if (d.avatar) userProfiles[d.username].avatar = d.avatar;
            }
          }
        });
        // Re-render if needed
        if (document.getElementById('newChatModal').classList.contains('show')) {
          renderContactList(allUsersList);
        }
      } catch(e) {}
    }

    function avatarHTML(u){
      const p = userProfiles[u];
      if(p&&p.avatar&&p.avatar!=='null'&&p.avatar!=='undefined'){
        return`<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${cleanName(u).charAt(0).toUpperCase()}';"/>`;
      }
      return cleanName(u).charAt(0).toUpperCase();
    }
    function dispName(u){const p=userProfiles[u];return p?p.name:cleanName(u);}

    // ✅ OPTIMIZED: Chat list with caching
    let chatListCache = {};
    let initialChatLoad = true;

    function setupRealtimeChatList() {
      if (unsubChatList) unsubChatList();
      unsubChatList = onSnapshot(collection(db, 'chats'), s => {
        loadChatListFast(s);
      });
    }

    // ✅ FAST chat list loader
    function loadChatListFast(snap) {
      const myChats = [];
      const seenPartners = new Set();
      
      snap.forEach(doc => {
        const ids = doc.id.split('_');
        if (ids.includes(currentUserId)) {
          const partnerId = ids.find(id => id !== currentUserId);
          if (partnerId && !seenPartners.has(partnerId)) {
            seenPartners.add(partnerId);
            const chatData = doc.data();
            myChats.push({
              partnerId,
              lastMessageTime: chatData.lastMessageTime || null,
              lastMessage: chatData.lastMessage || '',
              lastSender: chatData.lastSender || ''
            });
          }
        }
      });
      
      // Sort by time
      myChats.sort((a, b) => {
        const tA = a.lastMessageTime?.toDate?.() || new Date(0);
        const tB = b.lastMessageTime?.toDate?.() || new Date(0);
        return tB - tA;
      });
      
      // Convert to display format
      chatListData = myChats.map(c => ({
        username: '@' + c.partnerId,
        lastMsg: c.lastMessage || 'No messages',
        lastTime: c.lastMessageTime?.toDate?.() || new Date(0),
        unreadCount: 0  // Will be updated by realtime messages
      }));
      
      // Render instantly
      renderChatList(chatListData);
      
      // Load unread counts in background
      if (initialChatLoad) {
        initialChatLoad = false;
        loadUnreadCounts(myChats);
      }
    }

    // ✅ Background: load unread counts (doesn't block UI)
    async function loadUnreadCounts(myChats) {
      for (const chat of myChats) {
        const cid = [currentUserId, chat.partnerId].sort().join('_');
        try {
          const ms = await getDocs(query(
            collection(db, 'chats', cid, 'messages'),
            where('sender', '!=', currentUserId),
            where('seen', '==', false),
            limit(50)
          ));
          const uc = ms.size;
          const idx = chatListData.findIndex(c => c.username === '@' + chat.partnerId);
          if (idx >= 0) {
            chatListData[idx].unreadCount = uc;
          }
        } catch(e) {}
      }
      renderChatList(chatListData);
    }

    function renderChatList(cu) {
      const l = document.getElementById('userList');
      const cnt = document.getElementById('chatCount');
      const tu = cu.reduce((s, c) => s + (c.unreadCount || 0), 0);
      
      cnt.textContent = cu.length > 0 ? '(' + cu.length + ')' : '';
      if (!chatPartner) {
        document.getElementById('partnerName').textContent = tu > 0 ? 'Chats (' + tu + ')' : 'Chats';
      }
      
      if (cu.length === 0) {
        l.innerHTML = '<div style="text-align:center;color:#555;padding:3rem;font-size:0.8rem;">No messages yet<br><br>Tap <b style="color:#FFFC00;">+</b> to start a chat</div>';
        return;
      }
      
      // ✅ Use DocumentFragment for faster DOM update
      const fragment = document.createDocumentFragment();
      
      cu.forEach(c => {
        const ts = c.lastTime && c.lastTime.getTime() > 0 ? fmtTime(c.lastTime) : '';
        const dn = dispName(c.username);
        
        const div = document.createElement('div');
        div.className = 'user-list-item' + (chatPartner === c.username ? ' active' : '');
        div.innerHTML = `
          <div class="user-avatar" onclick="openChat('${c.username}')">${avatarHTML(c.username)}</div>
          <div class="user-info" onclick="openChat('${c.username}')">
            <div class="user-name-row">
              <span class="user-name">${dn}</span>
              <span class="user-time">${ts}</span>
            </div>
            <div class="user-msg-row">
              <span class="user-last-msg ${c.unreadCount > 0 ? 'unread-msg' : ''}">${c.lastMsg || 'No messages'}</span>
              ${c.unreadCount > 0 ? `<span class="unread-count">${c.unreadCount}</span>` : ''}
            </div>
          </div>
          <i class="fas fa-user-circle profile-icon-btn" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.username)}'" title="View Profile"></i>
        `;
        fragment.appendChild(div);
      });
      
      l.innerHTML = '';
      l.appendChild(fragment);
    }

    function fmtTime(d) {
      if (!d || d.getTime() === 0) return '';
      const n = new Date();
      const df = n - d;
      if (df < 60000) return 'Now';
      if (df < 3600000) return Math.floor(df / 60000) + 'm';
      if (d.toDateString() === n.toDateString()) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (n - d < 604800000) return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()];
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    // ... rest of the functions (voice, WebRTC, messages, etc.) remain the same ...
    // (toggleVoice, startVoice, stopVoice, cancelVoice, sendVoice, playVoice,
    //  createPeerConnection, listenForCallSignal, listenForIncomingCalls,
    //  acceptIncomingCall, rejectIncomingCall, checkPendingCall, startCall,
    //  endCall, endCallInternal, toggleMic, toggleVideo,
    //  showNewChatModal, closeNewChatModal, filterContacts, renderContactList,
    //  startNewChat, openChat, goBack, listenToMessages, renderMsg, genBars,
    //  sendImage, sendMessage, listenToTyping, scrollToBottom)

  </script>
</body>
