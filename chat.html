<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#0a0a0a;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#0a0a0a;display:flex;flex-direction:column;position:relative;overflow:hidden; }

    /* ===== SNAPCHAT-STYLE CHAT HEADER ===== */
    .chat-header {
      display:flex;align-items:center;gap:0.8rem;
      padding:0.8rem 1rem;
      background:#0a0a0a;
      border-bottom:1px solid rgba(255,255,255,0.06);
      z-index:50;
      flex-shrink:0;
    }
    .chat-back {
      width:2.2rem;height:2.2rem;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:0.9rem;cursor:pointer;
      text-decoration:none;border:none;
    }
    .chat-avatar {
      width:36px;height:36px;border-radius:50%;
      background:linear-gradient(135deg,#FFFC00,#FFFC00);
      display:flex;align-items:center;justify-content:center;
      font-size:0.9rem;color:#000;font-weight:700;
      flex-shrink:0;
    }
    .chat-partner-info { flex:1;min-width:0; }
    .chat-partner-name {
      font-size:0.9rem;font-weight:600;color:#fff;
    }
    .chat-partner-status {
      font-size:0.65rem;color:#4ade80;
      display:flex;align-items:center;gap:0.2rem;
    }
    .chat-partner-status.typing { color:#FFFC00; }
    .chat-partner-status .dot {
      width:6px;height:6px;border-radius:50%;
      background:#4ade80;display:inline-block;
    }
    .chat-partner-status.typing .dot {
      background:#FFFC00;
      animation:typingDot 0.6s infinite alternate;
    }
    .chat-partner-status.typing .dot:nth-child(2) { animation-delay:0.2s; }
    .chat-partner-status.typing .dot:nth-child(3) { animation-delay:0.4s; }

    @keyframes typingDot {
      0% { opacity:0.3;transform:translateY(0); }
      100% { opacity:1;transform:translateY(-4px); }
    }

    .chat-actions {
      display:flex;gap:0.6rem;
    }
    .chat-action-btn {
      width:2.2rem;height:2.2rem;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:0.85rem;cursor:pointer;
      border:none;
    }

    /* ===== MESSAGES AREA ===== */
    .messages-container {
      flex:1;
      overflow-y:auto;
      padding:0.8rem 0.8rem 0.5rem 0.8rem;
      display:flex;flex-direction:column;
      gap:0.3rem;
      -webkit-overflow-scrolling:touch;
      scroll-behavior:smooth;
    }
    .messages-container::-webkit-scrollbar { width:0; }

    /* ===== MESSAGE BUBBLES ===== */
    .message-wrapper {
      display:flex;
      animation:fadeInUp 0.3s ease-out;
      max-width:85%;
    }
    .message-wrapper.sent {
      align-self:flex-end;
      flex-direction:row-reverse;
    }
    .message-wrapper.received {
      align-self:flex-start;
    }

    @keyframes fadeInUp {
      from { opacity:0;transform:translateY(12px); }
      to { opacity:1;transform:translateY(0); }
    }

    .message-bubble {
      padding:0.6rem 0.9rem;
      border-radius:1.2rem;
      font-size:0.85rem;
      line-height:1.35;
      word-break:break-word;
      position:relative;
      max-width:100%;
    }
    .sent .message-bubble {
      background:#FFFC00;
      color:#000;
      border-bottom-right-radius:0.3rem;
    }
    .received .message-bubble {
      background:#1c1c1e;
      color:#fff;
      border-bottom-left-radius:0.3rem;
    }

    .message-time {
      font-size:0.55rem;
      margin-top:0.15rem;
      display:flex;align-items:center;gap:0.2rem;
    }
    .sent .message-time {
      justify-content:flex-end;
      color:rgba(0,0,0,0.5);
    }
    .received .message-time {
      color:rgba(255,255,255,0.4);
    }

    /* ===== DELIVERED/SEEN INDICATORS ===== */
    .msg-status {
      font-size:0.55rem;
      margin-left:0.2rem;
    }
    .msg-status.sent-status { color:rgba(0,0,0,0.4); }
    .msg-status.delivered { color:rgba(0,0,0,0.5); }
    .msg-status.seen { color:#007AFF; }

    /* ===== TYPING INDICATOR IN CHAT ===== */
    .typing-bubble {
      display:none;
      align-self:flex-start;
      padding:0.5rem 0.9rem;
      background:#1c1c1e;
      border-radius:1.2rem;
      border-bottom-left-radius:0.3rem;
      animation:fadeInUp 0.2s ease-out;
    }
    .typing-bubble.show { display:flex;align-items:center;gap:0.25rem; }
    .typing-bubble .tb-dot {
      width:6px;height:6px;border-radius:50%;
      background:#888;
      animation:typingBounce 0.5s infinite alternate;
    }
    .typing-bubble .tb-dot:nth-child(2) { animation-delay:0.15s; }
    .typing-bubble .tb-dot:nth-child(3) { animation-delay:0.3s; }

    @keyframes typingBounce {
      0% { transform:translateY(0);opacity:0.4; }
      100% { transform:translateY(-5px);opacity:1; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-chat {
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      color:#555;gap:0.5rem;
      text-align:center;padding:2rem;
    }
    .empty-chat i { font-size:3rem;opacity:0.5; }
    .empty-chat p { font-size:0.8rem; }

    /* ===== FRIEND SELECTION MODAL ===== */
    .friend-select-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.85);
      z-index:300;display:none;
      align-items:center;justify-content:center;
      padding:1rem;
    }
    .friend-select-overlay.show { display:flex; }
    .friend-select-modal {
      background:#1a1a1a;
      border-radius:1rem;
      padding:1.2rem;
      width:100%;max-width:360px;
      max-height:70vh;overflow-y:auto;
      border:1px solid rgba(255,255,255,0.1);
    }
    .friend-select-modal h3 {
      font-size:0.9rem;color:#fff;margin-bottom:0.8rem;
      text-align:center;
    }
    .friend-select-modal input {
      width:100%;padding:0.6rem 0.8rem;
      border-radius:0.5rem;border:1px solid #333;
      background:#111;color:#fff;font-size:0.8rem;
      margin-bottom:0.6rem;outline:none;
    }
    .friend-select-modal input:focus { border-color:#FFFC00; }
    .friend-item {
      display:flex;align-items:center;gap:0.6rem;
      padding:0.6rem;border-radius:0.5rem;
      cursor:pointer;color:#fff;font-size:0.8rem;
    }
    .friend-item:hover { background:rgba(255,255,255,0.05); }
    .friend-item .fav { width:32px;height:32px;border-radius:50%;
      background:linear-gradient(135deg,#FFFC00,#FFD600);
      display:flex;align-items:center;justify-content:center;
      color:#000;font-weight:700;font-size:0.7rem;
    }
    .friend-item .fname { flex:1; }

    /* ===== INPUT AREA ===== */
    .chat-input-area {
      display:flex;align-items:center;gap:0.5rem;
      padding:0.6rem 0.8rem;
      padding-bottom:max(0.6rem,env(safe-area-inset-bottom,0.6rem));
      background:#0a0a0a;
      border-top:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
      z-index:50;
    }
    .chat-input {
      flex:1;
      padding:0.65rem 1rem;
      border-radius:1.5rem;
      border:1px solid rgba(255,255,255,0.15);
      background:#1c1c1e;
      color:#fff;
      font-size:0.85rem;
      outline:none;
      transition:all 0.2s;
    }
    .chat-input:focus { border-color:#FFFC00; }
    .chat-input::placeholder { color:#666; }

    .send-btn {
      width:40px;height:40px;
      border-radius:50%;
      background:#FFFC00;
      border:none;
      color:#000;
      font-size:1rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;
      flex-shrink:0;
    }
    .send-btn:active { transform:scale(0.9); }
    .send-btn:disabled { opacity:0.4; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    .nav-upload, .nav-search { display:none !important; }

    /* Loading screen */
    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem; }
    .loading-screen i { font-size:2rem;color:#3897f0;animation:spin 1s infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .loading-screen span { font-size:0.75rem;color:#888; }

    @media (min-width:1024px) {
      .nav-upload, .nav-search { display:flex !important; }
      .floating-nav { top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column; }
      .nav-center { flex-direction:column;gap:1.2rem;max-width:none; }
      .nav-center a { font-size:1.4rem;width:2.6rem;height:2.6rem; }
      .nav-center a::before { bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0); }
      .nav-center a.active::before { transform:translateY(-50%) scale(1); }
      .page { max-width:600px;margin:0 auto;border-left:1px solid rgba(255,255,255,0.06);border-right:1px solid rgba(255,255,255,0.06); }
      .chat-input-area { padding-left:1.5rem;padding-right:1.5rem; }
      .messages-container { padding-left:1rem;padding-right:1rem; }
    }
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .message-bubble{font-size:0.8rem;padding:0.5rem 0.7rem;}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <i class="fas fa-spinner"></i>
    <span>Loading chat...</span>
  </div>

  <div class="page" id="mainPage" style="display:none;">
    <!-- Chat Header -->
    <div class="chat-header" id="chatHeader">
      <button class="chat-back" onclick="showFriendModal()"><i class="fas fa-user-plus"></i></button>
      <div class="chat-avatar" id="partnerAvatar"><i class="fas fa-user"></i></div>
      <div class="chat-partner-info">
        <div class="chat-partner-name" id="partnerName">Select a friend</div>
        <div class="chat-partner-status" id="partnerStatus"><span class="dot"></span> Active</div>
      </div>
      <div class="chat-actions">
        <button class="chat-action-btn" onclick="showFriendModal()"><i class="fas fa-user-plus"></i></button>
      </div>
    </div>

    <!-- Messages Area -->
    <div class="messages-container" id="messagesContainer">
      <div class="empty-chat" id="emptyChat">
        <i class="fas fa-paper-plane"></i>
        <p>Tap <b>+</b> to start a chat</p>
      </div>
      <div class="typing-bubble" id="typingBubble">
        <div class="tb-dot"></div><div class="tb-dot"></div><div class="tb-dot"></div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-input-area" id="chatInputArea">
      <input type="text" class="chat-input" id="chatInput" placeholder="Send a chat... " disabled>
      <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>

    <!-- Friend Selection Modal -->
    <div class="friend-select-overlay" id="friendModal">
      <div class="friend-select-modal">
        <h3>💬 New Chat</h3>
        <input type="text" id="friendSearch" placeholder="Search username..." oninput="filterFriends()">
        <div id="friendList"></div>
        <div style="text-align:center;margin-top:0.6rem;">
          <button onclick="closeFriendModal()" style="background:#333;color:#fff;border:none;padding:0.5rem 1.5rem;border-radius:1rem;cursor:pointer;font-size:0.8rem;">Close</button>
        </div>
      </div>
    </div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="friend.html" class="nav-upload"><i class="fas fa-user-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    // ===== AUTH GATE =====
    if (!localStorage.getItem("uid")) {
      window.location.replace("login.html");
    }

    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    const currentUserId = currentUser.replace('@', '');
    let chatPartner = null;
    let chatId = null;
    let unsubMessages = null;
    let allUsers = [];

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    loadAllUsers();

    // ===== LOAD ALL USERS FOR FRIEND SELECTION =====
    async function loadAllUsers() {
      try {
        const snap = await getDocs(collection(db, 'users'));
        allUsers = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (d.username !== currentUser) {
            allUsers.push({ username: d.username, name: d.name || d.username });
          }
        });
        renderFriendList(allUsers);
      } catch(e) {
        // Fallback: load from profile
        const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
        allUsers = (profile.friends || []).map(f => ({ username: f.name, name: f.name }));
        renderFriendList(allUsers);
      }
    }

    function renderFriendList(users) {
      const list = document.getElementById('friendList');
      if (users.length === 0) {
        list.innerHTML = '<p style="color:#666;text-align:center;padding:1rem;font-size:0.75rem;">No users found. Add friends first!</p>';
        return;
      }
      list.innerHTML = users.map(u => `
        <div class="friend-item" onclick="selectFriend('${u.username}','${u.name || u.username}')">
          <div class="fav">${(u.name || u.username).charAt(0).toUpperCase()}</div>
          <span class="fname">${u.name || u.username}</span>
          <i class="fas fa-chevron-right" style="color:#555;font-size:0.7rem;"></i>
        </div>
      `).join('');
    }

    window.filterFriends = function() {
      const q = document.getElementById('friendSearch').value.toLowerCase();
      const filtered = allUsers.filter(u => 
        (u.name || u.username).toLowerCase().includes(q)
      );
      renderFriendList(filtered);
    };

    window.showFriendModal = function() {
      document.getElementById('friendModal').classList.add('show');
      document.getElementById('friendSearch').value = '';
      renderFriendList(allUsers);
    };

    window.closeFriendModal = function() {
      document.getElementById('friendModal').classList.remove('show');
    };

    document.getElementById('friendModal').addEventListener('click', function(e) {
      if (e.target === this) closeFriendModal();
    });

    // ===== SELECT FRIEND TO CHAT WITH =====
    window.selectFriend = function(username, name) {
      chatPartner = username;
      const partnerId = username.replace('@', '');
      // Create consistent chat ID (sorted alphabetically)
      chatId = [currentUserId, partnerId].sort().join('_');

      // Update UI
      document.getElementById('partnerName').textContent = name || username;
      document.getElementById('partnerAvatar').innerHTML = `<span>${(name || username).charAt(0).toUpperCase()}</span>`;
      document.getElementById('partnerStatus').innerHTML = '<span class="dot"></span> Active';
      document.getElementById('partnerStatus').classList.remove('typing');
      document.getElementById('chatInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('emptyChat').style.display = 'none';
      
      // Start listening to messages
      listenToMessages();
      closeFriendModal();
    };

    // ===== LISTEN TO MESSAGES =====
    function listenToMessages() {
      if (unsubMessages) unsubMessages();
      
      const messagesRef = collection(db, 'chats', chatId, 'messages');
      const q = query(messagesRef, orderBy('createdAt', 'asc'));
      
      unsubMessages = onSnapshot(q, (snap) => {
        const container = document.getElementById('messagesContainer');
        const emptyChat = document.getElementById('emptyChat');
        
        if (snap.empty) {
          emptyChat.style.display = 'flex';
          // Clear old messages but keep typing bubble
          container.querySelectorAll('.message-wrapper').forEach(el => el.remove());
          return;
        }
        
        emptyChat.style.display = 'none';
        
        snap.docChanges().forEach(change => {
          if (change.type === 'added') {
            const msg = change.doc.data();
            // Check if this message is already rendered
            if (document.getElementById('msg-' + change.doc.id)) return;
            renderMessage(change.doc.id, msg);
          }
        });
        
        scrollToBottom();
      });
    }

    // ===== RENDER MESSAGE BUBBLE =====
    function renderMessage(id, msg) {
      const container = document.getElementById('messagesContainer');
      const typingBubble = document.getElementById('typingBubble');
      const isSent = msg.sender === currentUserId;
      
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper ' + (isSent ? 'sent' : 'received');
      wrapper.id = 'msg-' + id;
      
      const time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
      
      wrapper.innerHTML = `
        <div class="message-bubble">
          ${msg.text || ''}
          <div class="message-time">
            ${time}
            ${isSent ? `<span class="msg-status ${msg.seen ? 'seen' : 'delivered'}">
              <i class="fas fa-${msg.seen ? 'check-double' : 'check'}"></i>
            </span>` : ''}
          </div>
        </div>
      `;
      
      // Insert before typing bubble
      container.insertBefore(wrapper, typingBubble);
      
      // Mark as seen if received
      if (!isSent && !msg.seen) {
        setDoc(doc(db, 'chats', chatId, 'messages', id), { seen: true }, { merge: true });
      }
    }

    // ===== SEND MESSAGE =====
    window.sendMessage = async function() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !chatId) return;
      
      input.value = '';
      
      try {
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
          text: text,
          sender: currentUserId,
          createdAt: serverTimestamp(),
          seen: false
        });
      } catch(e) {
        console.error('Send error:', e);
      }
    };

    // ===== TYPING INDICATOR =====
    let typingTimeout;
    document.getElementById('chatInput').addEventListener('input', function() {
      if (!chatId) return;
      
      // Set typing status
      setDoc(doc(db, 'chats', chatId, 'typing', currentUserId), {
        typing: true,
        updatedAt: serverTimestamp()
      });
      
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        setDoc(doc(db, 'chats', chatId, 'typing', currentUserId), {
          typing: false,
          updatedAt: serverTimestamp()
        });
      }, 2000);
    });

    // Listen for partner typing
    function listenToTyping() {
      if (!chatId) return;
      const partnerId = chatPartner.replace('@', '');
      
      onSnapshot(doc(db, 'chats', chatId, 'typing', partnerId), (snap) => {
        const data = snap.data();
        const status = document.getElementById('partnerStatus');
        const typingBubble = document.getElementById('typingBubble');
        
        if (data && data.typing) {
          status.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span> typing...';
          status.classList.add('typing');
          typingBubble.classList.add('show');
        } else {
          status.innerHTML = '<span class="dot"></span> Active';
          status.classList.remove('typing');
          typingBubble.classList.remove('show');
        }
      });
    }

    // Override selectFriend to also listen to typing
    const originalSelectFriend = window.selectFriend;
    window.selectFriend = function(username, name) {
      originalSelectFriend(username, name);
      setTimeout(() => listenToTyping(), 500);
    };

    // ===== SCROLL TO BOTTOM =====
    function scrollToBottom() {
      const container = document.getElementById('messagesContainer');
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 100);
    }

    // Send on Enter key
    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
