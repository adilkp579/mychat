<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Settings - Locks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overscroll-behavior:none; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    @keyframes slideUp { 0%{transform:translateY(100%)} 100%{transform:translateY(0)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes recPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    .scrollable-content { flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0;background:#000; }
    .scrollable-content::-webkit-scrollbar { width:0;height:0; }
    .scrollable-content { scrollbar-width:none;-ms-overflow-style:none; }
    .top-icons { width:100%;display:flex;align-items:center;justify-content:space-between;padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0;position:relative;background:transparent;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px); }
    .corner-btn { width:2.4rem;height:2.4rem;background:rgba(255,255,255,0.03);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.3s; }
    .top-brand { font-size:2rem;font-weight:700;color:#fff;letter-spacing:3px;font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;line-height:1;font-style:italic; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0.5rem 1.2rem 2rem 1.2rem;gap:1.5rem;width:100%;max-width:500px;margin:0 auto; }
    .create-btn { width:100%;padding:0.8rem;border-radius:1rem;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#aaa;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem; }
    .numpad-section { width:100%;display:flex;flex-direction:column;align-items:center;gap:1rem; }
    .numpad-label { font-size:0.75rem;color:rgba(255,255,255,0.4);text-align:center; }
    .pin-dots { display:flex;gap:1rem;margin:0.3rem 0; }
    .pin-dot { width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);transition:all 0.2s; }
    .pin-dot.filled { background:#FFFC00;border-color:#FFFC00;animation:dotPulse 0.3s ease; }
    .numpad-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;width:100%;max-width:260px; }
    .numpad-key { aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:#fff;font-size:1.3rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none; }
    .numpad-key:active { background:rgba(255,255,255,0.12);transform:scale(0.92); }
    .numpad-key.empty { background:transparent;border:none;cursor:default; }
    .numpad-key.delete-btn { background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.15);color:#ef4444;font-size:0.8rem; }
    .error-msg { color:#ef4444;font-size:0.7rem;text-align:center;min-height:1rem; }
    .modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem; }
    .modal-overlay.show { display:flex; }
    .modal { background:rgba(255,255,255,0.02);backdrop-filter:blur(40px) saturate(180%);border-radius:1.5rem;padding:1.5rem;width:100%;max-width:340px;animation:popIn 0.3s ease;border:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;gap:0.8rem; }
    .modal h3 { font-size:0.9rem;color:#fff;text-align:center;position:relative;z-index:2; }
    .modal .btn-row { display:flex;gap:0.5rem;width:100%;position:relative;z-index:2; }
    .modal .btn-row button { flex:1;padding:0.6rem;border-radius:0.8rem;border:none;font-size:0.75rem;font-weight:600;cursor:pointer; }
    .btn-cancel { background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.08); }
    .btn-save { background:rgba(255,252,0,0.15);color:#FFFC00;border:1px solid rgba(255,252,0,0.3); }
    .btn-save:disabled { opacity:0.3;cursor:not-allowed; }
    .lock-info-bar { display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.8rem;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:0.8rem;width:100%;margin-bottom:0.3rem; }
    .chat-list-header { padding:0.5rem 0;font-size:0.6rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;width:100%; }
    .users-list { width:100%;display:flex;flex-direction:column; }
    .user-list-item { display:flex;align-items:center;gap:0.7rem;padding:0.7rem 0.8rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.02);border-radius:0.6rem;transition:all 0.2s; }
    .user-list-item:hover { background:rgba(255,255,255,0.03); }
    .user-avatar { width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.04);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;font-weight:700;flex-shrink:0;border:1px solid rgba(255,255,255,0.1); }
    .user-info { flex:1;min-width:0; }
    .user-name { font-size:0.85rem;color:#fff;font-weight:500; }
    .add-user-btn { width:100%;padding:0.6rem;border-radius:0.8rem;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.5);font-size:0.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:0.5rem; }
    .btn-delete { width:100%;padding:0.5rem;border-radius:0.8rem;margin-top:0.5rem;border:1px solid rgba(239,68,68,0.15);background:rgba(239,68,68,0.05);font-size:0.7rem;cursor:pointer;color:#ef4444; }

    .chat-fullscreen { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);z-index:200;display:none;flex-direction:column; }
    .chat-fullscreen.show { display:flex; }
    .chat-header-bar { display:flex;align-items:center;gap:0.6rem;padding:0.8rem 0.8rem 0.5rem 0.8rem;padding-top:max(0.8rem,env(safe-area-inset-top,0.8rem));background:transparent;backdrop-filter:blur(25px);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04); }
    .chat-back-btn { width:2.4rem;height:2.4rem;min-width:2.4rem;background:rgba(255,255,255,0.03);border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);cursor:pointer; }
    .chat-avatar { width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:#fff;flex-shrink:0;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,0.1); }
    .chat-partner-info { flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;justify-content:center; }
    .chat-partner-name { font-size:0.95rem;font-weight:600;color:#fff; }
    .chat-partner-status { font-size:0.65rem;color:#4ade80;display:flex;align-items:center;gap:0.2rem; }
    .call-btns { display:flex;align-items:center;gap:0.5rem; }
    .call-btn { width:2.2rem;height:2.2rem;border-radius:50%;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;cursor:pointer;border:1px solid rgba(255,255,255,0.06); }
    .call-btn.video-call { color:#4ade80; }.call-btn.audio-call { color:#60a5fa; }
    .messages-container { flex:1;overflow-y:auto;padding:0.8rem 0.8rem 0.5rem 0.8rem;display:flex;flex-direction:column;gap:0.2rem; }
    .messages-container::-webkit-scrollbar { width:0; }
    .message-wrapper { display:flex;max-width:85%;animation:fadeInUp 0.15s ease-out; }
    .message-wrapper.sent { align-self:flex-end;flex-direction:row-reverse; }
    .message-wrapper.received { align-self:flex-start; }
    .message-bubble { padding:0.55rem 0.8rem;border-radius:1.2rem;font-size:0.85rem;line-height:1.3;word-break:break-word; }
    .sent .message-bubble { background:#a78bfa;color:#fff;border-bottom-right-radius:0.3rem; }
    .received .message-bubble { background:rgba(255,255,255,0.06);color:#fff;border-bottom-left-radius:0.3rem;border:1px solid rgba(255,255,255,0.06); }
    .message-time { font-size:0.55rem;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem; }
    .message-image { max-width:200px;max-height:200px;border-radius:0.8rem;object-fit:cover;cursor:pointer; }
    .lock-badge { font-size:0.45rem;color:#a78bfa;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem; }
    .empty-chat-full { flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:0.8rem; }
    .recording-bar { display:none;align-items:center;gap:0.5rem;padding:0.4rem 0.8rem;background:rgba(0,0,0,0.5);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .recording-bar.show { display:flex; }
    .recording-dot { width:10px;height:10px;border-radius:50%;background:#ef4444;animation:recPulse 0.8s infinite; }
    .chat-input-area { display:flex;align-items:center;gap:0.4rem;padding:0.5rem 0.8rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));background:transparent;backdrop-filter:blur(25px);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .camera-btn-s,.mic-btn-s { width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .chat-input { flex:1;padding:0.6rem 1rem;border-radius:1.5rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#fff;font-size:0.85rem;outline:none; }
    .send-btn { width:38px;height:38px;border-radius:50%;background:#a78bfa;border:none;color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }

    .call-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:600;display:none;flex-direction:column; }
    .call-overlay.show { display:flex; }
    .call-top-bar { display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem 0.5rem 1rem;padding-top:max(1rem,env(safe-area-inset-top,1rem));flex-shrink:0;z-index:10; }
    .call-video-container { flex:1;position:relative;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden; }
    .call-remote-video { width:100%;height:100%;object-fit:cover;background:#0a0a0a; }
    .call-local-video { position:absolute;top:1rem;right:1rem;width:120px;height:170px;border-radius:0.8rem;object-fit:cover;background:#222;border:2px solid rgba(255,255,255,0.3);transform:scaleX(-1);z-index:5; }
    .call-status-bar { padding:0.5rem 1rem;text-align:center;flex-shrink:0; }
    .call-status { color:#fff;font-size:0.85rem;font-weight:500; }
    .call-controls-bar { display:flex;align-items:center;justify-content:center;gap:2rem;padding:1rem 1.5rem;padding-bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));flex-shrink:0;background:rgba(0,0,0,0.5); }
    .call-ctrl-btn { width:55px;height:55px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.2s;background:rgba(255,255,255,0.15);color:#fff; }
    .call-mute-btn.muted { background:#ef4444;color:#fff; }
    .call-video-toggle.off { background:#ef4444;color:#fff; }
    .call-end-btn { background:#ef4444;color:#fff;width:60px;height:60px;font-size:1.5rem; }
    .call-end-btn i { transform:rotate(135deg); }
    .call-switch-btn { width:45px;height:45px;font-size:1rem; }
    .call-label { font-size:0.55rem;color:#aaa;text-align:center;margin-top:0.3rem;text-transform:uppercase;letter-spacing:0.5px; }
    .call-ctrl-wrap { display:flex;flex-direction:column;align-items:center; }

    .incoming-call-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:700;display:none;flex-direction:column;align-items:center;justify-content:center; }
    .incoming-call-overlay.show { display:flex; }
    .incoming-avatar { width:90px;height:90px;border-radius:50%;background:#222;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#fff;overflow:hidden;border:3px solid rgba(255,255,255,0.15); }
    .incoming-name { color:#fff;font-size:1.4rem;font-weight:700;margin-bottom:0.5rem; }
    .incoming-type { color:#aaa;font-size:0.9rem;margin-bottom:2.5rem; }
    .incoming-actions { display:flex;gap:3rem;align-items:center; }
    .incoming-accept { width:65px;height:65px;border-radius:50%;background:#4ade80;border:none;color:#fff;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .incoming-reject { width:65px;height:65px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .incoming-reject i { transform:rotate(135deg); }
    .incoming-label { font-size:0.65rem;color:#aaa;margin-top:0.5rem;text-align:center; }

    .add-users-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:350;display:none;align-items:flex-end;justify-content:center; }
    .add-users-overlay.show { display:flex; }
    .add-users-sheet { background:rgba(30,30,30,0.6);backdrop-filter:blur(50px) saturate(180%);border-radius:1.5rem 1.5rem 0 0;width:100%;max-width:450px;max-height:70vh;display:flex;flex-direction:column;animation:slideUp 0.3s ease;padding-bottom:env(safe-area-inset-bottom,1rem);border:1px solid rgba(255,255,255,0.06); }
    .sheet-header { display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .sheet-tabs { display:flex;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .sheet-tab { flex:1;text-align:center;padding:0.7rem;color:rgba(255,255,255,0.3);font-size:0.7rem;cursor:pointer;border-bottom:2px solid transparent; }
    .sheet-tab.active { color:#fff;border-bottom-color:#a78bfa; }
    .sheet-list { flex:1;overflow-y:auto;padding:0.5rem 0; }
    .sheet-list::-webkit-scrollbar { width:0; }
    .toast { position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,0.1); }
    .toast.show { opacity:1; }
    .shake { animation:shake 0.4s ease; }
  </style>
</head>
<body>
  <div class="page" id="mainPage">
    <div class="scrollable-content">
      <div class="top-icons"><button class="corner-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button><span class="top-brand">Settings</span><div style="width:2.4rem;"></div></div>
      <div class="content" id="mainView">
        <button class="create-btn" onclick="showCreateLockModal()"><i class="fas fa-plus-circle"></i> Create New Lock</button>
        <div class="numpad-section" id="numpadSection"><div class="numpad-label">🔐 Enter PIN to access lock</div>
          <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div><div class="error-msg" id="errorMsg"></div>
          <div class="numpad-grid">
            <button class="numpad-key" onclick="numpadPress('1')">1</button><button class="numpad-key" onclick="numpadPress('2')">2</button><button class="numpad-key" onclick="numpadPress('3')">3</button>
            <button class="numpad-key" onclick="numpadPress('4')">4</button><button class="numpad-key" onclick="numpadPress('5')">5</button><button class="numpad-key" onclick="numpadPress('6')">6</button>
            <button class="numpad-key" onclick="numpadPress('7')">7</button><button class="numpad-key" onclick="numpadPress('8')">8</button><button class="numpad-key" onclick="numpadPress('9')">9</button>
            <button class="numpad-key empty"></button><button class="numpad-key" onclick="numpadPress('0')">0</button><button class="numpad-key delete-btn" onclick="numpadDelete()"><i class="fas fa-delete-left"></i></button>
          </div>
        </div>
      </div>
      <div class="content" id="lockDetailView" style="display:none;">
        <div class="lock-info-bar"><span class="icon"><i class="fas fa-shield-halved"></i></span><span class="text" id="lockInfoText">🔒 Private Lock Chat</span></div>
        <div class="chat-list-header">Users <span id="lockUserCount"></span></div>
        <div class="users-list" id="lockUsersList"></div>
        <button class="add-user-btn" onclick="showAddUsersSheet()"><i class="fas fa-user-plus"></i> Add Users to Lock</button>
        <button class="btn-delete" onclick="deleteCurrentLock()"><i class="fas fa-trash"></i> Delete This Lock</button>
      </div>
    </div>

    <div class="chat-fullscreen" id="chatFullscreen">
      <div class="chat-header-bar"><button class="chat-back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button><div class="chat-avatar" id="chatAvatar"><i class="fas fa-user"></i></div><div class="chat-partner-info"><div class="chat-partner-name" id="chatPartnerName">User</div><div class="chat-partner-status"><span class="dot"></span> online</div></div><div class="call-btns"><button class="call-btn audio-call" onclick="startCall('audio')"><i class="fas fa-phone"></i></button><button class="call-btn video-call" onclick="startCall('video')"><i class="fas fa-video"></i></button></div></div>
      <div class="messages-container" id="messagesContainer"><div class="empty-chat-full">Send a message!</div></div>
      <div class="recording-bar" id="recordingBar"><div class="recording-dot"></div><span class="recording-time-text" id="recTime">00:00</span><button class="recording-cancel" onclick="cancelVoice()">✕</button><button class="recording-send-btn" onclick="sendVoice()" style="background:#a78bfa;border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;"><i class="fas fa-paper-plane"></i></button></div>
      <div class="chat-input-area">
        <button class="camera-btn-s" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
        <button class="mic-btn-s" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>

    <div class="call-overlay" id="callOverlay">
      <div class="call-top-bar"><span style="color:#fff;font-size:0.8rem;font-weight:500;" id="callPartnerNameTop">Calling...</span><span style="color:#aaa;font-size:0.65rem;" id="callTimerDisplay">00:00</span></div>
      <div class="call-video-container"><video id="callRemoteVideo" class="call-remote-video" autoplay playsinline></video><video id="callLocalVideo" class="call-local-video" autoplay playsinline muted></video></div>
      <div class="call-status-bar"><div class="call-status" id="callStatus">Connecting...</div></div>
      <div class="call-controls-bar">
        <div class="call-ctrl-wrap"><button class="call-ctrl-btn call-mute-btn" id="callMuteBtn" onclick="toggleCallMute()"><i class="fas fa-microphone"></i></button><div class="call-label">Mute</div></div>
        <div class="call-ctrl-wrap"><button class="call-ctrl-btn call-video-toggle" id="callVideoBtn" onclick="toggleCallVideo()"><i class="fas fa-video"></i></button><div class="call-label">Video</div></div>
        <div class="call-ctrl-wrap"><button class="call-ctrl-btn call-switch-btn" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></button><div class="call-label">Flip</div></div>
        <div class="call-ctrl-wrap"><button class="call-ctrl-btn call-end-btn" onclick="endCall()"><i class="fas fa-phone"></i></button><div class="call-label">End</div></div>
      </div>
    </div>

    <div class="incoming-call-overlay" id="incomingCallOverlay">

    window.startCall=async function(type){if(!chatPartner||isCallActive)return;callType=type;isCaller=true;try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:type==='video'?{width:{ideal:640},height:{ideal:480},facingMode:'user'}:false});const lv=document.getElementById('callLocalVideo');lv.srcObject=localStream;lv.style.display=type==='video'?'block':'none';document.getElementById('callVideoBtn').style.display=type==='video'?'flex':'none';document.getElementById('callOverlay').classList.add('show');document.getElementById('callStatus').textContent='Calling...';document.getElementById('callPartnerNameTop').textContent=dispName(chatPartner);startCallTimer();const callId=[currentUserId,chatPartner.replace('@','')].sort().join('_')+'_'+Date.now();callDocRef=doc(db,'calls',callId);await createPeerConnection();localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));const offer=await peerConnection.createOffer();await peerConnection.setLocalDescription(offer);await setDoc(callDocRef,{caller:currentUserId,callee:chatPartner.replace('@',''),type:type,status:'ringing',offer:{type:offer.type,sdp:offer.sdp},createdAt:serverTimestamp()});callUnsub=onSnapshot(callDocRef,async(snap)=>{const d=snap.data();if(!d)return;if(d.status==='rejected'){endCall();return}if(d.status==='accepted'&&d.answer&&!peerConnection.currentRemoteDescription){document.getElementById('callStatus').textContent='Connected';await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer))}if(d.calleeCandidates&&peerConnection?.remoteDescription){const el=peerConnection._addedCalleeCandidates||0;for(let i=el;i<d.calleeCandidates.length;i++){try{await peerConnection.addIceCandidate(new RTCIceCandidate(d.calleeCandidates[i]));peerConnection._addedCalleeCandidates=i+1}catch(e){}}}});isCallActive=true}catch(e){alert('Camera/mic needed!');endCall()}};
    async function createPeerConnection(){if(peerConnection){peerConnection.close();peerConnection=null}peerConnection=new RTCPeerConnection(servers);peerConnection.ontrack=(e)=>{if(e.streams&&e.streams[0])document.getElementById('callRemoteVideo').srcObject=e.streams[0]};peerConnection.onicecandidate=async(e)=>{if(e.candidate&&callDocRef){try{const snap=await getDoc(callDocRef);const d=snap.data();if(d){const candidates=isCaller?(d.callerCandidates||[]):(d.calleeCandidates||[]);candidates.push(e.candidate.toJSON());await updateDoc(callDocRef,{[isCaller?'callerCandidates':'calleeCandidates']:candidates})}}catch(ex){}}};peerConnection.onconnectionstatechange=()=>{if(peerConnection.connectionState==='disconnected'||peerConnection.connectionState==='failed'||peerConnection.connectionState==='closed')endCall()};peerConnection.oniceconnectionstatechange=()=>{if(peerConnection.iceConnectionState==='disconnected'||peerConnection.iceConnectionState==='failed'||peerConnection.iceConnectionState==='closed')endCall()}}
    function listenForIncomingCalls(){const q=query(collection(db,'calls'),orderBy('createdAt','desc'));onSnapshot(q,(snap)=>{snap.docChanges().forEach(async(ch)=>{if(ch.type==='added'){const d=ch.doc.data();if(d.callee===currentUserId&&d.status==='ringing'&&!isCallActive){callDocRef=doc(db,'calls',ch.doc.id);showIncomingCall(d)}}if(ch.type==='modified'&&callDocRef&&ch.doc.id===callDocRef.id){const d=ch.doc.data();if(d.status==='rejected'||d.status==='ended')endCall()}if(ch.type==='removed'&&callDocRef&&ch.doc.id===callDocRef.id)endCall()})})}

    window.acceptCall=async function(){document.getElementById('incomingCallOverlay').classList.remove('show');try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:callType==='video'?{width:{ideal:640},height:{ideal:480}}:false});const lv=document.getElementById('callLocalVideo');lv.srcObject=localStream;lv.style.display=callType==='video'?'block':'none';document.getElementById('callVideoBtn').style.display=callType==='video'?'flex':'none';document.getElementById('callOverlay').classList.add('show');document.getElementById('callStatus').textContent='Connecting...';const snap=await getDoc(callDocRef);if(snap.exists())document.getElementById('callPartnerNameTop').textContent=dispName('@'+snap.data().caller);startCallTimer();await createPeerConnection();localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));const d=snap.data();if(d&&d.offer){await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));const answer=await peerConnection.createAnswer();await peerConnection.setLocalDescription(answer);await updateDoc(callDocRef,{answer:{type:answer.type,sdp:answer.sdp},status:'accepted'})}callUnsub=onSnapshot(callDocRef,async(snap)=>{const dd=snap.data();if(!dd)return;if(dd.status==='rejected'||dd.status==='ended'){endCall();return}if(dd.callerCandidates&&peerConnection?.remoteDescription){const el=peerConnection._addedCallerCandidates||0;for(let i=el;i<dd.callerCandidates.length;i++){try{await peerConnection.addIceCandidate(new RTCIceCandidate(dd.callerCandidates[i]));peerConnection._addedCallerCandidates=i+1}catch(e){}}}});document.getElementById('callStatus').textContent='Connected';isCallActive=true}catch(e){endCall()}};

    window.toggleCallMute=function(){if(!localStream)return;isMuted=!isMuted;localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);document.getElementById('callMuteBtn').classList.toggle('muted',isMuted)};
    window.toggleCallVideo=function(){if(!localStream)return;isVideoOff=!isVideoOff;localStream.getVideoTracks().forEach(t=>t.enabled=!isVideoOff);document.getElementById('callVideoBtn').classList.toggle('off',isVideoOff);document.getElementById('callLocalVideo').style.display=isVideoOff?'none':'block'};
    window.switchCamera=async function(){if(!localStream||callType!=='video')return;const vt=localStream.getVideoTracks()[0];if(!vt)return;try{const ns=await navigator.mediaDevices.getUserMedia({video:{facingMode:vt.getSettings().facingMode==='user'?'environment':'user'}});const nt=ns.getVideoTracks()[0];const sender=peerConnection?.getSenders().find(s=>s.track?.kind==='video');if(sender)await sender.replaceTrack(nt);vt.stop();localStream.removeTrack(vt);localStream.addTrack(nt);document.getElementById('callLocalVideo').srcObject=localStream}catch(e){}}
    function startCallTimer(){callSeconds=0;document.getElementById('callTimerDisplay').textContent='00:00';if(callTimer)clearInterval(callTimer);callTimer=setInterval(()=>{callSeconds++;document.getElementById('callTimerDisplay').textContent=formatDuration(callSeconds)},1000)}
    function stopCallTimer(){if(callTimer){clearInterval(callTimer);callTimer=null}}

    // Messages
    async function ensureChatDoc(){const ref=doc(db,'chats',chatId);if(!(await getDoc(ref)).exists())await setDoc(ref,{users:[currentUserId,chatPartner.replace('@','')],lastMessage:'',lastType:'text',lastTime:serverTimestamp()})}
    function listenToMessages(){if(unsubMessages){unsubMessages();unsubMessages=null}messageCache={};lastVisibleDoc=null;allMessagesLoaded=false;const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','asc'),limit(PAGE_SIZE));const c=document.getElementById('messagesContainer');c.innerHTML='';loadMessagesBatch(q,true);const rq=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','desc'),limit(1));unsubMessages=onSnapshot(rq,(snap)=>{if(!snap.empty){const doc=snap.docs[0];if(!messageCache[doc.id]&&!document.getElementById('msg-'+doc.id)){messageCache[doc.id]=true;const el=createMsgElement(doc.id,doc.data());if(el){c.appendChild(el);c.scrollTop=c.scrollHeight}}}})}
    async function loadMessagesBatch(q,isFirst){const c=document.getElementById('messagesContainer');try{const snap=await getDocs(q);if(snap.empty&&isFirst){c.innerHTML='<div class="empty-chat-full">Send a message!</div>';return}if(isFirst)c.innerHTML='';const f=document.createDocumentFragment();snap.forEach(doc=>{if(!messageCache[doc.id]){messageCache[doc.id]=true;const el=createMsgElement(doc.id,doc.data());if(el)f.appendChild(el)}});if(isFirst){c.appendChild(f);c.scrollTop=c.scrollHeight}else{c.insertBefore(f,c.firstChild)}lastVisibleDoc=snap.docs[0];if(snap.docs.length<PAGE_SIZE)allMessagesLoaded=true}catch(e){if(isFirst)c.innerHTML='<div class="empty-chat-full">Send a message!</div>'}}
    function createMsgElement(id,msg){const isSent=msg.sender===currentUserId;if(document.getElementById('msg-'+id))return null;const w=document.createElement('div');w.className='message-wrapper '+(isSent?'sent':'received');w.id='msg-'+id;const b=document.createElement('div');b.className='message-bubble';let time='';if(msg.createdAt)try{time=new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}catch(e){}if(msg.imageUrl){b.innerHTML=`<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')" loading="lazy">`}else if(msg.audioUrl){const dur=msg.audioDuration||0;b.innerHTML=`<div class="voice-msg" data-audio="${msg.audioUrl}" data-duration="${dur}" onclick="playVoice(this)"><button class="voice-play-btn"><i class="fas fa-play"></i></button><div class="voice-wave-container">${genBars(18)}</div><span class="voice-duration">0:00 / ${formatDuration(dur)}</span></div>`}else{b.textContent=msg.text||''}const te=document.createElement('div');te.className='message-time';te.textContent=time;b.appendChild(te);const badge=document.createElement('div');badge.className='lock-badge';badge.innerHTML='<i class="fas fa-shield-halved"></i> Private';b.appendChild(badge);w.appendChild(b);return w}
    function genBars(n){let h='';for(let i=0;i<n;i++)h+=`<div class="voice-wave-bar" style="height:${(Math.random()*22+4)|0}px;"></div>`;return h}
    window.sendMessage=async function(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!chatId)return;input.value='';input.focus();const ti='temp-'+Date.now();const el=createMsgElement(ti,{text,sender:currentUserId,createdAt:{toDate:()=>new Date()},seen:false});if(el){document.getElementById('messagesContainer').appendChild(el);const c=document.getElementById('messagesContainer');c.scrollTop=c.scrollHeight}try{const ri=chatPartner.replace('@','');if(isBothLocked(ri)){const pr=doc(db,'private_chats',chatId);getDoc(pr).then(snap=>{if(!snap.exists())setDoc(pr,{users:[currentUserId,ri],lastMessage:'',lastTime:serverTimestamp()})});addDoc(collection(db,'private_chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false});updateDoc(pr,{lastMessage:text,lastTime:serverTimestamp(),['unread_'+ri]:increment(1)})}else{ensureChatDoc();addDoc(collection(db,'chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});updateDoc(doc(db,'chats',chatId),{lastMessage:'🔒 '+text,lastType:'text',lastTime:serverTimestamp(),['unread_'+ri]:increment(1),source:'settings'})}setTimeout(()=>{const t=document.getElementById(ti);if(t)t.remove()},2000)}catch(e){}};
    window.sendImage=async function(e){const file=e.target.files[0];if(!file||!chatId)return;const r=new FileReader();r.onload=async function(ev){try{const ri=chatPartner.replace('@','');if(isBothLocked(ri)){const pr=doc(db,'private_chats',chatId);getDoc(pr).then(snap=>{if(!snap.exists())setDoc(pr,{users:[currentUserId,ri],lastMessage:'',lastTime:serverTimestamp()})});addDoc(collection(db,'private_chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false});updateDoc(pr,{lastMessage:'📷 Photo',lastTime:serverTimestamp(),['unread_'+ri]:increment(1)})}else{ensureChatDoc();addDoc(collection(db,'chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});updateDoc(doc(db,'chats',chatId),{lastMessage:'📷 Photo',lastType:'image',lastTime:serverTimestamp(),['unread_'+ri]:increment(1),source:'settings'})}}catch(err){}};r.readAsDataURL(file);e.target.value=''};
    window.toggleVoice=function(){if(isRecording){sendVoice()}else{startVoice()}};
    async function startVoice(){if(!chatId)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});mediaRecorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm'});audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop())};mediaRecorder.start(100);isRecording=true;voiceSeconds=0;document.getElementById('recordingBar').classList.add('show');document.getElementById('micBtn').style.display='none';document.getElementById('sendBtn').style.display='none';document.getElementById('chatInput').style.display='none';document.getElementById('recTime').textContent='00:00';voiceTimer=setInterval(()=>{voiceSeconds++;document.getElementById('recTime').textContent=formatDuration(voiceSeconds)},1000)}catch(e){}}
    function stopVoice(c){if(mediaRecorder&&isRecording){if(c)audioChunks=[];if(mediaRecorder.state==='recording')mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block'}}
    window.cancelVoice=function(){stopVoice(true)};
    window.sendVoice=async function(){if(!mediaRecorder||!isRecording)return;if(voiceSeconds<1){stopVoice(true);return}mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});const reader=new FileReader();reader.onload=async function(e){try{const ri=chatPartner.replace('@','');if(isBothLocked(ri)){const pr=doc(db,'private_chats',chatId);getDoc(pr).then(snap=>{if(!snap.exists())setDoc(pr,{users:[currentUserId,ri],lastMessage:'',lastTime:serverTimestamp()})});addDoc(collection(db,'private_chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,sender:currentUserId,createdAt:serverTimestamp(),seen:false});updateDoc(pr,{lastMessage:'🎤 Voice',lastTime:serverTimestamp(),['unread_'+ri]:increment(1)})}else{ensureChatDoc();addDoc(collection(db,'chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});updateDoc(doc(db,'chats',chatId),{lastMessage:'🎤 Voice',lastType:'audio',lastTime:serverTimestamp(),['unread_'+ri]:increment(1),source:'settings'})}}catch(err){}};reader.readAsDataURL(blob)};mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block'};
    window.playVoice=function(el){const audioUrl=el.getAttribute('data-audio');const btn=el.querySelector('.voice-play-btn i');const ds=el.querySelector('.voice-duration');const td=parseFloat(el.getAttribute('data-duration')||'0');document.querySelectorAll('.voice-msg').forEach(m=>{if(m!==el&&m._audio){m._audio.pause();const ob=m.querySelector('.voice-play-btn i');if(ob)ob.className='fas fa-play';const od=m.querySelector('.voice-duration');if(od&&m._totalDur)od.textContent='0:00 / '+formatDuration(m._totalDur)}});if(!el._audio){el._audio=new Audio(audioUrl);el._totalDur=td;if(ds)ds.textContent='0:00 / '+formatDuration(td);el._audio.ontimeupdate=()=>{if(ds&&el._audio&&el._totalDur)ds.textContent=formatDuration(el._audio.currentTime)+' / '+formatDuration(el._totalDur)};el._audio.onended=()=>{btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent='0:00 / '+formatDuration(el._totalDur)}}const audio=el._audio;if(audio.paused){audio.play().catch(()=>{});btn.className='fas fa-pause'}else{audio.pause();btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent=formatDuration(audio.currentTime)+' / '+formatDuration(el._totalDur)}};

    document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMessage()}});
    window.deleteCurrentLock=function(){if(currentLockIndex<0)return;if(confirm('Delete this lock?')){locks.splice(currentLockIndex,1);saveLocks();goBackToMain();showToast('Lock deleted')}};
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
    document.getElementById('createLockModal').addEventListener('click',function(e){if(e.target===this)closeCreateLockModal()});
    document.getElementById('addUsersOverlay').addEventListener('click',function(e){if(e.target===this)closeAddUsersSheet()});
    document.addEventListener('keydown',function(e){if(document.getElementById('createLockModal').classList.contains('show')){if(e.key>='0'&&e.key<='9')createNumpadPress(e.key);else if(e.key==='Backspace')createNumpadDelete();else if(e.key==='Enter'){const b=document.getElementById('createLockConfirm');if(!b.disabled)confirmCreateLock()}return}if(e.key>='0'&&e.key<='9')numpadPress(e.key);else if(e.key==='Backspace')numpadDelete()});

    async function init(){loadLocks();await loadUserLists();listenForIncomingCalls();if(addUserFromChat&&!newLockFlag){if(locks.length>0){showToast('🔐 Enter PIN to add @'+addUserFromChat.replace('@',''))}else{setTimeout(showCreateLockModal,300)}}if(addUserFromChat&&newLockFlag){setTimeout(showCreateLockModal,300)}}
    init();
    window.addEventListener('beforeunload',()=>{if(isCallActive)endCall()});
  </script>
</body>
