<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }

    .chat-header {
      display:flex;align-items:center;gap:0.8rem;
      padding:0.8rem 1rem;background:#000;
      border-bottom:1px solid #1a1a1a;flex-shrink:0;z-index:50;
    }
    .chat-back {
      width:2.2rem;height:2.2rem;border-radius:50%;
      background:#1a1a1a;display:none;align-items:center;justify-content:center;
      color:#fff;font-size:0.9rem;cursor:pointer;border:none;
    }
    .chat-back.show { display:flex; }
    .chat-avatar {
      width:36px;height:36px;border-radius:50%;cursor:pointer;
      background:#1a1a1a;display:flex;align-items:center;justify-content:center;
      font-size:0.85rem;color:#fff;flex-shrink:0;overflow:hidden;
    }
    .chat-avatar img { width:100%;height:100%;object-fit:cover; }
    .chat-partner-info { flex:1;min-width:0; }
    .chat-partner-name { font-size:0.9rem;font-weight:600;color:#fff;cursor:pointer; }
    .chat-partner-status { font-size:0.65rem;color:#4ade80;display:flex;align-items:center;gap:0.2rem; }
    .chat-partner-status .dot { width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block; }

    .call-btns { display:none;align-items:center;gap:0.5rem; }
    .call-btns.show { display:flex; }
    .call-btn {
      width:2.2rem;height:2.2rem;border-radius:50%;
      background:#1a1a1a;display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:0.85rem;cursor:pointer;border:none;transition:all 0.2s;
    }
    .call-btn.video-call { color:#4ade80; }
    .call-btn.audio-call { color:#60a5fa; }

    .header-new-chat-btn {
      width:2.2rem;height:2.2rem;border-radius:50%;
      background:#1a1a1a;display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:0.85rem;cursor:pointer;border:none;flex-shrink:0;
    }
    .header-new-chat-btn.hidden { display:none; }

    .contacts-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.85);z-index:300;display:none;
      align-items:center;justify-content:center;padding:1rem;
    }
    .contacts-overlay.show { display:flex; }
    .contacts-modal {
      background:#1a1a1a;border-radius:1rem;padding:1.2rem;
      width:100%;max-width:360px;max-height:70vh;overflow-y:auto;
      border:1px solid #333;
    }
    .contacts-modal h3 { font-size:0.9rem;color:#fff;margin-bottom:0.8rem;text-align:center; }
    .contacts-modal input {
      width:100%;padding:0.6rem 0.8rem;border-radius:0.5rem;
      border:1px solid #333;background:#000;color:#fff;font-size:0.8rem;margin-bottom:0.6rem;outline:none;
    }
    .contact-item {
      display:flex;align-items:center;gap:0.6rem;
      padding:0.6rem;border-radius:0.5rem;cursor:pointer;color:#fff;font-size:0.8rem;
    }
    .contact-avatar {
      width:32px;height:32px;border-radius:50%;background:#333;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:700;font-size:0.7rem;flex-shrink:0;
    }
    .contact-avatar img { width:100%;height:100%;object-fit:cover; }
    .contact-name { flex:1; }
    .contact-close { text-align:center;margin-top:0.6rem;color:#ef4444;cursor:pointer;font-size:0.75rem;padding:0.4rem; }

    .chat-list-full { flex:1;display:flex;flex-direction:column;overflow:hidden; }
    .chat-list-full.hidden { display:none; }
    .chat-list-scroll { flex:1;overflow-y:auto;padding-bottom:5rem;-webkit-overflow-scrolling:touch; }
    .chat-list-scroll::-webkit-scrollbar { width:0; }
    .chat-list-header {
      padding:0.5rem 1rem;font-size:0.6rem;color:#666;
      text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;
    }
    .user-list-item {
      display:flex;align-items:center;gap:0.7rem;
      padding:0.7rem 1rem;cursor:pointer;border-bottom:1px solid #1a1a1a;
    }
    .user-avatar {
      width:48px;height:48px;border-radius:50%;background:#1a1a1a;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;color:#fff;font-weight:700;flex-shrink:0;
    }
    .user-avatar img { width:100%;height:100%;object-fit:cover; }
    .user-info { flex:1;min-width:0; }
    .user-name-row { display:flex;align-items:center;justify-content:space-between; }
    .user-name { font-size:0.85rem;color:#fff;font-weight:500; }
    .user-time { font-size:0.6rem;color:#555;flex-shrink:0; }
    .user-msg-row { display:flex;align-items:center;justify-content:space-between;margin-top:2px; }
    .user-last-msg { font-size:0.7rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px; }
    .user-last-msg.unread-msg { color:#fff;font-weight:500; }
    .unread-count {
      background:#FFFC00;color:#000;font-size:0.6rem;font-weight:700;
      min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .profile-icon-btn {
      color:#888;font-size:1.2rem;cursor:pointer;flex-shrink:0;padding:5px;
    }

    .chat-view { flex:1;display:none;flex-direction:column;overflow:hidden; }
    .chat-view.show { display:flex; }
    .messages-container {
      flex:1;overflow-y:auto;padding:0.8rem 0.8rem 0.5rem 0.8rem;
      display:flex;flex-direction:column;gap:0.2rem;-webkit-overflow-scrolling:touch;background:#000;
    }
    .messages-container::-webkit-scrollbar { width:0; }

    .message-wrapper { display:flex;max-width:85%;animation:fadeInUp 0.25s ease-out; }
    .message-wrapper.sent { align-self:flex-end;flex-direction:row-reverse; }
    .message-wrapper.received { align-self:flex-start; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    .message-bubble { padding:0.55rem 0.8rem;border-radius:1.2rem;font-size:0.85rem;line-height:1.3;word-break:break-word; }
    .sent .message-bubble { background:#FFFC00;color:#000;border-bottom-right-radius:0.3rem; }
    .received .message-bubble { background:#1a1a1a;color:#fff;border-bottom-left-radius:0.3rem; }
    .message-time { font-size:0.55rem;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem; }
    .sent .message-time { justify-content:flex-end;color:rgba(0,0,0,0.45); }
    .received .message-time { color:rgba(255,255,255,0.35); }

    .voice-msg { display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.8rem;cursor:pointer;min-width:180px; }
    .voice-play-btn {
      width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);
      border:none;color:#fff;font-size:0.8rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .sent .voice-play-btn { color:#000;background:rgba(0,0,0,0.15); }
    .voice-wave-container { flex:1;display:flex;align-items:center;gap:1px;height:28px; }
    .voice-wave-bar { width:2px;border-radius:1px;opacity:0.6; }
    .sent .voice-wave-bar { background:#000; }.received .voice-wave-bar { background:#fff; }
    .voice-duration { font-size:0.55rem;opacity:0.7;min-width:60px;text-align:right; }

    .message-image { max-width:200px;max-height:200px;border-radius:0.8rem;object-fit:cover;cursor:pointer; }

    .recording-bar {
      display:none;align-items:center;gap:0.5rem;
      padding:0.4rem 1rem;background:#1a1a1a;border-top:1px solid #333;
    }
    .recording-bar.show { display:flex; }
    .recording-dot { width:10px;height:10px;border-radius:50%;background:#ef4444;animation:recPulse 0.8s infinite; }
    @keyframes recPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.7);} }
    .recording-time-text { color:#ef4444;font-size:0.85rem;font-weight:600; }
    .recording-cancel { margin-left:auto;background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer; }
    .recording-send { width:38px;height:38px;border-radius:50%;background:#FFFC00;border:none;color:#000;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }

    .typing-bubble {
      display:none;align-self:flex-start;padding:0.45rem 0.8rem;background:#1a1a1a;
      border-radius:1rem;border-bottom-left-radius:0.3rem;gap:0.2rem;
    }
    .typing-bubble.show { display:flex;align-items:center; }
    .typing-bubble .tb-dot {
      width:5px;height:5px;border-radius:50%;background:#888;animation:typingBounce 0.5s infinite alternate;
    }
    .typing-bubble .tb-dot:nth-child(2) { animation-delay:0.15s; }
    .typing-bubble .tb-dot:nth-child(3) { animation-delay:0.3s; }
    @keyframes typingBounce { 0%{transform:translateY(0);opacity:0.4;} 100%{transform:translateY(-4px);opacity:1;} }

    .chat-input-area {
      display:flex;align-items:center;gap:0.4rem;
      padding:0.5rem 0.8rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));
      background:#000;border-top:1px solid #1a1a1a;flex-shrink:0;z-index:50;
    }
    .camera-btn,.mic-btn {
      width:38px;height:38px;border-radius:50%;background:#1a1a1a;
      border:none;color:#fff;font-size:0.9rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;
    }
    .chat-input {
      flex:1;padding:0.6rem 1rem;border-radius:1.5rem;
      border:1px solid #333;background:#1a1a1a;
      color:#fff;font-size:0.85rem;outline:none;
    }
    .chat-input:focus { border-color:#FFFC00; }
    .send-btn {
      width:38px;height:38px;border-radius:50%;background:#FFFC00;
      border:none;color:#000;font-size:0.9rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;
    }

    .incoming-call-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:#000;z-index:9999;display:none;
      flex-direction:column;align-items:center;justify-content:center;gap:1rem;
    }
    .incoming-call-overlay.show { display:flex; }
    .incoming-call-avatar {
      width:80px;height:80px;border-radius:50%;background:#1a1a1a;
      display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;overflow:hidden;
    }
    .incoming-call-avatar img { width:100%;height:100%;object-fit:cover; }
    .incoming-call-name { font-size:1.2rem;color:#fff;font-weight:600; }
    .incoming-call-type { font-size:0.9rem;color:#4ade80; }
    .incoming-call-type.ringing { animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .incoming-call-actions { display:flex;gap:2rem;margin-top:1rem; }
    .incoming-call-btn {
      width:55px;height:55px;border-radius:50%;border:none;
      font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .incoming-call-btn.reject { background:#ef4444;color:#fff; }
    .incoming-call-btn.accept { background:#4ade80;color:#fff;width:65px;height:65px;font-size:1.5rem; }

    .call-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:#000;z-index:400;display:none;
      flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
    }
    .call-overlay.show { display:flex; }
    .call-video-container {
      position:absolute;top:0;left:0;right:0;bottom:0;
      display:flex;align-items:center;justify-content:center;
    }
    .call-remote-video { width:100%;height:100%;object-fit:cover;background:#000; }
    .call-local-video {
      position:absolute;top:1rem;right:1rem;
      width:120px;height:160px;border-radius:0.8rem;
      object-fit:cover;background:#1a1a1a;border:2px solid #333;z-index:10;
    }
    .call-info {
      position:absolute;top:2rem;left:50%;transform:translateX(-50%);text-align:center;z-index:10;
    }
    .call-info .call-name { font-size:1.2rem;color:#fff;font-weight:600; }
    .call-info .call-status { font-size:0.9rem;color:#fff;margin-top:0.3rem; }
    .call-actions { position:absolute;bottom:3rem;display:flex;gap:1.5rem;z-index:10; }
    .call-action-btn {
      width:55px;height:55px;border-radius:50%;border:none;cursor:pointer;
      font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    }
    .call-action-btn.end-call { background:#ef4444;color:#fff; }
    .call-action-btn.toggle-video { background:#333;color:#fff; }
    .call-action-btn.toggle-mic { background:#333;color:#fff; }
    .call-action-btn.toggle-mic.muted { background:#ef4444; }
    .call-action-btn.toggle-video.off { background:#ef4444; }

    .empty-chat { flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:0.8rem; }
    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem; }
    .loading-screen i { font-size:2rem;color:#3897f0;animation:spin 1s infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .floating-nav { 
      position:fixed;bottom:max(1rem,env(safe-area-inset-bottom,1rem));
      left:50%;transform:translateX(-50%);
      width:92%;max-width:500px;
      background:#1a1a1a;
      border-radius:2.5rem;padding:0.7rem 1.5rem;
      display:flex;align-items:center;justify-content:center;
      border:1px solid #333;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:100;
    }
    .floating-nav.hidden { display:none; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:#888;font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active { color:#fff;background:#333; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-upload, .nav-search { display:none !important; }

    @media (min-width: 1024px) {
      .nav-upload,.nav-search{display:flex!important}
      .floating-nav{position:fixed;top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .floating-nav.hidden{display:flex!important}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .page{padding:0 0 0 5.5rem}
      .chat-header{max-width:550px;margin:0 auto;width:100%}
      .chat-list-full{max-width:550px;margin:0 auto;width:100%}
      .chat-view{max-width:550px;margin:0 auto;width:100%}
      .chat-input-area{max-width:550px;margin:0 auto;width:100%}
      .call-local-video{width:180px;height:240px;top:2rem;right:2rem}
    }
    @media (max-width:380px) {
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:max(0.8rem,env(safe-area-inset-bottom,0.8rem))}
      .nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .chat-list-scroll{padding-bottom:4.5rem}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen"><i class="fas fa-spinner"></i><span>Loading...</span></div>

  <div class="page" id="mainPage" style="display:none;">
    <div class="chat-header">
      <button class="chat-back" id="backBtn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
      <div class="chat-avatar" id="partnerAvatar" onclick="if(chatPartner)window.location.href='profile.html?user='+encodeURIComponent(chatPartner)"><i class="fas fa-comment-dots"></i></div>
      <div class="chat-partner-info">
        <div class="chat-partner-name" id="partnerName">Chats</div>
        <div class="chat-partner-status" id="partnerStatus"></div>
      </div>
      <div class="call-btns" id="callBtns">
        <button class="call-btn audio-call" onclick="startCall('audio')" title="Audio Call"><i class="fas fa-phone"></i></button>
        <button class="call-btn video-call" onclick="startCall('video')" title="Video Call"><i class="fas fa-video"></i></button>
      </div>
      <button class="header-new-chat-btn" id="newChatBtn" onclick="showNewChatModal()"><i class="fas fa-plus"></i></button>
    </div>

    <div class="chat-list-full" id="chatListFull">
      <div class="chat-list-header">Messages <span id="chatCount"></span></div>
      <div class="chat-list-scroll" id="userList"></div>
    </div>

    <div class="chat-view" id="chatView">
      <div class="messages-container" id="messagesContainer">
        <div class="empty-chat" id="emptyChat">Send a message!</div>
        <div class="typing-bubble" id="typingBubble"><div class="tb-dot"></div><div class="tb-dot"></div><div class="tb-dot"></div></div>
      </div>
      <div class="recording-bar" id="recordingBar">
        <div class="recording-dot"></div><span class="recording-time-text" id="recTime">00:00</span>
        <button class="recording-cancel" onclick="cancelVoice()">✕</button>
        <button class="recording-send" onclick="sendVoice()"><i class="fas fa-paper-plane"></i></button>
      </div>
      <div class="chat-input-area">
        <button class="camera-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>

    <div class="incoming-call-overlay" id="incomingCallOverlay">
      <div class="incoming-call-avatar" id="incomingCallAvatar"><i class="fas fa-user"></i></div>
      <div class="incoming-call-name" id="incomingCallName">User</div>
      <div class="incoming-call-type ringing" id="incomingCallType">📹 Video call...</div>
      <div class="incoming-call-actions">
        <button class="incoming-call-btn reject" onclick="rejectIncomingCall()"><i class="fas fa-phone-slash"></i></button>
        <button class="incoming-call-btn accept" onclick="acceptIncomingCall()"><i class="fas fa-phone"></i></button>
      </div>
    </div>

    <div class="call-overlay" id="callOverlay">
      <div class="call-video-container">
        <video id="remoteVideo" class="call-remote-video" autoplay playsinline></video>
        <video id="localVideo" class="call-local-video" autoplay playsinline muted></video>
      </div>
      <div class="call-info">
        <div class="call-name" id="callName">User</div>
        <div class="call-status ringing" id="callStatus">Calling...</div>
      </div>
      <div class="call-actions" id="callActions">
        <button class="call-action-btn toggle-mic" id="toggleMicBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
        <button class="call-action-btn toggle-video" id="toggleVideoBtn" onclick="toggleVideo()"><i class="fas fa-video"></i></button>
        <button class="call-action-btn end-call" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
      </div>
    </div>

    <div class="contacts-overlay" id="newChatModal">
      <div class="contacts-modal">
        <h3>👥 New Chat</h3>
        <input type="text" id="contactSearch" placeholder="Search users..." oninput="filterContacts()">
        <div id="contactList"></div>
        <div class="contact-close" onclick="closeNewChatModal()">Close ✕</div>
      </div>
    </div>

    <nav class="floating-nav" id="floatingNav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    function genBars(n){let h='';for(let i=0;i<n;i++){h+=`<div class="voice-wave-bar" style="height:${Math.floor(Math.random()*22)+4}px;"></div>`;}return h;}
    window.sendImage=async function(e){const file=e.target.files[0];if(!file||!chatId)return;const r=new FileReader();r.onload=async function(ev){try{await addDoc(collection(db,'chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await setDoc(doc(db,'chats',chatId),{lastMessageTime:serverTimestamp(),lastMessage:'📷 Photo',lastSender:currentUserId},{merge:true});}catch(err){}};r.readAsDataURL(file);e.target.value='';};
    window.sendMessage=async function(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!chatId)return;input.value='';try{const batch=writeBatch(db);const msgRef=doc(collection(db,'chats',chatId,'messages'));batch.set(msgRef,{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false});batch.set(doc(db,'chats',chatId),{lastMessageTime:serverTimestamp(),lastMessage:text,lastSender:currentUserId},{merge:true});await batch.commit();}catch(e){await addDoc(collection(db,'chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await setDoc(doc(db,'chats',chatId),{lastMessageTime:serverTimestamp(),lastMessage:text,lastSender:currentUserId},{merge:true});}};
    function listenToTyping(){const pid=chatPartner.replace('@','');onSnapshot(doc(db,'chats',chatId,'typing',pid),snap=>{const d=snap.data(),st=document.getElementById('partnerStatus'),tb=document.getElementById('typingBubble');if(d&&d.typing){st.innerHTML='<span class="dot"></span> typing...';tb.classList.add('show');}else{st.innerHTML='<span class="dot"></span> online';tb.classList.remove('show');}});}
    let tt;document.getElementById('chatInput').addEventListener('input',function(){if(!chatId)return;setDoc(doc(db,'chats',chatId,'typing',currentUserId),{typing:true,updatedAt:serverTimestamp()});clearTimeout(tt);tt=setTimeout(()=>setDoc(doc(db,'chats',chatId,'typing',currentUserId),{typing:false,updatedAt:serverTimestamp()}),2000);});
    document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
    function scrollToBottom(){const c=document.getElementById('messagesContainer');setTimeout(()=>{c.scrollTop=c.scrollHeight;},100);}
  </script>
</body>
