<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif; min-height: 100vh; padding: 1rem; }
    .container { max-width: 500px; margin: 0 auto; }
    h2 { text-align: center; margin: 1rem 0; color: #4ade80; }
    .debug { background: #111; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin: 1rem 0; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; color: #0f0; }
    .videos { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .vid { flex: 1; aspect-ratio: 3/4; background: #111; border: 2px solid #333; border-radius: 12px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; max-height: 250px; }
    .vid video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .vid .off { color: #555; text-align: center; }
    .vid.connected { border-color: #4ade80; }
    .label { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; z-index: 5; }
    .btn { padding: 12px 30px; border-radius: 25px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; margin: 5px; }
    .btn-green { background: #4ade80; color: #000; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn:disabled { opacity: 0.5; }
    .status { text-align: center; color: #aaa; margin: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎥 Random Video Chat</h2>
    <div class="debug" id="debug">Waiting...</div>
    <div class="status" id="status">Press Start</div>
    
    <div class="videos">
      <div class="vid" id="myVid">
        <div class="label">YOU</div>
        <video id="myVideo" autoplay playsinline muted></video>
        <div class="off" id="myOff"><br>📷<br>off</div>
      </div>
      <div class="vid" id="strangerVid">
        <div class="label">STRANGER</div>
        <video id="strangerVideo" autoplay playsinline muted></video>
        <div class="off" id="strangerOff"><br>👤<br>???</div>
      </div>
    </div>
    
    <div style="text-align:center">
      <button class="btn btn-green" id="startBtn">Start</button>
      <button class="btn btn-red" id="stopBtn" style="display:none">Stop</button>
      <button class="btn btn-blue" id="nextBtn" style="display:none">Next</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, addDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.firebasestorage.app",
      messagingSenderId: "206620858913",
      appId: "1:206620858913:web:e8171ed8c1a2dbda3da160"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const debugEl = document.getElementById('debug');
    const statusEl = document.getElementById('status');
    const myVideo = document.getElementById('myVideo');
    const myOff = document.getElementById('myOff');
    const myVid = document.getElementById('myVid');
    const strangerVideo = document.getElementById('strangerVideo');
    const strangerOff = document.getElementById('strangerOff');
    const strangerVid = document.getElementById('strangerVid');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const nextBtn = document.getElementById('nextBtn');

    function log(msg) {
      console.log(msg);
      debugEl.innerHTML += '> ' + msg + '<br>';
      debugEl.scrollTop = debugEl.scrollHeight;
    }

    log('✅ Firebase ready');
    
    const myId = crypto.randomUUID();
    log('ID: ' + myId.substring(0,8));

    let localStream = null;
    let pc = null;
    let roomId = null;
    let unsubs = [];

    // Camera
    async function startCamera() {
      log('📷 Starting camera...');
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        myVideo.srcObject = localStream;
        await myVideo.play();
        myVideo.style.display = 'block';
        myOff.style.display = 'none';
        myVid.classList.add('connected');
        log('✅ Camera ready');
        return true;
      } catch(e) {
        log('❌ Camera: ' + e.message);
        return false;
      }
    }

    function stopCamera() {
      if(localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      myVideo.style.display = 'none';
      myVideo.srcObject = null;
      myOff.style.display = '';
      myVid.classList.remove('connected');
    }

    function resetStranger() {
      strangerVideo.style.display = 'none';
      strangerVideo.srcObject = null;
      strangerOff.style.display = '';
      strangerVid.classList.remove('connected');
    }

    // Wait - write to "waiting" collection
    async function startWaiting() {
      log('⏳ Adding to waiting list...');
      statusEl.textContent = 'Looking for someone...';
      
      try {
        // Write myself as waiting
        await setDoc(doc(db, "waiting", myId), {
          userId: myId,
          created: serverTimestamp()
        });
        log('✅ Added to waiting list');
        
        // Listen for someone to pick me up
        listenForInvite();
        
        // Also check if someone else is already waiting
        checkForOthers();
      } catch(e) {
        log('❌ Waiting error: ' + e.message);
      }
    }

    // Check if others are waiting
    async function checkForOthers() {
      log('🔍 Checking for others...');
      try {
        const snap = await getDoc(doc(db, "waiting", "check"));
        // We'll use a simple approach - just wait for incoming invite
        log('Listening for connections...');
      } catch(e) {
        log('❌ Check error: ' + e.message);
      }
    }

    // Listen for someone inviting me
    function listenForInvite() {
      log('👂 Listening for invites...');
      
      const unsub = onSnapshot(doc(db, "invites", myId), async (snap) => {
        if(snap.exists()) {
          const data = snap.data();
          log('📩 Got invite from: ' + data.from?.substring(0,8));
          
          // Remove myself from waiting
          await deleteDoc(doc(db, "waiting", myId)).catch(()=>{});
          
          // Create room - I am the answerer (not caller)
          await createRoom(data.from, false, data.offer);
          
          // Delete invite
          await deleteDoc(doc(db, "invites", myId));
          unsub();
        }
      });
      unsubs.push(unsub);
    }

    // Create room and connect
    async function createRoom(otherId, isCaller, remoteOffer) {
      log('🏠 Creating room, isCaller=' + isCaller);
      statusEl.textContent = 'Connected!';
      
      roomId = [myId, otherId].sort().join("_");
      log('Room: ' + roomId.substring(0,16));
      
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      nextBtn.style.display = 'inline-block';

      pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });

      // Add local tracks
      if(localStream) {
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      }

      // Handle remote stream
      pc.ontrack = (e) => {
        log('📥 Got remote stream!');
        strangerVideo.srcObject = e.streams[0];
        strangerVideo.style.display = 'block';
        strangerOff.style.display = 'none';
        strangerVid.classList.add('connected');
      };

      // ICE candidates
      pc.onicecandidate = async (e) => {
        if(e.candidate) {
          await addDoc(collection(db, "rooms", roomId, "ice"), {
            from: myId,
            candidate: e.candidate.toJSON()
          });
        }
      };

      pc.onconnectionstatechange = () => {
        log('State: ' + pc.connectionState);
        if(pc.connectionState === 'connected') {
          log('✅✅✅ CONNECTED!');
          statusEl.textContent = '🎉 Connected!';
        }
        if(pc.connectionState === 'failed') {
          log('❌ Connection failed');
          statusEl.textContent = 'Connection failed';
        }
      };

      const roomRef = doc(db, "rooms", roomId);

      if(isCaller) {
        // I am caller - create offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // Save offer and invite the other person
        await setDoc(roomRef, {
          offer: { type: offer.type, sdp: offer.sdp },
          created: serverTimestamp()
        });
        
        // Send invite to the waiting person
        await setDoc(doc(db, "invites", otherId), {
          from: myId,
          offer: { type: offer.type, sdp: offer.sdp }
        });
        
        log('📞 Offer sent + invite sent');
        
        // Listen for answer
        const unsubRoom = onSnapshot(roomRef, async (snap) => {
          const data = snap.data();
          if(data && data.answer && !pc.currentRemoteDescription) {
            log('📩 Got answer');
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            log('✅ Connected!');
            unsubRoom();
          }
        });
        unsubs.push(unsubRoom);
      } else {
        // I am answerer
        if(remoteOffer) {
          await pc.setRemoteDescription(new RTCSessionDescription(remoteOffer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          
          await setDoc(roomRef, {
            answer: { type: answer.type, sdp: answer.sdp }
          }, { merge: true });
          
          log('📞 Answer sent');
        }
        
        // Listen for offer updates
        const unsubRoom = onSnapshot(roomRef, async (snap) => {
          const data = snap.data();
          if(data && data.iceCandidates) {
            // ICE will be handled separately
          }
        });
        unsubs.push(unsubRoom);
      }

      // Listen for ICE from other person
      const unsubIce = onSnapshot(collection(db, "rooms", roomId, "ice"), (snap) => {
        snap.docChanges().forEach(async (c) => {
          if(c.type === 'added') {
            const iceData = c.doc.data();
            if(iceData.from !== myId) {
              try {
                await pc.addIceCandidate(new RTCIceCandidate(iceData.candidate));
              } catch(e) {}
            }
          }
        });
      });
      unsubs.push(unsubIce);
    }

    // Find a waiting person and connect
    async function findAndConnect() {
      log('🔍 Looking for waiting people...');
      
      try {
        // Get all waiting people
        const { getDocs: getDocsFS } = await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js");
        const waitingSnap = await getDocsFS(collection(db, "waiting"));
        
        let foundId = null;
        waitingSnap.forEach(doc => {
          const data = doc.data();
          if(data.userId && data.userId !== myId && !foundId) {
            foundId = data.userId;
            log('🔗 Found: ' + foundId.substring(0,8));
          }
        });
        
        if(foundId) {
          // Remove both from waiting
          await deleteDoc(doc(db, "waiting", myId)).catch(()=>{});
          await deleteDoc(doc(db, "waiting", foundId)).catch(()=>{});
          
          // Create room - I am caller
          await createRoom(foundId, true, null);
        } else {
          log('⏳ No one waiting yet, I will wait...');
        }
      } catch(e) {
        log('❌ Find error: ' + e.message);
      }
    }

    // Public functions
    window.startChat = async function() {
      log('▶️ Starting...');
      startBtn.disabled = true;
      
      const camOk = await startCamera();
      if(!camOk) {
        startBtn.disabled = false;
        return;
      }
      
      // First try to find someone
      await findAndConnect();
      
      // If no one found, start waiting
      await startWaiting();
      
      startBtn.disabled = false;
    };

    window.stopChat = function() {
      log('⏹️ Stopping');
      
      // Cleanup
      if(pc) { pc.close(); pc = null; }
      unsubs.forEach(u => u());
      unsubs = [];
      
      if(roomId) {
        deleteDoc(doc(db, "rooms", roomId)).catch(()=>{});
        roomId = null;
      }
      
      // Remove from waiting
      deleteDoc(doc(db, "waiting", myId)).catch(()=>{});
      
      resetStranger();
      stopCamera();
      
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      statusEl.textContent = 'Press Start';
    };

    window.nextStranger = function() {
      log('⏭️ Next');
      window.stopChat();
      setTimeout(() => window.startChat(), 500);
    };

    log('✅ Ready! Click Start in 2 browsers.');
  </script>
</body>
</html>
