<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Live</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:2rem;gap:1rem; }
    
    .live-header { display:flex;align-items:center;gap:0.8rem;padding:0.5rem 1rem;background:rgba(0,0,0,0.6);border-radius:2rem; }
    .live-dot { width:10px;height:10px;background:#ef4444;border-radius:50%;animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-text { color:#ef4444;font-weight:600;font-size:0.9rem;letter-spacing:1px; }
    .viewer-count { color:#ccc;font-size:0.7rem; }
    
    .video-container { width:100%;max-width:500px;aspect-ratio:9/16;background:#111;border-radius:1rem;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center; }
    .video-container video { width:100%;height:100%;object-fit:cover; }
    .video-placeholder { display:flex;flex-direction:column;align-items:center;color:#555;gap:0.5rem; }
    .video-placeholder i { font-size:3rem; }
    
    .actions { display:flex;gap:2rem;margin-top:1rem; }
    .action-btn { width:50px;height:50px;border-radius:50%;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s; }
    .btn-close { background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.4); }
    .btn-like { background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2); }
    .btn-like.liked { background:rgba(239,68,68,0.2);color:#ef4444;border-color:rgba(239,68,68,0.4); }
    
    .comment-bar { position:absolute;bottom:0;left:0;right:0;padding:0.8rem;background:linear-gradient(transparent,rgba(0,0,0,0.8));display:flex;flex-direction:column;gap:0.3rem;max-height:150px;overflow-y:auto; }
    .comment { font-size:0.7rem;color:#fff; }
    .comment span { font-weight:600;margin-right:0.3rem;color:#3897f0; }

    .loading-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem; }
    .loading-overlay i { font-size:2rem;color:#ef4444;animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .loading-overlay span { font-size:0.8rem;color:#888; }
  </style>
</head>
<body>
  <div class="page" id="mainPage" style="display:none;">
    <div class="content">
      <div class="live-header">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
        <span class="viewer-count" id="viewerCount">1 watching</span>
      </div>
      
      <div class="video-container" id="videoContainer">
        <div class="video-placeholder" id="videoPlaceholder">
          <i class="fas fa-video-slash"></i>
          <p>Live stream loading...</p>
        </div>
        <video id="liveVideo" autoplay playsinline style="display:none;"></video>
      </div>
      
      <div class="actions">
        <button class="action-btn btn-close" onclick="closeLive()"><i class="fas fa-times"></i></button>
        <button class="action-btn btn-like" id="likeBtn" onclick="toggleLike()"><i class="fas fa-heart"></i></button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    <span>Joining live...</span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, getDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    // Get username from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const liveUser = urlParams.get('user') || localStorage.getItem('liveViewUser') || 'unknown';

    let localStream = null;
    let pc = null;
    let viewerId = crypto.randomUUID();

    async function joinLive() {
      try {
        // Check if user is actually live
        const liveRef = doc(db, 'live', liveUser.replace('@', ''));
        const liveSnap = await getDoc(liveRef);
        
        if (!liveSnap.exists() || !liveSnap.data().active) {
          document.getElementById('loadingOverlay').innerHTML = '<span style="color:#ef4444;">Live ended</span><br><a href="index.html" style="color:#3897f0;margin-top:1rem;">Go back</a>';
          return;
        }

        // Start local camera (viewer)
        localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 640 }, audio: true });
        
        // Create offer to connect with live host
        pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.ontrack = (e) => {
          const video = document.getElementById('liveVideo');
          const placeholder = document.getElementById('videoPlaceholder');
          video.srcObject = e.streams[0];
          video.style.display = 'block';
          placeholder.style.display = 'none';
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('mainPage').style.display = 'flex';
        };

        // Save viewer request
        const roomId = liveUser + '_' + viewerId;
        const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);
        
        await addDoc(collection(db, 'live_viewers'), {
          liveUser, viewerId, roomId,
          offer: { type: offer.type, sdp: offer.sdp },
          createdAt: serverTimestamp()
        });

        // Listen for answer
        onSnapshot(doc(db, 'live_viewers', roomId), async (snap) => {
          const d = snap.data();
          if (d?.answer && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
          }
        });

      } catch(e) {
        console.error('Live join error:', e);
        document.getElementById('loadingOverlay').innerHTML = '<span style="color:#fbbf24;">Camera needed to watch live</span><br><a href="index.html" style="color:#3897f0;margin-top:1rem;">Go back</a>';
      }
    }

    window.closeLive = function() {
      if (pc) pc.close();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      window.history.back();
    };

    window.toggleLike = function() {
      document.getElementById('likeBtn').classList.toggle('liked');
    };

    joinLive();
  </script>
</body>
</html>
