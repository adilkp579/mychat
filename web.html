<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web • Live Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;color:#fff;padding:0.5rem 1rem 6rem 1rem;text-align:center;gap:0.3rem; }
    
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.7)} 50%{box-shadow:0 0 0 10px rgba(239,68,68,0)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    
    .online-counter { display:flex;align-items:center;gap:0.3rem;color:#4ade80;font-size:0.65rem;padding:0.2rem 0; }
    .online-dot { width:5px;height:5px;background:#4ade80;border-radius:50%;animation:blink 2s infinite; }
    
    .camera-container { display:flex;gap:0.5rem;align-items:flex-start;justify-content:center;width:100%;max-width:500px;flex:1;min-height:0; }
    .stranger-camera { width:75%;height:100%;max-height:62vh;background:#111;border:2px solid rgba(255,255,255,0.2);border-radius:1.2rem;box-shadow:0 15px 40px rgba(0,0,0,0.6);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center; }
    .stranger-camera.connected { border-color:#4ade80; }
    .stranger-camera.live-active { border-color:#ef4444; animation:livePulse 2s infinite; }
    
    #strangerFeed { width:100%;height:100%;object-fit:cover;display:none;background:#000;transform:rotateY(180deg);-webkit-transform:rotateY(180deg); }
    .stranger-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.3rem;color:rgba(255,255,255,0.25); }
    .stranger-placeholder i { font-size:3rem; }
    
    .my-camera { width:22%;max-height:150px;aspect-ratio:3/4;background:#111;border:2px solid rgba(255,255,255,0.3);border-radius:0.8rem;box-shadow:0 8px 20px rgba(0,0,0,0.6);position:relative;overflow:hidden; }
    .my-camera.active { border-color:#ef4444; }
    #myFeed { width:100%;height:100%;object-fit:cover;display:none;background:#000;transform:rotateY(180deg);-webkit-transform:rotateY(180deg); }
    .my-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;color:rgba(255,255,255,0.35);font-size:0.6rem; }
    .my-placeholder i { font-size:1.3rem; }
    
    .live-status {
      display: none; align-items: center; gap: 0.4rem;
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4);
      padding: 0.3rem 0.8rem; border-radius: 1.5rem;
      font-size: 0.7rem; color: #ef4444; font-weight: 600;
      animation: livePulse 2s infinite;
    }
    .live-status.show { display: flex; }
    
    .live-indicator {
      position: absolute; top: 0.5rem; left: 0.5rem;
      background: rgba(239,68,68,0.9); color: #fff;
      padding: 0.2rem 0.6rem; border-radius: 1rem;
      font-size: 0.6rem; font-weight: 700; z-index: 10;
      display: none; align-items: center; gap: 0.3rem;
    }
    .live-indicator.show { display: flex; }
    
    .camera-labels { display:flex;justify-content:space-between;width:100%;max-width:500px;padding:0 0.2rem; }
    .stranger-label-outside { color:#777;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;margin-left:0.3rem; }
    .you-label-outside { color:#777;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;margin-right:0.3rem; }
    
    .user-info { display:flex;align-items:center;gap:0.3rem;background:rgba(255,255,255,0.06);padding:0.25rem 0.6rem;border-radius:1rem;font-size:0.7rem;color:#ccc;opacity:0;transition:all 0.3s;border:1px solid rgba(255,255,255,0.08); }
    .user-info.active { opacity:1; }
    
    .buttons-container { display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;padding:0.2rem 0;align-items:center; }
    .btn { 
      height:36px;border-radius:2rem;
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      display:flex;align-items:center;justify-content:center;gap:0.3rem;
      cursor:pointer;border:none;outline:none;
      font-size:0.75rem;font-weight:600;padding:0 1rem;color:#fff;
      transition:all 0.3s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; user-select: none; -webkit-user-select: none;
    }
    .btn:active { transform:scale(0.95); }
    
    .start-button { width:90px;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:#4ade80; }
    .start-button.searching { background:rgba(251,191,36,0.2);border-color:rgba(251,191,36,0.5);color:#fbbf24;animation:pulse 1s infinite; }
    .stop-button { width:80px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#ef4444;display:none; }
    .stop-button.visible { display:flex; }
    .next-button { width:80px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#ccc;display:none; }
    .next-button.visible { display:flex; }
    .mic-button { width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#4ade80;display:none;padding:0; }
    .mic-button.visible { display:flex;align-items:center;justify-content:center; }
    .mic-button.muted { color:#ef4444;background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4); }
    
    .live-button { 
      width:80px; background:rgba(74,222,128,0.15);
      border:1px solid rgba(74,222,128,0.4); color:#4ade80;
    }
    .live-button.live-active-btn { 
      background:rgba(239,68,68,0.25); border-color:rgba(239,68,68,0.6);
      color:#ef4444; animation:livePulse 2s infinite;
    }

    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem; }
    .loading-screen i { font-size:2rem;color:#3897f0;animation:spin 1s infinite; }
    .loading-screen span { font-size:0.75rem;color:#888; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    
    @media (max-width:380px) { 
      .content{padding:0.3rem 0.6rem 5rem 0.6rem}
      .stranger-camera{max-height:56vh}
      .my-camera{max-height:100px}
      .btn{height:32px;font-size:0.65rem;padding:0 0.5rem}
      .start-button{width:60px}
      .stop-button,.next-button,.live-button{width:55px}
      .mic-button{width:32px;height:32px}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <i class="fas fa-spinner"></i>
    <span>Checking authentication...</span>
  </div>

  <div class="page" id="mainPage" style="display:none;">
    <div class="content">
      <div class="online-counter">
        <div class="online-dot"></div>
        <span id="onlineCount">0 online</span>
      </div>
      
      <div class="live-status" id="liveStatus">
        <i class="fas fa-circle"></i> LIVE • <span id="liveViewerCount">0</span> watching
      </div>
      
      <div class="camera-labels">
        <span class="stranger-label-outside">STRANGER</span>
        <span class="you-label-outside">YOU</span>
      </div>
      
      <div class="camera-container">
        <div class="stranger-camera" id="strangerCamera">
          <video id="strangerFeed" autoplay playsinline></video>
          <div class="stranger-placeholder" id="strangerPlaceholder">
            <i class="fas fa-user-secret"></i>
            <span>???</span>
          </div>
          <div class="live-indicator" id="strangerLiveIndicator">
            <i class="fas fa-circle" style="font-size:0.4rem;"></i> LIVE
          </div>
        </div>
        <div class="my-camera" id="myCamera">
          <video id="myFeed" autoplay playsinline muted></video>
          <div class="my-placeholder" id="myPlaceholder">
            <i class="fas fa-video"></i>
            <span>off</span>
          </div>
          <div class="live-indicator" id="myLiveIndicator">
            <i class="fas fa-circle" style="font-size:0.4rem;"></i> LIVE
          </div>
        </div>
      </div>
      
      <div class="user-info" id="userInfo">
        <span>🌍</span><span>Connected</span>
      </div>
      
      <div class="buttons-container">
        <button class="btn start-button" id="startBtn" type="button">
          <i class="fas fa-play"></i><span>Start</span>
        </button>
        <button class="btn live-button" id="liveBtn" type="button">
          <i class="fas fa-circle"></i><span>LIVE</span>
        </button>
        <button class="btn stop-button" id="stopBtn" type="button">
          <i class="fas fa-stop"></i><span>Stop</span>
        </button>
        <button class="btn next-button" id="nextBtn" type="button">
          <i class="fas fa-forward"></i><span>Next</span>
        </button>
        <button class="btn mic-button" id="micBtn" type="button" title="Mute">
          <i class="fas fa-microphone"></i>
        </button>
      </div>
    </div>
    
    <nav class="floating-nav">
      <div class="nav-center">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="web.html" class="active"><i class="fas fa-globe"></i></a>
        <a href="reel.html"><i class="fas fa-film"></i></a>
        <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
      </div>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { 
      getFirestore, doc, setDoc, getDoc, deleteDoc, collection, addDoc, 
      onSnapshot, getDocs, serverTimestamp, query, where 
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf"
    });
    const db = getFirestore(app);

    async function checkAuth() {
      const cu = localStorage.getItem('currentUser');
      if (!cu) { window.location.href = 'login.html'; return false; }
      try {
        const q = query(collection(db, 'users'), where('username', '==', cu));
        const snap = await getDocs(q);
        if (snap.empty) { localStorage.clear(); window.location.href = 'login.html'; return false; }
        return true;
      } catch(e) { return !!cu; }
    }

    async function init() {
      if (!(await checkAuth())) return;
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainPage').style.display = 'flex';
      startWebChat();
    }

    function startWebChat() {
      const myFeed = document.getElementById('myFeed');
      const myPlaceholder = document.getElementById('myPlaceholder');
      const myCamera = document.getElementById('myCamera');
      const strangerFeed = document.getElementById('strangerFeed');
      const strangerPlaceholder = document.getElementById('strangerPlaceholder');
      const strangerCamera = document.getElementById('strangerCamera');
      const liveStatus = document.getElementById('liveStatus');
      const liveViewerCount = document.getElementById('liveViewerCount');
      const strangerLiveIndicator = document.getElementById('strangerLiveIndicator');
      const myLiveIndicator = document.getElementById('myLiveIndicator');
      const userInfo = document.getElementById('userInfo');
      const startBtn = document.getElementById('startBtn');
      const stopBtnEl = document.getElementById('stopBtn');
      const nextBtn = document.getElementById('nextBtn');
      const micBtn = document.getElementById('micBtn');
      const liveBtn = document.getElementById('liveBtn');

      const myId = crypto.randomUUID();
      const currentUser = localStorage.getItem('currentUser') || '@anonymous';
      const liveUserId = currentUser.replace('@', '');
      
      let localStream, pc, roomId, unsubs = [];
      let isMuted = false, isLive = false;
      let strangerStream = null;
      let liveViewers = {};
      let liveUnsub = null;
      let canvasStream = null;
      let canvasElement = null;
      let canvasInterval = null;

      const servers = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" }
        ]
      };

      function updateLiveButton() {
        if (isLive) {
          liveBtn.innerHTML = '<i class="fas fa-stop-circle"></i><span>END</span>';
          liveBtn.classList.add('live-active-btn');
        } else {
          liveBtn.innerHTML = '<i class="fas fa-circle"></i><span>LIVE</span>';
          liveBtn.classList.remove('live-active-btn');
        }
      }

      // Create merged canvas stream from both videos
      function createMergedStream() {
        canvasElement = document.createElement('canvas');
        canvasElement.width = 640;
        canvasElement.height = 480;
        const ctx = canvasElement.getContext('2d');

        function drawFrame() {
          if (!isLive) return;
          
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, 640, 480);

          // Draw stranger video (main, full screen)
          if (strangerFeed.srcObject && strangerFeed.style.display !== 'none') {
            ctx.drawImage(strangerFeed, 0, 0, 640, 480);
          }

          // Draw my video (small PIP in bottom-right)
          if (myFeed.srcObject && myFeed.style.display !== 'none') {
            ctx.drawImage(myFeed, 460, 340, 160, 120);
            // Border around PIP
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.strokeRect(460, 340, 160, 120);
          }

          // Add LIVE text
          ctx.fillStyle = 'rgba(239, 68, 68, 0.9)';
          ctx.fillRect(10, 10, 60, 25);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 14px sans-serif';
          ctx.fillText('LIVE', 18, 28);

          // Add host name
          ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
          ctx.fillRect(80, 10, 120, 25);
          ctx.fillStyle = '#fff';
          ctx.font = '12px sans-serif';
          ctx.fillText(currentUser, 88, 28);

          requestAnimationFrame(drawFrame);
        }

        drawFrame();
        
        canvasStream = canvasElement.captureStream(30); // 30 fps
        return canvasStream;
      }

      // ===== LIVE START =====
      async function startLive() {
        if (!localStream) {
          alert('Start camera first! Click Start to connect with someone.');
          return;
        }

        isLive = true;
        updateLiveButton();
        
        // Create merged canvas stream
        const mergedStream = createMergedStream();
        
        try {
          await setDoc(doc(db, 'live', liveUserId), {
            userId: currentUser,
            active: true,
            startedAt: serverTimestamp(),
            viewers: 0
          });

          strangerCamera.classList.add('live-active');
          myCamera.classList.add('active');
          liveStatus.classList.add('show');
          strangerLiveIndicator.classList.add('show');
          myLiveIndicator.classList.add('show');

          // Listen for viewers who want to watch
          const viewersRef = collection(db, 'live_viewers');
          liveUnsub = onSnapshot(viewersRef, (snap) => {
            snap.docChanges().forEach(async (change) => {
              const vd = change.doc.data();
              
              if (change.type === 'added' && vd.liveUser === currentUser && vd.offer && vd.active) {
                console.log('📥 New viewer wants to watch:', vd.viewerName);
                await handleNewViewer(change.doc.id, vd, mergedStream);
              }
              
              if (change.type === 'modified' && vd.streamEnded) {
                cleanupViewer(change.doc.id);
              }
            });
          });

          updateLiveViewerCount();
          console.log('🔴 LIVE started - your chat is now visible to viewers');
          
        } catch (e) {
          console.error('Start live error:', e);
          isLive = false;
          updateLiveButton();
          endLive();
        }
      }

      async function handleNewViewer(viewerId, viewerData, streamToSend) {
        try {
          const vpc = new RTCPeerConnection(servers);
          
          // Add merged canvas stream tracks (this is what viewers will see)
          if (streamToSend) {
            streamToSend.getTracks().forEach(track => {
              vpc.addTrack(track, streamToSend);
            });
          }
          
          // Also add audio from local stream
          if (localStream) {
            localStream.getAudioTracks().forEach(track => {
              vpc.addTrack(track, localStream);
            });
          }

          vpc.onicecandidate = async (e) => {
            if (e.candidate) {
              const ref = doc(db, 'live_viewers', viewerId);
              const snap = await getDoc(ref);
              const existing = snap.data()?.hostCandidates || [];
              existing.push(e.candidate.toJSON());
              await setDoc(ref, { hostCandidates: existing }, { merge: true });
            }
          };

          vpc.onconnectionstatechange = () => {
            if (vpc.connectionState === 'failed' || vpc.connectionState === 'disconnected') {
              cleanupViewer(viewerId);
            }
          };

          await vpc.setRemoteDescription(new RTCSessionDescription(viewerData.offer));
          const answer = await vpc.createAnswer();
          await vpc.setLocalDescription(answer);

          await setDoc(doc(db, 'live_viewers', viewerId), {
            answer: { type: answer.type, sdp: answer.sdp },
            status: 'connected'
          }, { merge: true });

          liveViewers[viewerId] = vpc;
          updateLiveViewerCount();
          
          console.log('✅ Viewer connected, total watching:', Object.keys(liveViewers).length);
        } catch (e) {
          console.error('Viewer error:', e);
        }
      }

      function cleanupViewer(viewerId) {
        if (liveViewers[viewerId]) {
          liveViewers[viewerId].close();
          delete liveViewers[viewerId];
          updateLiveViewerCount();
        }
      }

      async function updateLiveViewerCount() {
        const count = Object.keys(liveViewers).length;
        liveViewerCount.textContent = count;
        try {
          await setDoc(doc(db, 'live', liveUserId), { viewers: count }, { merge: true });
        } catch (e) {}
      }

      // ===== LIVE END =====
      async function endLive() {
        isLive = false;
        updateLiveButton();

        // Close all viewer connections
        Object.keys(liveViewers).forEach(id => {
          if (liveViewers[id]) {
            liveViewers[id].close();
          }
        });
        liveViewers = {};

        // Notify all viewers that stream ended
        try {
          const viewersSnap = await getDocs(collection(db, 'live_viewers'));
          viewersSnap.forEach(async (docSnap) => {
            if (docSnap.data().liveUser === currentUser) {
              await setDoc(doc(db, 'live_viewers', docSnap.id), {
                streamEnded: true,
                active: false
              }, { merge: true }).catch(() => {});
            }
          });
        } catch (e) {}

        // Delete live document
        await deleteDoc(doc(db, 'live', liveUserId)).catch(() => {});

        // Clean up canvas
        if (canvasInterval) {
          clearInterval(canvasInterval);
          canvasInterval = null;
        }
        if (canvasStream) {
          canvasStream.getTracks().forEach(t => t.stop());
          canvasStream = null;
        }
        canvasElement = null;

        // Remove listeners
        if (liveUnsub) {
          liveUnsub();
          liveUnsub = null;
        }

        // Reset UI
        strangerCamera.classList.remove('live-active');
        liveStatus.classList.remove('show');
        strangerLiveIndicator.classList.remove('show');
        myLiveIndicator.classList.remove('show');
        liveViewerCount.textContent = '0';

        console.log('🔴 LIVE ended');
      }

      // ===== TOGGLE LIVE =====
      async function toggleLive(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        
        if (isLive) {
          await endLive();
        } else {
          await startLive();
        }
      }

      // ===== CAMERA =====
      async function startCamera() {
        try {
          if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
          }
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { width: 480, height: 640, facingMode: 'user' },
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
          });
          myFeed.srcObject = localStream;
          await myFeed.play();
          myFeed.style.display = 'block';
          myPlaceholder.style.display = 'none';
          myCamera.classList.add('active');
          return true;
        } catch (e) {
          console.error('Camera error:', e);
          alert('Camera & Microphone are required!');
          return false;
        }
      }

      function stopCamera() {
        if (localStream) {
          localStream.getTracks().forEach(t => t.stop());
          localStream = null;
        }
        myFeed.style.display = 'none';
        myFeed.srcObject = null;
        myPlaceholder.style.display = '';
        myCamera.classList.remove('active');
      }

      function resetStranger() {
        strangerStream = null;
        strangerFeed.style.display = 'none';
        strangerFeed.srcObject = null;
        strangerPlaceholder.style.display = '';
        strangerCamera.classList.remove('connected', 'live-active');
      }

      function showConnected() {
        startBtn.style.display = 'none';
        stopBtnEl.classList.add('visible');
        nextBtn.classList.add('visible');
        micBtn.classList.add('visible');
        userInfo.classList.add('active');
      }

      function showDisconnected() {
        startBtn.style.display = 'flex';
        stopBtnEl.classList.remove('visible');
        nextBtn.classList.remove('visible');
        micBtn.classList.remove('visible');
        startBtn.classList.remove('searching');
        startBtn.querySelector('span').textContent = 'Start';
        startBtn.querySelector('i').className = 'fas fa-play';
        startBtn.disabled = false;
        userInfo.classList.remove('active');
        resetStranger();
        stopCamera();
      }

      function toggleMute(e) {
        if (e) e.preventDefault();
        if (!localStream) return;
        const tracks = localStream.getAudioTracks();
        if (tracks.length > 0) {
          isMuted = !isMuted;
          tracks.forEach(t => t.enabled = !isMuted);
          micBtn.classList.toggle('muted', isMuted);
          micBtn.querySelector('i').className = isMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone';
        }
      }

      // ===== CHAT ROOM =====
      async function createRoom(otherId, isCaller) {
        roomId = [myId, otherId].sort().join('_');
        const roomRef = doc(db, 'rooms', roomId);
        showConnected();
        if (pc) { pc.close(); pc = null; }
        unsubs.forEach(u => u());
        unsubs = [];
        
        pc = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        
        pc.ontrack = (e) => {
          if (e.streams[0]) {
            strangerStream = e.streams[0];
            strangerFeed.srcObject = e.streams[0];
            strangerFeed.style.display = 'block';
            strangerPlaceholder.style.display = 'none';
            strangerCamera.classList.add('connected');
          }
        };
        
        pc.onicecandidate = async (e) => {
          if (e.candidate) await addDoc(collection(roomRef, 'ice'), { 
            sender: myId, candidate: e.candidate.toJSON() 
          });
        };
        
        unsubs.push(onSnapshot(collection(roomRef, 'ice'), (snap) => {
          snap.docChanges().forEach(async (c) => {
            if (c.type === 'added' && c.doc.data().sender !== myId && pc) {
              try { await pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate)); } catch (e) {}
            }
          });
        }));
        
        if (isCaller) {
          const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
          await pc.setLocalDescription(offer);
          await setDoc(doc(db, 'invites', otherId), { 
            from: myId, offer: { type: offer.type, sdp: offer.sdp } 
          });
          unsubs.push(onSnapshot(doc(db, 'invites', otherId), async (snap) => {
            const d = snap.data();
            if (d?.answer && !pc.currentRemoteDescription && pc.signalingState !== 'closed') {
              await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
            }
          }));
        }
      }

      function listenForInvites() {
        unsubs.push(onSnapshot(doc(db, 'invites', myId), async (snap) => {
          if (!snap.exists()) return;
          const d = snap.data();
          await deleteDoc(doc(db, 'waiting', myId)).catch(() => {});
          roomId = [myId, d.from].sort().join('_');
          const roomRef = doc(db, 'rooms', roomId);
          showConnected();
          if (pc) { pc.close(); pc = null; }
          unsubs.forEach(u => u());
          unsubs = [];
          
          pc = new RTCPeerConnection(servers);
          localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
          
          pc.ontrack = (e) => {
            if (e.streams[0]) {
              strangerStream = e.streams[0];
              strangerFeed.srcObject = e.streams[0];
              strangerFeed.style.display = 'block';
              strangerPlaceholder.style.display = 'none';
              strangerCamera.classList.add('connected');
            }
          };
          
          pc.onicecandidate = async (e) => {
            if (e.candidate) await addDoc(collection(roomRef, 'ice'), { 
              sender: myId, candidate: e.candidate.toJSON() 
            });
          };
          
          if (d.offer && pc.signalingState !== 'closed') {
            await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await setDoc(doc(db, 'invites', myId), { 
              from: d.from, offer: d.offer, answer: { type: answer.type, sdp: answer.sdp } 
            }, { merge: true });
          }
          
          unsubs.push(onSnapshot(collection(roomRef, 'ice'), (snap) => {
            snap.docChanges().forEach(async (c) => {
              if (c.type === 'added' && c.doc.data().sender !== myId && pc) {
                try { await pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate)); } catch (e) {}
              }
            });
          }));
        }));
      }

      async function startChat(e) {
        if (e) e.preventDefault();
        
        if (isLive) {
          alert('Please end live stream before starting a new chat');
          return;
        }
        
        startBtn.disabled = true;
        startBtn.classList.add('searching');
        startBtn.querySelector('span').textContent = 'Searching';
        startBtn.querySelector('i').className = 'fas fa-spinner fa-spin';
        
        if (!(await startCamera())) {
          showDisconnected();
          return;
        }
        
        const snap = await getDocs(collection(db, 'waiting'));
        let found = null;
        snap.forEach(d => { 
          if (d.data().userId !== myId && !found) found = d.data().userId; 
        });
        
        if (found) {
          await deleteDoc(doc(db, 'waiting', myId)).catch(() => {});
          await deleteDoc(doc(db, 'waiting', found)).catch(() => {});
          await createRoom(found, true);
        } else {
          await setDoc(doc(db, 'waiting', myId), { userId: myId });
          listenForInvites();
        }
      }

      function stopChat(e) {
        if (e) e.preventDefault();
        
        if (connectionTimeout) clearTimeout(connectionTimeout);
        if (pc) { pc.close(); pc = null; }
        unsubs.forEach(u => u());
        unsubs = [];
        if (roomId) { deleteDoc(doc(db, 'rooms', roomId)).catch(() => {}); roomId = null; }
        deleteDoc(doc(db, 'waiting', myId)).catch(() => {});
        deleteDoc(doc(db, 'invites', myId)).catch(() => {});
        
        if (isLive) { endLive(); }
        
        showDisconnected();
      }

      // Event Listeners
      startBtn.addEventListener('click', startChat);
      startBtn.addEventListener('touchend', (e) => { e.preventDefault(); startChat(e); });
      
      stopBtnEl.addEventListener('click', stopChat);
      stopBtnEl.addEventListener('touchend', (e) => { e.preventDefault(); stopChat(e); });
      
      nextBtn.addEventListener('click', (e) => {
        e.preventDefault();
        stopChat(e);
        setTimeout(() => startChat(e), 500);
      });
      nextBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopChat(e);
        setTimeout(() => startChat(e), 500);
      });
      
      micBtn.addEventListener('click', toggleMute);
      micBtn.addEventListener('touchend', (e) => { e.preventDefault(); toggleMute(e); });
      
      liveBtn.addEventListener('click', toggleLive);
      liveBtn.addEventListener('touchend', (e) => { e.preventDefault(); toggleLive(e); });
      
      window.addEventListener('beforeunload', () => {
        if (isLive) endLive().catch(() => {});
        if (pc) pc.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (canvasStream) canvasStream.getTracks().forEach(t => t.stop());
      });
      
      console.log('✅ Web chat ready. Start a chat, then press LIVE to broadcast!');
    }

    init();
  </script>
</body>
</html>
