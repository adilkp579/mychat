<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Test</title>
  <style>
    body { background:#000;color:#fff;font-family:sans-serif;padding:2rem;text-align:center; }
    input, button { padding:0.8rem;margin:1rem;font-size:1rem;border-radius:0.5rem;border:none; }
    button { background:#3897f0;color:#fff;cursor:pointer; }
    img { max-width:300px;margin:1rem; }
    #status { color:#4ade80;margin:1rem; }
  </style>
</head>
<body>
  <h2>Test Upload</h2>
  <input type="file" id="fileInput" accept="image/*">
  <button onclick="upload()">Upload</button>
  <div id="status"></div>
  <img id="preview" style="display:none;">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.firebasestorage.app",
      messagingSenderId: "206620858913",
      appId: "1:206620858913:web:e8171ed8c1a2dbda3da160"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    window.upload = function() {
      const file = document.getElementById('fileInput').files[0];
      if(!file) { document.getElementById('status').textContent = 'Select a file first!'; return; }

      document.getElementById('status').textContent = 'Uploading...';
      
      const storageRef = ref(storage, 'test/' + Date.now() + '_' + file.name);
      const uploadTask = uploadBytesResumable(storageRef, file);

      uploadTask.on('state_changed',
        (snapshot) => {
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          document.getElementById('status').textContent = 'Progress: ' + Math.round(progress) + '%';
        },
        (error) => {
          document.getElementById('status').textContent = 'ERROR: ' + error.message;
          console.error('Upload error:', error);
        },
        async () => {
          const url = await getDownloadURL(uploadTask.snapshot.ref);
          document.getElementById('status').textContent = 'SUCCESS! ✅';
          document.getElementById('preview').src = url;
          document.getElementById('preview').style.display = 'block';
          console.log('File URL:', url);
        }
      );
    };
  </script>
</body>
</html>
