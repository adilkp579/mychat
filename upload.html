<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Upload</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:3rem 1.5rem 6rem 1.5rem;text-align:center;gap:1.5rem;overflow-y:auto; }
    .upload-options { display:flex;flex-direction:column;gap:1rem;width:100%;max-width:300px; }
    .upload-card { background:rgba(255,255,255,0.05);border:2px dashed rgba(255,255,255,0.2);border-radius:1.5rem;padding:2.5rem 1.5rem;cursor:pointer;transition:all 0.3s;text-align:center; }
    .upload-card:hover { background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4); }
    .upload-card i { font-size:2.5rem;margin-bottom:0.8rem;display:block; }
    .upload-card.post i { color:#3897f0; }
    .upload-card.reel i { color:#e91e63; }
    .upload-card h3 { font-size:1rem;margin-bottom:0.3rem; }
    .upload-card p { font-size:0.7rem;color:#888; }
    .preview-container { width:100%;max-width:300px;display:none; }
    .preview-container.show { display:block; }
    .preview-img, .preview-video { width:100%;border-radius:1rem;max-height:300px;object-fit:cover;background:#111; }
    .upload-btn { width:100%;padding:0.8rem;border-radius:1.5rem;border:none;background:#3897f0;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:0.5rem; }
    .upload-btn:disabled { opacity:0.5; }
    .progress-bar { width:100%;height:4px;background:#333;border-radius:2px;margin-top:0.5rem;overflow:hidden;display:none; }
    .progress-bar.show { display:block; }
    .progress-fill { height:100%;background:#3897f0;width:0%;transition:width 0.3s; }
    .status-text { font-size:0.75rem;color:#4ade80;margin-top:0.3rem;min-height:1.2rem; }
    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    @media (min-width:1024px) {
      .floating-nav { top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;padding:1rem 0.6rem;flex-direction:column; }
      .nav-center { flex-direction:column;gap:1.2rem;max-width:none; }
      .nav-center a { font-size:1.4rem;width:2.6rem;height:2.6rem; }
      .nav-center a::before { bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0); }
      .nav-center a.active::before { transform:translateY(-50%) scale(1); }
      .content { padding:3rem 3rem 3rem 6rem; }
    }
    @media (max-width:380px) { .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem} }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <h2 style="font-size:1.3rem;font-weight:500;">Create</h2>
      <div class="upload-options" id="uploadOptions">
        <div class="upload-card post" onclick="selectType('post')"><i class="fas fa-image"></i><h3>Post</h3><p>Upload a photo</p></div>
        <div class="upload-card reel" onclick="selectType('reel')"><i class="fas fa-video"></i><h3>Reel</h3><p>Upload a video</p></div>
      </div>
      <div class="preview-container" id="previewContainer">
        <img class="preview-img" id="previewImg" style="display:none;">
        <video class="preview-video" id="previewVideo" controls style="display:none;"></video>
        <button class="upload-btn" id="uploadBtn" onclick="uploadFile()">Upload</button>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <p class="status-text" id="statusText"></p>
        <button class="upload-btn" style="background:#333;margin-top:0.5rem;" onclick="resetUpload()">Cancel</button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="handleFile(event)">
    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.firebasestorage.app",
      messagingSenderId: "206620858913",
      appId: "1:206620858913:web:e8171ed8c1a2dbda3da160"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let selectedType = null, selectedFile = null;

    window.selectType = function(type) {
      selectedType = type;
      document.getElementById('fileInput').accept = type === 'post' ? 'image/*' : 'video/*';
      document.getElementById('fileInput').click();
    };

    window.handleFile = function(event) {
      const file = event.target.files[0];
      if(!file) return;
      selectedFile = file;
      document.getElementById('uploadOptions').style.display = 'none';
      document.getElementById('previewContainer').classList.add('show');
      const url = URL.createObjectURL(file);
      if(selectedType === 'post') {
        document.getElementById('previewImg').src = url;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('previewVideo').style.display = 'none';
      } else {
        document.getElementById('previewVideo').src = url;
        document.getElementById('previewVideo').style.display = 'block';
        document.getElementById('previewImg').style.display = 'none';
      }
    };

    window.uploadFile = async function() {
      if(!selectedFile) return;
      const btn = document.getElementById('uploadBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const statusText = document.getElementById('statusText');
      
      btn.disabled = true; btn.textContent = 'Uploading...';
      progressBar.classList.add('show'); statusText.textContent = '';
      
      const userId = localStorage.getItem('userId') || 'user_' + crypto.randomUUID();
      localStorage.setItem('userId', userId);
      
      const fileName = `${selectedType}_${Date.now()}_${selectedFile.name}`;
      const storageRef = ref(storage, `uploads/${userId}/${fileName}`);
      const uploadTask = uploadBytesResumable(storageRef, selectedFile);
      
      uploadTask.on('state_changed', 
        (snap) => { progressFill.style.width = (snap.bytesTransferred/snap.totalBytes)*100 + '%'; },
        (err) => { statusText.textContent = 'Error: ' + err.message; statusText.style.color = '#ef4444'; btn.disabled = false; btn.textContent = 'Retry'; },
        async () => {
          const url = await getDownloadURL(uploadTask.snapshot.ref);
          await addDoc(collection(db, 'posts'), { userId, type: selectedType, url, fileName, createdAt: serverTimestamp() });
          const profile = JSON.parse(localStorage.getItem('userProfile')||'{}');
          if(!profile.posts) profile.posts = [];
          profile.posts.unshift({ type: selectedType==='post'?'image':'video', src: url });
          localStorage.setItem('userProfile', JSON.stringify(profile));
          statusText.textContent = 'Uploaded! ✅'; statusText.style.color = '#4ade80';
          progressBar.classList.remove('show'); btn.textContent = 'Upload Another'; btn.disabled = false;
        }
      );
    };

    window.resetUpload = function() {
      selectedFile = null; selectedType = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('uploadOptions').style.display = 'flex';
      document.getElementById('previewContainer').classList.remove('show');
      document.getElementById('progressBar').classList.remove('show');
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('statusText').textContent = '';
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadBtn').textContent = 'Upload';
    };
  </script>
</body>
</html>
