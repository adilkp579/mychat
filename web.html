<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overscroll-behavior:none;overflow:hidden; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.7)} 50%{box-shadow:0 0 0 10px rgba(239,68,68,0)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes giftFloat { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-60px) scale(1.3);opacity:0} }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    
    .top-icons {
      width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;

      margin:0 auto;

    .corner-btn {
      width:2.4rem;height:2.4rem;background:#1a1a1a;border-radius:50%;color:#fff;
      font-size:1rem;display:flex;align-items:center;justify-content:center;
      text-decoration:none;border:1px solid #333;
    }
    .top-brand {
      font-size:2rem;font-weight:700;color:#fff;letter-spacing:3px;
      font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;
      position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;
      line-height:1;font-style:italic;
    }
    
    .main-content {
      flex:1;display:flex;flex-direction:column;padding:0.5rem 1.2rem 1rem 1.2rem;position:relative;
      gap:8px;
    }
    
    .section-label {

      width:6px;height:6px;border-radius:50%;

      box-shadow:0 0 8px rgba(74,222,128,0.5);
    }
    
    .camera-area {
      display:flex;gap:8px;align-items:flex-start;
      margin-top: 5mm;
    }
    
    .stranger-section {
      width:60%;display:flex;flex-direction:column;gap:4px;
    }
    .stranger-camera {
      width:100%;height:55vh;background:#111;
      border:2px solid rgba(255,255,255,0.2);border-radius:14px;
      position:relative;overflow:hidden;

    }
    .stranger-camera.connected { border-color:#4ade80; box-shadow:0 0 20px rgba(74,222,128,0.15); }
    .stranger-camera.live-active { border-color:#ef4444; animation:livePulse 2s infinite; }
    #strangerFeed { width:100%;height:100%;object-fit:cover;display:none;background:#000; }
    .stranger-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:rgba(255,255,255,0.25); }
    .stranger-placeholder i { font-size:2.5rem; }
    .stranger-placeholder span { font-size:0.8rem; }
    .stranger-placeholder.searching-text { color:#fbbf24; }
    
    .you-section {
      width:35%;display:flex;flex-direction:column;gap:4px;align-items:flex-end;
    }
    .my-camera {
      width:100%;height:28vh;background:#111;
      border:2px solid rgba(255,255,255,0.3);border-radius:14px;
      position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;

    .my-camera.active { border-color:#ef4444; }
    #myFeed { width:100%;height:100%;object-fit:cover;display:none;background:#000; }
    .my-placeholder { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(255,255,255,0.35);font-size:0.6rem; }
    .my-placeholder i { font-size:1.2rem; }
    
    .token-stack {
      display:flex;flex-direction:column;gap:10px;align-items:flex-end;margin-top:4px;
    }
    .token-btn {
      width:110px;height:40px;border-radius:10px;

      background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
      font-size:0.75rem;font-weight:600;transition:all 0.2s;color:#fff;padding:0 12px;
      position:relative;
    }
    .token-btn:active { transform:scale(0.95); }
    .token-btn .token-emoji { font-size:1.1rem;line-height:1; }
    .token-btn .token-label { font-size:0.7rem;font-weight:700; }
    .token-btn .token-count {
      font-size:0.65rem;font-weight:700;
      background:rgba(0,0,0,0.4);
      padding:2px 6px;border-radius:8px;
      min-width:20px;text-align:center;
    }
    .token-btn.token-chicken { border-color:rgba(245,158,11,0.5);background:rgba(245,158,11,0.15); }
    .token-btn.token-chicken .token-label { color:#f59e0b; }
    .token-btn.token-chicken .token-count { color:#f59e0b; }
    .token-btn.token-lion { border-color:rgba(239,68,68,0.5);background:rgba(239,68,68,0.15); }
    .token-btn.token-lion .token-label { color:#ef4444; }
    .token-btn.token-lion .token-count { color:#ef4444; }
    .token-btn.token-fish { border-color:rgba(59,130,246,0.5);background:rgba(59,130,246,0.15); }
    .token-btn.token-fish .token-label { color:#3b82f6; }
    .token-btn.token-fish .token-count { color:#3b82f6; }
    .token-btn.token-bike { border-color:rgba(168,85,247,0.5);background:rgba(168,85,247,0.15); }
    .token-btn.token-bike .token-label { color:#a855f7; }
    .token-btn.token-bike .token-count { color:#a855f7; }
    .token-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .token-btn.no-receiver { animation: shake 0.5s ease-in-out; border-color: rgba(239,68,68,0.8) !important; }
    
    .gift-float { position:absolute;font-size:2rem;pointer-events:none;animation:giftFloat 1.5s ease-out forwards;z-index:50; }
    
    .control-row {
      display:flex;gap:12px;align-items:center; flex-wrap: wrap;
    }
    .ctrl-btn {
      width:80px;height:34px;border-radius:17px;

      cursor:pointer;border:1px solid transparent;outline:none;

      transition:all 0.3s;
      touch-action:manipulation;user-select:none;
    }
    .ctrl-btn:active { transform:scale(0.95); }
    .live-btn { background:rgba(74,222,128,0.2);border-color:rgba(74,222,128,0.5);color:#4ade80; }
    .live-btn.active { background:rgba(239,68,68,0.3);border-color:rgba(239,68,68,0.7);color:#ef4444;animation:livePulse 2s infinite; }
    .start-btn { background:rgba(74,222,128,0.2);border-color:rgba(74,222,128,0.5);color:#4ade80; }
    .start-btn.stop-state { background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);color:#ef4444; }
    
    .next-btn { display:none;width:60px;height:34px;border-radius:17px;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#ccc; }
    .next-btn.visible { display:inline-flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:1px solid rgba(255,255,255,0.2); }
    .mic-btn { display:none;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#4ade80; }
    .mic-btn.visible { display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.2);font-size:0.8rem; }
    .mic-btn.muted { color:#ef4444;background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5); }
    
    .chat-toggle-btn {
      display:none; width:34px; height:34px; border-radius:50%;
      background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.2); color:#fff;
    }
    .chat-toggle-btn.visible {
      display:inline-flex; align-items:center; justify-content:center;
      cursor:pointer; border:1px solid rgba(255,255,255,0.2); outline:none; font-size:0.8rem;
    }
    .chat-toggle-btn.has-messages { animation: pulse 1.5s infinite; color: #4ade80; border-color: rgba(74, 222, 128, 0.5); }
    
    .stranger-controls-row { display: none; gap: 10px; align-items: center; margin-top: 4px; }
    
    .chat-box {
      position: fixed; bottom: 5.5rem; left: 50%; transform: translateX(-50%);
      width: 92%; max-width: 500px; height: 35vh; max-height: 350px;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);

      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      display: flex; flex-direction: column; z-index: 150;
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    .chat-box.hidden { display: none; }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 1.2rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      color: #f5f5f5; font-size: 0.85rem; font-weight: 600;
    }
    .chat-close-btn {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #eee; font-size: 0.85rem; cursor: pointer;
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
    }
    .chat-close-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; transform: rotate(90deg); }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 0.8rem; display: flex; flex-direction: column; gap: 8px;
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    .chat-message {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      padding: 0.55rem 0.95rem; border-radius: 18px;
      color: #f0f0f0; font-size: 0.8rem; max-width: 78%; align-self: flex-start;
      border: 1px solid rgba(255, 255, 255, 0.12);
      animation: slideUp 0.25s ease;
    }
    .chat-message.self { 
      align-self: flex-end; 
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.25), rgba(74, 222, 128, 0.08));
      border-color: rgba(74, 222, 128, 0.3);
    }
    .chat-message.system {
      align-self: center;
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.08);
      color: #aaa;
      font-size: 0.7rem;
      max-width: 90%;
      text-align: center;
    }
    .chat-input-area {
      display: flex; padding: 0.6rem 0.8rem; gap: 8px;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(25px);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }
    .chat-input {
      flex:1;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px; padding: 0.55rem 1rem; color: #fff; font-size: 0.8rem; outline: none;
    }
    .chat-input::placeholder { color: rgba(255,255,255,0.4); }
    .chat-send-btn {
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.3), rgba(74, 222, 128, 0.1));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(74, 222, 128, 0.35);
      border-radius: 50%; width: 38px; height: 38px;
      color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .chat-send-btn:active { transform: scale(0.9); }

    .https-warning { display:none;background:#ef4444;color:#fff;text-align:center;padding:4px;font-size:0.55rem;font-weight:600;z-index:200;width:100%; }
    .https-warning.show { display:block; }
    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:8px; }
    .loading-screen i { font-size:2rem;color:#3897f0;animation:spin 1s infinite; }
    .loading-screen span { font-size:0.75rem;color:#888; }

    .floating-nav {
      position: fixed; bottom: max(1rem, env(safe-area-inset-bottom, 1rem)); left: 50%;
      transform: translateX(-50%); width: 92%; max-width: 500px;
      background: transparent; backdrop-filter: blur(8px);
      border-radius: 2.5rem; padding: 0.7rem 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.04);
      z-index: 100;
    }
    .nav-center {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 380px; gap: 0.3rem;
    }
    .nav-center a {
      color: rgba(255, 255, 255, 0.7); font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      transition: all 0.3s; text-decoration: none;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
    }
    .nav-center a:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
    .nav-center a.active { color: #fff; background: rgba(255, 255, 255, 0.12); }
    .nav-wallet, .nav-live { display: none !important; }

    @media (max-width: 380px) {
      .token-btn{width:100px;height:36px;font-size:0.7rem;}
      .ctrl-btn{width:65px;height:30px;font-size:0.6rem;}
      .floating-nav { width: 94%; padding: 0.5rem 0.8rem; }
      .nav-center a { font-size: 1.1rem; width: 2rem; height: 2rem; }
    }

    @media (min-width: 1024px) {
      .top-icons { display: none; }
      .nav-wallet, .nav-live { display: flex !important; }
      .floating-nav { position: fixed; top: 50%; left: 1.5rem; bottom: auto; transform: translateY(-50%); width: 3.8rem; height: auto; max-width: none; border-radius: 2.5rem; padding: 1rem 0.6rem; flex-direction: column; }
      .nav-center { flex-direction: column; gap: 1.2rem; max-width: none; }
      .nav-center a { font-size: 1.4rem; width: 2.6rem; height: 2.6rem; }
      .page { padding-left: 5rem; }
      .main-content { max-width: 950px; margin: 0 auto; width: 100%; }
      .camera-area { gap: 20px; }
      .stranger-section { width: 48%; }
      .you-section { width: 48%; align-items: flex-start; }
      .stranger-camera { height: 50vh; }

      .control-row.mobile-only { display: none; }

    }
    @media (max-width: 1023px) {
      .stranger-controls-row { display: none; }
      .control-row.mobile-only { display: flex; }
    }
  </style>

    const servers = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:standard.relay.metered.ca:80", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" },
        { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" },
        { urls: "turn:standard.relay.metered.ca:443", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" },
        { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" }
      ],
      iceCandidatePoolSize: 10,
      bundlePolicy: "max-bundle",
      rtcpMuxPolicy: "require"
    };
    
    const chatBox = document.getElementById('chatBox');
    const chatToggleBtn = document.getElementById('chatToggleBtn');
    const chatToggleBtnDesktop = document.getElementById('chatToggleBtnDesktop');
    const chatCloseBtn = document.getElementById('chatCloseBtn');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');
    
    let chatVisible = false;
    let pendingMessages = 0;
    let tokenBalances = { chicken: 0, lion: 0, fish: 0, bike: 0 };
    const uid = localStorage.getItem('uid');
    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    
    async function loadWalletBalances() {
      try {
        const walletDoc = await getDoc(doc(db, 'wallets', uid));
        if (walletDoc.exists()) {
          const walletData = walletDoc.data();
          tokenBalances.chicken = walletData.chicken || 0;
          tokenBalances.lion = walletData.lion || 0;
          tokenBalances.fish = walletData.fish || 0;
          tokenBalances.bike = walletData.bike || 0;
        } else {
          await setDoc(doc(db, 'wallets', uid), { userId: uid, username: currentUser, chicken: 10, lion: 5, fish: 8, bike: 3, createdAt: serverTimestamp() });
          tokenBalances = { chicken: 10, lion: 5, fish: 8, bike: 3 };
        }
        updateTokenDisplay();
      } catch (e) { console.error(e); }
    }
    async function saveWalletBalances() {
      try { await updateDoc(doc(db, 'wallets', uid), tokenBalances); } catch(e) {}
    }
    function updateTokenDisplay() {
      document.getElementById('chickenCount').textContent = tokenBalances.chicken;
      document.getElementById('lionCount').textContent = tokenBalances.lion;
      document.getElementById('fishCount').textContent = tokenBalances.fish;
      document.getElementById('bikeCount').textContent = tokenBalances.bike;
      document.getElementById('chickenBtn').disabled = tokenBalances.chicken <= 0;
      document.getElementById('lionBtn').disabled = tokenBalances.lion <= 0;
      document.getElementById('fishBtn').disabled = tokenBalances.fish <= 0;
      document.getElementById('bikeBtn').disabled = tokenBalances.bike <= 0;
    }
    
    function toggleChat() {
      chatVisible = !chatVisible;
      if (chatVisible) { chatBox.classList.remove('hidden'); pendingMessages = 0; chatToggleBtn.classList.remove('has-messages'); if(chatToggleBtnDesktop) chatToggleBtnDesktop.classList.remove('has-messages'); }
      else chatBox.classList.add('hidden');
    }
    chatToggleBtn.addEventListener('click', toggleChat);
    if (chatToggleBtnDesktop) chatToggleBtnDesktop.addEventListener('click', toggleChat);
    chatCloseBtn.addEventListener('click', () => { chatBox.classList.add('hidden'); chatVisible = false; });
    
    function addChatMessage(text, isSelf = false, username = '', isSystem = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'chat-message' + (isSelf ? ' self' : '') + (isSystem ? ' system' : '');
      if (username && !isSelf && !isSystem) msgDiv.innerHTML = `<span style="font-size:0.65rem;color:#aaa;display:block;margin-bottom:2px;">${username}</span>${text}`;
      else msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      if (!chatVisible && !isSelf && !isSystem) { pendingMessages++; if(pendingMessages>0) { chatToggleBtn.classList.add('has-messages'); if(chatToggleBtnDesktop) chatToggleBtnDesktop.classList.add('has-messages'); } }
    }
    
    let sendChatMessageFn = null;
    let sendTokenToStrangerFn = null;
    let myId = null;
    let isConnectedToStranger = false;
    let strangerUsername = '';
    
    window.handleTokenSend = function(tokenType) {
      if (!isConnectedToStranger) {
        const btn = document.getElementById(tokenType + 'Btn');
        btn.classList.add('no-receiver');
        setTimeout(() => btn.classList.remove('no-receiver'), 500);
        addChatMessage(`❌ No stranger connected! Cannot send ${tokenType}.`, true);
        return;
      }
      if (tokenBalances[tokenType] <= 0) { addChatMessage(`❌ No more ${tokenType} tokens!`, true); return; }
      tokenBalances[tokenType]--;
      updateTokenDisplay();
      saveWalletBalances();
      const emojiMap = { chicken: '🍗', lion: '🦁', fish: '🐟', bike: '🏍️' };
      const emoji = emojiMap[tokenType];
      const strangerCam = document.getElementById('strangerCamera');
      const float = document.createElement('span');
      float.className = 'gift-float';
      float.textContent = emoji;
      float.style.left = (Math.random() * 60 + 20) + '%';
      float.style.top = '55%';
      strangerCam.appendChild(float);
      setTimeout(() => float.remove(), 1500);
      if (sendTokenToStrangerFn) sendTokenToStrangerFn(emoji, tokenType);
      addChatMessage(`🎁 Sent ${emoji} to ${strangerUsername} (${tokenBalances[tokenType]} left)`, true);
    };
    
    chatSendBtn.addEventListener('click', () => { const text = chatInput.value.trim(); if(text && sendChatMessageFn) { sendChatMessageFn(text); chatInput.value = ''; } });
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') chatSendBtn.click(); });
    
    loadWalletBalances();
    startWebChat();
    
    function startWebChat() {
      const myFeed=document.getElementById('myFeed'),myPlaceholder=document.getElementById('myPlaceholder'),myCameraEl=document.getElementById('myCamera');
      const strangerFeed=document.getElementById('strangerFeed'),strangerPlaceholder=document.getElementById('strangerPlaceholder'),strangerCamera=document.getElementById('strangerCamera');
      const startStopBtn=document.getElementById('startStopBtn'),nextBtn=document.getElementById('nextBtn'),micBtn=document.getElementById('micBtn'),liveBtn=document.getElementById('liveBtn');
      const startStopBtnDesktop=document.getElementById('startStopBtnDesktop'),nextBtnDesktop=document.getElementById('nextBtnDesktop'),micBtnDesktop=document.getElementById('micBtnDesktop'),liveBtnDesktop=document.getElementById('liveBtnDesktop');
      
      myId = crypto.randomUUID ? crypto.randomUUID() : 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
      const liveUserId = currentUser.replace('@','');
      
      let localStream, pc, roomId, unsubs=[], isMuted=false, isLive=false;
      let strangerStream=null, liveViewers={}, liveUnsub=null;
      let chatMessagesUnsub = null;
      let tokenTransferUnsub = null;
      let messageCache = new Set();
      let pendingIceCandidates = [];
      
      sendChatMessageFn = async (text) => {
        if (!roomId) { addChatMessage(text, true); return; }
        try {
          await addDoc(collection(db, 'rooms', roomId, 'messages'), { sender: myId, text, timestamp: serverTimestamp(), username: currentUser, messageId: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) });
        } catch(e) { addChatMessage(text, true); }
      };
      
      sendTokenToStrangerFn = async (emoji, tokenType) => {
        if (!roomId || !isConnectedToStranger) return;
        try {
          await addDoc(collection(db, 'rooms', roomId, 'tokens'), { sender: myId, senderUid: uid, senderUsername: currentUser, emoji, tokenType, timestamp: serverTimestamp(), tokenId: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) });
        } catch(e) { tokenBalances[tokenType]++; updateTokenDisplay(); saveWalletBalances(); addChatMessage(`❌ Failed to send token.`, true); }
      };
      
      function cleanupRoomListeners() { unsubs.forEach(u => { try { u(); } catch(e){} }); unsubs = []; }
      
      function setButtonState(state) {
        [startStopBtn, startStopBtnDesktop].forEach(btn => { if(!btn) return; btn.classList.remove('stop-state'); if(state==='start') btn.innerHTML = '<i class="fas fa-play"></i><span>Start</span>'; else { btn.classList.add('stop-state'); btn.innerHTML = '<i class="fas fa-stop"></i><span>Stop</span>'; } });
      }
      
      async function startCamera() {
        try {
          if(localStream) localStream.getTracks().forEach(t => t.stop());
          const constraints = { 
            video: { width: { ideal: 480 }, height: { ideal: 640 }, facingMode: 'user' }, 
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
          };
          localStream = await navigator.mediaDevices.getUserMedia(constraints);
          myFeed.srcObject = localStream;
          await myFeed.play();
          myFeed.style.display = 'block';
          myPlaceholder.style.display = 'none';
          myCameraEl.classList.add('active');
          return true;
        } catch(e) { console.error('Camera error:', e); return false; }
      }
      
      function stopCamera() {
        if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        myFeed.style.display = 'none';
        myFeed.srcObject = null;
        myPlaceholder.style.display = '';
        myCameraEl.classList.remove('active');
      }
      
      function resetStranger() {
        if(strangerFeed.srcObject) strangerFeed.srcObject = null;
        strangerStream = null;
        strangerFeed.style.display = 'none';
        strangerPlaceholder.innerHTML = '<i class="fas fa-user-secret"></i><span>???</span>';
        strangerPlaceholder.classList.remove('searching-text');
        strangerCamera.classList.remove('connected','live-active');
        isConnectedToStranger = false;
        strangerUsername = '';
        document.getElementById('strangerUsername').style.display = 'none';
        document.getElementById('strangerOnlineDot').style.display = 'none';
      }
      
      function showConnected(username) {
        setButtonState('stop');
        [nextBtn, nextBtnDesktop].forEach(btn => { if(btn) btn.classList.add('visible'); });
        [micBtn, micBtnDesktop].forEach(btn => { if(btn) btn.classList.add('visible'); });
        [chatToggleBtn, chatToggleBtnDesktop].forEach(btn => { if(btn) btn.classList.add('visible'); });
        isConnectedToStranger = true;
        strangerUsername = username || 'Stranger';
        document.getElementById('strangerUsername').textContent = strangerUsername;
        document.getElementById('strangerUsername').style.display = 'inline-block';
        document.getElementById('strangerOnlineDot').style.display = 'inline-block';
        addChatMessage(`🔗 Connected with ${strangerUsername}!`, false, '', true);
      }
      
      function showDisconnected() {
        setButtonState('start');
        [nextBtn, nextBtnDesktop].forEach(btn => { if(btn) btn.classList.remove('visible'); });
        [micBtn, micBtnDesktop].forEach(btn => { if(btn) btn.classList.remove('visible'); });
        [chatToggleBtn, chatToggleBtnDesktop].forEach(btn => { if(btn) { btn.classList.remove('visible'); btn.classList.remove('has-messages'); } });
        pendingMessages = 0;
        isConnectedToStranger = false;
        strangerUsername = '';
        document.getElementById('strangerUsername').style.display = 'none';
        document.getElementById('strangerOnlineDot').style.display = 'none';
      }
      
      function toggleMute() {
        if(!localStream) return;
        const t = localStream.getAudioTracks();
        if(t.length > 0) {
          isMuted = !isMuted;
          t.forEach(t => t.enabled = !isMuted);
          [micBtn, micBtnDesktop].forEach(btn => { if(btn) { btn.classList.toggle('muted', isMuted); btn.querySelector('i').className = isMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone'; } });
        }
      }
      
      micBtn.onclick = toggleMute;
      if(micBtnDesktop) micBtnDesktop.onclick = toggleMute;
      
      function listenForTokenTransfers() {
        if(tokenTransferUnsub) tokenTransferUnsub();
        if(roomId) {
          tokenTransferUnsub = onSnapshot(query(collection(db,'rooms',roomId,'tokens'), orderBy('timestamp','asc')), (snapshot) => {
            snapshot.docChanges().forEach((change) => {
              if(change.type === 'added') {
                const tokenData = change.doc.data();
                if(tokenData.sender !== myId && tokenData.tokenType && tokenBalances[tokenData.tokenType] !== undefined) {
                  tokenBalances[tokenData.tokenType]++;
                  updateTokenDisplay();
                  saveWalletBalances();
                  addChatMessage(`🎁 Received ${tokenData.emoji} from ${tokenData.senderUsername || 'Stranger'}! Added to wallet.`, false);
                  const myCam = document.getElementById('myCamera');
                  const float = document.createElement('span');
                  float.className = 'gift-float';
                  float.textContent = tokenData.emoji;
                  float.style.left = (Math.random() * 60 + 20) + '%';
                  float.style.top = '55%';
                  myCam.appendChild(float);
                  setTimeout(() => float.remove(), 1500);
                }
              }
            });
          });
        }
      }
      
      function listenForChatMessages() {
        if(chatMessagesUnsub) chatMessagesUnsub();
        if(roomId) {
          chatMessagesUnsub = onSnapshot(query(collection(db,'rooms',roomId,'messages'), orderBy('timestamp','asc')), (snapshot) => {
            snapshot.docChanges().forEach((change) => {
              if(change.type === 'added') {
                const messageData = change.doc.data();
                if(messageData.messageId && messageCache.has(messageData.messageId)) return;
                if(messageData.messageId) messageCache.add(messageData.messageId);
                addChatMessage(messageData.text, messageData.sender === myId, messageData.username);
              }
            });
          });
        }
      }
      
      async function createRoom(oId, isCaller) {
        roomId = [myId, oId].sort().join('_');
        let strangerUser = 'Stranger';
        try {
          const waitingDocs = await getDocs(collection(db,'waiting'));
          waitingDocs.forEach(d => { if(d.data().userId === oId) strangerUser = d.data().username || 'Stranger'; });
        } catch(e) {}
        showConnected(strangerUser);
        
        cleanupRoomListeners();
        pendingIceCandidates = [];
        
        pc = new RTCPeerConnection(servers);
        
        // Safari fix: Add transceivers explicitly
        if (localStream) {
          localStream.getTracks().forEach(track => {
            const transceiver = pc.addTransceiver(track, { direction: 'sendrecv' });
            console.log('Added transceiver for:', track.kind);
          });
        }
        
        let trackAdded = false;
        pc.ontrack = (e) => {
          console.log('ontrack received:', e.track.kind);
          if(trackAdded) return;
          if(e.streams[0]) {
            trackAdded = true;
            strangerStream = e.streams[0];
            strangerFeed.srcObject = e.streams[0];
            strangerFeed.style.display = 'block';
            strangerPlaceholder.innerHTML = '';
            strangerCamera.classList.add('connected');
            console.log('Remote stream attached successfully');
          }
        };
        
        pc.onconnectionstatechange = () => {
          console.log('Connection state:', pc.connectionState);
          if(pc.connectionState === 'disconnected' || pc.connectionState === 'failed' || pc.connectionState === 'closed') {
            stopChat();
          }
        };
        
        pc.oniceconnectionstatechange = () => {
          console.log('ICE connection state:', pc.iceConnectionState);
          if(pc.iceConnectionState === 'connected') {
            console.log('ICE connected - call established');
          }
        };
        
        pc.onicecandidate = async (e) => {
          if(e.candidate && roomId) {
            console.log('ICE candidate generated');
            await addDoc(collection(doc(db,'rooms',roomId),'ice'), { sender: myId, candidate: e.candidate.toJSON() });
          }
        };
        
        unsubs.push(onSnapshot(collection(doc(db,'rooms',roomId),'ice'), async (snap) => {
          snap.docChanges().forEach(async (c) => {
            if(c.type === 'added' && c.doc.data().sender !== myId && pc && c.doc.data().candidate) {
              const candidate = new RTCIceCandidate(c.doc.data().candidate);
              if(pc.remoteDescription && pc.remoteDescription.type) {
                try { await pc.addIceCandidate(candidate); console.log('ICE candidate added'); } catch(e) { console.warn('ICE add error:', e); }
              } else {
                pendingIceCandidates.push(candidate);
              }
            }
          });
        }));
        
        if(isCaller) {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await setDoc(doc(db,'invites',oId), { from: myId, fromUsername: currentUser, offer: {type: offer.type, sdp: offer.sdp} });
          unsubs.push(onSnapshot(doc(db,'invites',oId), async (snap) => {
            const d = snap.data();
            if(d?.answer && !pc.currentRemoteDescription) {
              await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
              for(const cand of pendingIceCandidates) { try { await pc.addIceCandidate(cand); } catch(e){} }
              pendingIceCandidates = [];
              console.log('Remote description set from answer');
            }
          }));
        }
        
        listenForChatMessages();
        listenForTokenTransfers();
      }
      
      function listenForInvites() {
        unsubs.push(onSnapshot(doc(db,'invites',myId), async (snap) => {
          if(!snap.exists() || pc) return;
          const d = snap.data();
          await deleteDoc(doc(db,'waiting',myId)).catch(() => {});
          roomId = [myId, d.from].sort().join('_');
          
          const strangerUser = d.fromUsername || 'Stranger';
          showConnected(strangerUser);
          
          cleanupRoomListeners();
          pendingIceCandidates = [];
          
          pc = new RTCPeerConnection(servers);
          
          if (localStream) {
            localStream.getTracks().forEach(track => {
              pc.addTransceiver(track, { direction: 'sendrecv' });
            });
          }
          
          let trackAdded = false;
          pc.ontrack = (e) => {
            console.log('ontrack received (callee):', e.track.kind);
            if(trackAdded) return;
            if(e.streams[0]) {
              trackAdded = true;
              strangerStream = e.streams[0];
              strangerFeed.srcObject = e.streams[0];
              strangerFeed.style.display = 'block';
              strangerPlaceholder.innerHTML = '';
              strangerCamera.classList.add('connected');
            }
          };
          
          pc.onconnectionstatechange = () => {
            console.log('Connection state (callee):', pc.connectionState);
            if(pc.connectionState === 'disconnected' || pc.connectionState === 'failed' || pc.connectionState === 'closed') stopChat();
          };
          
          pc.onicecandidate = async (e) => {
            if(e.candidate && roomId) await addDoc(collection(doc(db,'rooms',roomId),'ice'), { sender: myId, candidate: e.candidate.toJSON() });
          };
          
          unsubs.push(onSnapshot(collection(doc(db,'rooms',roomId),'ice'), async (snap) => {
            snap.docChanges().forEach(async (c) => {
              if(c.type === 'added' && c.doc.data().sender !== myId && pc && c.doc.data().candidate) {
                const candidate = new RTCIceCandidate(c.doc.data().candidate);
                if(pc.remoteDescription && pc.remoteDescription.type) {
                  try { await pc.addIceCandidate(candidate); } catch(e) {}
                } else {
                  pendingIceCandidates.push(candidate);
                }
              }
            });
          }));
          
          if(d.offer && pc.signalingState !== 'closed') {
            await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await setDoc(doc(db,'invites',myId), { answer: {type: answer.type, sdp: answer.sdp} }, {merge: true});
            for(const cand of pendingIceCandidates) { try { await pc.addIceCandidate(cand); } catch(e){} }
            pendingIceCandidates = [];
            console.log('Answer sent, remote description set');
          }
          
          listenForChatMessages();
          listenForTokenTransfers();
        }));
      }
      
      async function startChat() {
        if(isLive) { alert('Please END live first.'); return; }
        setButtonState('stop');
        strangerPlaceholder.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span style="color:#fbbf24;">Searching...</span>';
        strangerPlaceholder.classList.add('searching-text');
        
        if(!(await startCamera())) { stopChat(); return; }
        
        const snap = await getDocs(collection(db,'waiting'));
        let found = null;
        let foundDocRef = null;
        for(const d of snap.docs) {
          if(d.data().userId !== myId && !found) {
            found = d.data().userId;
            foundDocRef = d.ref;
            break;
          }
        }
        
        if(found && foundDocRef) {
          await deleteDoc(doc(db,'waiting',myId)).catch(() => {});
          await deleteDoc(foundDocRef).catch(() => {});
          await createRoom(found, true);
        } else {
          await setDoc(doc(db,'waiting',myId), { userId: myId, username: currentUser });
          listenForInvites();
        }
      }
      
      function stopChat() {
        if(pc) { pc.close(); pc = null; }
        cleanupRoomListeners();
        if(chatMessagesUnsub) { chatMessagesUnsub(); chatMessagesUnsub = null; }
        if(tokenTransferUnsub) { tokenTransferUnsub(); tokenTransferUnsub = null; }
        messageCache.clear();
        pendingIceCandidates = [];
        
        if(roomId) {
          setTimeout(async () => {
            try {
              const messagesSnap = await getDocs(collection(db,'rooms',roomId,'messages'));
              messagesSnap.forEach(d => deleteDoc(d.ref).catch(()=>{}));
              const tokensSnap = await getDocs(collection(db,'rooms',roomId,'tokens'));
              tokensSnap.forEach(d => deleteDoc(d.ref).catch(()=>{}));
              await deleteDoc(doc(db,'rooms',roomId)).catch(()=>{});
            } catch(e) {}
          }, 10000);
          roomId = null;
        }
        
        deleteDoc(doc(db,'waiting',myId)).catch(() => {});
        deleteDoc(doc(db,'invites',myId)).catch(() => {});
        
        if(isLive) { endLive().catch(()=>{}); }
        resetStranger();
        stopCamera();
        showDisconnected();
        
        chatMessages.innerHTML = '';
        chatBox.classList.add('hidden');
        chatVisible = false;
      }
      
      async function startLive() {
        if(!localStream) return;
        isLive = true;
        [liveBtn, liveBtnDesktop].forEach(btn => { if(btn) { btn.innerHTML = '<i class="fas fa-stop-circle"></i><span>End</span>'; btn.classList.add('active'); } });
        try {
          await setDoc(doc(db,'live',liveUserId), { userId: currentUser, active: true, startedAt: serverTimestamp(), viewers: 0 });
          strangerCamera.classList.add('live-active');
        } catch(e) { isLive = false; }
      }
      async function endLive() {
        isLive = false;
        [liveBtn, liveBtnDesktop].forEach(btn => { if(btn) { btn.innerHTML = '<i class="fas fa-circle"></i><span>Live</span>'; btn.classList.remove('active'); } });
        await deleteDoc(doc(db,'live',liveUserId)).catch(() => {});
        strangerCamera.classList.remove('live-active');
      }
      async function toggleLive() {
        if(isLive) await endLive();
        else { if(!localStream && !await startCamera()) return; await startLive(); }
      }
      
      liveBtn.onclick = toggleLive;
      if(liveBtnDesktop) liveBtnDesktop.onclick = toggleLive;
      startStopBtn.onclick = () => { if(startStopBtn.classList.contains('stop-state')) stopChat(); else startChat(); };
      if(startStopBtnDesktop) startStopBtnDesktop.onclick = () => { if(startStopBtnDesktop.classList.contains('stop-state')) stopChat(); else startChat(); };
      nextBtn.onclick = () => { stopChat(); setTimeout(() => startChat(), 500); };
      if(nextBtnDesktop) nextBtnDesktop.onclick = () => { stopChat(); setTimeout(() => startChat(), 500); };
      
      window.addEventListener('beforeunload', () => { saveWalletBalances(); if(pc) pc.close(); if(localStream) localStream.getTracks().forEach(t => t.stop()); });
    }
  </script>
</body>
