    /* ========== WHATSAPP STYLE CALL UI ========== */
    .call-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.96);backdrop-filter:blur(20px); }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});

      { urls: "turn:standard.relay.metered.ca:443", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" },

    ];
    
    async function createPeerConnection() {
      if(peerConnection) peerConnection.close();
      peerConnection = new RTCPeerConnection({ iceServers: PROPER_ICE_SERVERS, iceCandidatePoolSize: 10 });
      peerConnection.ontrack = (event) => { if(event.streams[0]) document.getElementById('callRemoteVideo').srcObject = event.streams[0]; };
      peerConnection.onicecandidate = async (event) => {
        if(event.candidate && callDocRef) {
          const field = isCaller ? 'callerCandidates' : 'calleeCandidates';
          await updateDoc(callDocRef, { [field]: arrayUnion(event.candidate.toJSON()) });
        }
      };
      peerConnection.oniceconnectionstatechange = () => {
        if(peerConnection.iceConnectionState === 'connected') document.getElementById('callStatus').innerHTML = 'Connected ✓';
        else if(peerConnection.iceConnectionState === 'failed') { endCall(); alert("Connection failed"); }
      };
      return peerConnection;
    }
    
    document.getElementById('loadingScreen').style.display='none';document.getElementById('mainPage').style.display='flex';
    loadAllUsers();setupRealtimeChatList();listenForIncomingCalls();loadMessageRequests();
    
    // [All existing chat functions remain exactly the same - keeping them for compatibility]
    function hasDismissedSettings(username){try{const d=JSON.parse(localStorage.getItem('dismissed_settings_'+currentUserId)||'{}');return d[username]===true}catch(e){return false}}
    function dismissSettingsUser(username){try{const d=JSON.parse(localStorage.getItem('dismissed_settings_'+currentUserId)||'{}');d[username]=true;localStorage.setItem('dismissed_settings_'+currentUserId,JSON.stringify(d))}catch(e){}}
    window.dismissAndContinue=function(username,msgId){dismissSettingsUser(username);document.querySelectorAll('.settings-options').forEach(el=>el.remove())};
    function cleanName(u){return(u||'').replace(/^@/,'');}
    function formatDuration(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
    window.goToPartnerProfile=function(){if(chatPartner)window.location.href='profile.html?user='+encodeURIComponent(chatPartner);};
    window.filterChatList=function(){const s=document.getElementById('chatSearchInput').value.toLowerCase();renderChatList(s?chatListData.filter(c=>dispName(c.username).toLowerCase().includes(s)||(c.lastMsg&&c.lastMsg.toLowerCase().includes(s))):chatListData);};
    window.showLockOptions=function(username,msgId){lockOptionsUser=username;lockOptionsMsgId=msgId;document.getElementById('lockOptionsUser').textContent='@'+username.replace('@','')+' sent this from Settings';document.getElementById('lockOptionsOverlay').classList.add('show');};
    window.closeLockOptions=function(){document.getElementById('lockOptionsOverlay').classList.remove('show');lockOptionsUser=null;};
    window.goToNewLock=function(){if(lockOptionsUser){sessionStorage.setItem('settingsAddUser',lockOptionsUser);sessionStorage.setItem('settingsNewLock','true');}document.getElementById('lockOptionsOverlay').classList.remove('show');window.location.href='settings.html';};
    window.goToExistingLock=function(){if(lockOptionsUser){sessionStorage.setItem('settingsAddUser',lockOptionsUser);}document.getElementById('lockOptionsOverlay').classList.remove('show');window.location.href='settings.html';};
    window.continueInChat=function(){dismissSettingsUser(lockOptionsUser);document.getElementById('lockOptionsOverlay').classList.remove('show');document.querySelectorAll('.settings-options').forEach(el=>el.remove());lockOptionsUser=null;};
    document.getElementById('lockOptionsOverlay').addEventListener('click',function(e){if(e.target===this)closeLockOptions();});
    async function loadMessageRequests(){try{const snap=await getDocs(collection(db,'message_requests'));messageRequests=[];snap.forEach(doc=>{const d=doc.data();if(d.to===currentUserId||d.to===currentUser||d.to===currentUser.replace('@','')){messageRequests.push({id:doc.id,...d});}});updateRequestBadge();}catch(e){}}
    function updateRequestBadge(){const badge=document.getElementById('requestBadge');if(messageRequests.length>0){badge.style.display='flex';badge.textContent=messageRequests.length;}else{badge.style.display='none';}}
    async function loadAllUsers(){allUsersList=[];userProfiles={};try{const q=query(collection(db,'users'),orderBy('createdAt','desc'));const snap=await getDocs(q);snap.forEach(doc=>{const d=doc.data();if(d.username!==currentUser){const c=cleanName(d.username);allUsersList.push({username:d.username,displayName:c,avatar:d.avatar||null,createdAt:d.createdAt?.toDate?.()||d.updatedAt?.toDate?.()||new Date(0)});userProfiles[d.username]={name:c,avatar:d.avatar||null};}});}catch(e){}const profile=JSON.parse(localStorage.getItem('userProfile')||'{}');[...(profile.friends||[]),...(profile.besties||[])].forEach(f=>{const u=f.name;if(u&&u!==currentUser){if(!allUsersList.find(x=>x.username===u)){allUsersList.push({username:u,displayName:cleanName(u),avatar:f.avatar||null,createdAt:new Date(0)});}if(!userProfiles[u])userProfiles[u]={name:cleanName(u),avatar:f.avatar||null};if(f.avatar)userProfiles[u].avatar=f.avatar;}});allUsersList.sort((a,b)=>{const aT=a.createdAt?.getTime?.()||0;const bT=b.createdAt?.getTime?.()||0;if(aT!==bT)return bT-aT;return a.displayName.localeCompare(b.displayName);});if(profile.avatar){userProfiles[currentUser]={name:cleanName(currentUser),avatar:profile.avatar};}}
    function avatarHTML(u){const p=userProfiles[u];if(p&&p.avatar&&p.avatar!=='null'&&p.avatar!=='undefined'){return`<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${cleanName(u).charAt(0).toUpperCase()}';">`;}return cleanName(u).charAt(0).toUpperCase();}
    function dispName(u){const p=userProfiles[u];return p?p.name:cleanName(u);}
    window.goToUserProfile=function(username){closeNewChatModal();window.location.href='profile.html?user='+encodeURIComponent(username);};
    window.showNewChatModal=function(){document.getElementById('newChatOverlay').classList.add('show');document.getElementById('newChatSearchInput').value='';switchNewChatTab('users',document.querySelector('.new-chat-tab'));renderNewChatUsers(allUsersList);};
    window.closeNewChatModal=function(){document.getElementById('newChatOverlay').classList.remove('show');};
    window.switchNewChatTab=function(tab,el){newChatActiveTab=tab;document.querySelectorAll('.new-chat-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');if(tab==='users'){document.getElementById('newChatSearchInput').placeholder='🔍 Search users...';renderNewChatUsers(allUsersList);}else{document.getElementById('newChatSearchInput').placeholder='🔍 Search requests...';renderNewChatRequests(messageRequests);}};
    window.filterNewChatList=function(){const s=document.getElementById('newChatSearchInput').value.toLowerCase();if(newChatActiveTab==='users'){renderNewChatUsers(allUsersList.filter(u=>u.displayName.toLowerCase().includes(s)));}else{renderNewChatRequests(messageRequests.filter(r=>(r.fromName||r.from||'').toLowerCase().includes(s)));}};
    function isNewUser(user){if(!user.createdAt||user.createdAt.getTime()===0)return false;return (new Date()-user.createdAt)<7*24*60*60*1000;}
    function renderNewChatUsers(users){const l=document.getElementById('newChatList');if(users.length===0){l.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.4);padding:2rem;font-size:0.75rem;">No users found</div>';return;}const existingChats=chatListData.map(c=>c.username);const mySentRequests=messageRequests.filter(r=>r.fromId===currentUserId||r.from===currentUser).map(r=>r.to||r.toName);l.innerHTML=users.map(u=>{const alreadyChatting=existingChats.includes(u.username);const alreadyRequested=mySentRequests.includes(u.username.replace('@',''))||mySentRequests.includes(u.username);const newBadge=isNewUser(u)?'<span class="new-badge">NEW</span>':'';let actionBtn='';if(alreadyChatting){actionBtn=`<button class="new-chat-action chat" onclick="event.stopPropagation();closeNewChatModal();openChat('${u.username}')">💬 Chat</button>`;}else if(alreadyRequested){actionBtn=`<span class="requested-label">⏳ Requested</span>`;}else{actionBtn=`<button class="new-chat-action request-btn" onclick="event.stopPropagation();sendChatRequest('${u.username}', this)">📩 Request</button>`;}return`<div class="new-chat-item" onclick="goToUserProfile('${u.username}')"><div class="new-chat-avatar">${avatarHTML(u.username)}</div><div class="new-chat-info"><div class="new-chat-name">${u.displayName}${newBadge}</div><div class="new-chat-sub">${alreadyChatting?'Already in chats':alreadyRequested?'Request sent':'Tap to view profile'}</div></div><div class="new-chat-actions">${actionBtn}</div></div>`;}).join('');}
    window.sendChatRequest=async function(username,btnElement){try{const profile=JSON.parse(localStorage.getItem('userProfile')||'{}');const fromName=(profile.username||currentUser).replace('@','');const existing=messageRequests.find(r=>(r.fromId===currentUserId||r.from===currentUser)&&(r.to===username||r.to===username.replace('@','')));if(existing){alert('Request already sent!');return;}if(btnElement){const parentDiv=btnElement.closest('.new-chat-actions');if(parentDiv)parentDiv.innerHTML='<span class="requested-label">⏳ Requested</span>';const itemDiv=btnElement.closest('.new-chat-item');if(itemDiv){const subEl=itemDiv.querySelector('.new-chat-sub');if(subEl)subEl.textContent='Request sent';}}await addDoc(collection(db,'message_requests'),{from:currentUser,fromName:fromName,fromAvatar:profile.avatar||null,fromId:currentUserId,to:username.replace('@',''),toName:username.replace('@',''),lastMessage:'👋 Wants to chat with you',createdAt:serverTimestamp(),status:'pending'});await loadMessageRequests();showToast('✅ Request sent!');}catch(e){};};
    function renderNewChatRequests(requests){const l=document.getElementById('newChatList');if(requests.length===0){l.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.4);padding:2rem;font-size:0.75rem;">No pending requests ✨</div>';return;}l.innerHTML=requests.map(r=>{const userName=r.fromName||r.from||'Unknown';const avatarUrl=r.fromAvatar;const senderUsername=r.from||('@'+(r.fromName||''));return`<div class="new-chat-item" onclick="goToUserProfile('${senderUsername}')"><div class="new-chat-avatar">${avatarUrl&&avatarUrl!=='null'&&avatarUrl!=='undefined'?`<img src="${avatarUrl}" alt="">`:userName.charAt(0).toUpperCase()}</div><div class="new-chat-info"><div class="new-chat-name">${userName.replace('@','')}</div><div class="new-chat-sub">${r.lastMessage||'Wants to chat'}</div></div><div class="new-chat-actions"><button class="new-chat-action accept" onclick="event.stopPropagation();acceptRequest('${r.id}','${r.from}','${r.fromName}')">✓ Accept</button><button class="new-chat-action decline" onclick="event.stopPropagation();declineRequest('${r.id}')">✕</button></div></div>`;}).join('');}
    window.acceptRequest=async function(requestId,fromUser,fromName){try{const partnerUsername=fromUser||('@'+(fromName||'').replace('@',''));const cid=[currentUserId,partnerUsername.replace('@','')].sort().join('_');await setDoc(doc(db,'chats',cid),{users:[currentUserId,partnerUsername.replace('@','')],lastMessage:'👋 Chat started!',lastType:'text',lastTime:serverTimestamp(),['unread_'+currentUserId]:0,['unread_'+partnerUsername.replace('@','')]:1});await addDoc(collection(db,'chats',cid,'messages'),{text:'👋 Chat started! Say hello!',sender:currentUserId,createdAt:serverTimestamp(),seen:false});await deleteDoc(doc(db,'message_requests',requestId));messageRequests=messageRequests.filter(r=>r.id!==requestId);updateRequestBadge();renderNewChatRequests(messageRequests);renderNewChatUsers(allUsersList);closeNewChatModal();openChat(partnerUsername);}catch(e){};};
    window.declineRequest=async function(requestId){try{await deleteDoc(doc(db,'message_requests',requestId));messageRequests=messageRequests.filter(r=>r.id!==requestId);updateRequestBadge();renderNewChatRequests(messageRequests);}catch(e){};};
    document.getElementById('newChatOverlay').addEventListener('click',function(e){if(e.target===this)closeNewChatModal();});
    function setupRealtimeChatList(){if(unsubChatList)unsubChatList();const q=query(collection(db,'chats'),orderBy('lastTime','desc'));unsubChatList=onSnapshot(q,(snap)=>{const chats=[];snap.forEach(docSnap=>{const data=docSnap.data();const ids=docSnap.id.split('_');if(ids.includes(currentUserId)){const partnerId=ids.find(i=>i!==currentUserId);if(partnerId&&data.lastMessage!==undefined){chats.push({username:'@'+partnerId,lastMsg:(data.source==='settings'?'🔒 ':'')+(data.lastType==='image'?'📷 Photo':data.lastType==='audio'?'🎤 Voice':data.lastMessage||''),lastTime:data.lastTime?.toDate()||new Date(0),unreadCount:data['unread_'+currentUserId]||0});}}});chatListData=chats;renderChatList(chats);},(error)=>{},);}
    function renderChatList(cu){const l=document.getElementById('userList'),cnt=document.getElementById('chatCount');cnt.textContent=cu.length>0?'('+cu.length+')':'';if(cu.length===0){l.innerHTML='<div style="text-align:center;color:#555;padding:3rem;font-size:0.8rem;">No messages yet</div>';return;}l.innerHTML=cu.map(c=>{const ts=c.lastTime.getTime()>0?fmtTime(c.lastTime):'';const dn=dispName(c.username);return`<div class="user-list-item ${chatPartner===c.username?'active':''}" onclick="openChat('${c.username}')"><div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.username)}'">${avatarHTML(c.username)}</div><div class="user-info"><div class="user-name-row"><span class="user-name">${dn}</span><span class="user-time">${ts}</span></div><div class="user-msg-row"><span class="user-last-msg ${c.unreadCount>0?'unread-msg':''}">${c.lastMsg||'No messages'}</span>${c.unreadCount>0?`<span class="unread-count">${c.unreadCount}</span>`:''}</div></div></div>`;}).join('');}
    function fmtTime(d){if(!d||d.getTime()===0)return'';const n=new Date(),df=n-d;if(df<60000)return'Now';if(df<3600000)return Math.floor(df/60000)+'m';if(d.toDateString()===n.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(n-d<604800000)return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];return d.toLocaleDateString([],{month:'short',day:'numeric'});}
    window.openChat=function(u){chatPartner=u;chatId=[currentUserId,u.replace('@','')].sort().join('_');updateDoc(doc(db,'chats',chatId),{['unread_'+currentUserId]:0}).catch(()=>{});document.getElementById('topIcons').classList.add('hidden');document.getElementById('chatHeader').classList.add('show');document.getElementById('chatListFull').classList.add('hidden');document.getElementById('chatView').classList.add('show');document.getElementById('searchBarContainer').classList.add('hidden');document.getElementById('partnerName').textContent=dispName(u);document.getElementById('partnerStatus').innerHTML='<span class="dot"></span> online';document.getElementById('chatInputArea').classList.add('show');document.getElementById('floatingNav').classList.add('hidden');const c=document.getElementById('messagesContainer');c.querySelectorAll('.message-wrapper').forEach(el=>el.remove());document.getElementById('emptyChat').style.display='flex';listenToMessages();listenToTyping();scrollToBottom();};
    window.goBack=function(){if(isCallActive){endCall();}chatPartner=null;chatId=null;if(unsubMessages){unsubMessages();unsubMessages=null;}stopVoice(true);document.getElementById('topIcons').classList.remove('hidden');document.getElementById('chatHeader').classList.remove('show');document.getElementById('chatListFull').classList.remove('hidden');document.getElementById('chatView').classList.remove('show');document.getElementById('searchBarContainer').classList.remove('hidden');document.getElementById('partnerName').textContent='';document.getElementById('partnerStatus').textContent='';document.getElementById('chatInputArea').classList.remove('show');document.getElementById('floatingNav').classList.remove('hidden');};
    
    // ========== FIXED CALL FUNCTIONS WITH PROPER CONTROLS ==========
    window.startCall=async function(type){if(!chatPartner||isCallActive)return;callType=type;isCaller=true;try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:type==='video'});document.getElementById('callLocalVideo').srcObject=localStream;document.getElementById('callLocalVideo').style.display=type==='video'?'block':'none';document.getElementById('callOverlay').classList.add('show');document.getElementById('callStatus').textContent='Calling...';document.getElementById('callVideoBtn').style.display=type==='video'?'flex':'none';const callId=[currentUserId,chatPartner.replace('@','')].sort().join('_')+'_'+Date.now();callDocRef=doc(db,'calls',callId);await createPeerConnection();localStream.getTracks().forEach(track=>{peerConnection.addTrack(track,localStream);});const offer=await peerConnection.createOffer();await peerConnection.setLocalDescription(offer);await setDoc(callDocRef,{caller:currentUserId,callee:chatPartner.replace('@',''),type:type,status:'ringing',offer:{type:offer.type,sdp:offer.sdp},createdAt:serverTimestamp(),callerCandidates:[],calleeCandidates:[]});callUnsub=onSnapshot(callDocRef,async(snap)=>{const data=snap.data();if(!data)return;if(data.status==='rejected'){endCall();showToast('Call rejected');return;}if(data.status==='accepted'&&data.answer&&!peerConnection.currentRemoteDescription){await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));document.getElementById('callStatus').textContent='Connected ✓';}if(data.calleeCandidates&&peerConnection.remoteDescription){for(let cand of data.calleeCandidates){try{await peerConnection.addIceCandidate(new RTCIceCandidate(cand));}catch(e){}}}});isCallActive=true;}catch(e){alert('Camera/Microphone permission needed');endCall();}};
    window.acceptCall=async function(){document.getElementById('incomingCallOverlay').classList.remove('show');try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:callType==='video'});document.getElementById('callLocalVideo').srcObject=localStream;document.getElementById('callLocalVideo').style.display=callType==='video'?'block':'none';document.getElementById('callOverlay').classList.add('show');document.getElementById('callStatus').textContent='Connecting...';document.getElementById('callVideoBtn').style.display=callType==='video'?'flex':'none';await createPeerConnection();localStream.getTracks().forEach(track=>{peerConnection.addTrack(track,localStream);});const snap=await getDoc(callDocRef);const data=snap.data();if(data&&data.offer){await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));const answer=await peerConnection.createAnswer();await peerConnection.setLocalDescription(answer);await updateDoc(callDocRef,{answer:{type:answer.type,sdp:answer.sdp},status:'accepted'});}if(data.callerCandidates){for(let cand of data.callerCandidates){try{await peerConnection.addIceCandidate(new RTCIceCandidate(cand));}catch(e){}}}callUnsub=onSnapshot(callDocRef,async(snap)=>{const d=snap.data();if(!d)return;if(d.callerCandidates&&peerConnection.remoteDescription){for(let cand of d.callerCandidates){try{await peerConnection.addIceCandidate(new RTCIceCandidate(cand));}catch(e){}}}});document.getElementById('callStatus').textContent='Connected ✓';isCallActive=true;}catch(e){console.error(e);endCall();}};
    window.rejectCall=function(){if(callDocRef){updateDoc(callDocRef,{status:'rejected'}).catch(()=>{});}document.getElementById('incomingCallOverlay').classList.remove('show');callDocRef=null;};
    window.endCall=function(){if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}if(peerConnection){peerConnection.close();peerConnection=null;}if(callUnsub){callUnsub();callUnsub=null;}if(callDocRef&&isCaller){updateDoc(callDocRef,{status:'ended'}).then(()=>{deleteDoc(callDocRef).catch(()=>{});}).catch(()=>{});}document.getElementById('callOverlay').classList.remove('show');document.getElementById('incomingCallOverlay').classList.remove('show');document.getElementById('callRemoteVideo').srcObject=null;document.getElementById('callLocalVideo').srcObject=null;document.getElementById('callStatus').textContent='Connecting...';isCallActive=false;isCaller=false;callDocRef=null;isMuted=false;isVideoOff=false;document.getElementById('callMuteBtn').classList.remove('muted');document.getElementById('callVideoBtn').classList.remove('off');};
    window.toggleCallMute=function(){if(!localStream)return;isMuted=!isMuted;localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);document.getElementById('callMuteBtn').classList.toggle('muted',isMuted);};
    window.toggleCallVideo=function(){if(!localStream||callType!=='video')return;isVideoOff=!isVideoOff;localStream.getVideoTracks().forEach(t=>t.enabled=!isVideoOff);document.getElementById('callVideoBtn').classList.toggle('off',isVideoOff);document.getElementById('callLocalVideo').style.display=isVideoOff?'none':'block';};
    function listenForIncomingCalls(){const q=query(collection(db,'calls'),orderBy('createdAt','desc'));onSnapshot(q,(snap)=>{snap.docChanges().forEach(async(change)=>{if(change.type==='added'){const data=change.doc.data();const docId=change.doc.id;if(data.callee===currentUserId&&data.status==='ringing'&&!isCallActive){callDocRef=doc(db,'calls',docId);showIncomingCall(data);}}if(change.type==='modified'&&callDocRef&&change.doc.id===callDocRef.id){const data=change.doc.data();if(data.status==='rejected'){endCall();}}});});}
    function showIncomingCall(data){callType=data.type||'audio';isCaller=false;document.getElementById('incomingName').textContent=dispName('@'+data.caller);document.getElementById('incomingType').innerHTML=`<i class="fas ${callType==='audio'?'fa-phone':'fa-video'}"></i> Incoming ${callType} call...`;document.getElementById('incomingAvatar').innerHTML=avatarHTML('@'+data.caller);document.getElementById('incomingCallOverlay').classList.add('show');}
    
    window.toggleVoice=function(){if(isRecording){window.sendVoice();}else{startVoice();}};
    async function startVoice(){if(!chatId)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});const opts={audioBitsPerSecond:128000};if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))opts.mimeType='audio/webm;codecs=opus';else opts.mimeType='audio/webm';mediaRecorder=new MediaRecorder(stream,opts);audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());};mediaRecorder.start(100);isRecording=true;voiceSeconds=0;document.getElementById('recordingBar').classList.add('show');document.getElementById('micBtn').style.display='none';document.getElementById('sendBtn').style.display='none';document.getElementById('chatInput').style.display='none';document.getElementById('recTime').textContent='00:00';voiceTimer=setInterval(()=>{voiceSeconds++;document.getElementById('recTime').textContent=formatDuration(voiceSeconds);},1000);}catch(e){}}
    function stopVoice(c){if(mediaRecorder&&isRecording){if(c)audioChunks=[];if(mediaRecorder.state==='recording')mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block';}}
    window.cancelVoice=function(){stopVoice(true);};
    async function ensureChatDoc(){const chatRef=doc(db,'chats',chatId);const chatSnap=await getDoc(chatRef);if(!chatSnap.exists()){await setDoc(chatRef,{users:[currentUserId,chatPartner.replace('@','')],lastMessage:'',lastType:'text',lastTime:serverTimestamp()});}}
    window.sendVoice=async function(){if(!mediaRecorder||!isRecording)return;if(voiceSeconds<1){stopVoice(true);return;}mediaRecorder.onstop=async()=>{const mimeType=mediaRecorder.mimeType||'audio/webm';const blob=new Blob(audioChunks,{type:mimeType});const reader=new FileReader();reader.onload=async function(e){try{await ensureChatDoc();await addDoc(collection(db,'chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,audioMime:mimeType,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(doc(db,'chats',chatId),{lastMessage:'🎤 Voice message',lastType:'audio',lastTime:serverTimestamp(),['unread_'+chatPartner.replace('@','')]:increment(1)});}catch(err){}};reader.readAsDataURL(blob);};mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block';};
    window.playVoice=function(el){const audioUrl=el.getAttribute('data-audio');const btn=el.querySelector('.voice-play-btn i');const ds=el.querySelector('.voice-duration');const td=parseFloat(el.getAttribute('data-duration')||'0');document.querySelectorAll('.voice-msg').forEach(m=>{if(m!==el&&m._audio){m._audio.pause();const ob=m.querySelector('.voice-play-btn i');if(ob)ob.className='fas fa-play';const od=m.querySelector('.voice-duration');if(od&&m._totalDur)od.textContent='0:00 / '+formatDuration(m._totalDur);}});if(!el._audio){el._audio=new Audio(audioUrl);el._totalDur=td;if(ds)ds.textContent='0:00 / '+formatDuration(td);el._audio.ontimeupdate=()=>{if(ds&&el._audio&&el._totalDur)ds.textContent=formatDuration(el._audio.currentTime)+' / '+formatDuration(el._totalDur);};el._audio.onended=()=>{btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent='0:00 / '+formatDuration(el._totalDur);};}const audio=el._audio;if(audio.paused){audio.play().catch(()=>{});btn.className='fas fa-pause';}else{audio.pause();btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent=formatDuration(audio.currentTime)+' / '+formatDuration(el._totalDur);}};
    function listenToMessages(){if(unsubMessages){unsubMessages();unsubMessages=null;}const messagesRef=collection(db,'chats',chatId,'messages');const q=query(messagesRef,orderBy('createdAt','asc'));getDocs(q).then(snap=>{const c=document.getElementById('messagesContainer');const ec=document.getElementById('emptyChat');if(snap.empty){ec.style.display='flex';}else{ec.style.display='none';c.querySelectorAll('.message-wrapper').forEach(el=>el.remove());snap.forEach(doc=>{renderMsg(doc.id,doc.data());});scrollToBottom();}}).catch(err=>{});unsubMessages=onSnapshot(q,(snap)=>{const c=document.getElementById('messagesContainer');const ec=document.getElementById('emptyChat');if(snap.empty){ec.style.display='flex';return;}ec.style.display='none';snap.docChanges().forEach(ch=>{if(ch.type==='added'&&!document.getElementById('msg-'+ch.doc.id)){renderMsg(ch.doc.id,ch.doc.data());scrollToBottom();}});},(error)=>{console.error(error);});}
    function renderMsg(id,msg){const c=document.getElementById('messagesContainer');const tb=document.getElementById('typingBubble');const isSent=msg.sender===currentUserId;if(document.getElementById('msg-'+id))return;const isFromSettings=msg.source==='settings';const w=document.createElement('div');w.className='message-wrapper '+(isSent?'sent':'received');w.id='msg-'+id;let time='';if(msg.createdAt){try{time=new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){}}if(msg.imageUrl){w.innerHTML=`<div class="message-bubble"><img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')" loading="lazy"><div class="message-time">${time}</div>${isFromSettings?'<div class="settings-badge"><i class="fas fa-shield-halved"></i> From Settings</div>':''}</div>`;}else if(msg.audioUrl){const dur=msg.audioDuration||0;w.innerHTML=`<div class="message-bubble voice-msg" data-audio="${msg.audioUrl}" data-duration="${dur}" onclick="playVoice(this)"><button class="voice-play-btn"><i class="fas fa-play"></i></button><div class="voice-wave-container">${genBars(18)}</div><span class="voice-duration">0:00 / ${formatDuration(dur)}</span><div class="message-time">${time}</div>${isFromSettings?'<div class="settings-badge"><i class="fas fa-shield-halved"></i> From Settings</div>':''}</div>`;}else{w.innerHTML=`<div class="message-bubble">${msg.text||''}<div class="message-time">${time}</div>${isFromSettings?'<div class="settings-badge"><i class="fas fa-shield-halved"></i> From Settings</div>':''}</div>`;}if(isFromSettings&&!isSent&&!hasDismissedSettings(chatPartner)){w.innerHTML+=`<div class="settings-options"><button class="settings-opt-btn lock-btn" onclick="showLockOptions('${chatPartner}','${id}')"><i class="fas fa-lock"></i> Add to Lock</button><button class="settings-opt-btn chat-btn" onclick="dismissAndContinue('${chatPartner}','${id}')"><i class="fas fa-comment-dots"></i> Continue</button></div>`;}c.insertBefore(w,tb);if(!isSent&&!msg.seen){setDoc(doc(db,'chats',chatId,'messages',id),{seen:true},{merge:true}).catch(()=>{});}}
    function genBars(n){let h='';for(let i=0;i<n;i++){h+=`<div class="voice-wave-bar" style="height:${Math.floor(Math.random()*22)+4}px;"></div>`;}return h;}
    window.sendImage=async function(e){const file=e.target.files[0];if(!file||!chatId)return;const r=new FileReader();r.onload=async function(ev){try{await ensureChatDoc();await addDoc(collection(db,'chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(doc(db,'chats',chatId),{lastMessage:'📷 Photo',lastType:'image',lastTime:serverTimestamp(),['unread_'+chatPartner.replace('@','')]:increment(1)});}catch(err){}};r.readAsDataURL(file);e.target.value='';};
    window.sendMessage=async function(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!chatId)return;input.value='';try{await ensureChatDoc();await addDoc(collection(db,'chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(doc(db,'chats',chatId),{lastMessage:text,lastType:'text',lastTime:serverTimestamp(),['unread_'+chatPartner.replace('@','')]:increment(1)});}catch(e){}};
    function listenToTyping(){const pid=chatPartner.replace('@','');onSnapshot(doc(db,'chats',chatId,'typing',pid),snap=>{const d=snap.data();const st=document.getElementById('partnerStatus');const tb=document.getElementById('typingBubble');if(d&&d.typing){st.innerHTML='<span class="dot"></span> typing...';tb.classList.add('show');}else{st.innerHTML='<span class="dot"></span> online';tb.classList.remove('show');}});}
    let typingTimeout;document.getElementById('chatInput').addEventListener('input',function(){if(!chatId)return;setDoc(doc(db,'chats',chatId,'typing',currentUserId),{typing:true,updatedAt:serverTimestamp()});clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>{setDoc(doc(db,'chats',chatId,'typing',currentUserId),{typing:false,updatedAt:serverTimestamp()});},2000);});
    document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
    function scrollToBottom(){const c=document.getElementById('messagesContainer');setTimeout(()=>{if(c)c.scrollTop=c.scrollHeight;},100);}
    function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1.5rem;border-radius:2rem;font-size:0.7rem;z-index:500;pointer-events:none;';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
    window.addEventListener('beforeunload',()=>{if(isCallActive)endCall();});
  </script>
</body>
