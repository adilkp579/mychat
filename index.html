  <style>

    .vc-play-btn { display:flex;align-items:center;gap:0.3rem;padding:0.2rem 0.5rem;background:rgba(255,252,0,0.08);border:1px solid rgba(255,252,0,0.15);border-radius:0.8rem;cursor:pointer;font-size:0.7rem;color:#FFFC00;margin-top:0.1rem;width:fit-content; }

    .cmt-input-area { display:flex;align-items:center;gap:0.3rem;padding:0.5rem 1rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:#0a0a0a; }
    .cmt-input-wrap { flex:1;display:flex;align-items:center;background:#1a1a1a;border-radius:1.2rem;border:1px solid rgba(255,255,255,0.12);overflow:hidden; }
    .cmt-input-wrap:focus-within { border-color:#FFFC00; }
    .cmt-mic-btn { width:38px;height:38px;min-width:38px;border:none;background:transparent;color:#FFFC00;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }

    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:#888;font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }

    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;padding:0.4rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:800;opacity:0;transition:all 0.3s;font-weight:600;pointer-events:none; }
    .toast.show { opacity:1; }.toast.error { background:#ef4444;color:#fff; }

    }
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:max(0.8rem,env(safe-area-inset-bottom,0.8rem))}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .content{padding:0 0 5rem 0}
      .corner-btn{width:2rem;height:2rem;font-size:0.9rem}.story-ring{width:54px;height:54px}.story-avatar{width:46px;height:46px;font-size:1.1rem}.top-brand{font-size:1.5rem;}
    }
  </style>

<body>
  <div class="page" id="mainPage">
    <div class="content" id="mainContent">
      <div class="top-icons"><a href="upload.html" class="corner-btn"><i class="fas fa-plus"></i></a><span class="top-brand">Choicho</span><a href="search.html" class="corner-btn"><i class="fas fa-search"></i></a></div>
      <div class="stories-section"><div class="stories-bar" id="storiesBar"></div><div class="no-stories" id="noStories" style="display:none;">No recent stories</div></div>
      <div class="feed-section" id="feedContainer"></div>
      <div id="scrollSentinel" style="height:1px;"></div>
    </div>
    <div class="comments-overlay" id="commentsOverlay">
      <div class="comments-header"><h3>Comments</h3><button class="comments-close" onclick="closeComments()">✕</button></div>
      <div class="comments-list" id="commentsList"></div>
      <div class="global-rec-bar" id="globalRecBar">
        <div class="grec-dot"></div><span class="grec-timer" id="grecTimer">00:00</span>
        <button class="grec-cancel" onclick="cancelRecording()">✕</button>
        <button class="grec-send" onclick="sendRecording()"><i class="fas fa-paper-plane"></i></button>
      </div>
      <div class="cmt-input-area">
        <div class="cmt-input-wrap">
          <button class="cmt-mic-btn" id="mainMicBtn" onclick="toggleMainMic()"><i class="fas fa-microphone"></i></button>
          <input type="text" class="cmt-input" id="cmtInput" placeholder="Add a comment...">
        </div>
        <button class="cmt-post-btn" id="cmtPostBtn" onclick="postMainComment()">Post</button>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html" class="active"><i class="fas fa-home"></i></a><a href="web.html"><i class="fas fa-globe"></i></a><a href="reel.html"><i class="fas fa-film"></i></a><a href="chat.html"><i class="fas fa-comment-dots"></i></a><a href="profile.html"><i class="fas fa-user"></i></a><a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a><a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, getDoc, setDoc, addDoc, serverTimestamp, increment, updateDoc, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    const userCache = new Map();
    const PAGE_SIZE = 10;
    let lastVisiblePost = null;
    let allPostsLoaded = false;
    let isLoadingPosts = false;
    let activePostId = null;
    let voiceTargetCid = '', voiceTargetPath = '';
    let voiceRecorder = null, voiceChunks = [], voiceTimer = null, voiceSeconds = 0;
    const MAX_VOICE_SEC = 10;
    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    const loadedThreads = new Set();

    function cname(u) { return (u || '').replace(/^@/, ''); }
    function fmtDur(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
    function timeAgo(d) { if (!d) return ''; const n = new Date(); const df = n - d; if (df < 60000) return 'now'; if (df < 3600000) return Math.floor(df/60000)+'m'; if (df < 86400000) return Math.floor(df/3600000)+'h'; if (df < 604800000) return Math.floor(df/86400000)+'d'; return d.toLocaleDateString(); }

    // ✅ Load user from localStorage cache FIRST (instant), then Firestore
    function loadUserFromLocalCache(username) {
      if (!username || username === '@anonymous') return null;
      const key = 'profile_' + username.replace('@','');
      const cached = localStorage.getItem(key);
      if (cached) {
        try {
          const data = JSON.parse(cached);
          return { avatar: data.avatar || null, name: data.name || username };
        } catch(e) {}
      }
      // Also check userProfile
      const up = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (up.username === username) {
        return { avatar: up.avatar || null, name: up.name || username };
      }
      return null;
    }

    async function batchLoadProfiles(usernames) {
      const uniqueUsers = [...new Set(usernames)].filter(u => u && u !== '@anonymous' && !userCache.has(u));
      if (uniqueUsers.length === 0) return;
      
      // ✅ First load from localStorage for instant display
      for (const u of uniqueUsers) {
        const local = loadUserFromLocalCache(u);
        if (local) {
          userCache.set(u, local);
        }
      }
      
      // Then fetch from Firestore for latest data
      const firestoreUsers = uniqueUsers.filter(u => !userCache.has(u));
      for (let i = 0; i < firestoreUsers.length; i += 10) {
        const batch = firestoreUsers.slice(i, i + 10);
        try {
          const q = query(collection(db, 'users'), where('username', 'in', batch));
          const snap = await getDocs(q);
          snap.forEach(doc => {
            const d = doc.data();
            userCache.set(d.username, { avatar: d.avatar || null, name: d.name || d.username });
            // ✅ Update local cache
            localStorage.setItem('profile_' + d.username.replace('@',''), JSON.stringify(d));
          });
        } catch(e) {
          for (const u of batch) {
            await getUserProfile(u);
          }
        }
      }
      
      updateAllAvatars();
    }

    async function getUserProfile(username) {
      if (!username || username === '@anonymous') return { avatar: null, name: username };
      if (userCache.has(username)) return userCache.get(username);
      
      // Try local cache first
      const local = loadUserFromLocalCache(username);
      if (local) {
        userCache.set(username, local);
        return local;
      }
      
      // Try Firestore
      try {
        const snap = await getDoc(doc(db, 'users', username.replace('@', '')));
        if (snap.exists()) {
          const d = snap.data();
          const profile = { avatar: d.avatar || null, name: d.name || username };
          userCache.set(username, profile);
          localStorage.setItem('profile_' + username.replace('@',''), JSON.stringify(d));
          return profile;
        }
      } catch(e) {}
      
      const fallback = { avatar: null, name: username };
      userCache.set(username, fallback);
      return fallback;
    }

    function getAvtFromCache(username) {
      const p = userCache.get(username);
      if (p?.avatar && p.avatar !== 'null' && p.avatar !== 'undefined') {
        return `<img src="${p.avatar}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>';">`;
      }
      return '<i class="fas fa-user"></i>';
    }

    function updateAllAvatars() {
      document.querySelectorAll('[data-avatar-user]').forEach(el => {
        const username = el.dataset.avatarUser;
        el.innerHTML = getAvtFromCache(username);
      });
    }

    // ✅ Listen for profile updates from other tabs/pages
    window.addEventListener('storage', function(e) {
      if (e.key && e.key.startsWith('profile_')) {
        try {
          const data = JSON.parse(e.newValue);
          if (data.username) {
            userCache.set(data.username, { avatar: data.avatar || null, name: data.name || data.username });
            updateAllAvatars();
          }
        } catch(ex) {}
      }
      if (e.key === 'userProfile') {
        try {
          const data = JSON.parse(e.newValue);
          if (data.username) {
            userCache.set(data.username, { avatar: data.avatar || null, name: data.name || data.username });
            updateAllAvatars();
          }
        } catch(ex) {}
      }
    });

    // ✅ Refresh avatars when page gets focus (user may have updated profile)
    window.addEventListener('focus', function() {
      const lp = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (lp.username) {
        userCache.set(lp.username, { avatar: lp.avatar || null, name: lp.name || lp.username });
      }
      updateAllAvatars();
    });

    async function bootApp() {
      const hasLocalUid = localStorage.getItem("uid");
      if (!hasLocalUid && !auth.currentUser) {
        await new Promise(resolve => {
          const unsub = onAuthStateChanged(auth, (user) => {
            unsub();
            if (user) localStorage.setItem("uid", user.uid);
            resolve();
          });
        });
      }
      
      if (!localStorage.getItem("uid") && !auth.currentUser) {
        window.location.replace("login.html");
        return;
      }
      
      document.getElementById('mainPage').style.display = 'flex';
      const lp = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (lp.username) userCache.set(lp.username, { avatar: lp.avatar || null, name: lp.name || lp.username });
      
      renderStories();
      setupInfiniteScroll();
      loadMorePosts();
    }

    async function renderStories() {
      const ps = await loadProfileStories(currentUser);
      const bar = document.getElementById('storiesBar'), ns = document.getElementById('noStories');
      if (ps.length === 0) { bar.style.display = 'none'; ns.style.display = 'block'; return; }
      bar.style.display = 'flex'; ns.style.display = 'none';
      
      await batchLoadProfiles(ps.map(s => s.name));
      
      bar.innerHTML = ps.map(s => {
        const avt = getAvtFromCache(s.name);
        return `<div class="story-item" onclick="window.location.href='profile.html?user=${encodeURIComponent(s.name)}'"><div class="story-ring ${s.type}"><div class="story-avatar">${avt}</div></div><span class="story-name">${cname(s.name)}</span></div>`;
      }).join('');
    }
    
    async function loadProfileStories(username) {
      try { const ref = doc(db, 'profiles', username.replace('@', '')); const s = await getDoc(ref); if (s.exists()) { const d = s.data(); return [...(d.friends||[]).map(f=>({name:f.name,type:'friend'})),...(d.besties||[]).map(b=>({name:b.name,type:'bestie'}))]; } } catch(e) {}
      const p = JSON.parse(localStorage.getItem('userProfile')||'{}'); return [...(p.friends||[]).map(f=>({name:f.name,type:'friend'})),...(p.besties||[]).map(b=>({name:b.name,type:'bestie'}))];
    }

    async function loadMorePosts() {
      if (isLoadingPosts || allPostsLoaded) return;
      isLoadingPosts = true;
      try {
        let q;
        if (lastVisiblePost) {
          q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), startAfter(lastVisiblePost), limit(PAGE_SIZE));
        } else {
          q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
        }
        const snap = await getDocs(q);
        if (snap.empty) {
          allPostsLoaded = true;
          if (!lastVisiblePost) document.getElementById('feedContainer').innerHTML = '<div style="text-align:center;color:#555;padding:3rem;">No posts yet</div>';
          return;
        }
        
        const posts = [];
        snap.forEach(doc => {
          const dt = doc.data();
          const src = dt.data || dt.url || '';
          if (src) {
            posts.push({
              id: doc.id,
              userId: dt.username || dt.userId || '@anonymous',
              caption: dt.caption || '',
              src,
              likes: dt.likes || 0,
              time: dt.createdAt ? timeAgo(dt.createdAt.toDate()) : 'Recently'
            });
          }
        });
        
        lastVisiblePost = snap.docs[snap.docs.length - 1];
        await batchLoadProfiles(posts.map(p => p.userId));
        renderPostsToFeed(posts);
      } catch(e) {
        console.error(e);
      } finally {
        isLoadingPosts = false;
      }
    }

    function renderPostsToFeed(posts) {
      const container = document.getElementById('feedContainer');
      
      posts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'feed-card';
        card.innerHTML = `
          <div class="feed-header">
            <div class="feed-avatar" data-avatar-user="${p.userId}" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${getAvtFromCache(p.userId)}</div>
            <div><div class="feed-username" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cname(p.userId)}</div></div>
            <span class="feed-time">${p.time}</span>
          </div>
          <div class="feed-image" onclick="openImageViewer('${p.src}')"><img src="${p.src}" alt="post" loading="lazy" onerror="this.style.display='none'"></div>
          <div class="feed-actions">
            <button class="feed-action" id="likeBtn-${p.id}" onclick="toggleLike('${p.id}')"><i class="far fa-heart"></i></button>
            <button class="feed-action" onclick="openComments('${p.id}')"><i class="far fa-comment"></i></button>
            <button class="feed-action" onclick="sharePost('${p.src}')"><i class="far fa-share-square"></i></button>
          </div>
          <div class="feed-likes" id="likes-${p.id}">${p.likes||0} likes</div>
          <div class="feed-caption"><span onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cname(p.userId)}</span>${p.caption}</div>
          <div class="view-comments-btn" onclick="openComments('${p.id}')">View all comments</div>
        `;
        container.appendChild(card);
      });
    }

    function setupInfiniteScroll() {
      const content = document.getElementById('mainContent');
      let ticking = false;
      content.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            if (content.scrollHeight - content.scrollTop - content.clientHeight < 500) {
              loadMorePosts();
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    }

    // ---------- COMMENTS (same as before) ----------
    window.openComments = async function(pid) {
      activePostId = pid;
      loadedThreads.clear();
      document.getElementById('commentsOverlay').classList.add('show');
      document.getElementById('cmtInput').value = '';
      await renderTopLevelComments(pid);
    };
    
    window.closeComments = function() {
      document.getElementById('commentsOverlay').classList.remove('show');
      cancelRecording();
      activePostId = null;
      loadedThreads.clear();
    };

    async function renderTopLevelComments(pid) {
      const listEl = document.getElementById('commentsList');
      listEl.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;">Loading comments...</div>';
      
      try {
        const snap = await getDocs(query(collection(db, 'posts', pid, 'comments'), orderBy('createdAt', 'asc')));
        
        if (snap.empty) {
          listEl.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;">No comments yet</div>';
          return;
        }
        
        const usernames = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (!d._deleted && d.username) usernames.push(d.username);
        });
        
        await batchLoadProfiles(usernames);
        
        listEl.innerHTML = '';
        const postSnap = await getDoc(doc(db, 'posts', pid));
        const postOwner = postSnap.exists() ? (postSnap.data().username || postSnap.data().userId || '') : '';
        
        snap.forEach(docSnap => {
          const d = docSnap.data();
          if (d._deleted) return;
          const cid = docSnap.id;
          const canDel = (d.username === currentUser || postOwner === currentUser);
          appendCommentElement(listEl, d, cid, pid, '', canDel);
        });
        
        checkAllRepliesInBackground(pid, snap);
      } catch(e) {
        listEl.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;">Error loading comments</div>';
      }
    }

    async function checkAllRepliesInBackground(pid, topLevelSnap) {
      for (const docSnap of topLevelSnap.docs) {
        const cid = docSnap.id;
        checkHasReplies(pid, cid, 'vr-' + cid);
      }
    }

    function appendCommentElement(parentEl, data, commentId, postId, parentPath, canDelete) {
      const wrapper = document.createElement('div');
      wrapper.className = 'cmt-block';
      wrapper.id = 'c-' + commentId;
      
      const delBtn = canDelete ? `<button class="cmt-btn del-btn show" onclick="event.stopPropagation();deleteCmt('${postId}','${commentId}','${parentPath}')">🗑️</button>` : '';
      const myPath = parentPath ? `${parentPath}/${commentId}` : commentId;
      const avtHTML = getAvtFromCache(data.username);
      
      if (data.type === 'voice') {
        wrapper.innerHTML = `
          <div class="cmt-row">
            <div class="cmt-avatar" data-avatar-user="${data.username}">${avtHTML}</div>
            <div class="cmt-body">
              <div class="cmt-username">${cname(data.username)}</div>
              <div class="vc-play-btn" onclick="playVC('${data.audioURL || ''}', this)"><i class="fas fa-play"></i><span>Voice</span><span class="vc-duration">${fmtDur(data.duration||0)}</span></div>
              <div class="cmt-meta">
                <span class="cmt-time">${data.createdAt?timeAgo(data.createdAt.toDate()):''}</span>
                <button class="cmt-btn reply-btn" onclick="toggleReplyBox('${commentId}')">Reply</button>${delBtn}
              </div>
              <div class="reply-box" id="rb-${commentId}">
                <div class="reply-input-wrap"><button class="reply-mic-btn" id="rmic-${commentId}" onclick="startVoiceFor('${commentId}','${parentPath}')"><i class="fas fa-microphone"></i></button><input class="reply-input" id="ri-${commentId}" placeholder="Reply..."></div>
                <button class="reply-post-btn" onclick="postReply('${postId}','${commentId}','${parentPath}')">Post</button>
              </div>
              <div class="cmt-thread" id="thread-${commentId}"></div>
              <button class="view-replies-btn" id="vr-${commentId}" onclick="loadReplies('${postId}','${myPath}','thread-${commentId}')">View replies</button>
            </div>
          </div>`;
      } else {
        wrapper.innerHTML = `
          <div class="cmt-row">
            <div class="cmt-avatar" data-avatar-user="${data.username}">${avtHTML}</div>
            <div class="cmt-body">
              <div class="cmt-username">${cname(data.username)}</div>
              <div class="cmt-content">${data.text||''}</div>
              <div class="cmt-meta">
                <span class="cmt-time">${data.createdAt?timeAgo(data.createdAt.toDate()):''}</span>
                <button class="cmt-btn reply-btn" onclick="toggleReplyBox('${commentId}')">Reply</button>${delBtn}
              </div>
              <div class="reply-box" id="rb-${commentId}">
                <div class="reply-input-wrap"><button class="reply-mic-btn" id="rmic-${commentId}" onclick="startVoiceFor('${commentId}','${parentPath}')"><i class="fas fa-microphone"></i></button><input class="reply-input" id="ri-${commentId}" placeholder="Reply..."></div>
                <button class="reply-post-btn" onclick="postReply('${postId}','${commentId}','${parentPath}')">Post</button>
              </div>
              <div class="cmt-thread" id="thread-${commentId}"></div>
              <button class="view-replies-btn" id="vr-${commentId}" onclick="loadReplies('${postId}','${myPath}','thread-${commentId}')">View replies</button>
            </div>
          </div>`;
      }
      parentEl.appendChild(wrapper);
    }

    async function checkHasReplies(postId, path, btnId) {
      try {
        const snap = await getDocs(query(collection(db, 'posts', postId, 'comments', path, 'replies'), limit(1)));
        const btn = document.getElementById(btnId);
        if (btn && !snap.empty) btn.style.display = 'block';
      } catch(e) {}
    }

    window.loadReplies = async function(postId, parentPath, threadId) {
      const threadEl = document.getElementById(threadId);
      if (!threadEl) return;
      if (loadedThreads.has(parentPath)) { threadEl.style.display = threadEl.style.display === 'none' ? '' : 'none'; return; }
      threadEl.innerHTML = '<div style="color:#555;font-size:0.6rem;">Loading...</div>';
      try {
        const snap = await getDocs(query(collection(db, 'posts', postId, 'comments', parentPath, 'replies'), orderBy('createdAt', 'asc')));
        if (snap.empty) { threadEl.innerHTML = '<div style="color:#555;font-size:0.6rem;">No replies</div>'; loadedThreads.add(parentPath); return; }
        const usernames = []; snap.forEach(d => { if (!d.data()._deleted) usernames.push(d.data().username); });
        await batchLoadProfiles(usernames);
        threadEl.innerHTML = '';
        const postSnap = await getDoc(doc(db, 'posts', postId));
        const postOwner = postSnap.exists() ? (postSnap.data().username || postSnap.data().userId || '') : '';
        snap.forEach(docSnap => {
          const d = docSnap.data(); if (d._deleted) return;
          appendCommentElement(threadEl, d, docSnap.id, postId, parentPath, (d.username === currentUser || postOwner === currentUser));
        });
        loadedThreads.add(parentPath);
        const btn = document.getElementById('vr-' + parentPath.split('/').pop());
        if (btn) btn.style.display = 'none';
      } catch(e) { threadEl.innerHTML = '<div style="color:#ef4444;font-size:0.6rem;">Error</div>'; }
    };

    window.toggleReplyBox = function(cid) {
      document.querySelectorAll('.reply-box').forEach(e => e.classList.remove('show'));
      const b = document.getElementById('rb-'+cid);
      if (b) { b.classList.add('show'); document.getElementById('ri-'+cid)?.focus(); }
    };

    window.postReply = async function(pid, commentId, parentPath) {
      const input = document.getElementById('ri-' + commentId);
      const text = input?.value?.trim();
      if (!text || !pid || !commentId) return;
      input.value = '';
      const colPath = parentPath ? `posts/${pid}/comments/${parentPath}/replies` : `posts/${pid}/comments/${commentId}/replies`;
      try {
        const docRef = await addDoc(collection(db, colPath), { type:'text', text, username: currentUser, createdAt: serverTimestamp() });
        if (!userCache.has(currentUser)) userCache.set(currentUser, { avatar: null, name: currentUser });
        const threadEl = document.getElementById('thread-' + commentId);
        if (threadEl) {
          const targetPath = parentPath || commentId;
          if (loadedThreads.has(targetPath)) {
            appendCommentElement(threadEl, { type: 'text', text, username: currentUser, createdAt: { toDate: () => new Date() } }, docRef.id, pid, targetPath, true);
          } else loadReplies(pid, targetPath, 'thread-' + commentId);
        }
        showToast('Reply posted!');
      } catch(e) { showToast('Failed', true); }
    };

    window.deleteCmt = async function(pid, cid, parentPath) {
      if (!confirm('Delete?')) return;
      const colPath = parentPath ? `posts/${pid}/comments/${parentPath}/replies` : `posts/${pid}/comments`;
      try { await setDoc(doc(db, colPath, cid), { _deleted: true }, { merge: true }); document.getElementById('c-'+cid)?.remove(); showToast('Deleted'); } catch(e) { showToast('Failed',true); }
    };

    window.postMainComment = async function() {
      const input = document.getElementById('cmtInput');
      const text = input.value.trim();
      if (!text || !activePostId) return;
      input.value = '';
      try {
        const docRef = await addDoc(collection(db, 'posts', activePostId, 'comments'), { type:'text', text, username: currentUser, createdAt: serverTimestamp() });
        if (!userCache.has(currentUser)) userCache.set(currentUser, { avatar: null, name: currentUser });
        const listEl = document.getElementById('commentsList');
        if (listEl.querySelector('.cmt-block')) {
          appendCommentElement(listEl, { type: 'text', text, username: currentUser, createdAt: { toDate: () => new Date() } }, docRef.id, activePostId, '', true);
        }
        showToast('Comment posted!');
      } catch(e) { showToast('Failed', true); }
    };

    // ---------- VOICE ----------
    window.toggleMainMic = function() { if (voiceRecorder) sendRecording(); else startVoiceFor('', ''); };
    window.startVoiceFor = function(cid, parentPath) { if (voiceRecorder) sendRecording(); else startVoiceRecording(cid, parentPath); };

    async function startVoiceRecording(cid, parentPath) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 16000, channelCount: 1 } });
        voiceRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm', audioBitsPerSecond: 24000 });
        voiceChunks = []; voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
        voiceRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
        voiceRecorder.start(200); voiceSeconds = 0;
        voiceTargetCid = cid || ''; voiceTargetPath = parentPath || '';
        document.getElementById('globalRecBar').classList.add('show'); document.getElementById('grecTimer').textContent = '00:00';
        if (cid) document.getElementById('rmic-'+cid)?.classList.add('recording');
        else { document.getElementById('mainMicBtn')?.classList.add('recording'); document.getElementById('cmtPostBtn').disabled = true; }
        voiceTimer = setInterval(() => { voiceSeconds++; document.getElementById('grecTimer').textContent = fmtDur(voiceSeconds); if (voiceSeconds >= MAX_VOICE_SEC) sendRecording(); }, 1000);
      } catch(e) { showToast('Microphone needed!', true); }
    }

    window.cancelRecording = function() { if (voiceRecorder) { voiceChunks = []; voiceRecorder.stop(); } resetVoiceUI(); };

    window.sendRecording = async function() {
      if (!voiceRecorder || voiceSeconds < 1) { cancelRecording(); return; }
      voiceRecorder.onstop = async () => {
        voiceRecorder.stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(voiceChunks, { type: voiceRecorder.mimeType || 'audio/webm' });
        await saveVoiceToStorage(blob, voiceSeconds); resetVoiceUI();
      };
      voiceRecorder.stop(); clearInterval(voiceTimer);
    };

    function resetVoiceUI() {
      clearInterval(voiceTimer); voiceRecorder = null; voiceChunks = [];
      document.getElementById('globalRecBar').classList.remove('show'); document.getElementById('cmtPostBtn').disabled = false;
      if (voiceTargetCid) document.getElementById('rmic-'+voiceTargetCid)?.classList.remove('recording');
      else document.getElementById('mainMicBtn')?.classList.remove('recording');
      voiceTargetCid = ''; voiceTargetPath = '';
    }

    async function saveVoiceToStorage(audioBlob, duration) {
      showToast('Uploading voice...');
      const fileName = `voice_comments/${activePostId}/${Date.now()}.webm`;
      const storageRef = ref(storage, fileName);
      try {
        const snapshot = await uploadBytes(storageRef, audioBlob);
        const downloadURL = await getDownloadURL(snapshot.ref);
        if (!userCache.has(currentUser)) userCache.set(currentUser, { avatar: null, name: currentUser });
        if (voiceTargetCid) {
          const colPath = voiceTargetPath ? `posts/${activePostId}/comments/${voiceTargetPath}/replies` : `posts/${activePostId}/comments/${voiceTargetCid}/replies`;
          const docRef = await addDoc(collection(db, colPath), { type:'voice', username:currentUser, audioURL:downloadURL, duration, createdAt:serverTimestamp() });
          const threadEl = document.getElementById('thread-' + voiceTargetCid);
          const targetPath = voiceTargetPath || voiceTargetCid;
          if (threadEl && loadedThreads.has(targetPath)) {
            appendCommentElement(threadEl, { type:'voice', username:currentUser, audioURL:downloadURL, duration, createdAt:{toDate:()=>new Date()} }, docRef.id, activePostId, targetPath, true);
          } else if (threadEl) loadReplies(activePostId, targetPath, 'thread-' + voiceTargetCid);
        } else {
          const docRef = await addDoc(collection(db, 'posts', activePostId, 'comments'), { type:'voice', username:currentUser, audioURL:downloadURL, duration, createdAt:serverTimestamp() });
          const listEl = document.getElementById('commentsList');
          if (listEl.querySelector('.cmt-block')) {
            appendCommentElement(listEl, { type:'voice', username:currentUser, audioURL:downloadURL, duration, createdAt:{toDate:()=>new Date()} }, docRef.id, activePostId, '', true);
          }
        }
        showToast('✅ Voice added!');
      } catch(e) { showToast('❌ Upload failed', true); }
    }

    window.playVC = function(url, btn) {
      if (!url) return;
      document.querySelectorAll('.vc-play-btn i').forEach(i => i.className = 'fas fa-play');
      if (btn._audio && !btn._audio.paused) { btn._audio.pause(); btn.querySelector('i').className = 'fas fa-play'; return; }
      if (!btn._audio) { btn._audio = new Audio(url); btn._audio.onended = () => { btn.querySelector('i').className = 'fas fa-play'; }; }
      btn._audio.play().catch(() => { btn.querySelector('i').className = 'fas fa-exclamation-triangle'; });
      btn.querySelector('i').className = 'fas fa-pause';
    };

    window.toggleLike = async function(pid) {
      const b = document.getElementById('likeBtn-'+pid), l = document.getElementById('likes-'+pid);
      if (!b||!l) return;
      const liked = b.classList.contains('liked');
      if (liked) { b.classList.remove('liked'); b.querySelector('i').className='far fa-heart'; l.textContent=(Math.max(0,parseInt(l.textContent)-1))+' likes'; try { await updateDoc(doc(db,'posts',pid),{likes:increment(-1)}); } catch(e) {} }
      else { b.classList.add('liked'); b.querySelector('i').className='fas fa-heart'; l.textContent=(parseInt(l.textContent)+1)+' likes'; try { await updateDoc(doc(db,'posts',pid),{likes:increment(1)}); } catch(e) {} }
    };

    window.sharePost = function(s) { if (navigator.share) navigator.share({url:s}); else { navigator.clipboard.writeText(s); showToast('Link copied!'); } };

    function showToast(m, e) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast '+(e?'error':''); t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }

    window.openImageViewer = function(s) {
      const o = document.createElement('div'); o.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:800;display:flex;align-items:center;justify-content:center;';
      o.innerHTML = `<img src="${s}" style="max-width:95%;max-height:90vh;object-fit:contain;"><button style="position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:1rem;cursor:pointer;">✕</button>`;
      o.querySelector('button').onclick = () => o.remove(); o.onclick = e => { if (e.target === o) o.remove(); }; document.body.appendChild(o);
    };

    document.getElementById('cmtInput').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postMainComment(); } });

    bootApp();
  </script>
</body>
</html>
