<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif; min-height: 100vh; padding: 1rem; }
    .container { max-width: 500px; margin: 0 auto; }
    h2 { text-align: center; margin: 1rem 0; color: #4ade80; }
    .debug { background: #111; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin: 1rem 0; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; color: #0f0; }
    .videos { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .vid { flex: 1; aspect-ratio: 3/4; background: #111; border: 2px solid #333; border-radius: 12px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; max-height: 250px; }
    .vid video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .vid .off { color: #555; text-align: center; }
    .vid.connected { border-color: #4ade80; }
    .label { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; z-index: 5; }
    .btn { padding: 12px 30px; border-radius: 25px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; margin: 5px; color: #fff; }
    .btn-green { background: #4ade80; color: #000; }
    .btn-red { background: #ef4444; }
    .btn-blue { background: #3b82f6; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { text-align: center; color: #aaa; margin: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎥 Random Video Chat</h2>
    <div class="debug" id="debug">> Ready...</div>
    <div class="status" id="status">Press Start to find stranger</div>
    
    <div class="videos">
      <div class="vid" id="myVid">
        <div class="label">YOU</div>
        <video id="myVideo" autoplay playsinline muted></video>
        <div class="off" id="myOff"><br>📷<br>off</div>
      </div>
      <div class="vid" id="strangerVid">
        <div class="label">STRANGER</div>
        <video id="strangerVideo" autoplay playsinline muted></video>
        <div class="off" id="strangerOff"><br>👤<br>???</div>
      </div>
    </div>
    
    <div style="text-align:center">
      <button class="btn btn-green" id="startBtn">▶ Start</button>
      <button class="btn btn-red" id="stopBtn" style="display:none">⏹ Stop</button>
      <button class="btn btn-blue" id="nextBtn" style="display:none">⏭ Next</button>
    </div>
  </div>

  <script type="module">
    // ALL imports in one line
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, addDoc, onSnapshot, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.firebasestorage.app",
      messagingSenderId: "206620858913",
      appId: "1:206620858913:web:e8171ed8c1a2dbda3da160"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const debugEl = document.getElementById('debug');
    const statusEl = document.getElementById('status');
    const myVideo = document.getElementById('myVideo');
    const myOff = document.getElementById('myOff');
    const myVid = document.getElementById('myVid');
    const strangerVideo = document.getElementById('strangerVideo');
    const strangerOff = document.getElementById('strangerOff');
    const strangerVid = document.getElementById('strangerVid');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const nextBtn = document.getElementById('nextBtn');

    function log(msg) {
      console.log(msg);
      debugEl.innerHTML += '> ' + msg + '<br>';
      debugEl.scrollTop = debugEl.scrollHeight;
    }

    log('Firebase initialized');

    const myId = crypto.randomUUID();
    log('My ID: ' + myId.substring(0, 8));

    let localStream = null;
    let pc = null;
    let roomId = null;
    let unsubs = [];

    async function startCamera() {
      log('Requesting camera...');
      try {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
        myVideo.srcObject = localStream;
        await myVideo.play();
        myVideo.style.display = 'block';
        myOff.style.display = 'none';
        myVid.classList.add('connected');
        log('Camera ready');
        return true;
      } catch (e) {
        log('Camera error: ' + e.message);
        alert('Please allow camera access!');
        return false;
      }
    }

    function stopCamera() {
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      myVideo.style.display = 'none';
      myVideo.srcObject = null;
      myOff.style.display = '';
      myVid.classList.remove('connected');
    }

    function resetStranger() {
      strangerVideo.style.display = 'none';
      strangerVideo.srcObject = null;
      strangerOff.style.display = '';
      strangerVid.classList.remove('connected');
    }

    function showConnected() {
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      nextBtn.style.display = 'inline-block';
    }

    function showDisconnected() {
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      startBtn.disabled = false;
    }

    // Test Firestore connection first
    async function testFirestore() {
      log('Testing Firestore...');
      try {
        const testDoc = doc(db, 'test', 'connection');
        await setDoc(testDoc, { test: true, time: serverTimestamp() });
        log('✅ Firestore write OK');
        const snap = await getDoc(testDoc);
        if (snap.exists()) {
          log('✅ Firestore read OK');
        }
        await deleteDoc(testDoc);
        log('✅ Firestore working!');
        return true;
      } catch (e) {
        log('❌ Firestore error: ' + e.message);
        log('⚠️ Check Firebase Console → Firestore → Rules');
        log('⚠️ Make sure rules are: allow read, write: if true;');
        return false;
      }
    }

    async function createRoom(otherId, isCaller) {
      log('Creating room... isCaller=' + isCaller);
      statusEl.textContent = 'Connecting...';
      roomId = [myId, otherId].sort().join('_');
      showConnected();

      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

      if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }

      pc.ontrack = (event) => {
        log('Received remote stream!');
        if (event.streams[0]) {
          strangerVideo.srcObject = event.streams[0];
          strangerVideo.style.display = 'block';
          strangerOff.style.display = 'none';
          strangerVid.classList.add('connected');
        }
      };

      pc.onicecandidate = async (event) => {
        if (event.candidate) {
          await addDoc(collection(db, 'rooms', roomId, 'ice'), {
            sender: myId,
            candidate: JSON.parse(JSON.stringify(event.candidate))
          }).catch(() => {});
        }
      };

      pc.onconnectionstatechange = () => {
        log('State: ' + pc.connectionState);
        if (pc.connectionState === 'connected') statusEl.textContent = '🎉 Connected!';
        if (pc.connectionState === 'failed') statusEl.textContent = 'Connection failed';
      };

      if (isCaller) {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await setDoc(doc(db, 'invites', otherId), {
          from: myId,
          offer: { type: offer.type, sdp: offer.sdp }
        });
        log('Offer sent');

        const unsub = onSnapshot(doc(db, 'invites', otherId), async (snap) => {
          const data = snap.data();
          if (data && data.answer && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            log('Connected!');
            unsub();
          }
        });
        unsubs.push(unsub);
      }

      const unsubIce = onSnapshot(collection(db, 'rooms', roomId, 'ice'), (snap) => {
        snap.docChanges().forEach(async (change) => {
          if (change.type === 'added') {
            const data = change.doc.data();
            if (data.sender !== myId && data.candidate) {
              try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {}
            }
          }
        });
      });
      unsubs.push(unsubIce);
    }

    function listenForInvites() {
      log('Listening for invites...');
      const unsub = onSnapshot(doc(db, 'invites', myId), async (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        log('Got invite from: ' + data.from?.substring(0,8));

        await deleteDoc(doc(db, 'waiting', myId)).catch(()=>{});

        roomId = [myId, data.from].sort().join('_');
        showConnected();

        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        if (localStream) {
          localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        pc.ontrack = (event) => {
          log('Received remote stream!');
          if (event.streams[0]) {
            strangerVideo.srcObject = event.streams[0];
            strangerVideo.style.display = 'block';
            strangerOff.style.display = 'none';
            strangerVid.classList.add('connected');
          }
        };

        pc.onicecandidate = async (event) => {
          if (event.candidate) {
            await addDoc(collection(db, 'rooms', roomId, 'ice'), {
              sender: myId,
              candidate: JSON.parse(JSON.stringify(event.candidate))
            }).catch(()=>{});
          }
        };

        pc.onconnectionstatechange = () => {
          log('State: ' + pc.connectionState);
          if (pc.connectionState === 'connected') statusEl.textContent = '🎉 Connected!';
        };

        if (data.offer) {
          await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await setDoc(doc(db, 'invites', myId), {
            from: data.from, offer: data.offer,
            answer: { type: answer.type, sdp: answer.sdp }
          }, { merge: true });
          log('Answer sent');
        }

        const unsubIce = onSnapshot(collection(db, 'rooms', roomId, 'ice'), (snap) => {
          snap.docChanges().forEach(async (change) => {
            if (change.type === 'added') {
              const iceData = change.doc.data();
              if (iceData.sender !== myId && iceData.candidate) {
                try { await pc.addIceCandidate(new RTCIceCandidate(iceData.candidate)); } catch(e) {}
              }
            }
          });
        });
        unsubs.push(unsubIce);
        unsub();
      });
      unsubs.push(unsub);
    }

    async function startChat() {
      log('=== START ===');
      startBtn.disabled = true;

      // Test Firestore first
      const fsOk = await testFirestore();
      if (!fsOk) {
        startBtn.disabled = false;
        statusEl.textContent = 'Firestore error - check Rules';
        return;
      }

      const camReady = await startCamera();
      if (!camReady) { startBtn.disabled = false; return; }

      statusEl.textContent = 'Looking for stranger...';
      
      try {
        const waitingSnap = await getDocs(collection(db, 'waiting'));
        let foundId = null;
        
        waitingSnap.forEach(docSnap => {
          const data = docSnap.data();
          if (data.userId && data.userId !== myId && !foundId) {
            foundId = data.userId;
          }
        });

        if (foundId) {
          log('Found: ' + foundId.substring(0,8));
          await deleteDoc(doc(db, 'waiting', myId)).catch(()=>{});
          await deleteDoc(doc(db, 'waiting', foundId)).catch(()=>{});
          await createRoom(foundId, true);
        } else {
          log('Waiting...');
          statusEl.textContent = 'Waiting for stranger...';
          await setDoc(doc(db, 'waiting', myId), { userId: myId, time: serverTimestamp() });
          listenForInvites();
        }
      } catch (e) {
        log('Error: ' + e.message);
        startBtn.disabled = false;
      }
    }

    function stopChat() {
      log('=== STOP ===');
      if (pc) { pc.close(); pc = null; }
      unsubs.forEach(u => u());
      unsubs = [];
      if (roomId) { deleteDoc(doc(db, 'rooms', roomId)).catch(()=>{}); roomId = null; }
      deleteDoc(doc(db, 'waiting', myId)).catch(()=>{});
      deleteDoc(doc(db, 'invites', myId)).catch(()=>{});
      resetStranger();
      stopCamera();
      showDisconnected();
      statusEl.textContent = 'Press Start';
    }

    function nextStranger() { stopChat(); setTimeout(() => startChat(), 500); }

    startBtn.addEventListener('click', startChat);
    stopBtn.addEventListener('click', stopChat);
    nextBtn.addEventListener('click', nextStranger);

    log('✅ Ready!');
  </script>
</body>
</html>
