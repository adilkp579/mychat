<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Reel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    
    .reel-wrapper { 
      flex:1;position:relative;
      overflow-y:scroll;
      scroll-snap-type:y mandatory;
      scroll-snap-stop:always;
      -webkit-overflow-scrolling:touch;
      padding-bottom:0;
      height:100%;
      max-height:100vh;
      max-height:100dvh;
    }
    .reel-wrapper::-webkit-scrollbar { width:0; }
    
    .reel-slide { 
      width:100%;height:100vh;
      height:100dvh;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      position:relative;
      display:flex;align-items:center;justify-content:center;
      background:#000;
      flex-shrink:0;
    }
    .reel-slide video { 
      width:100%;height:100%;
      object-fit:contain;
      background:#000;
      position:absolute;
      top:0;left:0;
    }
    
    .user-tag { position:absolute;top:1rem;left:1rem;display:flex;align-items:center;gap:0.5rem;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);padding:0.4rem 0.8rem;border-radius:1.5rem;z-index:10;border:1px solid rgba(255,255,255,0.1); }
    .user-tag .avatar { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.7rem; }
    .user-tag .name { font-size:0.8rem;font-weight:500;color:#fff; }
    
    .actions-bar { position:absolute;right:0.8rem;bottom:50%;transform:translateY(50%);display:flex;flex-direction:column;align-items:center;gap:1.5rem;z-index:10; }
    .action-btn { display:flex;flex-direction:column;align-items:center;gap:0.2rem;background:none;border:none;color:#fff;cursor:pointer;font-size:1.5rem;transition:all 0.2s; }
    .action-btn span { font-size:0.65rem;font-weight:500; }
    .action-btn.liked { color:#ef4444; }
    
    .caption-bar { position:absolute;bottom:1rem;left:1rem;right:5rem;z-index:10; }
    .caption-text { color:#fff;font-size:0.8rem;background:rgba(0,0,0,0.4);padding:0.5rem 0.8rem;border-radius:0.5rem;display:inline-block;max-width:100%; }
    
    .play-overlay { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;color:rgba(255,255,255,0.4);pointer-events:none;z-index:5; }

    .empty-state { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#555; }
    .empty-state i { font-size:3rem;display:block;margin-bottom:0.5rem; }

    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap; }
    .toast.show { opacity:1; }

    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:1rem; }
    .loading-screen i { font-size:2.5rem;color:#3897f0;animation:spin 1s infinite; }
    .loading-screen span { color:#888;font-size:0.85rem; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    
    .loading-overlay { position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:0.5rem; }
    .loading-overlay i { font-size:2rem;color:#3897f0;animation:spin 1s linear infinite; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    .nav-upload, .nav-search { display:none !important; }

    @media (min-width:1024px) {
      .nav-upload,.nav-search{display:flex!important}
      .floating-nav{top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .reel-wrapper{margin-left:5rem}
      .reel-slide{max-width:500px;margin:0 auto}
      .actions-bar{right:2rem}
    }
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <i class="fas fa-spinner"></i>
    <span>Loading reels...</span>
  </div>

  <div class="page" id="mainPage" style="display:none;">
    <div class="reel-wrapper" id="reelWrapper">
      <div class="loading-overlay" id="loadingOverlay"><i class="fas fa-spinner"></i></div>
    </div>
    <div class="toast" id="toast"></div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html" class="active"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script>
    if (!localStorage.getItem("uid")) {
      window.location.replace("login.html");
      throw new Error("Unauthorized");
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, getDocs, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    let allReels = [];
    let currentIndex = 0;

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    
    loadAllReels().then(() => renderReels());

    async function loadAllReels() {
      try {
        const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        snap.forEach(doc => {
          const d = doc.data();
          const src = d.data || d.url || '';
          const username = d.username || d.userId || '@anonymous';
          const isVideo = src && (src.startsWith('data:video/') || d.type === 'reel' || d.type === 'video');
          if (isVideo && !allReels.find(r => r.src === src)) {
            allReels.push({ id: doc.id, username, caption: d.caption || d.fileName || '', src, likes: d.likes || 0, comments: d.comments || 0, liked: false });
          }
        });
      } catch(e) {}
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      (profile.posts || []).filter(p => p.type === 'video').forEach(p => {
        if (!allReels.find(r => r.src === p.src)) {
          allReels.unshift({ id: 'local_' + Date.now(), username: p.username || profile.username || '@user', caption: p.caption || '', src: p.src, likes: 0, comments: 0, liked: false });
        }
      });
    }

    function renderReels() {
      const wrapper = document.getElementById('reelWrapper');
      document.getElementById('loadingOverlay').style.display = 'none';
      
      if (allReels.length === 0) {
        wrapper.innerHTML = `<div class="empty-state"><i class="fas fa-film"></i><p>No reels yet</p><p style="font-size:0.7rem;margin-top:0.5rem;">Be the first to upload a reel!</p></div>`;
        return;
      }

      wrapper.innerHTML = allReels.map((reel, i) => `
        <div class="reel-slide" id="slide${i}">
          <video id="video${i}" src="${reel.src}" muted loop playsinline webkit-playsinline preload="auto" onclick="togglePlay(${i})"></video>
          <div class="play-overlay" id="overlay${i}"><i class="fas fa-play-circle"></i></div>
          <div class="user-tag">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <span class="name">${reel.username}</span>
          </div>
          <div class="actions-bar">
            <button class="action-btn ${reel.liked?'liked':''}" onclick="toggleLike(${i})">
              <i class="${reel.liked?'fas':'far'} fa-heart"></i>
              <span id="likes${i}">${reel.likes}</span>
            </button>
            <button class="action-btn" onclick="showToast('Comments coming soon! 💬')">
              <i class="far fa-comment"></i>
              <span>${reel.comments}</span>
            </button>
            <button class="action-btn" onclick="shareReel(${i})">
              <i class="far fa-share-square"></i>
              <span>Share</span>
            </button>
          </div>
          ${reel.caption ? `<div class="caption-bar"><div class="caption-text">${reel.caption}</div></div>` : ''}
        </div>
      `).join('');
      
      setTimeout(() => {
        allReels.forEach((reel, i) => {
          const v = document.getElementById('video' + i);
          if (v) {
            v.load();
            let loaded = false;
            const onLoaded = () => { loaded = true; };
            v.addEventListener('loadeddata', onLoaded, { once: true });
            setTimeout(() => {
              if (!loaded) {
                const currentSrc = v.src;
                v.src = '';
                v.load();
                setTimeout(() => { v.src = currentSrc; v.load(); }, 100);
              }
            }, 3000);
          }
        });
        playVideo(0);
      }, 500);
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const idx = parseInt(entry.target.id.replace('slide', ''));
          if (entry.isIntersecting && entry.intersectionRatio > 0.8) {
            currentIndex = idx;
            playVideo(idx);
            allReels.forEach((_, j) => { if (j !== idx) pauseVideo(j); });
          } else if (entry.intersectionRatio < 0.3) {
            pauseVideo(idx);
          }
        });
      }, { threshold: [0, 0.3, 0.5, 0.8, 1.0] });
      
      document.querySelectorAll('.reel-slide').forEach(s => observer.observe(s));

      let scrollTimeout;
      wrapper.addEventListener('scroll', function() {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          const slideHeight = wrapper.clientHeight;
          const scrollTop = wrapper.scrollTop;
          const newIndex = Math.round(scrollTop / slideHeight);
          if (newIndex !== currentIndex && newIndex >= 0 && newIndex < allReels.length) {
            currentIndex = newIndex;
            allReels.forEach((_, j) => {
              if (j === currentIndex) playVideo(j);
              else pauseVideo(j);
            });
          }
        }, 100);
      });
    }

    function playVideo(i) {
      const v = document.getElementById('video' + i);
      const o = document.getElementById('overlay' + i);
      if (!v) return;
      if (v.readyState === 0) v.load();
      v.play().then(() => { if (o) o.style.display = 'none'; }).catch(() => { if (o) o.style.display = 'none'; });
    }

    function pauseVideo(i) {
      const v = document.getElementById('video' + i);
      const o = document.getElementById('overlay' + i);
      if (v) { v.pause(); if (o) o.style.display = 'flex'; }
    }

    window.togglePlay = function(i) {
      const v = document.getElementById('video' + i);
      const o = document.getElementById('overlay' + i);
      if (!v) return;
      if (v.paused) {
        if (v.readyState === 0) v.load();
        v.play().catch(() => {});
        if (o) o.style.display = 'none';
        allReels.forEach((_, j) => { if (j !== i) pauseVideo(j); });
      } else {
        v.pause();
        if (o) o.style.display = 'flex';
      }
    };

    window.toggleLike = async function(i) {
      allReels[i].liked = !allReels[i].liked;
      allReels[i].likes += allReels[i].liked ? 1 : -1;
      document.getElementById('likes' + i).textContent = allReels[i].likes;
      const slide = document.getElementById('slide' + i);
      const likeBtn = slide.querySelector('.action-btn');
      likeBtn.classList.toggle('liked', allReels[i].liked);
      likeBtn.querySelector('i').className = allReels[i].liked ? 'fas fa-heart' : 'far fa-heart';
      showToast(allReels[i].liked ? 'Liked! ❤️' : 'Unliked');
      if (!allReels[i].id.startsWith('local_')) {
        try { await updateDoc(doc(db, 'posts', allReels[i].id), { likes: increment(allReels[i].liked ? 1 : -1) }); } catch(e) {}
      }
    };

    window.shareReel = async function(i) {
      const reel = allReels[i];
      if (navigator.share) {
        try { await navigator.share({ title: `${reel.username}'s reel`, text: reel.caption || 'Check out this reel!' }); } catch(e) {}
      } else {
        try { await navigator.clipboard.writeText(window.location.href); showToast('Link copied! 📋'); } catch(e) {}
      }
    };

    window.showToast = function(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(t._t);
      t._t = setTimeout(() => t.classList.remove('show'), 2000);
    };
  </script>
</body>
</html>
