<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web • iPhone style glass navbar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    .page {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #000000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .top-left-corner {
      position: absolute;
      top: max(1.2rem, env(safe-area-inset-top, 1.2rem));
      left: max(1.2rem, env(safe-area-inset-left, 1.2rem));
      z-index: 200;
    }

    .top-left-corner a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.6rem;
      height: 2.6rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 50%;
      color: #ffffff;
      font-size: 1.2rem;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .top-left-corner a:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .top-right-corner {
      position: absolute;
      top: max(1.2rem, env(safe-area-inset-top, 1.2rem));
      right: max(1.2rem, env(safe-area-inset-right, 1.2rem));
      z-index: 200;
    }

    .top-right-corner a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.6rem;
      height: 2.6rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 50%;
      color: #ffffff;
      font-size: 1.2rem;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
    }

    .top-right-corner a:active {
      transform: scale(0.92);
      background: rgba(255, 60, 90, 0.3);
      border-color: rgba(255, 100, 130, 0.5);
      color: #ff6b81;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
      padding: 3rem 1.5rem 7rem 1.5rem;
      text-align: center;
      gap: 1.5rem;
    }

    .camera-interface {
      width: 300px;
      height: 350px;
      background: #111;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 2rem;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
      transition: all 0.5s ease;
    }

    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 2rem;
      background: #000;
    }

    .camera-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2;
    }

    .camera-placeholder.hidden {
      display: none;
    }

    .camera-icon {
      font-size: 5rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.8rem;
    }

    .camera-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .camera-interface.active {
      border-color: rgba(255, 0, 0, 0.8);
      box-shadow: 0 0 50px rgba(255, 0, 0, 0.4), 0 15px 40px rgba(0, 0, 0, 0.6);
      animation: recordingPulse 2s infinite;
    }

    @keyframes recordingPulse {
      0%, 100% {
        border-color: rgba(255, 0, 0, 0.8);
        box-shadow: 0 0 50px rgba(255, 0, 0, 0.4), 0 15px 40px rgba(0, 0, 0, 0.6);
      }
      50% {
        border-color: rgba(255, 0, 0, 0.4);
        box-shadow: 0 0 80px rgba(255, 0, 0, 0.6), 0 15px 40px rgba(0, 0, 0, 0.6);
      }
    }

    .recording-indicator {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      padding: 5px 12px;
      border-radius: 20px;
    }

    .camera-interface.active .recording-indicator {
      opacity: 1;
    }

    .rec-dot {
      width: 12px;
      height: 12px;
      background: #ff0000;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .rec-text {
      color: #ff0000;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .timer-display {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 2px;
      opacity: 0;
      z-index: 10;
      font-family: 'Courier New', monospace;
      background: rgba(0,0,0,0.5);
      padding: 5px 12px;
      border-radius: 20px;
    }

    .camera-interface.active .timer-display {
      opacity: 1;
    }

    .buttons-container {
      display: flex;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    .start-button {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #4ade80;
      user-select: none;
      border: none;
      outline: none;
    }

    .start-button:hover {
      background: rgba(74, 222, 128, 0.2);
      transform: scale(1.08);
    }

    .start-button.recording {
      background: rgba(255, 0, 0, 0.2);
      color: #ff4444;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    }

    .start-button i {
      font-size: 2.2rem;
    }

    .start-button span {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cancel-button {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #ef4444;
      user-select: none;
      border: none;
      outline: none;
    }

    .cancel-button:hover {
      background: rgba(239, 68, 68, 0.2);
      transform: scale(1.08);
    }

    .cancel-button i {
      font-size: 2.2rem;
    }

    .cancel-button span {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .floating-nav {
      position: absolute;
      bottom: max(1.5rem, env(safe-area-inset-bottom, 1.5rem));
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-radius: 2.5rem;
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      z-index: 100;
    }

    .nav-center {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      gap: 0.3rem;
    }

    .nav-center a {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      transition: all 0.3s ease;
      text-decoration: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-center a.active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @media (min-width: 1024px) {
      .top-left-corner a, .top-right-corner a {
        width: 3.2rem;
        height: 3.2rem;
        font-size: 1.4rem;
      }
      .camera-interface {
        width: 380px;
        height: 440px;
      }
      .start-button, .cancel-button {
        width: 120px;
        height: 120px;
      }
      .floating-nav {
        width: 45%;
        max-width: 550px;
        padding: 0.9rem 2.2rem;
      }
      .nav-center a {
        font-size: 1.5rem;
        width: 2.8rem;
        height: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-left-corner">
      <a href="upload.html" title="upload"><i class="fas fa-plus"></i></a>
    </div>
    <div class="top-right-corner">
      <a href="like.html" title="like"><i class="fas fa-heart"></i></a>
    </div>
    <div class="content">
      <div class="camera-interface" id="cameraInterface">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <div class="camera-placeholder" id="cameraPlaceholder">
          <i class="fas fa-camera camera-icon"></i>
          <span class="camera-text">Camera</span>
        </div>
        <div class="recording-indicator">
          <div class="rec-dot"></div>
          <span class="rec-text">REC</span>
        </div>
        <div class="timer-display" id="timerDisplay">00:00</div>
      </div>
      <div class="buttons-container">
        <button class="start-button" id="startButton" onclick="toggleCamera()">
          <i class="fas fa-play" id="startIcon"></i>
          <span id="startText">Start</span>
        </button>
        <button class="cancel-button" onclick="cancelCamera()">
          <i class="fas fa-times"></i>
          <span>Cancel</span>
        </button>
      </div>
    </div>
    <nav class="floating-nav">
      <div class="nav-center">
        <a href="index.html" data-page="index" title="home"><i class="fas fa-home"></i></a>
        <a href="web.html" class="active" data-page="web" title="web" aria-current="page"><i class="fas fa-globe"></i></a>
        <a href="search.html" data-page="search" title="search"><i class="fas fa-search"></i></a>
        <a href="chat.html" data-page="chat" title="chat"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" data-page="profile" title="profile"><i class="fas fa-user"></i></a>
      </div>
    </nav>
  </div>
  <script>
    let isRecording = false;
    let timerInterval;
    let seconds = 0;
    let minutes = 0;
    let mediaStream = null;

    async function startCamera() {
      try {
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => track.stop());
        }
        const videoElement = document.getElementById('cameraFeed');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoElement.srcObject = mediaStream;
        await videoElement.play();
        cameraPlaceholder.classList.add('hidden');
        return true;
      } catch (error) {
        alert('Camera access denied. Please allow camera permissions.');
        return false;
      }
    }

    function stopCamera() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      document.getElementById('cameraFeed').srcObject = null;
      document.getElementById('cameraPlaceholder').classList.remove('hidden');
    }

    async function toggleCamera() {
      const cameraInterface = document.getElementById('cameraInterface');
      const startButton = document.getElementById('startButton');
      const startIcon = document.getElementById('startIcon');
      const startText = document.getElementById('startText');
      const timerDisplay = document.getElementById('timerDisplay');

      if (!isRecording) {
        startButton.disabled = true;
        startText.textContent = 'Starting...';
        const cameraStarted = await startCamera();
        if (cameraStarted) {
          isRecording = true;
          cameraInterface.classList.add('active');
          startButton.classList.add('recording');
          startIcon.className = 'fas fa-stop';
          startText.textContent = 'Stop';
          seconds = 0;
          minutes = 0;
          timerDisplay.textContent = '00:00';
          timerInterval = setInterval(() => {
            seconds++;
            if (seconds === 60) { seconds = 0; minutes++; }
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
          }, 1000);
        } else {
          startText.textContent = 'Start';
        }
        startButton.disabled = false;
      } else {
        isRecording = false;
        cameraInterface.classList.remove('active');
        startButton.classList.remove('recording');
        startIcon.className = 'fas fa-play';
        startText.textContent = 'Start';
        stopCamera();
        clearInterval(timerInterval);
      }
    }

    function cancelCamera() {
      if (isRecording) {
        isRecording = false;
        document.getElementById('cameraInterface').classList.remove('active');
        document.getElementById('startButton').classList.remove('recording');
        document.getElementById('startIcon').className = 'fas fa-play';
        document.getElementById('startText').textContent = 'Start';
        clearInterval(timerInterval);
      }
      document.getElementById('timerDisplay').textContent = '00:00';
      seconds = 0;
      minutes = 0;
      stopCamera();
    }

    window.addEventListener('beforeunload', () => {
      if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
      clearInterval(timerInterval);
    });
  </script>
</body>
</html>
