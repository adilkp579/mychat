<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Live</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    
    .live-header { position:absolute;top:max(1rem,env(safe-area-inset-top,1rem));left:1rem;right:1rem;display:flex;align-items:center;justify-content:space-between;z-index:20; }
    .live-badge-row { display:flex;align-items:center;gap:0.5rem;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);padding:0.4rem 0.8rem;border-radius:1.5rem;border:1px solid rgba(255,255,255,0.1); }
    .live-dot { width:8px;height:8px;background:#ef4444;border-radius:50%;animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-text { color:#ef4444;font-size:0.75rem;font-weight:600;letter-spacing:1px; }
    .viewer-count { color:#ccc;font-size:0.7rem; }
    .host-name { color:#fff;font-size:0.8rem;font-weight:500;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);padding:0.4rem 0.8rem;border-radius:1.5rem;border:1px solid rgba(255,255,255,0.1); }
    
    .close-btn { position:absolute;top:max(1rem,env(safe-area-inset-top,1rem));right:1rem;width:2rem;height:2rem;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:#fff;font-size:1rem;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center; }
    
    .video-container { flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative; }
    .video-container video { width:100%;height:100%;object-fit:contain; }
    .video-placeholder { text-align:center;color:#555; }
    .video-placeholder i { font-size:4rem;display:block;margin-bottom:0.5rem; }
    .video-placeholder p { font-size:0.8rem; }
    
    .bottom-actions { position:absolute;bottom:2rem;right:1rem;display:flex;flex-direction:column;gap:1.5rem;z-index:10; }
    .action-btn { display:flex;flex-direction:column;align-items:center;gap:0.2rem;background:none;border:none;color:#fff;cursor:pointer;font-size:1.4rem;transition:all 0.2s; }
    .action-btn span { font-size:0.6rem; }
    .action-btn.liked { color:#ef4444; }

    .loading-overlay { position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:0.5rem; }
    .loading-overlay i { font-size:2rem;color:#ef4444;animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .loading-overlay span { font-size:0.8rem;color:#888; }
  </style>
</head>
<body>
  <div class="page" id="mainPage" style="display:none;">
    <div class="live-header">
      <div class="live-badge-row">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
        <span class="viewer-count" id="viewerCount">1 watching</span>
      </div>
      <div class="host-name" id="hostName">@user</div>
    </div>

    <button class="close-btn" onclick="closeLive()"><i class="fas fa-times"></i></button>
    
    <div class="video-container" id="videoContainer">
      <div class="video-placeholder" id="videoPlaceholder">
        <i class="fas fa-video-slash"></i>
        <p>Connecting to live stream...</p>
      </div>
      <video id="liveVideo" autoplay playsinline style="display:none;"></video>
    </div>

    <div class="bottom-actions">
      <button class="action-btn" id="likeBtn" onclick="toggleLike()">
        <i class="far fa-heart"></i>
        <span id="likeCount">Like</span>
      </button>
      <button class="action-btn" onclick="shareLive()">
        <i class="far fa-share-square"></i>
        <span>Share</span>
      </button>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    <span id="loadingText">Joining live stream...</span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, getDoc, onSnapshot, collection, addDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const liveUser = urlParams.get('user') || '@user';
    const viewerId = crypto.randomUUID();

    document.getElementById('hostName').textContent = liveUser;
    document.getElementById('loadingText').textContent = 'Joining ' + liveUser + '\'s live...';

    let pc = null;
    let localStream = null;

    async function joinLive() {
      try {
        // Check if user is live
        const liveRef = doc(db, 'live', liveUser.replace('@', ''));
        const liveSnap = await getDoc(liveRef);
        
        if (!liveSnap.exists() || !liveSnap.data().active) {
          document.getElementById('loadingOverlay').innerHTML = '<span style="color:#ef4444;">This live has ended</span><br><button onclick="window.location.href=\'index.html\'" style="margin-top:1rem;padding:0.5rem 1.5rem;border-radius:1rem;border:none;background:#333;color:#fff;cursor:pointer;">Go Back</button>';
          return;
        }

        // Create peer connection
        pc = new RTCPeerConnection({ 
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
          ] 
        });

        // Handle incoming stream (host's video)
        pc.ontrack = (e) => {
          if (e.streams[0]) {
            const video = document.getElementById('liveVideo');
            const placeholder = document.getElementById('videoPlaceholder');
            video.srcObject = e.streams[0];
            video.style.display = 'block';
            placeholder.style.display = 'none';
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('mainPage').style.display = 'flex';
          }
        };

        pc.onconnectionstatechange = () => {
          if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingOverlay').innerHTML = '<span style="color:#ef4444;">Connection lost</span>';
          }
        };

        // Create offer to send to host
        const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);

        // Save viewer request
        const viewerRef = doc(db, 'live_viewers', viewerId);
        await setDoc(viewerRef, {
          liveUser, viewerId,
          offer: { type: offer.type, sdp: offer.sdp },
          createdAt: serverTimestamp()
        });

        // Listen for host's answer
        onSnapshot(viewerRef, async (snap) => {
          const d = snap.data();
          if (d?.answer && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
          }
        });

        // Update viewer count
        await updateDoc(liveRef, { viewers: increment(1) });

      } catch(e) {
        console.error('Join live error:', e);
        document.getElementById('loadingOverlay').innerHTML = '<span style="color:#fbbf24;">Unable to join live</span><br><button onclick="window.location.href=\'index.html\'" style="margin-top:1rem;padding:0.5rem 1.5rem;border-radius:1rem;border:none;background:#333;color:#fff;cursor:pointer;">Go Back</button>';
      }
    }

    window.closeLive = function() {
      if (pc) pc.close();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      // Update viewer count
      const liveRef = doc(db, 'live', liveUser.replace('@', ''));
      updateDoc(liveRef, { viewers: increment(-1) }).catch(()=>{});
      window.history.back();
    };

    window.toggleLike = function() {
      document.getElementById('likeBtn').classList.toggle('liked');
      const icon = document.getElementById('likeBtn').querySelector('i');
      if (document.getElementById('likeBtn').classList.contains('liked')) {
        icon.className = 'fas fa-heart';
      } else {
        icon.className = 'far fa-heart';
      }
    };

    window.shareLive = async function() {
      const url = window.location.href;
      if (navigator.share) {
        try { await navigator.share({ title: '🔴 LIVE: ' + liveUser, url }); } catch(e) {}
      } else {
        try { await navigator.clipboard.writeText(url); alert('Link copied! 📋'); } catch(e) {}
      }
    };

    joinLive();
  </script>
</body>
</html>
