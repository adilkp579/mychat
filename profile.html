<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:2rem;gap:1rem; }
    .login-box { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:1.5rem;padding:2rem;width:100%;max-width:350px;text-align:center; }
    .login-box h2 { margin-bottom:1.5rem;font-weight:500; }
    .login-box input { width:100%;padding:0.8rem;border-radius:0.5rem;border:1px solid #333;background:#111;color:#fff;font-size:0.9rem;margin-bottom:0.8rem;outline:none; }
    .login-box button { width:100%;padding:0.8rem;border-radius:1.5rem;border:none;background:#3897f0;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer; }
    .user-list { margin-top:1rem;text-align:left; }
    .user-item { padding:0.6rem;background:rgba(255,255,255,0.03);border-radius:0.5rem;margin-bottom:0.3rem;cursor:pointer;font-size:0.8rem; }
    .user-item:hover { background:rgba(255,255,255,0.08); }
    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;justify-content:center;border:1px solid rgba(255,255,255,0.12);z-index:100; }
    .nav-center { display:flex;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;width:2.5rem;height:2.5rem;display:flex;align-items:center;justify-content:center;border-radius:50%;text-decoration:none; }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15); }
    @media (min-width:1024px) {
      .floating-nav { top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;flex-direction:column;padding:1rem 0.6rem; }
      .nav-center { flex-direction:column;gap:1.2rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <div class="login-box">
        <h2>🔐 Login</h2>
        <input type="text" id="usernameInput" placeholder="Enter username">
        <button onclick="login()">Sign In</button>
        <div class="user-list" id="userList"></div>
      </div>
    </div>
    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
    </div></nav>
  </div>
  <script>
    const savedUsers = JSON.parse(localStorage.getItem('savedUsers')||'[]');
    function renderUsers(){document.getElementById('userList').innerHTML=savedUsers.map(u=>`<div class="user-item" onclick="loginAs('${u}')">👤 ${u}</div>`).join('');}
    function login(){const u=document.getElementById('usernameInput').value.trim();if(u){localStorage.setItem('currentUser','@'+u);if(!savedUsers.includes('@'+u)){savedUsers.push('@'+u);localStorage.setItem('savedUsers',JSON.stringify(savedUsers));}window.location.href='profile.html';}}
    function loginAs(u){localStorage.setItem('currentUser',u);window.location.href='profile.html';}
    renderUsers();
  </script>
</body>
</html>
