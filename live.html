<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Live Streams · Choicho Live</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Main Page */
    .page {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* Top Header */
    .top-header {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      background: #000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.8rem 1rem;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }
    
    .back-btn {
      width: 2.4rem;
      height: 2.4rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    .back-btn:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.15);
    }
    
    /* Choicho Style Title */
    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFC00, #FFD700, #FFA500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      font-family: 'Segoe Script', 'Brush Script MT', 'Apple Chancery', cursive;
      text-shadow: 0 0 20px rgba(255, 252, 0, 0.2);
    }
    
    /* Live Count Badge - Top Right Corner */
    .live-count-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(239, 68, 68, 0.15);
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      border: 1px solid rgba(239, 68, 68, 0.3);
      flex-shrink: 0;
    }
    
    .live-count-badge i {
      font-size: 0.5rem;
      color: #ef4444;
    }
    
    .live-count-badge span {
      font-size: 0.7rem;
      font-weight: 600;
      color: #ef4444;
    }
    
    /* Search Bar Below Header */
    .search-container {
      padding: 0.8rem 1rem;
      background: #000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 4rem;
      z-index: 99;
    }
    
    .search-wrapper {
      position: relative;
      width: 100%;
    }
    
    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 0.85rem;
      pointer-events: none;
    }
    
    .search-input {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.2s;
    }
    
    .search-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 252, 0, 0.3);
    }
    
    .search-input::placeholder {
      color: #666;
    }
    
    .clear-search {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
    }
    
    .clear-search.show {
      display: block;
    }
    
    /* Live Users Section */
    .live-users-section {
      padding: 1rem;
      flex: 1;
    }
    
    /* Grid Layout - 2 columns, multiple rows */
    .live-users-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding-bottom: 0.5rem;
    }
    
    /* Live User Card */
    .live-user-card {
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .live-user-card:active {
      transform: scale(0.96);
    }
    
    .live-avatar-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 1rem;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border: 2px solid rgba(239, 68, 68, 0.5);
    }
    
    .live-avatar-container .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    }
    
    .live-avatar-container .avatar-placeholder i {
      font-size: 2.5rem;
      color: rgba(255, 255, 255, 0.3);
    }
    
    .live-badge-corner {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: #ef4444;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.55rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    
    .live-badge-corner i {
      font-size: 0.35rem;
    }
    
    .viewer-badge-corner {
      position: absolute;
      bottom: 0.5rem;
      right: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.55rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    
    .live-user-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-top: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 0.2rem;
    }
    
    /* Empty State */
    .empty-live {
      text-align: center;
      padding: 2rem;
      color: #555;
    }
    
    .empty-live i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    
    .empty-live p {
      font-size: 0.75rem;
    }
    
    /* Scrollable Content */
    .scrollable-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 2rem;
    }
    
    /* Selected Live Stream Page */
    .stream-page {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .stream-page.active {
      display: flex;
    }
    
    /* Stream Header */
    .stream-header {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top, 1rem));
      left: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      pointer-events: none;
    }
    
    .stream-header > * {
      pointer-events: auto;
    }
    
    /* Choicho Style Live Badge in Stream */
    .stream-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 252, 0, 0.3);
    }
    
    .stream-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .stream-live-text {
      color: #FFFC00;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 5px rgba(255, 252, 0, 0.5);
    }
    
    .stream-viewers {
      color: #ccc;
      font-size: 0.65rem;
    }
    
    .stream-host-name {
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .stream-close-btn {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Video Container */
    .video-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }
    
    .host-video-wrapper {
      flex: 1;
      position: relative;
      background: #0a0a0a;
      min-height: 0;
    }
    
    .host-video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    
    .video-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #555;
    }
    
    .video-placeholder i {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    
    .video-placeholder p {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    
    /* Demo Stream Preview */
    .demo-stream-preview {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #FFFC00;
      background: rgba(0,0,0,0.7);
      padding: 1rem 2rem;
      border-radius: 1rem;
      backdrop-filter: blur(20px);
      z-index: 10;
    }
    
    .demo-stream-preview i {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    
    .demo-stream-preview p {
      font-size: 0.8rem;
    }
    
    /* Bottom Actions */
    .stream-actions {
      position: absolute;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
      z-index: 20;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      padding: 0.6rem 1.5rem;
      border-radius: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .stream-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1.3rem;
      padding: 0.2rem;
      transition: all 0.2s;
    }
    
    .stream-action-btn span {
      font-size: 0.55rem;
      font-weight: 500;
      opacity: 0.8;
    }
    
    .stream-action-btn:active {
      transform: scale(0.95);
    }
    
    .stream-action-btn.liked {
      color: #ef4444;
    }
    
    /* Comment Section */
    .comment-section {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      right: 1rem;
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    
    .comment-list {
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 0 0.3rem;
      pointer-events: auto;
      scrollbar-width: none;
    }
    
    .comment-list::-webkit-scrollbar {
      display: none;
    }
    
    .comment-item {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      padding: 0.35rem 0.7rem;
      border-radius: 1rem;
      color: #fff;
      font-size: 0.75rem;
      align-self: flex-start;
      max-width: 85%;
      word-break: break-word;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
    }
    
    .comment-username {
      font-weight: 700;
      color: #fbbf24;
      font-size: 0.7rem;
      white-space: nowrap;
    }
    
    .comment-input-row {
      display: flex;
      gap: 0.5rem;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .comment-input-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      outline: none;
    }
    
    .comment-input-row input::placeholder {
      color: #888;
    }
    
    .comment-send-btn {
      background: #FFFC00;
      border: none;
      color: #000;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.8rem;
      flex-shrink: 0;
      font-weight: bold;
    }
    
    .comment-send-btn:active {
      transform: scale(0.95);
    }
    
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      gap: 0.8rem;
    }
    
    .loading-overlay i {
      font-size: 2rem;
      color: #FFFC00;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .loading-overlay span {
      font-size: 0.8rem;
      color: #ccc;
    }
    
    .loading-overlay button {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      border: none;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 8rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      z-index: 350;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255, 252, 0, 0.3);
    }
    
    .toast.show {
      opacity: 1;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .live-users-grid {
        gap: 0.8rem;
      }
      .live-user-name {
        font-size: 0.7rem;
      }
      .live-badge-corner {
        font-size: 0.5rem;
        padding: 0.15rem 0.4rem;
      }
      .viewer-badge-corner {
        font-size: 0.5rem;
        padding: 0.15rem 0.4rem;
      }
      .live-count-badge span {
        font-size: 0.65rem;
      }
      .live-count-badge {
        padding: 0.25rem 0.6rem;
      }
      .page-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <!-- Main Page -->
  <div class="page" id="mainPage">
    <!-- Top Header -->
    <div class="top-header">
      <button class="back-btn" onclick="window.location.href='web.html'">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="page-title">Choicho LIVE</div>
      <div class="live-count-badge" id="liveCountBadge">
        <i class="fas fa-circle"></i>
        <span id="totalLiveCount">0</span>
      </div>
    </div>
    
    <!-- Search Bar Below Header -->
    <div class="search-container">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="Search live streams by username..." oninput="filterLiveStreams()">
        <i class="fas fa-times clear-search" id="clearSearch" onclick="clearSearch()"></i>
      </div>
    </div>
    
    <div class="scrollable-content">
      <div class="live-users-section">
        <div class="live-users-grid" id="liveUsersGrid"></div>
        <div class="empty-live" id="emptyLive" style="display: none;">
          <i class="fas fa-video-slash"></i>
          <p>No live streams found</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Live Stream Page -->
  <div class="stream-page" id="streamPage">
    <div class="stream-header">
      <div class="stream-info">
        <div class="stream-dot"></div>
        <span class="stream-live-text">CHOICHO LIVE</span>
        <span class="stream-viewers" id="streamViewerCount">0 watching</span>
      </div>
      <div class="stream-host-name" id="streamHostName">@user</div>
      <button class="stream-close-btn" onclick="closeStream()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    
    <div class="video-container">
      <div class="host-video-wrapper" id="hostVideoWrapper">
        <div class="video-placeholder" id="videoPlaceholder">
          <i class="fas fa-video"></i>
          <p>Demo stream preview</p>
        </div>
        <div class="demo-stream-preview" id="demoPreview" style="display: none;">
          <i class="fas fa-video"></i>
          <p id="demoPreviewText">Demo Live Stream</p>
          <p style="font-size:0.6rem; margin-top:0.3rem;">🎬 Test Mode</p>
        </div>
        <video id="remoteVideo" autoplay playsinline style="display:none;"></video>
      </div>
    </div>
    
    <div class="comment-section">
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-row">
        <input type="text" id="commentInput" placeholder="Add a comment..." maxlength="150" autocomplete="off">
        <button class="comment-send-btn" onclick="sendComment()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
    
    <div class="stream-actions">
      <button class="stream-action-btn" id="likeBtn" onclick="toggleLike()">
        <i class="far fa-heart"></i>
        <span id="likeCount">Like</span>
      </button>
      <button class="stream-action-btn" onclick="shareStream()">
        <i class="fas fa-share"></i>
        <span>Share</span>
      </button>
    </div>
  </div>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display: none;">
    <i class="fas fa-spinner"></i>
    <span id="loadingText">Connecting to Choicho Live...</span>
    <button onclick="closeStream()">Go Back</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc123"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const currentUser = localStorage.getItem('currentUser') || '@viewer';
    const currentUserId = currentUser.replace('@', '');

    let currentStreamHost = null;
    let pc = null;
    let isLiked = false;
    let liveRef = null;
    let commentsListener = null;
    let liveStatusListener = null;
    let isDemoMode = true;
    let viewerId = localStorage.getItem('live_viewer_id') || crypto.randomUUID();
    localStorage.setItem('live_viewer_id', viewerId);

    // 8 Demo Live Streams Data - 4 rows x 2 columns = 8 total live streams
    const demoStreams = [
      // Row 1
      { userId: "alex_streamer", username: "@alex_streamer", viewers: 1234, avatar: "🎮", color: "#ef4444", category: "Gaming" },
      { userId: "music_mia", username: "@music_mia", viewers: 567, avatar: "🎵", color: "#f97316", category: "Music" },
      // Row 2
      { userId: "tech_john", username: "@tech_john", viewers: 289, avatar: "💻", color: "#eab308", category: "Tech" },
      { userId: "travel_girl", username: "@travel_girl", viewers: 1892, avatar: "✈️", color: "#22c55e", category: "Travel" },
      // Row 3
      { userId: "gaming_pro", username: "@gaming_pro", viewers: 2345, avatar: "🎯", color: "#06b6d4", category: "Gaming" },
      { userId: "cook_master", username: "@cook_master", viewers: 445, avatar: "🍳", color: "#8b5cf6", category: "Cooking" },
      // Row 4
      { userId: "fitness_king", username: "@fitness_king", viewers: 678, avatar: "💪", color: "#ec4899", category: "Fitness" },
      { userId: "vibes_only", username: "@vibes_only", viewers: 345, avatar: "✨", color: "#f43f5e", category: "Entertainment" }
    ];

    // Show toast message
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Update total live count in header
    function updateLiveCount(count) {
      const countElement = document.getElementById('totalLiveCount');
      if (countElement) {
        countElement.textContent = count;
      }
    }

    // Filter live streams by search
    window.filterLiveStreams = function() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().replace('@', '');
      const gridContainer = document.getElementById('liveUsersGrid');
      const emptyLive = document.getElementById('emptyLive');
      
      let filteredStreams = demoStreams;
      if (searchTerm) {
        filteredStreams = demoStreams.filter(stream => 
          stream.username.toLowerCase().includes(searchTerm) ||
          stream.userId.toLowerCase().includes(searchTerm)
        );
      }
      
      // Update total live count in header
      updateLiveCount(filteredStreams.length);
      
      if (filteredStreams.length === 0) {
        gridContainer.innerHTML = '';
        emptyLive.style.display = 'block';
        return;
      }
      
      emptyLive.style.display = 'none';
      
      gridContainer.innerHTML = filteredStreams.map(stream => `
        <div class="live-user-card" onclick="openDemoStream('${stream.userId}')">
          <div class="live-avatar-container" style="border-color: ${stream.color}80;">
            <div class="avatar-placeholder" style="background: linear-gradient(135deg, ${stream.color}40, ${stream.color}20);">
              <i class="fas ${getIconForStream(stream.avatar)}" style="font-size: 2.5rem; color: ${stream.color};"></i>
            </div>
            <div class="live-badge-corner">
              <i class="fas fa-circle"></i>
              <span>LIVE</span>
            </div>
            <div class="viewer-badge-corner">
              <i class="fas fa-eye"></i>
              <span>${formatNumber(stream.viewers)}</span>
            </div>
          </div>
          <div class="live-user-name">${stream.username}</div>
        </div>
      `).join('');
      
      // Show/hide clear button
      const clearBtn = document.getElementById('clearSearch');
      if (searchTerm) {
        clearBtn.classList.add('show');
      } else {
        clearBtn.classList.remove('show');
      }
    };
    
    window.clearSearch = function() {
      document.getElementById('searchInput').value = '';
      filterLiveStreams();
    };
    
    function formatNumber(num) {
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    function getIconForStream(avatar) {
      const iconMap = {
        '🎮': 'fa-gamepad',
        '🎵': 'fa-music',
        '💻': 'fa-laptop-code',
        '✈️': 'fa-plane',
        '🎯': 'fa-bullseye',
        '🍳': 'fa-utensils',
        '💪': 'fa-dumbbell',
        '✨': 'fa-star'
      };
      return iconMap[avatar] || 'fa-user-circle';
    }

    // Open demo stream
    window.openDemoStream = async function(hostId) {
      const stream = demoStreams.find(s => s.userId === hostId);
      if (!stream) return;
      
      currentStreamHost = hostId;
      isDemoMode = true;
      
      document.getElementById('mainPage').style.display = 'none';
      document.getElementById('streamPage').classList.add('active');
      document.getElementById('streamHostName').textContent = stream.username;
      document.getElementById('streamViewerCount').textContent = `${formatNumber(stream.viewers)} watching`;
      document.getElementById('demoPreviewText').innerHTML = `${stream.username}<br><span style="font-size:0.6rem;">${stream.category} stream</span>`;
      
      document.getElementById('loadingOverlay').style.display = 'none';
      
      // Show demo preview
      const demoPreview = document.getElementById('demoPreview');
      const videoPlaceholder = document.getElementById('videoPlaceholder');
      demoPreview.style.display = 'flex';
      videoPlaceholder.style.display = 'none';
      
      // Load demo comments
      loadDemoComments(hostId);
      
      showToast(`Watching ${stream.username}'s Choicho Live stream 🔴`);
    };

    // Load demo comments
    function loadDemoComments(hostId) {
      const commentList = document.getElementById('commentList');
      const demoComments = [
        { username: "@fan1", text: "🔥 Great Choicho Live stream!" },
        { username: "@viewer2", text: "Loving this content ❤️" },
        { username: "@supporter", text: "Keep it up!" },
        { username: "@new_fan", text: "First time here 👋" }
      ];
      
      commentList.innerHTML = demoComments.map(c => `
        <div class="comment-item">
          <span class="comment-username">${c.username}</span>
          ${c.text}
        </div>
      `).join('');
    }

    // Send comment (demo mode)
    window.sendComment = async function() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      
      const commentList = document.getElementById('commentList');
      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment-item';
      commentDiv.innerHTML = `<span class="comment-username">${currentUser}</span> ${text}`;
      commentList.appendChild(commentDiv);
      commentList.scrollTop = commentList.scrollHeight;
      
      showToast('Comment posted! 💬');
    };

    // Toggle like
    window.toggleLike = async function() {
      const likeBtn = document.getElementById('likeBtn');
      const icon = likeBtn.querySelector('i');
      
      if (!isLiked) {
        isLiked = true;
        likeBtn.classList.add('liked');
        icon.className = 'fas fa-heart';
        const currentLikes = parseInt(document.getElementById('likeCount').textContent) || 0;
        document.getElementById('likeCount').textContent = currentLikes + 1;
        showToast('❤️ You liked this Choicho Live stream!');
      } else {
        isLiked = false;
        likeBtn.classList.remove('liked');
        icon.className = 'far fa-heart';
        const currentLikes = parseInt(document.getElementById('likeCount').textContent) || 0;
        document.getElementById('likeCount').textContent = Math.max(0, currentLikes - 1);
        showToast('Like removed');
      }
    };

    // Share stream
    window.shareStream = async function() {
      const host = currentStreamHost || 'live_stream';
      const url = `${window.location.origin}/live.html?user=${host}`;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: `🔴 CHOICHO LIVE: ${host}`,
            text: `Watch ${host}'s Choicho Live stream!`,
            url: url
          });
        } catch (e) {}
      } else {
        try {
          await navigator.clipboard.writeText(url);
          showToast('Link copied! 📋');
        } catch (e) {
          showToast('Unable to share');
        }
      }
    };

    // Close stream
    window.closeStream = async function() {
      document.getElementById('streamPage').classList.remove('active');
      document.getElementById('mainPage').style.display = 'block';
      document.getElementById('remoteVideo').style.display = 'none';
      document.getElementById('videoPlaceholder').style.display = 'flex';
      document.getElementById('demoPreview').style.display = 'none';
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('commentList').innerHTML = '';
      document.getElementById('likeCount').textContent = 'Like';
      isLiked = false;
      document.getElementById('likeBtn').classList.remove('liked');
      document.getElementById('likeBtn').querySelector('i').className = 'far fa-heart';
      
      filterLiveStreams();
    };

    // Enter key for comment
    document.addEventListener('DOMContentLoaded', () => {
      const commentInput = document.getElementById('commentInput');
      if (commentInput) {
        commentInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            sendComment();
          }
        });
      }
    });

    // Handle page unload
    window.addEventListener('beforeunload', () => {
      if (pc) pc.close();
    });

    // Load demo streams on page load
    filterLiveStreams();
  </script>
</body>
</html>
