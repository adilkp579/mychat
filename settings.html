<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Settings - Locks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overscroll-behavior:none; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    @keyframes slideUp { 0%{transform:translateY(100%)} 100%{transform:translateY(0)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes recPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    @keyframes glassShine { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

    .scrollable-content { flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0;background:#000; }
    .scrollable-content::-webkit-scrollbar { width:0;height:0; }
    .scrollable-content { scrollbar-width:none;-ms-overflow-style:none; }
    .top-icons { width:100%;display:flex;align-items:center;justify-content:space-between;padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0;position:relative;background:transparent;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px); }
    .corner-btn { width:2.4rem;height:2.4rem;background:rgba(255,255,255,0.03);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.3s; }
    .top-brand { font-size:2rem;font-weight:700;color:#fff;letter-spacing:3px;font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;line-height:1;font-style:italic; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0.5rem 1.2rem 2rem 1.2rem;gap:1.5rem;width:100%;max-width:500px;margin:0 auto; }
    .create-btn { width:100%;padding:0.8rem;border-radius:1rem;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#aaa;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem; }
    .create-btn:hover { border-color:rgba(255,252,0,0.3);color:#FFFC00;background:rgba(255,252,0,0.04); }
    .numpad-section { width:100%;display:flex;flex-direction:column;align-items:center;gap:1rem; }
    .numpad-label { font-size:0.75rem;color:rgba(255,255,255,0.4);text-align:center; }
    .pin-dots { display:flex;gap:1rem;margin:0.3rem 0; }
    .pin-dot { width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);transition:all 0.2s; }
    .pin-dot.filled { background:#FFFC00;border-color:#FFFC00;animation:dotPulse 0.3s ease; }
    .pin-dot.error { background:#ef4444;border-color:#ef4444; }
    .numpad-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;width:100%;max-width:260px; }
    .numpad-key { aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:#fff;font-size:1.3rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none; }
    .numpad-key:active { background:rgba(255,255,255,0.12);transform:scale(0.92); }
    .numpad-key.empty { background:transparent;border:none;cursor:default; }
    .numpad-key.delete-btn { background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.15);color:#ef4444;font-size:0.8rem; }
    .error-msg { color:#ef4444;font-size:0.7rem;text-align:center;min-height:1rem; }
    .modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem; }
    .modal-overlay.show { display:flex; }
    .modal { background:rgba(255,255,255,0.02);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-radius:1.5rem;padding:1.5rem;width:100%;max-width:340px;animation:popIn 0.3s ease;border:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;gap:0.8rem;box-shadow:0 8px 32px rgba(0,0,0,0.4); }
    .modal::before { content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.02) 25%,rgba(255,255,255,0.04) 50%,rgba(255,255,255,0.02) 75%,transparent 100%);animation:glassShine 8s infinite linear;pointer-events:none;border-radius:1.5rem; }
    .modal h3 { font-size:0.9rem;color:#fff;text-align:center;position:relative;z-index:2; }
    .modal p { font-size:0.65rem;color:rgba(255,255,255,0.4);text-align:center;position:relative;z-index:2; }
    .modal .btn-row { display:flex;gap:0.5rem;width:100%;position:relative;z-index:2; }
    .modal .btn-row button { flex:1;padding:0.6rem;border-radius:0.8rem;border:none;font-size:0.75rem;font-weight:600;cursor:pointer; }
    .btn-cancel { background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.08); }
    .btn-save { background:rgba(255,252,0,0.15);color:#FFFC00;border:1px solid rgba(255,252,0,0.3); }
    .btn-save:disabled { opacity:0.3;cursor:not-allowed; }
    .lock-info-bar { display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.8rem;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);border-radius:0.8rem;width:100%;margin-bottom:0.3rem; }
    .chat-list-header { padding:0.5rem 0;font-size:0.6rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;width:100%; }
    .users-list { width:100%;display:flex;flex-direction:column; }
    .user-list-item { display:flex;align-items:center;gap:0.7rem;padding:0.7rem 0.8rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.02);border-radius:0.6rem;background:transparent;transition:all 0.2s; }
    .user-list-item:hover { background:rgba(255,255,255,0.03); }
    .user-avatar { width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.04);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;font-weight:700;flex-shrink:0;border:1px solid rgba(255,255,255,0.1); }
    .user-info { flex:1;min-width:0; }
    .user-name { font-size:0.85rem;color:#fff;font-weight:500; }
    .user-last-msg { font-size:0.7rem;color:rgba(255,255,255,0.35);margin-top:2px; }
    .add-user-btn { width:100%;padding:0.6rem;border-radius:0.8rem;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.5);font-size:0.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:0.5rem; }
    .add-user-btn:hover { border-color:rgba(74,222,128,0.3);color:#4ade80;background:rgba(74,222,128,0.05); }
    .btn-delete { width:100%;padding:0.5rem;border-radius:0.8rem;margin-top:0.5rem;border:1px solid rgba(239,68,68,0.15);background:rgba(239,68,68,0.05);font-size:0.7rem;cursor:pointer;color:#ef4444; }
    .chat-fullscreen { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);z-index:200;display:none;flex-direction:column; }
    .chat-fullscreen.show { display:flex; }
    .chat-header-bar { display:flex;align-items:center;gap:0.6rem;padding:0.8rem 0.8rem 0.5rem 0.8rem;padding-top:max(0.8rem,env(safe-area-inset-top,0.8rem));background:transparent;backdrop-filter:blur(25px);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04); }
    .chat-back-btn { width:2.4rem;height:2.4rem;min-width:2.4rem;background:rgba(255,255,255,0.03);border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);cursor:pointer; }
    .chat-avatar { width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:#fff;flex-shrink:0;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,0.1); }
    .chat-partner-info { flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;justify-content:center; }
    .chat-partner-name { font-size:0.95rem;font-weight:600;color:#fff; }
    .chat-partner-status { font-size:0.65rem;color:#4ade80;display:flex;align-items:center;gap:0.2rem; }
    .chat-partner-status .dot { width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block; }
    .call-btns { display:flex;align-items:center;gap:0.5rem; }
    .call-btn { width:2.2rem;height:2.2rem;border-radius:50%;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;cursor:pointer;border:1px solid rgba(255,255,255,0.06); }
    .call-btn.video-call { color:#4ade80; }.call-btn.audio-call { color:#60a5fa; }
    .messages-container { flex:1;overflow-y:auto;padding:0.8rem 0.8rem 0.5rem 0.8rem;display:flex;flex-direction:column;gap:0.2rem; }
    .messages-container::-webkit-scrollbar { width:0; }
    .message-wrapper { display:flex;max-width:85%;animation:fadeInUp 0.25s ease-out; }
    .message-wrapper.sent { align-self:flex-end;flex-direction:row-reverse; }
    .message-wrapper.received { align-self:flex-start; }
    .message-bubble { padding:0.55rem 0.8rem;border-radius:1.2rem;font-size:0.85rem;line-height:1.3;word-break:break-word; }
    .sent .message-bubble { background:#a78bfa;color:#fff;border-bottom-right-radius:0.3rem; }
    .received .message-bubble { background:rgba(255,255,255,0.06);color:#fff;border-bottom-left-radius:0.3rem;border:1px solid rgba(255,255,255,0.06); }
    .message-time { font-size:0.55rem;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem; }
    .message-image { max-width:200px;max-height:200px;border-radius:0.8rem;object-fit:cover;cursor:pointer; }
    .lock-badge { font-size:0.45rem;color:#a78bfa;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem; }
    .empty-chat-full { flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:0.8rem; }
    .recording-bar { display:none;align-items:center;gap:0.5rem;padding:0.4rem 0.8rem;background:rgba(0,0,0,0.5);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .recording-bar.show { display:flex; }
    .recording-dot { width:10px;height:10px;border-radius:50%;background:#ef4444;animation:recPulse 0.8s infinite; }
    .recording-time-text { color:#ef4444;font-size:0.85rem;font-weight:600; }
    .recording-cancel { margin-left:auto;background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer; }
    .recording-send-btn { width:38px;height:38px;border-radius:50%;background:#a78bfa;border:none;color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .chat-input-area { display:flex;align-items:center;gap:0.4rem;padding:0.5rem 0.8rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));background:transparent;backdrop-filter:blur(25px);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .camera-btn-s,.mic-btn-s { width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .chat-input { flex:1;padding:0.6rem 1rem;border-radius:1.5rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#fff;font-size:0.85rem;outline:none; }
    .chat-input:focus { border-color:rgba(167,139,250,0.4); }
    .send-btn { width:38px;height:38px;border-radius:50%;background:#a78bfa;border:none;color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .call-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center; }
    .call-overlay.show { display:flex; }
    .incoming-call-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:700;display:none;flex-direction:column;align-items:center;justify-content:center; }
    .incoming-call-overlay.show { display:flex; }
    .add-users-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);z-index:350;display:none;align-items:flex-end;justify-content:center; }
    .add-users-overlay.show { display:flex; }
    .add-users-sheet { background:rgba(30,30,30,0.6);backdrop-filter:blur(50px) saturate(180%);border-radius:1.5rem 1.5rem 0 0;width:100%;max-width:450px;max-height:70vh;display:flex;flex-direction:column;animation:slideUp 0.3s ease;padding-bottom:env(safe-area-inset-bottom,1rem);border:1px solid rgba(255,255,255,0.06); }
    .sheet-header { display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .sheet-tabs { display:flex;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0; }
    .sheet-tab { flex:1;text-align:center;padding:0.7rem;color:rgba(255,255,255,0.3);font-size:0.7rem;cursor:pointer;border-bottom:2px solid transparent; }
    .sheet-tab.active { color:#fff;border-bottom-color:#a78bfa;background:rgba(255,255,255,0.03); }
    .sheet-list { flex:1;overflow-y:auto;padding:0.5rem 0; }
    .toast { position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,0.1); }
    .toast.show { opacity:1; }
    .shake { animation:shake 0.4s ease; }
  </style>
</head>
<body>
  <div class="page" id="mainPage">
    <div class="scrollable-content">
      <div class="top-icons"><button class="corner-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button><span class="top-brand">Settings</span><div style="width:2.4rem;"></div></div>
      <div class="content" id="mainView">
        <button class="create-btn" onclick="showCreateLockModal()"><i class="fas fa-plus-circle"></i> Create New Lock</button>
        <div class="numpad-section" id="numpadSection"><div class="numpad-label">🔐 Enter PIN to access lock</div>
          <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
          <div class="error-msg" id="errorMsg"></div>
          <div class="numpad-grid">
            <button class="numpad-key" onclick="numpadPress('1')">1</button><button class="numpad-key" onclick="numpadPress('2')">2</button><button class="numpad-key" onclick="numpadPress('3')">3</button>
            <button class="numpad-key" onclick="numpadPress('4')">4</button><button class="numpad-key" onclick="numpadPress('5')">5</button><button class="numpad-key" onclick="numpadPress('6')">6</button>
            <button class="numpad-key" onclick="numpadPress('7')">7</button><button class="numpad-key" onclick="numpadPress('8')">8</button><button class="numpad-key" onclick="numpadPress('9')">9</button>
            <button class="numpad-key empty"></button><button class="numpad-key" onclick="numpadPress('0')">0</button><button class="numpad-key delete-btn" onclick="numpadDelete()"><i class="fas fa-delete-left"></i></button>
          </div>
        </div>
      </div>
      <div class="content" id="lockDetailView" style="display:none;">
        <div class="lock-info-bar"><span class="icon"><i class="fas fa-shield-halved"></i></span><span class="text" id="lockInfoText">🔒 Lock Chat</span></div>
        <div class="chat-list-header">Users <span id="lockUserCount"></span></div>
        <div class="users-list" id="lockUsersList"></div>
        <button class="add-user-btn" onclick="showAddUsersSheet()"><i class="fas fa-user-plus"></i> Add Users to Lock</button>
        <button class="btn-delete" onclick="deleteCurrentLock()"><i class="fas fa-trash"></i> Delete This Lock</button>
      </div>
    </div>

    <div class="chat-fullscreen" id="chatFullscreen">
      <div class="chat-header-bar"><button class="chat-back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button><div class="chat-avatar" id="chatAvatar"><i class="fas fa-user"></i></div><div class="chat-partner-info"><div class="chat-partner-name" id="chatPartnerName">User</div><div class="chat-partner-status"><span class="dot"></span> online</div></div><div class="call-btns"><button class="call-btn audio-call" onclick="startCall('audio')"><i class="fas fa-phone"></i></button><button class="call-btn video-call" onclick="startCall('video')"><i class="fas fa-video"></i></button></div></div>
      <div class="messages-container" id="messagesContainer"><div class="empty-chat-full">Send a message!</div></div>
      <div class="recording-bar" id="recordingBar"><div class="recording-dot"></div><span class="recording-time-text" id="recTime">00:00</span><button class="recording-cancel" onclick="cancelVoice()">✕</button><button class="recording-send-btn" onclick="sendVoice()"><i class="fas fa-paper-plane"></i></button></div>
      <div class="chat-input-area">
        <button class="camera-btn-s" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
        <button class="mic-btn-s" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>

    <div class="call-overlay" id="callOverlay"><div class="call-video-container"><video id="callRemoteVideo" class="call-remote-video" autoplay playsinline></video><video id="callLocalVideo" class="call-local-video" autoplay playsinline muted style="transform:scaleX(-1);"></video></div><div class="call-status" id="callStatus">Connecting...</div><div class="call-controls"><button class="call-ctrl-btn call-mute-btn" id="callMuteBtn" onclick="toggleCallMute()"><i class="fas fa-microphone"></i></button><button class="call-ctrl-btn call-video-toggle" id="callVideoBtn" onclick="toggleCallVideo()"><i class="fas fa-video"></i></button><button class="call-ctrl-btn call-end-btn" onclick="endCall()"><i class="fas fa-phone"></i></button></div></div>
    <div class="incoming-call-overlay" id="incomingCallOverlay"><div class="incoming-avatar" id="incomingAvatar"><i class="fas fa-user"></i></div><div class="incoming-name" id="incomingName">Caller</div><div class="incoming-type" id="incomingType">Incoming audio call...</div><div class="incoming-actions"><button class="incoming-reject" onclick="rejectCall()"><i class="fas fa-phone"></i></button><button class="incoming-accept" onclick="acceptCall()"><i class="fas fa-phone"></i></button></div></div>
    <div class="modal-overlay" id="createLockModal"><div class="modal"><h3 id="createLockTitle">🔐 Create New Lock</h3><p id="createLockSubtitle">Enter a 4-digit PIN</p><div class="pin-dots" id="createPinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div><p style="color:#ef4444;font-size:0.65rem;min-height:1rem;position:relative;z-index:2;" id="createErrorMsg"></p><div class="numpad-grid"><button class="numpad-key" onclick="createNumpadPress('1')">1</button><button class="numpad-key" onclick="createNumpadPress('2')">2</button><button class="numpad-key" onclick="createNumpadPress('3')">3</button><button class="numpad-key" onclick="createNumpadPress('4')">4</button><button class="numpad-key" onclick="createNumpadPress('5')">5</button><button class="numpad-key" onclick="createNumpadPress('6')">6</button><button class="numpad-key" onclick="createNumpadPress('7')">7</button><button class="numpad-key" onclick="createNumpadPress('8')">8</button><button class="numpad-key" onclick="createNumpadPress('9')">9</button><button class="numpad-key empty"></button><button class="numpad-key" onclick="createNumpadPress('0')">0</button><button class="numpad-key delete-btn" onclick="createNumpadDelete()"><i class="fas fa-delete-left"></i></button></div><div class="btn-row"><button class="btn-cancel" onclick="closeCreateLockModal()">Cancel</button><button class="btn-save" id="createLockConfirm" disabled onclick="confirmCreateLock()">Create</button></div></div></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, updateDoc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    if(!localStorage.getItem("uid")){window.location.replace("login.html");}
    const currentUser=localStorage.getItem('currentUser')||'@anonymous',currentUserId=currentUser.replace('@','');
    let locks=[],currentLockIndex=-1,currentView='main';
    let accessPin='',createPin='',createConfirmPin='',isCreateConfirmStep=false;
    let currentUserTab='besties',allUsersList=[],friendsList=[],bestiesList=[];
    let chatPartner=null,chatId=null,unsubMessages=null,userProfiles={};
    let mediaRecorder=null,audioChunks=[],voiceTimer=null,voiceSeconds=0,isRecording=false;
    let localStream=null,peerConnection=null,callUnsub=null,callDocRef=null;
    let isCallActive=false,isCaller=false,callType='audio',isMuted=false,isVideoOff=false;
    const servers={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};
    function loadLocks(){const s=localStorage.getItem('chat_locks_'+currentUserId);if(s){try{locks=JSON.parse(s)}catch(e){locks=[]}}else{locks=[]}}
    function saveLocks(){localStorage.setItem('chat_locks_'+currentUserId,JSON.stringify(locks))}
    function loadUserLists(){const p=JSON.parse(localStorage.getItem('userProfile')||'{}');bestiesList=(p.besties||[]).map(f=>({name:(f.name||'').replace('@',''),username:f.name||'',avatar:f.avatar||null}));friendsList=(p.friends||[]).map(f=>({name:(f.name||'').replace('@',''),username:f.name||'',avatar:f.avatar||null}));const m={};[...bestiesList,...friendsList].forEach(u=>{if(!m[u.username]){m[u.username]=u;userProfiles[u.username]={name:u.name,avatar:u.avatar}}});allUsersList=Object.values(m)}
    function avatarHTML(u){const p=userProfiles[u];if(p&&p.avatar&&p.avatar!=='null')return`<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${(p.name||u).replace('@','').charAt(0).toUpperCase()}';">`;return(u||'U').replace('@','').charAt(0).toUpperCase()}
    function dispName(u){const p=userProfiles[u];return p?p.name:(u||'').replace('@','')}
    function formatDuration(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
    const addUserFromChat=sessionStorage.getItem('settingsAddUser');const newLockFlag=sessionStorage.getItem('settingsNewLock');

    window.goBack=function(){if(currentView==='lockDetail'){document.getElementById('lockDetailView').style.display='none';document.getElementById('mainView').style.display='flex';currentLockIndex=-1;currentView='main'}else{window.history.back()}};
    function goBackToMain(){closeChat();document.getElementById('lockDetailView').style.display='none';document.getElementById('mainView').style.display='flex';currentLockIndex=-1;currentView='main'}
    window.numpadPress=function(num){if(accessPin.length<4){accessPin+=num;updateAccessPinDots();if(accessPin.length===4)setTimeout(()=>checkAccessPin(),400)}};
    window.numpadDelete=function(){accessPin=accessPin.slice(0,-1);document.getElementById('errorMsg').textContent='';updateAccessPinDots()};
    function updateAccessPinDots(){document.querySelectorAll('#pinDots .pin-dot').forEach((dot,i)=>{dot.classList.remove('filled','error');if(i<accessPin.length)dot.classList.add('filled')})}
    function checkAccessPin(){const fi=locks.findIndex(l=>l.pin===accessPin);if(fi>=0){currentLockIndex=fi;accessPin='';updateAccessPinDots();document.getElementById('mainView').style.display='none';document.getElementById('lockDetailView').style.display='flex';document.getElementById('lockInfoText').textContent='🔒 '+locks[fi].name;currentView='lockDetail';renderLockUsers();setTimeout(()=>autoAddUserIfNeeded(),300)}else{document.getElementById('errorMsg').textContent='❌ Wrong PIN!';document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.add('error'));setTimeout(()=>{accessPin='';updateAccessPinDots();document.getElementById('errorMsg').textContent=''},1200)}}
    window.showCreateLockModal=function(){createPin='';createConfirmPin='';isCreateConfirmStep=false;document.getElementById('createLockTitle').textContent='🔐 Create New Lock';document.getElementById('createLockConfirm').textContent='Create';document.getElementById('createLockConfirm').disabled=true;updateCreatePinDots();document.getElementById('createLockModal').classList.add('show')};
    window.closeCreateLockModal=function(){document.getElementById('createLockModal').classList.remove('show')};
    window.createNumpadPress=function(num){if(isCreateConfirmStep){if(createConfirmPin.length<4){createConfirmPin+=num;updateCreatePinDots();if(createConfirmPin.length===4)document.getElementById('createLockConfirm').disabled=false}}else{if(createPin.length<4){createPin+=num;updateCreatePinDots();if(createPin.length===4)setTimeout(()=>{isCreateConfirmStep=true;document.getElementById('createLockTitle').textContent='🔐 Confirm PIN';document.getElementById('createLockConfirm').textContent='Create Lock';document.getElementById('createLockConfirm').disabled=true;updateCreatePinDots()},300)}}};
    window.createNumpadDelete=function(){if(isCreateConfirmStep)createConfirmPin=createConfirmPin.slice(0,-1);else createPin=createPin.slice(0,-1);document.getElementById('createLockConfirm').disabled=true;updateCreatePinDots()};
    function updateCreatePinDots(){const cp=isCreateConfirmStep?createConfirmPin:createPin;document.querySelectorAll('#createPinDots .pin-dot').forEach((dot,i)=>{dot.classList.remove('filled','error');if(i<cp.length)dot.classList.add('filled')})}
    window.confirmCreateLock=function(){if(createPin.length===4&&createConfirmPin.length===4&&createPin===createConfirmPin){if(locks.some(l=>l.pin===createPin)){document.getElementById('createErrorMsg').textContent='❌ PIN exists!';return}const nl={name:'Lock '+(locks.length+1),pin:createPin,users:[],createdAt:new Date().toISOString()};if(addUserFromChat&&newLockFlag){nl.users.push({username:addUserFromChat,name:addUserFromChat.replace('@',''),avatar:null,addedAt:new Date().toISOString()});sessionStorage.removeItem('settingsAddUser');sessionStorage.removeItem('settingsNewLock')}locks.push(nl);saveLocks();closeCreateLockModal();showToast('✅ Lock created!');if(addUserFromChat&&newLockFlag){currentLockIndex=locks.length-1;document.getElementById('mainView').style.display='none';document.getElementById('lockDetailView').style.display='flex';document.getElementById('lockInfoText').textContent='🔒 '+nl.name;currentView='lockDetail';renderLockUsers()}}else{document.getElementById('createErrorMsg').textContent='❌ PINs mismatch!'}};
    window.showAddUsersSheet=function(){loadUserLists();currentUserTab='besties';document.querySelectorAll('.sheet-tab').forEach((t,i)=>t.classList.toggle('active',i===0));document.getElementById('userSearchInput').value='';renderUsersSheetList(bestiesList);document.getElementById('addUsersOverlay').classList.add('show')};
    window.closeAddUsersSheet=function(){document.getElementById('addUsersOverlay').classList.remove('show')};
    window.switchUserTab=function(tab,el){currentUserTab=tab;document.querySelectorAll('.sheet-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('userSearchInput').value='';if(tab==='besties')renderUsersSheetList(bestiesList);else if(tab==='friends')renderUsersSheetList(friendsList);else renderUsersSheetList(allUsersList)};
    window.filterUserList=function(){const s=document.getElementById('userSearchInput').value.toLowerCase();let src=currentUserTab==='besties'?bestiesList:currentUserTab==='friends'?friendsList:allUsersList;renderUsersSheetList(src.filter(u=>u.name.toLowerCase().includes(s)||u.username.toLowerCase().includes(s)))};
    function renderUsersSheetList(users){const ex=(locks[currentLockIndex]?.users||[]).map(u=>u.username);document.getElementById('usersSheetList').innerHTML=users.length===0?'<div class="empty-list">No users</div>':users.map(u=>{const added=ex.includes(u.username);return`<div class="sheet-user-item"><div class="avatar">${u.avatar&&u.avatar!=='null'?`<img src="${u.avatar}">`:u.name.charAt(0).toUpperCase()}</div><div class="info"><div class="name">${u.name}</div><div class="sub">@${u.username.replace('@','')}</div></div>${added?'<span class="check-icon"><i class="fas fa-check-circle"></i></span>':`<button class="add-icon" onclick="addUserFromSheet('${u.username}','${u.name}','${u.avatar||''}')"><i class="fas fa-plus"></i></button>`}</div>`}).join('')}
    window.addUserFromSheet=function(username,name,avatar){if(currentLockIndex<0)return;const lock=locks[currentLockIndex];if(!lock.users)lock.users=[];if(lock.users.some(u=>u.username===username)){showToast('Already added!');return}lock.users.push({username,name,avatar:avatar&&avatar!=='null'?avatar:null,addedAt:new Date().toISOString()});if(avatar)userProfiles[username]={name,avatar};saveLocks();renderLockUsers();showToast('✅ User added!')};
    function autoAddUserIfNeeded(){if(addUserFromChat&&currentLockIndex>=0&&!newLockFlag){const lock=locks[currentLockIndex];if(!lock.users)lock.users=[];const uname=addUserFromChat;if(!lock.users.some(u=>u.username===uname)){lock.users.push({username:uname,name:uname.replace('@',''),avatar:null,addedAt:new Date().toISOString()});saveLocks();renderLockUsers();showToast('✅ User added!')}sessionStorage.removeItem('settingsAddUser')}}
    function renderLockUsers(){if(currentLockIndex<0)return;const lock=locks[currentLockIndex];const c=document.getElementById('lockUsersList');document.getElementById('lockUserCount').textContent=lock.users?'('+lock.users.length+')':'(0)';if(!lock.users||lock.users.length===0){c.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.25);padding:3rem;font-size:0.8rem;">No users yet</div>';return}c.innerHTML=lock.users.map((u,i)=>`<div class="user-list-item" onclick="openChat('${u.username}','${(u.name||u.username).replace('@','')}','${u.avatar||''}')"><div class="user-avatar">${avatarHTML(u.username)}</div><div class="user-info"><div class="user-name">${(u.name||u.username).replace('@','')}</div><div class="user-last-msg">Tap to chat</div></div><button style="background:rgba(239,68,68,0.1);color:#ef4444;width:28px;height:28px;border-radius:50%;border:1px solid rgba(239,68,68,0.2);font-size:0.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" onclick="event.stopPropagation();removeUserFromLock(${i})"><i class="fas fa-times"></i></button></div>`).join('')}
    window.removeUserFromLock=function(i){if(currentLockIndex<0)return;locks[currentLockIndex].users.splice(i,1);saveLocks();renderLockUsers();showToast('User removed')};

    window.openChat=function(username,displayName,avatarUrl){chatPartner=username;chatId=[currentUserId,username.replace('@','')].sort().join('_');const ae=document.getElementById('chatAvatar');if(avatarUrl&&avatarUrl!=='null'){ae.innerHTML=`<img src="${avatarUrl}" alt="">`}else{ae.innerHTML=displayName.charAt(0).toUpperCase()}document.getElementById('chatPartnerName').textContent=displayName;document.getElementById('chatFullscreen').classList.add('show');document.getElementById('messagesContainer').innerHTML='<div class="empty-chat-full">Loading...</div>';listenToMessages()};
    window.closeChat=function(){if(isCallActive)endCall();if(unsubMessages){unsubMessages();unsubMessages=null}stopVoice(true);chatPartner=null;chatId=null;document.getElementById('chatFullscreen').classList.remove('show')};
    window.goToUserProfile=function(){if(chatPartner)window.location.href='profile.html?user='+encodeURIComponent(chatPartner)};

    window.startCall=async function(type){if(!chatPartner||isCallActive)return;callType=type;isCaller=true;try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:type==='video'?{width:{ideal:640},height:{ideal:480},facingMode:'user'}:false});const lv=document.getElementById('callLocalVideo');lv.srcObject=localStream;lv.style.display=type==='video'?'block':'none';lv.style.transform='scaleX(-1)';document.getElementById('callVideoBtn').style.display=type==='video'?'flex':'none';document.getElementById('callOverlay').classList.add('show');document.getElementById('callStatus').textContent='Calling...';const cid=[currentUserId,chatPartner.replace('@','')].sort().join('_')+'_'+Date.now();callDocRef=doc(db,'calls',cid);await createPeerConnection();localStream.getTracks().forEach(t=>{peerConnection.addTrack(t,localStream)});const offer=await peerConnection.createOffer();await peerConnection.setLocalDescription(offer);await setDoc(callDocRef,{caller:currentUserId,callee:chatPartner.replace('@',''),type:type,status:'ringing',offer:{type:offer.type,sdp:offer.sdp},createdAt:serverTimestamp()});callUnsub=onSnapshot(callDocRef,async(snap)=>{const d=snap.data();if(!d)return;if(d.status==='rejected'){endCall();return}if(d.status==='accepted'&&d.answer&&!peerConnection.currentRemoteDescription){document.getElementById('callStatus').textContent='Connected';await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer))}});isCallActive=true}catch(e){alert('Camera/mic needed!');endCall()}};
    async function createPeerConnection(){if(peerConnection){peerConnection.close();peerConnection=null}peerConnection=new RTCPeerConnection(servers);peerConnection.ontrack=(e)=>{if(e.streams[0])document.getElementById('callRemoteVideo').srcObject=e.streams[0]};peerConnection.onicecandidate=async(e)=>{if(e.candidate&&callDocRef){try{const snap=await getDoc(callDocRef);const d=snap.data();if(d){const candidates=isCaller?(d.callerCandidates||[]):(d.calleeCandidates||[]);candidates.push(e.candidate.toJSON());await updateDoc(callDocRef,{[isCaller?'callerCandidates':'calleeCandidates']:candidates})}}catch(ex){}}};peerConnection.oniceconnectionstatechange=()=>{if(peerConnection.iceConnectionState==='disconnected'||peerConnection.iceConnectionState==='failed')endCall()}}
    function listenForIncomingCalls(){const q=query(collection(db,'calls'),orderBy('createdAt','desc'));onSnapshot(q,(snap)=>{snap.docChanges().forEach(async(ch)=>{if(ch.type==='added'){const d=ch.doc.data();if(d.callee===currentUserId&&d.status==='ringing'&&!isCallActive){callDocRef=doc(db,'calls',ch.doc.id);showIncomingCall(d)}}if(ch.type==='modified'&&callDocRef&&ch.doc.id===callDocRef.id){const d=ch.doc.data();if(d.status==='rejected')endCall()}})})}
    function showIncomingCall(d){callType=d.type||'audio';isCaller=false;document.getElementById('incomingName').textContent=dispName('@'+d.caller);document.getElementById('incomingType').textContent='Incoming '+callType+' call...';document.getElementById('incomingAvatar').innerHTML=avatarHTML('@'+d.caller);document.getElementById('incomingCallOverlay').classList.add('show')}
    window.acceptCall=async function(){document.getElementById('incomingCallOverlay').classList.remove('show');try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:callType==='video'?{width:{ideal:640},height:{ideal:480}}:false});const lv=document.getElementById('callLocalVideo');lv.srcObject=localStream;lv.style.display=callType==='video'?'block':'none';lv.style.transform='scaleX(-1)';document.getElementById('callVideoBtn').style.display=callType==='video'?'flex':'none';document.getElementById('callOverlay').classList.add('show');document.getElementById('callStatus').textContent='Connecting...';await createPeerConnection();localStream.getTracks().forEach(t=>{peerConnection.addTrack(t,localStream)});const snap=await getDoc(callDocRef);const d=snap.data();if(d&&d.offer){await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));const answer=await peerConnection.createAnswer();await peerConnection.setLocalDescription(answer);await updateDoc(callDocRef,{answer:{type:answer.type,sdp:answer.sdp},status:'accepted'})}callUnsub=onSnapshot(callDocRef,async(snap)=>{const dd=snap.data();if(!dd)return;if(dd.callerCandidates&&peerConnection){const el=peerConnection.getRemoteDescription()?(peerConnection._addedCandidates||0):0;for(let i=el;i<dd.callerCandidates.length;i++){try{await peerConnection.addIceCandidate(new RTCIceCandidate(dd.callerCandidates[i]));peerConnection._addedCandidates=i+1}catch(ex){}}}});document.getElementById('callStatus').textContent='Connected';isCallActive=true}catch(e){endCall()}};
    window.rejectCall=function(){if(callDocRef)updateDoc(callDocRef,{status:'rejected'}).catch(()=>{});document.getElementById('incomingCallOverlay').classList.remove('show');callDocRef=null};
    window.endCall=function(){if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}if(peerConnection){peerConnection._addedCandidates=0;peerConnection.close();peerConnection=null}if(callUnsub){callUnsub();callUnsub=null}if(callDocRef&&isCaller){updateDoc(callDocRef,{status:'ended'}).then(()=>{deleteDoc(callDocRef).catch(()=>{})}).catch(()=>{})}document.getElementById('callOverlay').classList.remove('show');document.getElementById('incomingCallOverlay').classList.remove('show');document.getElementById('callRemoteVideo').srcObject=null;document.getElementById('callLocalVideo').srcObject=null;isCallActive=false;isCaller=false;callDocRef=null;isMuted=false;isVideoOff=false;document.getElementById('callMuteBtn').classList.remove('muted');document.getElementById('callVideoBtn').classList.remove('off')};
    window.toggleCallMute=function(){if(!localStream)return;isMuted=!isMuted;localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);document.getElementById('callMuteBtn').classList.toggle('muted',isMuted)};
    window.toggleCallVideo=function(){if(!localStream)return;isVideoOff=!isVideoOff;localStream.getVideoTracks().forEach(t=>t.enabled=!isVideoOff);document.getElementById('callVideoBtn').classList.toggle('off',isVideoOff);document.getElementById('callLocalVideo').style.display=isVideoOff?'none':'block'};

    async function ensureChatDoc(){const ref=doc(db,'chats',chatId);if(!(await getDoc(ref)).exists())await setDoc(ref,{users:[currentUserId,chatPartner.replace('@','')],lastMessage:'',lastType:'text',lastTime:serverTimestamp()})}
    function listenToMessages(){if(unsubMessages){unsubMessages();unsubMessages=null}const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','asc'));getDocs(q).then(snap=>{const c=document.getElementById('messagesContainer');c.innerHTML='';if(snap.empty)c.innerHTML='<div class="empty-chat-full">Send a message!</div>';else snap.forEach(d=>renderMsg(d.id,d.data()));scrollToBottom()});unsubMessages=onSnapshot(q,(snap)=>{const c=document.getElementById('messagesContainer');const ee=c.querySelector('.empty-chat-full');if(ee&&!snap.empty)c.innerHTML='';snap.docChanges().forEach(ch=>{if(ch.type==='added'&&!document.getElementById('msg-'+ch.doc.id)){renderMsg(ch.doc.id,ch.doc.data());scrollToBottom()}})});}
    function renderMsg(id,msg){const c=document.getElementById('messagesContainer');const isSent=msg.sender===currentUserId;if(document.getElementById('msg-'+id))return;const w=document.createElement('div');w.className='message-wrapper '+(isSent?'sent':'received');w.id='msg-'+id;let time='';if(msg.createdAt)try{time=new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}catch(e){}if(msg.imageUrl){w.innerHTML=`<div class="message-bubble"><img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')"><div class="message-time">${time}</div><div class="lock-badge"><i class="fas fa-shield-halved"></i> Private</div></div>`}else if(msg.audioUrl){const dur=msg.audioDuration||0;w.innerHTML=`<div class="message-bubble voice-msg" data-audio="${msg.audioUrl}" data-duration="${dur}" onclick="playVoice(this)"><button class="voice-play-btn"><i class="fas fa-play"></i></button><div class="voice-wave-container">${genBars(18)}</div><span class="voice-duration">0:00 / ${formatDuration(dur)}</span><div class="message-time">${time}</div><div class="lock-badge"><i class="fas fa-shield-halved"></i> Private</div></div>`}else{w.innerHTML=`<div class="message-bubble">${msg.text||''}<div class="message-time">${time}</div><div class="lock-badge"><i class="fas fa-shield-halved"></i> Private</div></div>`}c.appendChild(w)}
    function genBars(n){let h='';for(let i=0;i<n;i++)h+=`<div class="voice-wave-bar" style="height:${Math.floor(Math.random()*22)+4}px;"></div>`;return h}
    function scrollToBottom(){const c=document.getElementById('messagesContainer');setTimeout(()=>{if(c)c.scrollTop=c.scrollHeight},100)}

    // ✅ CHECK if receiver ALSO has sender locked
    window.sendMessage=async function(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!chatId)return;input.value='';try{const receiverId=chatPartner.replace('@','');const receiverLocks=localStorage.getItem('chat_locks_'+receiverId);let bothLocked=false;if(receiverLocks){try{const rLocks=JSON.parse(receiverLocks);bothLocked=rLocks.some(lock=>(lock.users||[]).some(u=>u.username===currentUser))}catch(e){}}if(bothLocked){const privateRef=doc(db,'private_chats',chatId);if(!(await getDoc(privateRef)).exists()){await setDoc(privateRef,{users:[currentUserId,receiverId],lastMessage:'',lastTime:serverTimestamp(),createdAt:serverTimestamp()})}await addDoc(collection(db,'private_chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(privateRef,{lastMessage:text,lastTime:serverTimestamp(),['unread_'+receiverId]:increment(1)})}else{await ensureChatDoc();await addDoc(collection(db,'chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});await updateDoc(doc(db,'chats',chatId),{lastMessage:'🔒 '+text,lastType:'text',lastTime:serverTimestamp(),['unread_'+receiverId]:increment(1),source:'settings'})}}catch(e){}};
    window.sendImage=async function(e){const file=e.target.files[0];if(!file||!chatId)return;const r=new FileReader();r.onload=async function(ev){try{const receiverId=chatPartner.replace('@','');const receiverLocks=localStorage.getItem('chat_locks_'+receiverId);let bothLocked=false;if(receiverLocks){try{const rLocks=JSON.parse(receiverLocks);bothLocked=rLocks.some(lock=>(lock.users||[]).some(u=>u.username===currentUser))}catch(e){}}if(bothLocked){const privateRef=doc(db,'private_chats',chatId);if(!(await getDoc(privateRef)).exists()){await setDoc(privateRef,{users:[currentUserId,receiverId],lastMessage:'',lastTime:serverTimestamp()})}await addDoc(collection(db,'private_chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(privateRef,{lastMessage:'📷 Photo',lastTime:serverTimestamp(),['unread_'+receiverId]:increment(1)})}else{await ensureChatDoc();await addDoc(collection(db,'chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});await updateDoc(doc(db,'chats',chatId),{lastMessage:'📷 Photo',lastType:'image',lastTime:serverTimestamp(),['unread_'+receiverId]:increment(1),source:'settings'})}}catch(err){}};r.readAsDataURL(file);e.target.value=''};
    window.toggleVoice=function(){if(isRecording){sendVoice()}else{startVoice()}};
    async function startVoice(){if(!chatId)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});mediaRecorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm'});audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop())};mediaRecorder.start(100);isRecording=true;voiceSeconds=0;document.getElementById('recordingBar').classList.add('show');document.getElementById('micBtn').style.display='none';document.getElementById('sendBtn').style.display='none';document.getElementById('chatInput').style.display='none';document.getElementById('recTime').textContent='00:00';voiceTimer=setInterval(()=>{voiceSeconds++;document.getElementById('recTime').textContent=formatDuration(voiceSeconds)},1000)}catch(e){}}
    function stopVoice(c){if(mediaRecorder&&isRecording){if(c)audioChunks=[];if(mediaRecorder.state==='recording')mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block'}}
    window.cancelVoice=function(){stopVoice(true)};
    window.sendVoice=async function(){if(!mediaRecorder||!isRecording)return;if(voiceSeconds<1){stopVoice(true);return}mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});const reader=new FileReader();reader.onload=async function(e){try{const receiverId=chatPartner.replace('@','');const receiverLocks=localStorage.getItem('chat_locks_'+receiverId);let bothLocked=false;if(receiverLocks){try{const rLocks=JSON.parse(receiverLocks);bothLocked=rLocks.some(lock=>(lock.users||[]).some(u=>u.username===currentUser))}catch(e){}}if(bothLocked){const privateRef=doc(db,'private_chats',chatId);if(!(await getDoc(privateRef)).exists()){await setDoc(privateRef,{users:[currentUserId,receiverId],lastMessage:'',lastTime:serverTimestamp()})}await addDoc(collection(db,'private_chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(privateRef,{lastMessage:'🎤 Voice',lastTime:serverTimestamp(),['unread_'+receiverId]:increment(1)})}else{await ensureChatDoc();await addDoc(collection(db,'chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});await updateDoc(doc(db,'chats',chatId),{lastMessage:'🎤 Voice',lastType:'audio',lastTime:serverTimestamp(),['unread_'+receiverId]:increment(1),source:'settings'})}}catch(err){}};reader.readAsDataURL(blob)};mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block'};
    window.playVoice=function(el){const audioUrl=el.getAttribute('data-audio');const btn=el.querySelector('.voice-play-btn i');const ds=el.querySelector('.voice-duration');const td=parseFloat(el.getAttribute('data-duration')||'0');document.querySelectorAll('.voice-msg').forEach(m=>{if(m!==el&&m._audio){m._audio.pause();const ob=m.querySelector('.voice-play-btn i');if(ob)ob.className='fas fa-play';const od=m.querySelector('.voice-duration');if(od&&m._totalDur)od.textContent='0:00 / '+formatDuration(m._totalDur)}});if(!el._audio){el._audio=new Audio(audioUrl);el._totalDur=td;if(ds)ds.textContent='0:00 / '+formatDuration(td);el._audio.ontimeupdate=()=>{if(ds&&el._audio&&el._totalDur)ds.textContent=formatDuration(el._audio.currentTime)+' / '+formatDuration(el._totalDur)};el._audio.onended=()=>{btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent='0:00 / '+formatDuration(el._totalDur)}}const audio=el._audio;if(audio.paused){audio.play().catch(()=>{});btn.className='fas fa-pause'}else{audio.pause();btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent=formatDuration(audio.currentTime)+' / '+formatDuration(el._totalDur)}};

    document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMessage()}});
    window.deleteCurrentLock=function(){if(currentLockIndex<0)return;if(confirm('Delete this lock?')){locks.splice(currentLockIndex,1);saveLocks();goBackToMain();showToast('Lock deleted')}};
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
    document.getElementById('createLockModal').addEventListener('click',function(e){if(e.target===this)closeCreateLockModal()});
    document.getElementById('addUsersOverlay').addEventListener('click',function(e){if(e.target===this)closeAddUsersSheet()});
    document.addEventListener('keydown',function(e){if(document.getElementById('createLockModal').classList.contains('show')){if(e.key>='0'&&e.key<='9')createNumpadPress(e.key);else if(e.key==='Backspace')createNumpadDelete();else if(e.key==='Enter'){const b=document.getElementById('createLockConfirm');if(!b.disabled)confirmCreateLock()}return}if(e.key>='0'&&e.key<='9')numpadPress(e.key);else if(e.key==='Backspace')numpadDelete()});
    loadLocks();loadUserLists();listenForIncomingCalls();
    if(addUserFromChat&&!newLockFlag){if(locks.length>0){showToast('🔐 Enter PIN to add @'+addUserFromChat.replace('@',''))}else{setTimeout(()=>showCreateLockModal(),500)}}
    if(addUserFromChat&&newLockFlag){setTimeout(()=>showCreateLockModal(),500)}
    window.addEventListener('beforeunload',()=>{if(isCallActive)endCall()});
  </script>
