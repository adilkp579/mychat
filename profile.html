<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .top-left { position:absolute;top:max(1rem,env(safe-area-inset-top,1rem));left:max(1rem,env(safe-area-inset-left,1rem));z-index:200; }
    .top-right { position:absolute;top:max(1rem,env(safe-area-inset-top,1rem));right:max(1rem,env(safe-area-inset-right,1rem));z-index:200; }
    .back-btn {
      position:absolute;top:max(1rem,env(safe-area-inset-top,1rem));left:max(1rem,env(safe-area-inset-left,1rem));z-index:200;
      width:2.4rem;height:2.4rem;background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);
      border-radius:50%;color:#fff;font-size:1rem;display:none;align-items:center;justify-content:center;
      text-decoration:none;border:1px solid rgba(255,255,255,0.15);cursor:pointer;
    }
    .back-btn.show { display:flex; }
    .corner-btn {
      width:2.4rem;height:2.4rem;background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);
      border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;
      text-decoration:none;border:1px solid rgba(255,255,255,0.15);transition:all 0.3s;
    }
    .content {
      flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;
      padding:3.5rem 1.2rem 6rem 1.2rem;overflow-y:auto;gap:0.6rem;
    }
    .content::-webkit-scrollbar { width:0; }
    .profile-header { display:flex;align-items:center;gap:1.2rem;width:100%;max-width:400px;padding:0.3rem 0; }
    .avatar-container { position:relative;flex-shrink:0;cursor:pointer; }
    .avatar {
      width:75px;height:75px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;
      border:2px solid rgba(255,255,255,0.15);overflow:hidden;
    }
    .avatar img { width:100%;height:100%;object-fit:cover; }
    .avatar-edit {
      position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;
      background:#3897f0;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:0.6rem;border:2px solid #000;
    }
    .avatar-edit.hidden { display:none; }
    .avatar-options {
      position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#1a1a1a;
      border-radius:0.8rem;padding:0.4rem 0;margin-top:0.4rem;z-index:50;display:none;
      min-width:150px;box-shadow:0 10px 30px rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.1);
    }
    .avatar-options.show { display:block; }
    .avatar-option { padding:0.5rem 0.8rem;font-size:0.7rem;color:#fff;cursor:pointer;display:flex;align-items:center;gap:0.4rem; }
    .avatar-option:hover { background:rgba(255,255,255,0.05); }
    .avatar-option.remove { color:#ef4444; }
    .stats-row { display:flex;gap:1rem;flex:1;justify-content:space-around; }
    .stat { text-align:center;cursor:pointer; }
    .stat-num { font-size:1rem;font-weight:700;color:#fff; }
    .stat-label { font-size:0.6rem;color:#888; }
    .bio-section { width:100%;max-width:400px;text-align:left;padding:0 0.2rem; }
    .username { font-size:0.9rem;font-weight:650;color:#fff;letter-spacing:-0.2px; }
    .bio-text { font-size:0.7rem;color:#bbb;margin-top:0.1rem;line-height:1.3; }
    .website { font-size:0.65rem;color:#3897f0;margin-top:0.1rem; }
    .actions-row { display:flex;gap:0.4rem;width:100%;max-width:400px; }
    .action-btn {
      flex:1;padding:0.45rem;border-radius:0.4rem;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.04);color:#fff;font-size:0.7rem;font-weight:600;cursor:pointer;text-align:center;
    }
    .action-btn.primary { background:#3897f0;border:none; }
    .action-btn.following { background:#333;border-color:#555; }
    .tabs { display:flex;width:100%;max-width:400px;border-top:1px solid rgba(255,255,255,0.08);margin-top:0.2rem; }
    .tab {
      flex:1;text-align:center;padding:0.5rem 0;color:#666;font-size:0.7rem;
      cursor:pointer;border-bottom:1px solid transparent;
    }
    .tab.active { color:#fff;border-bottom-color:#fff; }
    .tab i { font-size:1.1rem;display:block;margin-bottom:0.1rem; }
    .posts-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:100%;max-width:400px; }
    .post-item { aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden; }
    .post-item img { width:100%;height:100%;object-fit:cover; }
    .reel-item { aspect-ratio:9/16;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-radius:0.2rem; }
    .reel-item video { width:100%;height:100%;object-fit:cover; }
    .empty-text { color:#444;font-size:0.75rem;text-align:center;padding:2rem 0;width:100%;max-width:400px; }

    .modal-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);
      z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;
    }
    .modal-overlay.show { display:flex; }
    .modal { background:#1a1a1a;border-radius:1rem;padding:1.2rem;width:100%;max-width:380px;max-height:80vh;overflow-y:auto; }
    .modal h3 { font-size:0.95rem;margin-bottom:0.8rem;text-align:center; }
    .modal label { display:block;font-size:0.7rem;color:#888;margin-bottom:0.2rem;margin-top:0.5rem; }
    .modal input,.modal textarea { width:100%;padding:0.6rem;border-radius:0.4rem;border:1px solid #333;background:#111;color:#fff;font-size:0.8rem;margin-bottom:0.3rem;outline:none; }
    .modal textarea { min-height:50px;resize:vertical; }
    .modal .btn-row { display:flex;gap:0.4rem;margin-top:0.8rem; }
    .modal .btn-row button { flex:1;padding:0.55rem;border-radius:0.4rem;border:none;font-size:0.75rem;font-weight:600;cursor:pointer; }
    .btn-save { background:#3897f0;color:#fff; }
    .btn-cancel { background:#333;color:#fff; }
    .crop-container { width:220px;height:220px;margin:0 auto 0.8rem;overflow:hidden;border-radius:50%;position:relative;background:#222; }
    .crop-container img { width:100%;height:100%;object-fit:cover;transition:transform 0.2s; }
    .zoom-control { display:flex;align-items:center;gap:0.4rem;justify-content:center;margin-bottom:0.5rem; }
    .zoom-control input { width:120px;accent-color:#3897f0; }
    .list-modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem; }
    .list-modal-overlay.show { display:flex; }
    .list-modal { background:#1a1a1a;border-radius:1rem;padding:1.2rem;width:100%;max-width:380px;max-height:60vh;overflow-y:auto; }
    .list-modal h3 { font-size:0.85rem;margin-bottom:0.8rem;text-align:center; }
    .list-item { display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer; }
    .mini-avatar { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#fff;overflow:hidden; }
    .mini-avatar img { width:100%;height:100%;object-fit:cover; }
    .list-item .name { font-size:0.75rem; }
    .list-item .sub { font-size:0.6rem;color:#777; }
    .list-close { text-align:center;margin-top:0.6rem;color:#ef4444;cursor:pointer;font-size:0.75rem;padding:0.4rem; }
    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap; }
    .toast.show { opacity:1; }
    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500; }
    .loading-screen i { font-size:2rem;color:#3897f0;animation:spin 1s infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    .nav-upload,.nav-search { display:none !important; }

    @media (max-width:380px) {
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .corner-btn{width:2rem;height:2rem;font-size:0.9rem}
    }
    @media (min-width:1024px) {
      .top-left,.top-right{display:none}
      .nav-upload,.nav-search{display:flex!important}
      .floating-nav{top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .content{padding:5rem 3rem 3rem 7rem;max-width:700px;margin:0 auto;width:100%;align-items:center}
      .profile-header,.bio-section,.actions-row,.tabs,.posts-grid{max-width:500px;width:100%}
      .avatar{width:85px;height:85px;font-size:2rem}.stat-num{font-size:1.1rem}.username{font-size:1rem}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen"><i class="fas fa-spinner"></i></div>

  <div class="page" id="mainPage" style="display:none;">
    <button class="back-btn" id="backBtn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
    <div class="top-left" id="topLeftBtn"><a href="login.html" class="corner-btn"><i class="fas fa-sign-in-alt"></i></a></div>
    <div class="top-right" id="topRightBtn"><a href="settings.html" class="corner-btn"><i class="fas fa-cog"></i></a></div>

    <div class="content">
      <div style="text-align:center;font-size:0.7rem;color:#4ade80;margin-bottom:0.2rem;" id="currentUserDisplay"></div>
      <div class="profile-header">
        <div class="avatar-container">
          <div class="avatar" id="profileAvatar" onclick="toggleAvatarOptions()"><i class="fas fa-user"></i></div>
          <div class="avatar-edit" id="avatarEdit" onclick="toggleAvatarOptions()"><i class="fas fa-pen"></i></div>
          <div class="avatar-options" id="avatarOptions">
            <div class="avatar-option" onclick="document.getElementById('avatarInput').click()"><i class="fas fa-camera"></i> Change</div>
            <div class="avatar-option" onclick="openCropModal()"><i class="fas fa-crop"></i> Adjust</div>
            <div class="avatar-option remove" onclick="removeAvatar()"><i class="fas fa-trash"></i> Remove</div>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="updateAvatar(event)">
        </div>
        <div class="stats-row">
          <div class="stat"><div class="stat-num" id="postCount">0</div><div class="stat-label">Posts</div></div>
          <div class="stat" onclick="showList('friends')"><div class="stat-num" id="friendsCount">0</div><div class="stat-label">Friends</div></div>
          <div class="stat" onclick="showList('besties')"><div class="stat-num" id="bestiesCount">0</div><div class="stat-label">Besties</div></div>
        </div>
      </div>
      <div class="bio-section">
        <div class="username" id="displayName"></div>
        <div class="bio-text" id="displayBio"></div>
        <div class="website" id="displayWebsite"></div>
      </div>
      <div class="actions-row" id="actionsRow">
        <button class="action-btn primary" id="editProfileBtn" onclick="openEditProfile()">Edit Profile</button>
        <button class="action-btn" onclick="shareProfile()"><i class="fas fa-share-alt"></i> Share</button>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab(this,'posts')"><i class="fas fa-grid-2"></i>Posts</div>
        <div class="tab" onclick="switchTab(this,'reels')"><i class="fas fa-film"></i>Reels</div>
      </div>
      <div class="posts-grid" id="postsGrid"></div>
      <div class="posts-grid" id="reelsGrid" style="display:none;"></div>
      <div class="empty-text" id="emptyText">No posts yet</div>
    </div>

    <div class="modal-overlay" id="cropModal"><div class="modal"><h3>Adjust Photo</h3><div class="crop-container"><img id="cropImage" src=""></div><div class="zoom-control"><input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1" oninput="document.getElementById('cropImage').style.transform=`scale(${this.value})`"></div><div class="btn-row"><button class="btn-cancel" onclick="closeCropModal()">Cancel</button><button class="btn-save" onclick="saveCrop()">Save</button></div></div></div>
    <div class="modal-overlay" id="editModal"><div class="modal"><h3>Edit Profile</h3><label>Username</label><input type="text" id="editUsername"><label>Bio</label><textarea id="editBio"></textarea><label>Website</label><input type="text" id="editWebsite"><div class="btn-row"><button class="btn-cancel" onclick="closeEditProfile()">Cancel</button><button class="btn-save" onclick="saveProfile()">Save</button></div></div></div>
    <div class="list-modal-overlay" id="listModal"><div class="list-modal"><h3 id="listTitle"></h3><div id="listContent"></div><div class="list-close" onclick="closeList()">Close ✕</div></div></div>
    <div class="toast" id="toast"></div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html" class="active"><i class="fas fa-user"></i></a>
      <a href="notification.html" class="nav-upload"><i class="fas fa-bell"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    if (!localStorage.getItem("uid")) { window.location.replace("login.html"); }

    const currentUser = localStorage.getItem('currentUser') || '@user';
    const urlParams = new URLSearchParams(window.location.search);
    const viewUser = urlParams.get('user');
    const isOwnProfile = !viewUser || viewUser === currentUser;

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';

    // ===== SAVE TO FIRESTORE =====
    async function saveToFirestore() {
      if (!isOwnProfile) return;
      const p = window._profile;
      try {
        await setDoc(doc(db, 'users', currentUser), {
          username: p.username || currentUser,
          name: p.name || '',
          bio: p.bio || '',
          website: p.website || '',
          avatar: p.avatar || null,
          friends: p.friends || [],
          besties: p.besties || [],
          posts: p.posts || [],
          updatedAt: serverTimestamp()
        }, { merge: true });
        localStorage.setItem('userProfile', JSON.stringify(p));
        console.log('✅ Profile synced to Firestore');
      } catch(e) { console.error('Firestore save error:', e); }
    }

    // ===== ADD/REMOVE FOLLOWER FROM OTHER USER =====
    async function addFollower(targetUsername, followerUsername) {
      try {
        const q = query(collection(db, 'users'), where('username', '==', targetUsername));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const userData = snap.docs[0].data();
          let friends = userData.friends || [];
          if (!friends.find(f => f.name === followerUsername)) {
            friends.push({ name: followerUsername, avatar: null });
            await setDoc(doc(db, 'users', targetUsername), { friends: friends }, { merge: true });
            console.log('✅ Added', followerUsername, 'as friend of', targetUsername);
          }
        }
      } catch(e) { console.error('Add follower error:', e); }
    }

    async function removeFollower(targetUsername, followerUsername) {
      try {
        const q = query(collection(db, 'users'), where('username', '==', targetUsername));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const userData = snap.docs[0].data();
          let friends = (userData.friends || []).filter(f => f.name !== followerUsername);
          await setDoc(doc(db, 'users', targetUsername), { friends: friends }, { merge: true });
          console.log('✅ Removed', followerUsername, 'from friends of', targetUsername);
        }
      } catch(e) { console.error('Remove follower error:', e); }
    }

    // ===== VIEWING OTHER USER'S PROFILE =====
    if (!isOwnProfile) {
      document.getElementById('backBtn').classList.add('show');
      document.getElementById('topLeftBtn').style.display = 'none';
      document.getElementById('topRightBtn').style.display = 'none';
      document.getElementById('avatarEdit').classList.add('hidden');
      document.getElementById('currentUserDisplay').textContent = '📋 ' + (viewUser || '').replace('@','');
      loadOtherUserProfile(viewUser);
    } else {
      document.getElementById('currentUserDisplay').textContent = '✅ ' + currentUser.replace('@','');
      loadOwnProfile();
    }

    async function loadOtherUserProfile(username) {
      const cleanName = (username || '').replace(/^@/, '');
      document.getElementById('displayName').textContent = cleanName;
      let userData = null;
      
      try {
        const q = query(collection(db, 'users'), where('username', '==', username));
        const snap = await getDocs(q);
        if (!snap.empty) { userData = snap.docs[0].data(); }
      } catch(e) {}
      
      if (!userData) {
        const savedProfile = localStorage.getItem('profile_' + username);
        if (savedProfile) { try { userData = JSON.parse(savedProfile); } catch(e) {} }
      }
      
      if (!userData) {
        const myProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
        const allFriends = [...(myProfile.friends || []), ...(myProfile.besties || [])];
        const friend = allFriends.find(f => f.name === username);
        if (friend) { userData = { name: friend.name, avatar: friend.avatar, posts: [], friends: [], besties: [] }; }
      }
      
      if (userData) {
        document.getElementById('displayName').textContent = userData.name || cleanName;
        document.getElementById('displayBio').textContent = userData.bio || '';
        document.getElementById('displayWebsite').textContent = userData.website ? '🔗 ' + userData.website : '';
        document.getElementById('profileAvatar').innerHTML = userData.avatar ? `<img src="${userData.avatar}" alt="avatar">` : `<i class="fas fa-user"></i>`;
        document.getElementById('friendsCount').textContent = (userData.friends || []).length;
        document.getElementById('bestiesCount').textContent = (userData.besties || []).length;
        document.getElementById('postCount').textContent = (userData.posts || []).filter(p => p.type === 'image').length;
        window._viewProfile = userData;
        renderContent();
      }
      
      const actionsRow = document.getElementById('actionsRow');
      actionsRow.innerHTML = `
        <button class="action-btn primary" onclick="window.location.href='chat.html'">💬 Message</button>
        <button class="action-btn" id="followBtn" onclick="toggleFollowUser('${username}')">Follow</button>
      `;
      
      const myProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if ((myProfile.besties || []).some(f => f.name === username)) {
        const fb = document.getElementById('followBtn');
        fb.textContent = 'Following'; fb.classList.add('following');
      }
    }

    async function loadOwnProfile() {
      try {
        const snap = await getDoc(doc(db, 'users', currentUser));
        if (snap.exists()) {
          window._profile = snap.data();
          if (!window._profile.friends) window._profile.friends = [];
          if (!window._profile.besties) window._profile.besties = [];
          if (!window._profile.posts) window._profile.posts = [];
          localStorage.setItem('userProfile', JSON.stringify(window._profile));
          updateUI(); return;
        }
      } catch(e) {}
      
      const defaultProfile = {
        username: currentUser, name: '', bio: '', website: '', avatar: null,
        friends: [], besties: [], posts: []
      };
      let profile = JSON.parse(localStorage.getItem('userProfile')) || defaultProfile;
      if (!profile.username || profile.username !== currentUser) {
        profile = defaultProfile;
        localStorage.setItem('userProfile', JSON.stringify(profile));
      }
      if (!profile.friends) profile.friends = [];
      if (!profile.besties) profile.besties = [];
      if (!profile.posts) profile.posts = [];
      window._profile = profile;
      window._viewProfile = profile;
      updateUI();
      saveToFirestore();
    }

    function updateUI() {
      const p = window._profile;
      if (!p) return;
      document.getElementById('displayName').textContent = (p.username || currentUser).replace('@','');
      document.getElementById('displayBio').textContent = p.bio || '';
      document.getElementById('displayWebsite').textContent = p.website ? '🔗 ' + p.website : '';
      document.getElementById('profileAvatar').innerHTML = p.avatar ? `<img src="${p.avatar}" alt="avatar">` : '<i class="fas fa-user"></i>';
      document.getElementById('friendsCount').textContent = p.friends.length;
      document.getElementById('bestiesCount').textContent = p.besties.length;
      document.getElementById('postCount').textContent = p.posts.filter(x => x.type === 'image').length;
      renderContent();
    }

    function renderContent() {
      const p = window._viewProfile || window._profile;
      if (!p) return;
      const pg = document.getElementById('postsGrid'), rg = document.getElementById('reelsGrid'), et = document.getElementById('emptyText');
      const activeTab = document.querySelector('.tab.active');
      const isReels = activeTab && activeTab.textContent.includes('Reels');
      const imagePosts = (p.posts || []).filter(x => x.type === 'image');
      const videoPosts = (p.posts || []).filter(x => x.type === 'video');
      if (isReels) {
        pg.style.display = 'none';
        if (videoPosts.length === 0) { rg.style.display = 'none'; et.style.display = 'block'; et.textContent = 'No reels yet'; }
        else { rg.style.display = 'grid'; et.style.display = 'none'; rg.innerHTML = videoPosts.map(x => `<div class="reel-item"><video src="${x.src}" muted loop playsinline></video></div>`).join(''); }
      } else {
        rg.style.display = 'none';
        if (imagePosts.length === 0) { pg.style.display = 'none'; et.style.display = 'block'; et.textContent = 'No posts yet'; }
        else { pg.style.display = 'grid'; et.style.display = 'none'; pg.innerHTML = imagePosts.map(x => `<div class="post-item"><img src="${x.src}" alt="post"></div>`).join(''); }
      }
    }

    // ===== FOLLOW/UNFOLLOW WITH TWO-WAY SYNC =====
    window.toggleFollowUser = async function(username) {
      const myProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      let myFriends = myProfile.friends || [];
      let myBesties = myProfile.besties || [];
      
      const existingBestieIndex = myBesties.findIndex(f => f.name === username);
      const btn = document.getElementById('followBtn');
      const viewData = window._viewProfile || {};
      
      if (existingBestieIndex >= 0) {
        // UNFOLLOW
        myBesties.splice(existingBestieIndex, 1);
        btn.textContent = 'Follow'; btn.classList.remove('following');
        await removeFollower(username, currentUser);
      } else {
        // FOLLOW
        myBesties.push({ name: username, avatar: viewData.avatar || null });
        btn.textContent = 'Following'; btn.classList.add('following');
        if (viewData && viewData.username) {
          localStorage.setItem('profile_' + username, JSON.stringify(viewData));
        }
        await addFollower(username, currentUser);
      }
      
      myProfile.friends = myFriends;
      myProfile.besties = myBesties;
      localStorage.setItem('userProfile', JSON.stringify(myProfile));
      
      try {
        await setDoc(doc(db, 'users', currentUser), {
          friends: myFriends,
          besties: myBesties
        }, { merge: true });
      } catch(e) {}
      
      document.getElementById('friendsCount').textContent = myFriends.length;
      document.getElementById('bestiesCount').textContent = myBesties.length;
      
      // Refresh the viewed user's data
      if (!isOwnProfile) {
        setTimeout(() => loadOtherUserProfile(username), 500);
      }
    };

    // ===== OWN PROFILE ACTIONS =====
    window.toggleAvatarOptions = function() {
      if (!isOwnProfile) return;
      document.getElementById('avatarOptions').classList.toggle('show');
      setTimeout(() => {
        document.addEventListener('click', function c(e) {
          if (!e.target.closest('.avatar-container')) { document.getElementById('avatarOptions').classList.remove('show'); document.removeEventListener('click', c); }
        });
      }, 100);
    };

    window.updateAvatar = function(e) {
      if (!isOwnProfile) return;
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) { window._profile.avatar = ev.target.result; saveToFirestore(); updateUI(); };
        reader.readAsDataURL(file);
      }
      document.getElementById('avatarOptions').classList.remove('show');
    };

    window.removeAvatar = function() {
      if (!isOwnProfile) return;
      window._profile.avatar = null; saveToFirestore(); updateUI();
      document.getElementById('avatarOptions').classList.remove('show');
    };

    window.openCropModal = function() {
      if (!isOwnProfile || !window._profile.avatar) return;
      document.getElementById('cropImage').src = window._profile.avatar;
      document.getElementById('zoomSlider').value = 1;
      document.getElementById('cropImage').style.transform = 'scale(1)';
      document.getElementById('cropModal').classList.add('show');
    };
    window.closeCropModal = function() { document.getElementById('cropModal').classList.remove('show'); };
    window.saveCrop = function() {
      if (!isOwnProfile) return;
      window._profile.avatar = document.getElementById('cropImage').src; saveToFirestore(); updateUI(); closeCropModal();
    };

    window.openEditProfile = function() {
      if (!isOwnProfile) return;
      document.getElementById('editUsername').value = (window._profile.username || '').replace('@','');
      document.getElementById('editBio').value = window._profile.bio || '';
      document.getElementById('editWebsite').value = window._profile.website || '';
      document.getElementById('editModal').classList.add('show');
    };
    window.closeEditProfile = function() { document.getElementById('editModal').classList.remove('show'); };
    window.saveProfile = function() {
      if (!isOwnProfile) return;
      window._profile.username = '@' + (document.getElementById('editUsername').value || currentUser.replace('@',''));
      window._profile.name = document.getElementById('editUsername').value || currentUser.replace('@','');
      window._profile.bio = document.getElementById('editBio').value;
      window._profile.website = document.getElementById('editWebsite').value;
      if (window._profile.username !== currentUser) {
        localStorage.setItem('currentUser', window._profile.username);
      }
      saveToFirestore(); updateUI(); closeEditProfile();
    };

    window.switchTab = function(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active'); renderContent();
    };

    window.showList = function(type) {
      const p = window._viewProfile || window._profile;
      document.getElementById('listTitle').textContent = type === 'friends' ? '👥 Friends (Followers)' : '⭐ Besties (Following)';
      const list = type === 'friends' ? (p.friends || []) : (p.besties || []);
      document.getElementById('listContent').innerHTML = list.length === 0 ? 
        '<div style="text-align:center;color:#555;padding:1rem;">No one yet</div>' :
        list.map(u =>
        `<div class="list-item" onclick="window.location.href='profile.html?user=${encodeURIComponent(u.name)}'">
          <div class="mini-avatar">${u.avatar ? `<img src="${u.avatar}" alt="">` : '<i class="fas fa-user"></i>'}</div>
          <div><div class="name">${(u.name||'').replace('@','')}</div><div class="sub">Tap to view profile</div></div>
        </div>`
      ).join('');
      document.getElementById('listModal').classList.add('show');
    };
    window.closeList = function() { document.getElementById('listModal').classList.remove('show'); };

    window.shareProfile = function() {
      const url = window.location.href.split('?')[0];
      const name = (window._viewProfile || window._profile)?.username || currentUser;
      if (navigator.share) { navigator.share({ title: name, url: url }); }
      else { navigator.clipboard.writeText(url); }
    };

    document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeEditProfile(); });
    document.getElementById('cropModal').addEventListener('click', function(e) { if (e.target === this) closeCropModal(); });
    document.getElementById('listModal').addEventListener('click', function(e) { if (e.target === this) closeList(); });

    if (isOwnProfile) updateUI();
  </script>
</body>
</html>
