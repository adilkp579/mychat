<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web • Live Chat • iPhone style glass navbar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    .page {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #000000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .top-left-corner {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top, 1rem));
      left: max(1rem, env(safe-area-inset-left, 1rem));
      z-index: 200;
    }

    .top-left-corner a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 50%;
      color: #ffffff;
      font-size: 1.1rem;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .top-right-corner {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top, 1rem));
      right: max(1rem, env(safe-area-inset-right, 1rem));
      z-index: 200;
    }

    .top-right-corner a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 50%;
      color: #ffffff;
      font-size: 1.1rem;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: #f0f0f0;
      padding: 4rem 1rem 6rem 1rem;
      text-align: center;
      gap: 0.6rem;
      overflow-y: auto;
    }

    /* Online counter */
    .online-counter {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #4ade80;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
    }

    .online-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Camera container */
    .camera-container {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 500px;
    }

    /* Stranger camera - big box */
    .stranger-camera {
      width: 75%;
      aspect-ratio: 3/4;
      max-height: 380px;
      background: #111;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
      transition: all 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stranger-camera.connected {
      border-color: rgba(74, 222, 128, 0.6);
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.3), 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    #strangerFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
    }

    .stranger-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .stranger-placeholder i {
      font-size: 3.5rem;
    }

    .stranger-placeholder span {
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    /* Labels outside boxes */
    .camera-labels {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
      padding: 0 0.3rem;
    }

    .stranger-label-outside {
      color: #aaa;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: 0.5rem;
    }

    .you-label-outside {
      color: #aaa;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 0.5rem;
    }

    /* My camera - small box */
    .my-camera {
      width: 22%;
      aspect-ratio: 3/4;
      max-height: 160px;
      background: #111;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .my-camera.active {
      border-color: rgba(255, 0, 0, 0.6);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
    }

    #myFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
    }

    .my-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.65rem;
    }

    .my-placeholder i {
      font-size: 1.5rem;
    }

    /* Recording indicator */
    .recording-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.8);
      padding: 3px 8px;
      border-radius: 10px;
      z-index: 10;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .recording-indicator.active {
      opacity: 1;
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      background: #ff0000;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    .rec-text {
      color: #ff0000;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Timer */
    .timer-display {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      z-index: 10;
      font-family: 'Courier New', monospace;
      background: rgba(0,0,0,0.7);
      padding: 2px 8px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .timer-display.active {
      opacity: 1;
    }

    /* Connected user info */
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.06);
      padding: 0.4rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.75rem;
      color: #ccc;
      opacity: 0;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .user-info.active {
      opacity: 1;
    }

    .user-flag {
      font-size: 1rem;
    }

    /* Buttons container */
    .buttons-container {
      display: flex;
      gap: 1rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
      justify-content: center;
      padding-bottom: 0.5rem;
    }

    /* Start button */
    .start-button {
      width: 100px;
      height: 42px;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.4);
      border-radius: 2rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #4ade80;
      user-select: none;
      border: none;
      outline: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .start-button:hover {
      background: rgba(74, 222, 128, 0.3);
      transform: scale(1.05);
    }

    .start-button:active {
      transform: scale(0.95);
    }

    .start-button.searching {
      background: rgba(251, 191, 36, 0.2);
      border-color: rgba(251, 191, 36, 0.5);
      color: #fbbf24;
      animation: pulse 1s infinite;
    }

    .start-button.connected {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.5);
      color: #ef4444;
    }

    .start-button i {
      font-size: 1rem;
    }

    /* Record button */
    .record-button {
      width: 100px;
      height: 42px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #aaa;
      user-select: none;
      border: none;
      outline: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .record-button:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.05);
    }

    .record-button:active {
      transform: scale(0.95);
    }

    .record-button.recording {
      background: rgba(255, 0, 0, 0.2);
      border-color: rgba(255, 0, 0, 0.5);
      color: #ff4444;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
      animation: pulse 1.5s infinite;
    }

    .record-button i {
      font-size: 0.7rem;
    }

    /* Navbar */
    .floating-nav {
      position: absolute;
      bottom: max(1rem, env(safe-area-inset-bottom, 1rem));
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-radius: 2.5rem;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      z-index: 100;
    }

    .nav-center {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      gap: 0.3rem;
    }

    .nav-center a {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      transition: all 0.3s ease;
      text-decoration: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-center a.active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Responsive */
    @media (max-width: 380px) {
      .content {
        padding: 3.5rem 0.8rem 5.5rem 0.8rem;
        gap: 0.4rem;
      }
      .stranger-camera {
        width: 72%;
        max-height: 280px;
      }
      .my-camera {
        width: 24%;
        max-height: 120px;
      }
      .start-button, .record-button {
        width: 85px;
        height: 38px;
        font-size: 0.75rem;
      }
    }

    @media (min-width: 768px) {
      .content {
        padding: 5rem 2rem 6rem 2rem;
        gap: 0.8rem;
      }
      .stranger-camera {
        max-height: 420px;
      }
      .my-camera {
        max-height: 170px;
      }
      .start-button, .record-button {
        width: 120px;
        height: 48px;
        font-size: 0.9rem;
      }
      .buttons-container {
        gap: 1.5rem;
        margin-top: 0.5rem;
      }
    }

    @media (min-width: 1024px) {
      .top-left-corner a, .top-right-corner a {
        width: 3rem;
        height: 3rem;
        font-size: 1.3rem;
      }
      .content {
        padding: 5rem 3rem 6rem 3rem;
      }
      .stranger-camera {
        max-height: 440px;
        border-radius: 2rem;
      }
      #strangerFeed {
        border-radius: 2rem;
      }
      .my-camera {
        max-height: 180px;
        border-radius: 1.2rem;
      }
      #myFeed {
        border-radius: 1.2rem;
      }
      .start-button, .record-button {
        width: 130px;
        height: 50px;
        font-size: 0.9rem;
      }
      .floating-nav {
        width: 45%;
        max-width: 550px;
        padding: 0.8rem 2rem;
      }
      .nav-center a {
        font-size: 1.5rem;
        width: 2.8rem;
        height: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-left-corner">
      <a href="upload.html" title="upload"><i class="fas fa-plus"></i></a>
    </div>
    <div class="top-right-corner">
      <a href="search.html" title="search"><i class="fas fa-search"></i></a>
    </div>

    <div class="content">
      <!-- Online counter -->
      <div class="online-counter">
        <div class="online-dot"></div>
        <span id="onlineCount">12,847 strangers online</span>
      </div>

      <!-- Labels outside camera boxes -->
      <div class="camera-labels">
        <span class="stranger-label-outside">STRANGER</span>
        <span class="you-label-outside">YOU</span>
      </div>

      <!-- Camera container -->
      <div class="camera-container">
        <!-- Stranger camera (big) -->
        <div class="stranger-camera" id="strangerCamera">
          <video id="strangerFeed" autoplay playsinline muted></video>
          <div class="stranger-placeholder" id="strangerPlaceholder">
            <i class="fas fa-user-secret"></i>
            <span>???</span>
          </div>
          <div class="recording-indicator" id="recIndicator">
            <div class="rec-dot"></div>
            <span class="rec-text">REC</span>
          </div>
          <div class="timer-display" id="timerDisplay">00:00</div>
        </div>

        <!-- My camera (small) -->
        <div class="my-camera" id="myCamera">
          <video id="myFeed" autoplay playsinline muted></video>
          <div class="my-placeholder" id="myPlaceholder">
            <i class="fas fa-video"></i>
            <span>off</span>
          </div>
        </div>
      </div>

      <!-- Connected user info -->
      <div class="user-info" id="userInfo">
        <span class="user-flag" id="userFlag">🌍</span>
        <span id="userCountry">Connecting...</span>
      </div>

      <!-- Buttons -->
      <div class="buttons-container">
        <button class="start-button" id="startButton" onclick="toggleChat()">
          <i class="fas fa-play" id="startIcon"></i>
          <span id="startText">Start</span>
        </button>
        
        <button class="record-button" id="recordButton" onclick="toggleRecording()">
          <i class="fas fa-circle" id="recordIcon"></i>
          <span id="recordText">Record</span>
        </button>
      </div>
    </div>

    <nav class="floating-nav">
      <div class="nav-center">
        <a href="index.html" data-page="index" title="home"><i class="fas fa-home"></i></a>
        <a href="web.html" class="active" data-page="web" title="web" aria-current="page"><i class="fas fa-globe"></i></a>
        <a href="reel.html" data-page="reel" title="reel"><i class="fas fa-film"></i></a>
        <a href="chat.html" data-page="chat" title="chat"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html" data-page="profile" title="profile"><i class="fas fa-user"></i></a>
      </div>
    </nav>
  </div>

  <script>
    let isConnected = false;
    let isSearching = false;
    let isRecording = false;
    let timerInterval;
    let seconds = 0;
    let minutes = 0;
    let myStream = null;

    const strangers = [
      { flag: '🇺🇸', country: 'United States' },
      { flag: '🇬🇧', country: 'United Kingdom' },
      { flag: '🇯🇵', country: 'Japan' },
      { flag: '🇧🇷', country: 'Brazil' },
      { flag: '🇩🇪', country: 'Germany' },
      { flag: '🇫🇷', country: 'France' },
      { flag: '🇮🇳', country: 'India' },
      { flag: '🇨🇦', country: 'Canada' },
      { flag: '🇦🇺', country: 'Australia' },
      { flag: '🇰🇷', country: 'South Korea' },
    ];

    async function startMyCamera() {
      try {
        if (myStream) {
          myStream.getTracks().forEach(track => track.stop());
        }
        const myFeed = document.getElementById('myFeed');
        const myPlaceholder = document.getElementById('myPlaceholder');
        const myCamera = document.getElementById('myCamera');
        
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        myFeed.srcObject = myStream;
        await myFeed.play();
        myFeed.style.display = 'block';
        myPlaceholder.style.display = 'none';
        myCamera.classList.add('active');
        return true;
      } catch (error) {
        alert('Camera access needed for video chat. Please allow camera permissions.');
        return false;
      }
    }

    function stopMyCamera() {
      if (myStream) {
        myStream.getTracks().forEach(track => track.stop());
        myStream = null;
      }
      const myFeed = document.getElementById('myFeed');
      const myPlaceholder = document.getElementById('myPlaceholder');
      const myCamera = document.getElementById('myCamera');
      
      myFeed.style.display = 'none';
      myFeed.srcObject = null;
      myPlaceholder.style.display = 'flex';
      myCamera.classList.remove('active');
    }

    function simulateStrangerConnection() {
      const strangerFeed = document.getElementById('strangerFeed');
      const strangerPlaceholder = document.getElementById('strangerPlaceholder');
      const strangerCamera = document.getElementById('strangerCamera');
      
      if (myStream) {
        strangerFeed.srcObject = myStream;
        strangerFeed.style.display = 'block';
        strangerPlaceholder.style.display = 'none';
        strangerCamera.classList.add('connected');
      }
      
      const randomStranger = strangers[Math.floor(Math.random() * strangers.length)];
      document.getElementById('userFlag').textContent = randomStranger.flag;
      document.getElementById('userCountry').textContent = randomStranger.country;
      document.getElementById('userInfo').classList.add('active');
    }

    function disconnectStranger() {
      const strangerFeed = document.getElementById('strangerFeed');
      const strangerPlaceholder = document.getElementById('strangerPlaceholder');
      const strangerCamera = document.getElementById('strangerCamera');
      
      strangerFeed.style.display = 'none';
      strangerFeed.srcObject = null;
      strangerPlaceholder.style.display = 'flex';
      strangerCamera.classList.remove('connected');
      document.getElementById('userInfo').classList.remove('active');
    }

    async function toggleChat() {
      const startButton = document.getElementById('startButton');
      const startIcon = document.getElementById('startIcon');
      const startText = document.getElementById('startText');

      if (!isConnected && !isSearching) {
        const cameraReady = await startMyCamera();
        if (!cameraReady) return;

        isSearching = true;
        startButton.classList.add('searching');
        startIcon.className = 'fas fa-spinner fa-spin';
        startText.textContent = 'Searching';

        setTimeout(() => {
          if (isSearching) {
            isSearching = false;
            isConnected = true;
            startButton.classList.remove('searching');
            startButton.classList.add('connected');
            startIcon.className = 'fas fa-forward';
            startText.textContent = 'Next';
            
            simulateStrangerConnection();
            startTimer();
          }
        }, 2000 + Math.random() * 2000);

      } else if (isConnected) {
        disconnectStranger();
        stopTimer();
        isConnected = false;
        startButton.classList.remove('connected');
        startButton.classList.add('searching');
        startIcon.className = 'fas fa-spinner fa-spin';
        startText.textContent = 'Searching';

        setTimeout(() => {
          if (!isConnected) {
            isConnected = true;
            startButton.classList.remove('searching');
            startButton.classList.add('connected');
            startIcon.className = 'fas fa-forward';
            startText.textContent = 'Next';
            
            simulateStrangerConnection();
            startTimer();
          }
        }, 1500 + Math.random() * 2000);
      }
    }

    function startTimer() {
      seconds = 0;
      minutes = 0;
      document.getElementById('timerDisplay').textContent = '00:00';
      document.getElementById('timerDisplay').classList.add('active');
      timerInterval = setInterval(() => {
        seconds++;
        if (seconds === 60) { seconds = 0; minutes++; }
        document.getElementById('timerDisplay').textContent = 
          `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      document.getElementById('timerDisplay').classList.remove('active');
      document.getElementById('timerDisplay').textContent = '00:00';
      seconds = 0;
      minutes = 0;
    }

    function toggleRecording() {
      const recordButton = document.getElementById('recordButton');
      const recordIcon = document.getElementById('recordIcon');
      const recordText = document.getElementById('recordText');
      const recIndicator = document.getElementById('recIndicator');

      if (!isConnected) {
        alert('Connect with a stranger first to start recording!');
        return;
      }

      if (!isRecording) {
        isRecording = true;
        recordButton.classList.add('recording');
        recordIcon.className = 'fas fa-stop';
        recordText.textContent = 'Stop';
        recIndicator.classList.add('active');
      } else {
        isRecording = false;
        recordButton.classList.remove('recording');
        recordIcon.className = 'fas fa-circle';
        recordText.textContent = 'Record';
        recIndicator.classList.remove('active');
      }
    }

    function disconnectAll() {
      if (isConnected) {
        disconnectStranger();
        stopTimer();
        isConnected = false;
        isSearching = false;
        
        const startButton = document.getElementById('startButton');
        startButton.classList.remove('connected', 'searching');
        document.getElementById('startIcon').className = 'fas fa-play';
        document.getElementById('startText').textContent = 'Start';
      }
      
      if (isRecording) {
        toggleRecording();
      }
      
      stopMyCamera();
    }

    setInterval(() => {
      const count = Math.floor(10000 + Math.random() * 15000);
      document.getElementById('onlineCount').textContent = `${count.toLocaleString()} strangers online`;
    }, 5000);

    window.addEventListener('beforeunload', () => {
      disconnectAll();
    });
  </script>
</body>
</html>
