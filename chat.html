<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat • Glass</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      overscroll-behavior: none;
    }
    .page {
      width:100%; height:100vh; height:100dvh; background:#000;
      display:flex; flex-direction:column; position:relative; overflow:hidden;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    
    .scrollable-page {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      display:flex; flex-direction:column; background:#000;
      padding-bottom:6rem;
    }
    .scrollable-page::-webkit-scrollbar { width:0; height:0; }
    .scrollable-page { scrollbar-width:none; -ms-overflow-style:none; }

    .top-icons {
      width:100%; max-width:500px; display:flex; align-items:center; justify-content:space-between;
      padding:0.8rem 0.8rem 0.3rem; flex-shrink:0; position:relative; background:#000;
      margin:0 auto;
    }
    .top-icons.hidden { display:none; }
    .corner-btn {
      width:2.4rem; height:2.4rem; background: transparent;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius:50%; color:#fff; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; border:1px solid rgba(255,255,255,0.15);
      cursor:pointer; transition:all 0.3s;
      background: rgba(255,255,255,0.05);
    }
    .top-brand {
      font-size:2rem; font-weight:700; color:#fff; letter-spacing:3px;
      font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;
      position:absolute; left:50%; transform:translateX(-50%); white-space:nowrap;
      line-height:1; font-style:italic;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .chat-header {
      display:none; align-items:center; gap:0.6rem;
      padding:0.8rem 1rem 0.5rem; padding-top:max(0.8rem, env(safe-area-inset-top, 0.8rem));
      background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      flex-shrink:0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .chat-header.show {display:flex;}
    .chat-back {
      width:2.4rem; height:2.4rem; min-width:2.4rem;
      background:rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      border-radius:50%; color:#fff; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(255,255,255,0.15); cursor:pointer;
    }
    .chat-partner-info {flex:1; min-width:0; cursor:pointer; display:flex; flex-direction:column; justify-content:center;}
    .chat-partner-name {font-size:0.95rem; font-weight:600; color:#fff;}
    .chat-partner-status {font-size:0.65rem; color:#4ade80; display:flex; align-items:center; gap:0.2rem;}
    .chat-partner-status .dot {width:5px; height:5px; border-radius:50%; background:#4ade80; display:inline-block;}
    .call-btns {display:flex; align-items:center; gap:0.5rem;}
    .call-btn {
      width:2.2rem; height:2.2rem; border-radius:50%;
      background:rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      display:flex; align-items:center; justify-content:center; color:#fff;
      font-size:0.85rem; cursor:pointer; border:1px solid rgba(255,255,255,0.12);
      transition:all 0.2s;
    }

    .search-bar-container {padding:0.3rem 1rem 0.5rem; background:transparent; flex-shrink:0;}
    .search-bar-container.hidden {display:none;}
    .search-bar {
      display:flex; align-items:center; gap:0.5rem;
      background: rgba(255,255,255,0.04); backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.1); border-radius:1.5rem;
      padding:0.45rem 0.8rem;
    }
    .search-bar i {color:#aaa; font-size:0.75rem;}
    .search-bar input {
      flex:1; background:transparent; border:none; color:#fff; font-size:0.8rem; outline:none;
    }
    .search-bar input::placeholder {color:#777;}

    .chat-list-full {display:flex; flex-direction:column; flex:1; min-height:0;}
    .chat-list-full.hidden {display:none;}
    .chat-list-header {
      padding:0.5rem 1rem; font-size:0.65rem; color:#aaa; text-transform:uppercase;
      letter-spacing:1px; display:flex; justify-content:space-between; align-items:center;
      flex-shrink:0; background:transparent; backdrop-filter: blur(4px);
    }
    .user-list-item {
      display:flex; align-items:center; gap:0.7rem; padding:0.7rem 1rem;
      cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.03);
      background: transparent; transition: background 0.2s;
    }
    .user-list-item.active {background: rgba(255,252,0,0.08); backdrop-filter: blur(8px);}
    .user-avatar {
      width:48px; height:48px; border-radius:50%;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
      overflow:hidden; display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; color:#fff; font-weight:700; flex-shrink:0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .user-avatar img {width:100%; height:100%; object-fit:cover;}
    .user-info {flex:1; min-width:0;}
    .user-name-row {display:flex; align-items:center; justify-content:space-between;}
    .user-name {font-size:0.85rem; color:#fff; font-weight:500; cursor:pointer;}
    .user-time {font-size:0.6rem; color:#888; flex-shrink:0;}
    .user-msg-row {display:flex; align-items:center; justify-content:space-between; margin-top:2px;}
    .user-last-msg {
      font-size:0.7rem; color:#999; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; max-width:180px;
    }
    .user-last-msg.unread-msg {color:#fff; font-weight:500;}
    .unread-count {
      background:#FFFC00; color:#000; font-size:0.6rem; font-weight:700;
      min-width:18px; height:18px; border-radius:9px; display:flex;
      align-items:center; justify-content:center; flex-shrink:0;
    }

    .chat-view {display:none; flex-direction:column; flex:1; min-height:0;}
    .chat-view.show {display:flex;}
    .messages-container {
      flex:1; overflow-y:auto; padding:0.8rem 0.8rem 0.5rem;
      display:flex; flex-direction:column; gap:0.2rem; background:#000;
    }
    .messages-container::-webkit-scrollbar {width:0;}
    .message-wrapper {display:flex; max-width:85%; animation:fadeInUp 0.25s ease-out;}
    .message-wrapper.sent {align-self:flex-end; flex-direction:row-reverse;}
    .message-wrapper.received {align-self:flex-start;}
    @keyframes fadeInUp {from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
    .message-bubble {
      padding:0.55rem 0.8rem; border-radius:1.2rem; font-size:0.85rem;
      line-height:1.3; word-break:break-word;
    }
    .sent .message-bubble {
      background:#FFFC00; color:#000; border-bottom-right-radius:0.3rem;
    }
    .received .message-bubble {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
      color:#fff; border-bottom-left-radius:0.3rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .message-time {font-size:0.55rem; margin-top:0.1rem; display:flex; align-items:center; gap:0.15rem;}
    .sent .message-time {justify-content:flex-end; color:rgba(0,0,0,0.5);}
    .received .message-time {color:rgba(255,255,255,0.45);}

    .voice-msg {display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.8rem; cursor:pointer; min-width:180px;}
    .voice-play-btn {
      width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,0.15);
      border:none; color:#fff; font-size:0.8rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .sent .voice-play-btn {color:#000; background:rgba(0,0,0,0.2);}
    .voice-wave-container {flex:1; display:flex; align-items:center; gap:1px; height:28px;}
    .voice-wave-bar {width:2px; border-radius:1px; opacity:0.6;}
    .sent .voice-wave-bar {background:#000;} .received .voice-wave-bar {background:#fff;}
    .voice-duration {font-size:0.55rem; opacity:0.7; min-width:60px; text-align:right;}

    .recording-bar {
      display:none; align-items:center; gap:0.5rem; padding:0.4rem 1rem;
      background:rgba(0,0,0,0.7); backdrop-filter: blur(12px);
      border-top:1px solid rgba(255,255,255,0.06); flex-shrink:0;
    }
    .recording-bar.show {display:flex;}
    .recording-dot {width:10px; height:10px; border-radius:50%; background:#ef4444; animation:recPulse 0.8s infinite;}
    @keyframes recPulse {0%,100%{opacity:1; transform:scale(1);} 50%{opacity:0.4; transform:scale(0.7);}}
    .recording-time-text {color:#ef4444; font-size:0.85rem; font-weight:600;}

    .typing-bubble {
      display:none; align-self:flex-start; padding:0.45rem 0.8rem;
      background:rgba(255,255,255,0.06); backdrop-filter: blur(10px);
      border-radius:1rem; gap:0.2rem; border:1px solid rgba(255,255,255,0.08);
    }
    .typing-bubble.show {display:flex; align-items:center;}

    .chat-input-area {
      display:none; align-items:center; gap:0.4rem; padding:0.5rem 0.8rem;
      padding-bottom:max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: transparent; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top:1px solid rgba(255,255,255,0.08); flex-shrink:0;
      position:fixed; bottom:0; left:0; right:0; z-index:50;
    }
    .chat-input-area.show {display:flex;}
    .camera-btn, .mic-btn {
      width:38px; height:38px; border-radius:50%;
      background:rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.15); color:#fff; font-size:0.9rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all 0.15s;
    }
    .chat-input {
      flex:1; padding:0.6rem 1rem; border-radius:1.5rem;
      border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06);
      backdrop-filter: blur(10px); color:#fff; font-size:0.85rem; outline:none;
    }
    .chat-input:focus {border-color:#FFFC00;}
    .send-btn {
      width:38px; height:38px; border-radius:50%; background:#FFFC00;
      border:none; color:#000; font-size:0.9rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }

    /* 🌟 ULTRA TRANSPARENT GLASS MODAL + LIST STYLE */
    .new-chat-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.25); backdrop-filter: blur(6px);
      z-index:400; display:none; align-items:center; justify-content:center; padding:1rem;
    }
    .new-chat-overlay.show {display:flex;}
    .new-chat-modal {
      background: rgba(10,10,15,0.25); 
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border-radius:1.5rem; padding:0; width:100%; max-width:400px; max-height:75vh;
      display:flex; flex-direction:column;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.5);
      overflow:hidden;
    }
    .new-chat-tabs {
      display:flex; border-bottom:1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02); backdrop-filter: blur(20px);
    }
    .new-chat-tab {
      flex:1; text-align:center; padding:0.8rem; color:rgba(255,255,255,0.55);
      font-size:0.8rem; font-weight:600; cursor:pointer;
      border-bottom:2px solid transparent; transition:all 0.2s;
      background: transparent;
    }
    .new-chat-tab.active {color:#fff; border-bottom-color:#FFFC00; background:rgba(255,255,255,0.04);}
    .new-chat-search {padding:0.7rem 1rem; background:transparent;}
    .new-chat-search input {
      width:100%; padding:0.6rem 0.9rem; border-radius:1.2rem;
      border:1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05); backdrop-filter: blur(18px);
      color:#fff; font-size:0.8rem; outline:none;
    }
    .new-chat-search input::placeholder {color:rgba(255,255,255,0.3);}
    .new-chat-list {
      flex:1; overflow-y:auto; padding:0.3rem 0;
      background: transparent;
    }
    .new-chat-list::-webkit-scrollbar {width:3px;}
    .new-chat-list::-webkit-scrollbar-thumb {background:rgba(255,255,255,0.15); border-radius:3px;}
    
    .new-chat-item {
      display:flex; align-items:center; gap:0.6rem; padding:0.75rem 1rem;
      cursor:pointer; transition:all 0.15s;
      background: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .new-chat-item:hover {background: rgba(255,255,255,0.04); backdrop-filter: blur(10px);}
    .new-chat-avatar {
      width:42px; height:42px; border-radius:50%;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
      overflow:hidden; display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:700; font-size:0.9rem; flex-shrink:0;
      border:1px solid rgba(255,255,255,0.2);
    }
    .new-chat-avatar img {width:100%; height:100%; object-fit:cover;}
    .new-chat-info {flex:1; min-width:0;}
    .new-chat-name {font-size:0.8rem; color:#fff; font-weight:500;}
    .new-chat-sub {font-size:0.6rem; color:rgba(255,255,255,0.5); margin-top:2px;}
    .new-chat-actions {display:flex; gap:0.4rem; flex-shrink:0;}
    .new-chat-action {
      padding:0.35rem 0.8rem; border-radius:1rem;
      font-size:0.65rem; font-weight:600; cursor:pointer;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.2); color:#fff;
    }
    .new-chat-action.accept {color:#4ade80; border-color:rgba(74,222,128,0.5);}
    .new-chat-action.decline {color:#ef4444; border-color:rgba(239,68,68,0.4);}
    .new-chat-action.chat {color:#FFFC00; border-color:rgba(255,252,0,0.5);}
    .new-chat-action.request-btn {color:#a78bfa; border-color:rgba(139,92,246,0.5);}
    .new-chat-close {
      text-align:center; padding:0.7rem; color:rgba(255,255,255,0.5);
      cursor:pointer; font-size:0.75rem; border-top:1px solid rgba(255,255,255,0.06);
      background: transparent; flex-shrink:0;
    }

    /* Floating nav glass */
    .floating-nav {
      position: fixed; bottom: max(1rem, env(safe-area-inset-bottom, 1rem));
      left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px;
      background: rgba(10,10,15,0.25); backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px); border-radius: 2.5rem;
      padding: 0.7rem 1.5rem; border: 1px solid rgba(255,255,255,0.08);
      z-index: 100; pointer-events: auto;
    }
    .floating-nav.hidden {display:none;}
    .nav-center { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:380px; gap:0.3rem; }
    .nav-center a {
      color: rgba(255,255,255,0.75); font-size:1.3rem; display:flex; align-items:center;
      justify-content:center; width:2.5rem; height:2.5rem; border-radius:50%;
      transition:all 0.3s; text-decoration:none; background:transparent;
    }
    .nav-center a.active { color:#fff; background:rgba(255,255,255,0.12); }
    
    @media (min-width: 1024px) {
      .floating-nav { position:fixed; top:50%; left:1.5rem; bottom:auto; transform:translateY(-50%); width:3.8rem; border-radius:2.5rem; padding:1rem 0.6rem; }
      .nav-center { flex-direction:column; gap:1.2rem; }
      .page { padding:0 0 0 5.5rem; }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem;color:#fff;">
    <i class="fas fa-spinner" style="font-size:2rem;animation:spin 1s infinite;"></i><span>Loading...</span>
  </div>
  <div class="page" id="mainPage" style="display:none;">
    <div class="scrollable-page" id="scrollablePage">
      <div class="top-icons" id="topIcons">
        <a href="hart.html" class="corner-btn" title="Likes"><i class="fas fa-heart"></i></a>
        <span class="top-brand">Chats</span>
        <button class="corner-btn" id="newChatBtn" onclick="showNewChatModal()"><i class="fas fa-plus"></i></button>
      </div>

      <div class="chat-header" id="chatHeader">
        <button class="chat-back" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-partner-info" onclick="goToPartnerProfile()">
          <div class="chat-partner-name" id="partnerName"></div>
          <div class="chat-partner-status" id="partnerStatus"></div>
        </div>
        <div class="call-btns">
          <button class="call-btn audio-call" onclick="startCall('audio')"><i class="fas fa-phone"></i></button>
          <button class="call-btn video-call" onclick="startCall('video')"><i class="fas fa-video"></i></button>
        </div>
      </div>

      <div class="search-bar-container" id="searchBarContainer">
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="chatSearchInput" placeholder="Search messages..." oninput="filterChatList()"></div>
      </div>

      <div class="chat-list-full" id="chatListFull">
        <div class="chat-list-header">Messages <span id="chatCount"></span></div>
        <div id="userList"></div>
      </div>
      <div class="chat-view" id="chatView">
        <div class="messages-container" id="messagesContainer">
          <div class="empty-chat" id="emptyChat" style="color:#555;">Send a message!</div>
          <div class="typing-bubble" id="typingBubble"><div class="tb-dot" style="width:5px;height:5px;border-radius:50%;background:#888;animation:typingBounce 0.5s infinite alternate;"></div><div class="tb-dot" style="width:5px;height:5px;border-radius:50%;background:#888;animation:typingBounce 0.5s infinite alternate 0.15s;"></div><div class="tb-dot" style="width:5px;height:5px;border-radius:50%;background:#888;animation:typingBounce 0.5s infinite alternate 0.3s;"></div></div>
        </div>
        <div class="recording-bar" id="recordingBar"><div class="recording-dot"></div><span class="recording-time-text" id="recTime">00:00</span><button class="recording-cancel" onclick="cancelVoice()" style="background:none;border:none;color:#fff;margin-left:auto;">✕</button><button class="recording-send" onclick="sendVoice()" style="width:38px;height:38px;border-radius:50%;background:#FFFC00;border:none;color:#000;"><i class="fas fa-paper-plane"></i></button></div>
      </div>
    </div>

    <div class="chat-input-area" id="chatInputArea">
      <button class="camera-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
      <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
      <button class="mic-btn" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- 🌟 ULTRA GLASS MODAL -->
    <div class="new-chat-overlay" id="newChatOverlay">
      <div class="new-chat-modal">
        <div class="new-chat-tabs">
          <div class="new-chat-tab active" onclick="switchNewChatTab('users', this)">👥 Users</div>
          <div class="new-chat-tab" onclick="switchNewChatTab('requests', this)">📩 Requests <span class="tab-badge" id="requestBadge" style="display:none; background:#ef4444; color:#fff; border-radius:8px; padding:0 4px; font-size:0.6rem; margin-left:4px;">0</span></div>
        </div>
        <div class="new-chat-search" id="newChatSearchBox"><input type="text" id="newChatSearchInput" placeholder="🔍 Search users..." oninput="filterNewChatList()"></div>
        <div class="new-chat-list" id="newChatList"></div>
        <div class="new-chat-close" onclick="closeNewChatModal()">Close ✕</div>
      </div>
    </div>

    <div class="call-overlay" id="callOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;">
      <div class="call-video-container" style="width:100%;max-width:500px;aspect-ratio:3/4;position:relative;background:#111;border-radius:1rem;overflow:hidden;">
        <video id="callRemoteVideo" class="call-remote-video" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
        <video id="callLocalVideo" class="call-local-video" autoplay playsinline muted style="position:absolute;top:1rem;right:1rem;width:100px;height:140px;border-radius:0.8rem;object-fit:cover;background:#222;border:2px solid rgba(255,255,255,0.2);"></video>
      </div>
      <div class="call-status" id="callStatus" style="color:#fff;margin-top:1rem;">Connecting...</div>
      <div class="call-controls" style="display:flex;gap:1.5rem;margin-top:2rem;">
        <button class="call-ctrl-btn call-mute-btn" id="callMuteBtn" onclick="toggleCallMute()" style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:none;"><i class="fas fa-microphone"></i></button>
        <button class="call-ctrl-btn call-video-toggle" id="callVideoBtn" onclick="toggleCallVideo()" style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:none;"><i class="fas fa-video"></i></button>
        <button class="call-ctrl-btn call-end-btn" onclick="endCall()" style="width:60px;height:60px;border-radius:50%;background:#ef4444;color:#fff;border:none;font-size:1.4rem;"><i class="fas fa-phone" style="transform:rotate(135deg);"></i></button>
      </div>
    </div>

    <div class="incoming-call-overlay" id="incomingCallOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:700;display:none;flex-direction:column;align-items:center;justify-content:center;">
      <div class="incoming-avatar" id="incomingAvatar" style="width:80px;height:80px;border-radius:50%;background:#333;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;overflow:hidden;"><i class="fas fa-user"></i></div>
      <div class="incoming-name" id="incomingName" style="color:#fff;font-size:1.2rem;font-weight:600;">Caller</div>
      <div class="incoming-type" id="incomingType" style="color:#aaa;margin-bottom:2rem;">Incoming audio call...</div>
      <div class="incoming-actions" style="display:flex;gap:2rem;">
        <button class="incoming-reject" onclick="rejectCall()" style="width:60px;height:60px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:1.5rem;"><i class="fas fa-phone"></i></button>
        <button class="incoming-accept" onclick="acceptCall()" style="width:60px;height:60px;border-radius:50%;background:#4ade80;border:none;color:#fff;font-size:1.5rem;"><i class="fas fa-phone"></i></button>
      </div>
    </div>
    
    <nav class="floating-nav" id="floatingNav">
      <div class="nav-center">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="web.html"><i class="fas fa-globe"></i></a>
        <a href="reel.html"><i class="fas fa-film"></i></a>
        <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="upload.html" class="nav-upload" style="display:none;"><i class="fas fa-plus"></i></a>
        <a href="search.html" class="nav-search" style="display:none;"><i class="fas fa-search"></i></a>
      </div>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, updateDoc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    if(!localStorage.getItem("uid")){window.location.replace("login.html");}
    const currentUser=localStorage.getItem('currentUser')||'@anonymous',currentUserId=currentUser.replace('@','');
    let chatPartner=null,chatId=null,unsubMessages=null,unsubChatList=null,allUsersList=[],chatListData=[],userProfiles={};
    let mediaRecorder=null,audioChunks=[],voiceTimer=null,voiceSeconds=0,isRecording=false;
    let localStream=null,peerConnection=null,callUnsub=null,callDocRef=null;
    let isCallActive=false,isCaller=false,callType='audio',isMuted=false,isVideoOff=false;
    let newChatActiveTab='users',messageRequests=[];
    const servers={iceServers:[{urls:"stun:stun.l.google.com:19302"}]};
    
    document.getElementById('loadingScreen').style.display='none';document.getElementById('mainPage').style.display='flex';
    loadAllUsers();setupRealtimeChatList();listenForIncomingCalls();loadMessageRequests();
    
    function cleanName(u){return(u||'').replace(/^@/,'');}
    function formatDuration(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
    window.goToPartnerProfile=function(){if(chatPartner)window.location.href='profile.html?user='+encodeURIComponent(chatPartner);};
    window.filterChatList=function(){const s=document.getElementById('chatSearchInput').value.toLowerCase();renderChatList(s?chatListData.filter(c=>dispName(c.username).toLowerCase().includes(s)||(c.lastMsg&&c.lastMsg.toLowerCase().includes(s))):chatListData);};
    
    async function loadMessageRequests(){try{const snap=await getDocs(collection(db,'message_requests'));messageRequests=[];snap.forEach(doc=>{const d=doc.data();if(d.to===currentUserId||d.to===currentUser||d.to===currentUser.replace('@','')){messageRequests.push({id:doc.id,...d});}});updateRequestBadge();}catch(e){}}
    function updateRequestBadge(){const badge=document.getElementById('requestBadge');if(messageRequests.length>0){badge.style.display='inline-block';badge.textContent=messageRequests.length;}else{badge.style.display='none';}}
    
    async function loadAllUsers(){allUsersList=[];userProfiles={};try{const q=query(collection(db,'users'),orderBy('createdAt','desc'));const snap=await getDocs(q);snap.forEach(doc=>{const d=doc.data();if(d.username!==currentUser){const c=cleanName(d.username);allUsersList.push({username:d.username,displayName:c,avatar:d.avatar||null,createdAt:d.createdAt?.toDate?.()||new Date(0)});userProfiles[d.username]={name:c,avatar:d.avatar||null};}});}catch(e){}const profile=JSON.parse(localStorage.getItem('userProfile')||'{}');[...(profile.friends||[]),...(profile.besties||[])].forEach(f=>{const u=f.name;if(u&&u!==currentUser){if(!allUsersList.find(x=>x.username===u)){allUsersList.push({username:u,displayName:cleanName(u),avatar:f.avatar||null,createdAt:new Date(0)});}if(!userProfiles[u])userProfiles[u]={name:cleanName(u),avatar:f.avatar||null};if(f.avatar)userProfiles[u].avatar=f.avatar;}});allUsersList.sort((a,b)=>(b.createdAt?.getTime?.()||0)-(a.createdAt?.getTime?.()||0));}
    function avatarHTML(u){const p=userProfiles[u];if(p&&p.avatar&&p.avatar!=='null'){return`<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${cleanName(u).charAt(0).toUpperCase()}';" style="width:100%;height:100%;object-fit:cover;"/>`;}return cleanName(u).charAt(0).toUpperCase();}
    function dispName(u){const p=userProfiles[u];return p?p.name:cleanName(u);}
    
    window.goToUserProfile=function(username){closeNewChatModal();window.location.href='profile.html?user='+encodeURIComponent(username);};
    window.showNewChatModal=function(){document.getElementById('newChatOverlay').classList.add('show');document.getElementById('newChatSearchInput').value='';switchNewChatTab('users',document.querySelector('.new-chat-tab'));renderNewChatUsers(allUsersList);};
    window.closeNewChatModal=function(){document.getElementById('newChatOverlay').classList.remove('show');};
    window.switchNewChatTab=function(tab,el){newChatActiveTab=tab;document.querySelectorAll('.new-chat-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('newChatSearchBox').style.display='block';if(tab==='users'){document.getElementById('newChatSearchInput').placeholder='🔍 Search users...';renderNewChatUsers(allUsersList);}else{document.getElementById('newChatSearchInput').placeholder='🔍 Search requests...';renderNewChatRequests(messageRequests);}};
    window.filterNewChatList=function(){const s=document.getElementById('newChatSearchInput').value.toLowerCase();if(newChatActiveTab==='users'){renderNewChatUsers(allUsersList.filter(u=>u.displayName.toLowerCase().includes(s)));}else{renderNewChatRequests(messageRequests.filter(r=>(r.fromName||r.from||'').toLowerCase().includes(s)));}};
    
    function renderNewChatUsers(users){const l=document.getElementById('newChatList');if(users.length===0){l.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.4);padding:2rem;">No users found</div>';return;}const existingChats=chatListData.map(c=>c.username);const mySentRequests=messageRequests.filter(r=>r.fromId===currentUserId).map(r=>r.to);l.innerHTML=users.map(u=>{const alreadyChatting=existingChats.includes(u.username);const alreadyRequested=mySentRequests.includes(u.username.replace('@',''));let actionBtn='';if(alreadyChatting){actionBtn=`<button class="new-chat-action chat" onclick="event.stopPropagation();closeNewChatModal();openChat('${u.username}')">💬 Chat</button>`;}else if(alreadyRequested){actionBtn=`<span style="color:#f59e0b;font-size:0.6rem;">⏳ Requested</span>`;}else{actionBtn=`<button class="new-chat-action request-btn" onclick="event.stopPropagation();sendChatRequest('${u.username}', this)">📩 Request</button>`;}return`<div class="new-chat-item" onclick="goToUserProfile('${u.username}')"><div class="new-chat-avatar">${avatarHTML(u.username)}</div><div class="new-chat-info"><div class="new-chat-name">${u.displayName}</div><div class="new-chat-sub">${alreadyChatting?'Already in chats':'Tap to view profile'}</div></div><div class="new-chat-actions">${actionBtn}</div></div>`;}).join('');}
    
    window.sendChatRequest=async function(username,btnElement){try{const profile=JSON.parse(localStorage.getItem('userProfile')||'{}');const fromName=(profile.username||currentUser).replace('@','');if(btnElement){btnElement.closest('.new-chat-actions').innerHTML='<span style="color:#f59e0b;font-size:0.6rem;">⏳ Requested</span>';}await addDoc(collection(db,'message_requests'),{from:currentUser,fromName:fromName,fromId:currentUserId,to:username.replace('@',''),lastMessage:'👋 Wants to chat',createdAt:serverTimestamp(),status:'pending'});await loadMessageRequests();}catch(e){};};
    
    function renderNewChatRequests(requests){const l=document.getElementById('newChatList');if(requests.length===0){l.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.4);padding:2rem;">No pending requests</div>';return;}l.innerHTML=requests.map(r=>`<div class="new-chat-item"><div class="new-chat-avatar">${(r.fromAvatar&&r.fromAvatar!=='null')?`<img src="${r.fromAvatar}">`: (r.fromName||'?').charAt(0).toUpperCase()}</div><div class="new-chat-info"><div class="new-chat-name">${r.fromName||r.from}</div><div class="new-chat-sub">${r.lastMessage||'Wants to chat'}</div></div><div class="new-chat-actions"><button class="new-chat-action accept" onclick="event.stopPropagation();acceptRequest('${r.id}','${r.from}')">✓</button><button class="new-chat-action decline" onclick="event.stopPropagation();declineRequest('${r.id}')">✕</button></div></div>`).join('');}
    
    window.acceptRequest=async function(requestId,fromUser){try{const partnerUsername=fromUser||'@'+fromUser;const cid=[currentUserId,partnerUsername.replace('@','')].sort().join('_');await setDoc(doc(db,'chats',cid),{users:[currentUserId,partnerUsername.replace('@','')],lastMessage:'👋 Chat started!',lastType:'text',lastTime:serverTimestamp()});await addDoc(collection(db,'chats',cid,'messages'),{text:'👋 Chat started!',sender:currentUserId,createdAt:serverTimestamp()});await deleteDoc(doc(db,'message_requests',requestId));messageRequests=messageRequests.filter(r=>r.id!==requestId);updateRequestBadge();closeNewChatModal();openChat(partnerUsername);}catch(e){};};
    window.declineRequest=async function(requestId){await deleteDoc(doc(db,'message_requests',requestId));messageRequests=messageRequests.filter(r=>r.id!==requestId);updateRequestBadge();renderNewChatRequests(messageRequests);};
    
    function setupRealtimeChatList(){if(unsubChatList)unsubChatList();const q=query(collection(db,'chats'),orderBy('lastTime','desc'));unsubChatList=onSnapshot(q,(snap)=>{const chats=[];snap.forEach(docSnap=>{const data=docSnap.data();const ids=docSnap.id.split('_');if(ids.includes(currentUserId)){const partnerId=ids.find(i=>i!==currentUserId);if(partnerId&&data.lastMessage!==undefined){chats.push({username:'@'+partnerId,lastMsg:data.lastType==='image'?'📷 Photo':data.lastType==='audio'?'🎤 Voice':data.lastMessage||'',lastTime:data.lastTime?.toDate()||new Date(0),unreadCount:data['unread_'+currentUserId]||0});}}});chatListData=chats;renderChatList(chats);});}
    
    function renderChatList(cu){const l=document.getElementById('userList');document.getElementById('chatCount').textContent=cu.length>0?'('+cu.length+')':'';if(cu.length===0){l.innerHTML='<div style="text-align:center;color:#555;padding:3rem;">No messages yet</div>';return;}l.innerHTML=cu.map(c=>`<div class="user-list-item ${chatPartner===c.username?'active':''}" onclick="openChat('${c.username}')"><div class="user-avatar">${avatarHTML(c.username)}</div><div class="user-info"><div class="user-name-row"><span class="user-name">${dispName(c.username)}</span><span class="user-time">${fmtTime(c.lastTime)}</span></div><div class="user-msg-row"><span class="user-last-msg ${c.unreadCount>0?'unread-msg':''}">${c.lastMsg||'No messages'}</span>${c.unreadCount>0?`<span class="unread-count">${c.unreadCount}</span>`:''}</div></div></div>`).join('');}
    function fmtTime(d){if(!d||d.getTime()===0)return'';const n=new Date(),df=n-d;if(df<60000)return'Now';if(df<3600000)return Math.floor(df/60000)+'m';if(d.toDateString()===n.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'});}
    
    window.openChat=function(u){chatPartner=u;chatId=[currentUserId,u.replace('@','')].sort().join('_');updateDoc(doc(db,'chats',chatId),{['unread_'+currentUserId]:0}).catch(()=>{});document.getElementById('topIcons').classList.add('hidden');document.getElementById('chatHeader').classList.add('show');document.getElementById('chatListFull').classList.add('hidden');document.getElementById('chatView').classList.add('show');document.getElementById('searchBarContainer').classList.add('hidden');document.getElementById('partnerName').textContent=dispName(u);document.getElementById('partnerStatus').innerHTML='<span class="dot"></span> online';document.getElementById('chatInputArea').classList.add('show');document.getElementById('floatingNav').classList.add('hidden');listenToMessages();scrollToBottom();};
    window.goBack=function(){if(isCallActive)endCall();chatPartner=null;chatId=null;if(unsubMessages){unsubMessages();unsubMessages=null;}document.getElementById('topIcons').classList.remove('hidden');document.getElementById('chatHeader').classList.remove('show');document.getElementById('chatListFull').classList.remove('hidden');document.getElementById('chatView').classList.remove('show');document.getElementById('searchBarContainer').classList.remove('hidden');document.getElementById('chatInputArea').classList.remove('show');document.getElementById('floatingNav').classList.remove('hidden');};
    
    function listenToMessages(){if(unsubMessages)unsubMessages();const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','asc'));unsubMessages=onSnapshot(q,(snap)=>{const c=document.getElementById('messagesContainer');document.getElementById('emptyChat').style.display=snap.empty?'flex':'none';snap.docChanges().forEach(ch=>{if(ch.type==='added'&&!document.getElementById('msg-'+ch.doc.id)){renderMsg(ch.doc.id,ch.doc.data());}});scrollToBottom();});}
    function renderMsg(id,msg){const c=document.getElementById('messagesContainer');const isSent=msg.sender===currentUserId;const w=document.createElement('div');w.className='message-wrapper '+(isSent?'sent':'received');w.id='msg-'+id;let time='';if(msg.createdAt)time=new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(msg.imageUrl)w.innerHTML=`<div class="message-bubble"><img src="${msg.imageUrl}" style="max-width:200px;border-radius:0.8rem;" onclick="window.open('${msg.imageUrl}')"><div class="message-time">${time}</div></div>`;else if(msg.audioUrl)w.innerHTML=`<div class="message-bubble voice-msg" data-audio="${msg.audioUrl}" data-duration="${msg.audioDuration||0}" onclick="playVoice(this)"><button class="voice-play-btn"><i class="fas fa-play"></i></button><div class="voice-wave-container">${Array(18).fill(0).map(()=>`<div class="voice-wave-bar" style="height:${Math.floor(Math.random()*22)+4}px;"></div>`).join('')}</div><span class="voice-duration">0:00 / ${formatDuration(msg.audioDuration||0)}</span><div class="message-time">${time}</div></div>`;else w.innerHTML=`<div class="message-bubble">${msg.text||''}<div class="message-time">${time}</div></div>`;c.insertBefore(w,document.getElementById('typingBubble'));}
    window.playVoice=function(el){const audioUrl=el.getAttribute('data-audio');const btn=el.querySelector('.voice-play-btn i');if(!el._audio){el._audio=new Audio(audioUrl);el._audio.onended=()=>{btn.className='fas fa-play';};}if(el._audio.paused){el._audio.play();btn.className='fas fa-pause';}else{el._audio.pause();btn.className='fas fa-play';}};
    
    window.sendMessage=async function(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!chatId)return;input.value='';await addDoc(collection(db,'chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp()});await updateDoc(doc(db,'chats',chatId),{lastMessage:text,lastType:'text',lastTime:serverTimestamp()});};
    
    function scrollToBottom(){const c=document.getElementById('messagesContainer');setTimeout(()=>{if(c)c.scrollTop=c.scrollHeight;},100);}
    
    // Keep other functions minimal for demonstration
    window.startCall=async function(type){alert('Call feature: '+type);};
    window.toggleVoice=function(){alert('Voice recording simulation');};
    window.sendImage=function(e){alert('Image send simulation');};
  </script>
</body>
