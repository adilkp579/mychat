<!DOCTYPE html>
<html lang="en">

  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overscroll-behavior:none;overflow:hidden; }

    .my-camera { width:100%;height:28vh;background:#111;border:2px solid rgba(255,255,255,0.3);border-radius:20px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center; }

    .token-stack { display:flex;flex-direction:column;gap:8px;align-items:flex-end;margin-top:8px; }
    .token-btn { width:110px;height:40px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.75rem;font-weight:600;color:#fff;transition:all 0.2s; }
    .token-btn:active { transform:scale(0.95); }
    .token-btn .token-count { background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:8px;min-width:22px;text-align:center; }
    .token-btn.token-chicken { border-color:#f59e0b;background:rgba(245,158,11,0.15); }
    .token-btn.token-lion { border-color:#ef4444;background:rgba(239,68,68,0.15); }
    .token-btn.token-fish { border-color:#3b82f6;background:rgba(59,130,246,0.15); }

    .token-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .token-btn.no-receiver { animation: shake 0.5s ease; border-color:#ef4444 !important; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    
    .gift-float { position:absolute;font-size:2rem;pointer-events:none;animation:giftFloat 1.5s ease-out forwards;z-index:50; }
    .control-row { display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:8px; }
    .ctrl-btn { width:80px;height:36px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;border:1px solid transparent;font-size:0.7rem;font-weight:600;color:#fff;transition:all 0.2s; }
    .ctrl-btn:active { transform:scale(0.96); }

    .next-btn { display:none;width:65px;height:36px;border-radius:18px;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#ccc; }
    .next-btn.visible { display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer; }
    .mic-btn { display:none;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#4ade80; }
    .mic-btn.visible { display:inline-flex;align-items:center;justify-content:center;cursor:pointer; }
    .mic-btn.muted { color:#ef4444;background:rgba(239,68,68,0.2); }
    .chat-toggle-btn { display:none;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);color:#fff; }
    .chat-toggle-btn.visible { display:inline-flex;align-items:center;justify-content:center;cursor:pointer; }
    .chat-toggle-btn.has-messages { animation:pulse 1.5s infinite; color:#4ade80; border-color:#4ade80; }
    .stranger-controls-row { display:none;gap:10px;margin-top:4px; }
    
    .chat-box { position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);width:92%;max-width:500px;height:35vh;max-height:350px;background:linear-gradient(135deg,rgba(20,20,30,0.95),rgba(10,10,15,0.95));backdrop-filter:blur(30px);border-radius:28px;border:1px solid rgba(255,255,255,0.2);display:flex;flex-direction:column;z-index:150;animation:slideUp 0.3s ease;overflow:hidden; }
    .chat-box.hidden { display:none; }
    .chat-header { display:flex;justify-content:space-between;align-items:center;padding:0.8rem 1.2rem;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.1);color:#fff;font-weight:600; }
    .chat-close-btn { background:rgba(255,255,255,0.1);border:none;color:#eee;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s; }
    .chat-messages { flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:8px; }
    .chat-messages::-webkit-scrollbar { width:3px; }
    .chat-message { background:rgba(255,255,255,0.08);padding:0.5rem 0.9rem;border-radius:18px;color:#f0f0f0;font-size:0.8rem;max-width:78%;align-self:flex-start;border:1px solid rgba(255,255,255,0.08);animation:slideUp 0.2s ease; }
    .chat-message.self { align-self:flex-end;background:linear-gradient(135deg,rgba(74,222,128,0.25),rgba(74,222,128,0.1));border-color:rgba(74,222,128,0.3); }
    .chat-message.system { align-self:center;background:rgba(255,255,255,0.04);color:#aaa;font-size:0.7rem;max-width:90%;text-align:center; }
    .chat-input-area { display:flex;padding:0.6rem 0.8rem;gap:8px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.1); }
    .chat-input { flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:0.55rem 1rem;color:#fff;font-size:0.8rem;outline:none; }
    .chat-send-btn { background:rgba(74,222,128,0.3);border:1px solid rgba(74,222,128,0.4);border-radius:50%;width:38px;height:38px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer; }
    
    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;gap:10px;color:#fff; }
    .loading-screen i { font-size:2rem;animation:spin 1s infinite linear; }
    
    .floating-nav { position:fixed;bottom:max(1rem,env(safe-area-inset-bottom,1rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:transparent;backdrop-filter:blur(12px);border-radius:2.5rem;padding:0.7rem 1.5rem;border:1px solid rgba(255,255,255,0.06);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.7);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;text-shadow:0 0 8px rgba(0,0,0,0.8); }
    .nav-center a:hover { color:#fff;background:rgba(255,255,255,0.1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15); }
    
    @media (max-width:380px) { .token-btn{width:95px;height:36px;} .ctrl-btn{width:70px;height:32px;} .floating-nav{width:94%;padding:0.5rem 0.8rem;} .nav-center a{font-size:1.1rem;width:2rem;height:2rem;} }
    @media (min-width:1024px) { .top-icons{display:none;} .floating-nav{position:fixed;top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column;} .nav-center{flex-direction:column;gap:1.2rem;} .nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem;} .page{padding-left:5rem;} .main-content{max-width:950px;margin:0 auto;} .camera-area{gap:20px;} .stranger-section{width:48%;} .you-section{width:48%;align-items:flex-start;} .stranger-camera{height:50vh;} .my-camera{height:50vh;} .token-stack{flex-direction:row;flex-wrap:wrap;justify-content:flex-start;} .token-btn{width:auto;min-width:90px;} .stranger-controls-row{display:flex;} .control-row.mobile-only{display:none;} .chat-box{width:380px;left:auto;right:1.5rem;transform:none;} }
    @media (max-width:1023px) { .stranger-controls-row{display:none;} .control-row.mobile-only{display:flex;} }
  </style>

<body>

  <div class="page" id="mainPage" style="display:none;">

            <video id="strangerFeed" autoplay playsinline webkit-playsinline></video>

          <div class="stranger-controls-row" id="strangerControlsRow">
            <button class="ctrl-btn start-btn" id="startStopBtnDesktop"><i class="fas fa-play"></i><span>Start</span></button>

            <button class="chat-toggle-btn" id="chatToggleBtnDesktop"><i class="fas fa-comment"></i></button>
          </div>
        </div>
        <div class="you-section">
          <span class="section-label">You</span>
          <div class="my-camera" id="myCamera">
            <video id="myFeed" autoplay playsinline muted webkit-playsinline></video>
            <div class="my-placeholder" id="myPlaceholder"><i class="fas fa-video"></i><span>Camera off</span></div>
          </div>
          <div class="token-stack" id="tokenStack">
            <button class="token-btn token-chicken" id="chickenBtn"><span>🍗</span><span class="token-count" id="chickenCount">0</span></button>
            <button class="token-btn token-lion" id="lionBtn"><span>🦁</span><span class="token-count" id="lionCount">0</span></button>
            <button class="token-btn token-fish" id="fishBtn"><span>🐟</span><span class="token-count" id="fishCount">0</span></button>
            <button class="token-btn token-bike" id="bikeBtn"><span>🏍️</span><span class="token-count" id="bikeCount">0</span></button>
          </div>
        </div>
      </div>
      <div class="control-row mobile-only">
        <button class="ctrl-btn start-btn" id="startStopBtn"><i class="fas fa-play"></i><span>Start</span></button>
        <button class="next-btn" id="nextBtn"><i class="fas fa-forward"></i><span>Next</span></button>
        <button class="mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>

      </div>
    </div>
    <div class="chat-box hidden" id="chatBox">
      <div class="chat-header"><span>💬 Chat</span><button class="chat-close-btn" id="chatCloseBtn"><i class="fas fa-times"></i></button></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area"><input class="chat-input" id="chatInput" placeholder="Type a message..."><button class="chat-send-btn" id="chatSendBtn"><i class="fas fa-paper-plane"></i></button></div>
    </div>
    <nav class="floating-nav"><div class="nav-center"><a href="index.html"><i class="fas fa-home"></i></a><a href="web.html" class="active"><i class="fas fa-globe"></i></a><a href="reel.html"><i class="fas fa-film"></i></a><a href="chat.html"><i class="fas fa-comment-dots"></i></a><a href="profile.html"><i class="fas fa-user"></i></a></div></nav>
  </div>

  <script>
    if (!localStorage.getItem("uid")) window.location.replace("login.html");
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, addDoc, onSnapshot, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    
    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    const uid = localStorage.getItem('uid');
    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    const myId = crypto.randomUUID();
    
    let tokenBalances = { chicken: 10, lion: 5, fish: 8, bike: 3 };
    let localStream = null, pc = null, roomId = null;
    let unsubs = [], roomIceUnsub = null, roomChatUnsub = null, roomTokenUnsub = null;
    let pendingICECandidates = [];
    let isConnected = false, strangerUsername = '', isMuted = false;
    let chatVisible = false, pendingMsgCount = 0;
    
    // Load wallet
    async function loadWallet() {
      try {
        const docSnap = await getDoc(doc(db, 'wallets', uid));
        if (docSnap.exists()) {
          const d = docSnap.data();
          tokenBalances = { chicken: d.chicken || 0, lion: d.lion || 0, fish: d.fish || 0, bike: d.bike || 0 };
        } else {
          await setDoc(doc(db, 'wallets', uid), { userId: uid, username: currentUser, ...tokenBalances, createdAt: serverTimestamp() });
        }
        updateTokenUI();
      } catch(e) {}
    }
    function updateTokenUI() {
      ['chicken','lion','fish','bike'].forEach(t => {
        document.getElementById(`${t}Count`).textContent = tokenBalances[t];
        document.getElementById(`${t}Btn`).disabled = tokenBalances[t] <= 0;
      });
    }
    async function saveWallet() { await updateDoc(doc(db, 'wallets', uid), tokenBalances).catch(()=>{}); }
    loadWallet();
    
    // TURN + STUN servers (FIX #5)
    const iceServers = [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun.relay.metered.ca:80" },
      { urls: "turn:standard.relay.metered.ca:80", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" },
      { urls: "turn:standard.relay.metered.ca:80?transport=tcp", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" },
      { urls: "turns:standard.relay.metered.ca:443?transport=tcp", username: "a6b2ebd89a4174b7f3843634", credential: "xyEoZGCCUl7ZAQ4h" }
    ];
    
    // Chat UI
    const chatBox = document.getElementById('chatBox'), chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput'), chatSendBtn = document.getElementById('chatSendBtn');
    function addMessage(text, isSelf = false, username = '', isSystem = false) {
      const div = document.createElement('div');
      div.className = `chat-message${isSelf ? ' self' : ''}${isSystem ? ' system' : ''}`;
      if (username && !isSelf && !isSystem) div.innerHTML = `<span style="font-size:0.65rem;color:#aaa;">${username}</span><br>${text}`;
      else div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      if (!chatVisible && !isSelf && !isSystem) {
        pendingMsgCount++;
        document.getElementById('chatToggleBtn').classList.add('has-messages');
        document.getElementById('chatToggleBtnDesktop')?.classList.add('has-messages');
      }
    }
    function toggleChat() {
      chatVisible = !chatVisible;
      chatBox.classList.toggle('hidden', !chatVisible);
      if (chatVisible) { pendingMsgCount = 0; document.getElementById('chatToggleBtn').classList.remove('has-messages'); document.getElementById('chatToggleBtnDesktop')?.classList.remove('has-messages'); }
    }
    document.getElementById('chatToggleBtn').addEventListener('click', toggleChat);
    document.getElementById('chatToggleBtnDesktop')?.addEventListener('click', toggleChat);
    document.getElementById('chatCloseBtn').addEventListener('click', () => { chatBox.classList.add('hidden'); chatVisible = false; });
    chatSendBtn.addEventListener('click', () => { const t = chatInput.value.trim(); if (t && window.sendChatMsg) window.sendChatMsg(t); chatInput.value = ''; });
    chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') chatSendBtn.click(); });
    
    // Send token
    window.handleTokenSend = async (type) => {
      if (!isConnected) {
        document.getElementById(`${type}Btn`).classList.add('no-receiver');
        setTimeout(() => document.getElementById(`${type}Btn`).classList.remove('no-receiver'), 500);
        addMessage(`❌ No stranger connected!`, true);
        return;
      }
      if (tokenBalances[type] <= 0) { addMessage(`❌ No ${type} tokens left!`, true); return; }
      tokenBalances[type]--;
      updateTokenUI();
      await saveWallet();
      const emoji = { chicken:'🍗', lion:'🦁', fish:'🐟', bike:'🏍️' }[type];
      const float = document.createElement('span');
      float.className = 'gift-float';
      float.textContent = emoji;
      float.style.left = (Math.random() * 60 + 20) + '%';
      float.style.top = '55%';
      document.getElementById('strangerCamera').appendChild(float);
      setTimeout(() => float.remove(), 1500);
      if (window.sendTokenFn) window.sendTokenFn(emoji, type);
      addMessage(`🎁 Sent ${emoji} to ${strangerUsername}`, true);
    };
    ['chicken','lion','fish','bike'].forEach(t => { document.getElementById(`${t}Btn`).onclick = () => window.handleTokenSend(t); });
    
    // Cleanup
    function cleanupRoom() {
      unsubs.forEach(u => { try { u(); } catch(e) {} });
      unsubs = [];
      if (roomIceUnsub) { roomIceUnsub(); roomIceUnsub = null; }
      if (roomChatUnsub) { roomChatUnsub(); roomChatUnsub = null; }
      if (roomTokenUnsub) { roomTokenUnsub(); roomTokenUnsub = null; }
    }
    
    function resetStrangerUI() {
      document.getElementById('strangerFeed').style.display = 'none';
      document.getElementById('strangerFeed').srcObject = null;
      document.getElementById('strangerPlaceholder').innerHTML = '<i class="fas fa-user-secret"></i><span>Waiting for stranger...</span>';
      document.getElementById('strangerCamera').classList.remove('connected');
      isConnected = false;
      strangerUsername = '';
      document.getElementById('strangerUsername').style.display = 'none';
      document.getElementById('strangerOnlineDot').style.display = 'none';
    }
    
    function setConnected(username) {
      isConnected = true;
      strangerUsername = username || 'Stranger';
      document.getElementById('strangerUsername').textContent = strangerUsername;
      document.getElementById('strangerUsername').style.display = 'inline-block';
      document.getElementById('strangerOnlineDot').style.display = 'inline-block';
      document.getElementById('startStopBtn').classList.add('stop-state');
      document.getElementById('startStopBtn').innerHTML = '<i class="fas fa-stop"></i><span>Stop</span>';
      document.getElementById('startStopBtnDesktop')?.classList.add('stop-state');
      document.getElementById('startStopBtnDesktop').innerHTML = '<i class="fas fa-stop"></i><span>Stop</span>';
      document.getElementById('nextBtn').classList.add('visible');
      document.getElementById('nextBtnDesktop')?.classList.add('visible');
      document.getElementById('micBtn').classList.add('visible');
      document.getElementById('micBtnDesktop')?.classList.add('visible');
      document.getElementById('chatToggleBtn').classList.add('visible');
      document.getElementById('chatToggleBtnDesktop')?.classList.add('visible');
      addMessage(`🔗 Connected with ${strangerUsername}!`, false, '', true);
    }
    
    function setDisconnected() {
      isConnected = false;
      document.getElementById('startStopBtn').classList.remove('stop-state');
      document.getElementById('startStopBtn').innerHTML = '<i class="fas fa-play"></i><span>Start</span>';
      document.getElementById('startStopBtnDesktop')?.classList.remove('stop-state');
      document.getElementById('startStopBtnDesktop').innerHTML = '<i class="fas fa-play"></i><span>Start</span>';
      document.getElementById('nextBtn').classList.remove('visible');
      document.getElementById('nextBtnDesktop')?.classList.remove('visible');
      document.getElementById('micBtn').classList.remove('visible');
      document.getElementById('micBtnDesktop')?.classList.remove('visible');
      document.getElementById('chatToggleBtn').classList.remove('visible', 'has-messages');
      document.getElementById('chatToggleBtnDesktop')?.classList.remove('visible', 'has-messages');
      pendingMsgCount = 0;
      resetStrangerUI();
    }
    
    async function createPeerConnection(isCaller = true, remoteOffer = null) {
      if (pc) { pc.close(); pc = null; }
      pendingICECandidates = [];
      pc = new RTCPeerConnection({ iceServers });
      if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      
      pc.ontrack = (e) => {
        const feed = document.getElementById('strangerFeed');
        if (feed.srcObject) return;
        if (e.streams[0]) {
          feed.srcObject = e.streams[0];
          feed.style.display = 'block';
          document.getElementById('strangerPlaceholder').innerHTML = '';
          document.getElementById('strangerCamera').classList.add('connected');
        }
      };
      
      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') stopChat();
      };
      
      pc.onicecandidate = async (e) => {
        if (e.candidate && roomId) {
          await addDoc(collection(db, 'rooms', roomId, 'ice'), { sender: myId, candidate: e.candidate.toJSON(), ts: serverTimestamp() });
        }
      };
      
      if (!isCaller && remoteOffer) {
        await pc.setRemoteDescription(new RTCSessionDescription(remoteOffer));
        for (const cand of pendingICECandidates) { try { await pc.addIceCandidate(cand); } catch(e) {} }
        pendingICECandidates = [];
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        return answer;
      } else {
        const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);
        return offer;
      }
    }
    
    async function listenRoomICE() {
      if (roomIceUnsub) roomIceUnsub();
      roomIceUnsub = onSnapshot(query(collection(db, 'rooms', roomId, 'ice'), orderBy('ts', 'asc')), async (snap) => {
        for (const change of snap.docChanges()) {
          if (change.type === 'added') {
            const data = change.doc.data();
            if (data.sender !== myId && pc) {
              const cand = new RTCIceCandidate(data.candidate);
              if (pc.remoteDescription && pc.remoteDescription.type) {
                try { await pc.addIceCandidate(cand); } catch(e) {}
              } else {
                pendingICECandidates.push(cand);
              }
            }
          }
        }
      });
    }
    
    window.sendChatMsg = async (text) => { if (roomId) await addDoc(collection(db, 'rooms', roomId, 'messages'), { sender: myId, text, ts: serverTimestamp(), username: currentUser }); };
    window.sendTokenFn = async (emoji, type) => { if (roomId) await addDoc(collection(db, 'rooms', roomId, 'tokens'), { sender: myId, senderUsername: currentUser, emoji, tokenType: type, ts: serverTimestamp() }); };
    
    async function startChat() {
      if (!localStream) {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: { echoCancellation: true, noiseSuppression: true } });
          document.getElementById('myFeed').srcObject = localStream;
          document.getElementById('myFeed').style.display = 'block';
          document.getElementById('myPlaceholder').style.display = 'none';
          document.getElementById('myCamera').classList.add('active');
        } catch(e) { alert('Camera permission required'); return; }
      }
      document.getElementById('strangerPlaceholder').innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Searching for stranger...</span>';
      
      // Atomic matchmaking
      const waitingSnap = await getDocs(collection(db, 'waiting'));
      let matched = null;
      for (const d of waitingSnap.docs) if (d.data().userId !== myId) { matched = d.data().userId; break; }
      
      if (matched) {
        await deleteDoc(doc(db, 'waiting', matched)).catch(()=>{});
        await deleteDoc(doc(db, 'waiting', myId)).catch(()=>{});
        roomId = [myId, matched].sort().join('_');
        const offer = await createPeerConnection(true);
        await setDoc(doc(db, 'rooms', roomId), { users: [myId, matched], createdAt: serverTimestamp() });
        await setDoc(doc(db, 'invites', matched), { from: myId, fromUsername: currentUser, offer: { type: offer.type, sdp: offer.sdp } });
        await listenRoomICE();
        // listen chat & tokens
        roomChatUnsub = onSnapshot(query(collection(db, 'rooms', roomId, 'messages'), orderBy('ts', 'asc')), (snap) => {
          snap.docChanges().forEach(ch => { if (ch.type === 'added' && ch.doc.data().sender !== myId) addMessage(ch.doc.data().text, false, ch.doc.data().username); });
        });
        roomTokenUnsub = onSnapshot(query(collection(db, 'rooms', roomId, 'tokens'), orderBy('ts', 'asc')), (snap) => {
          snap.docChanges().forEach(async ch => {
            if (ch.type === 'added' && ch.doc.data().sender !== myId) {
              const data = ch.doc.data();
              const ttype = data.tokenType;
              if (tokenBalances[ttype] !== undefined) {
                tokenBalances[ttype]++;
                updateTokenUI();
                await saveWallet();
                addMessage(`🎁 Received ${data.emoji} from ${data.senderUsername || 'Stranger'}!`, false);
                const float = document.createElement('span');
                float.className = 'gift-float';
                float.textContent = data.emoji;
                float.style.left = (Math.random() * 60 + 20) + '%';
                float.style.top = '55%';
                document.getElementById('myCamera').appendChild(float);
                setTimeout(() => float.remove(), 1500);
              }
            }
          });
        });
        setConnected('Stranger');
      } else {
        await setDoc(doc(db, 'waiting', myId), { userId: myId, username: currentUser, createdAt: serverTimestamp() });
        const inviteUnsub = onSnapshot(doc(db, 'invites', myId), async (snap) => {
          if (!snap.exists()) return;
          const data = snap.data();
          if (data.offer) {
            await deleteDoc(doc(db, 'waiting', myId)).catch(()=>{});
            await deleteDoc(doc(db, 'invites', myId)).catch(()=>{});
            roomId = [myId, data.from].sort().join('_');
            const answer = await createPeerConnection(false, data.offer);
            await setDoc(doc(db, 'rooms', roomId), { users: [myId, data.from], createdAt: serverTimestamp() });
            await setDoc(doc(db, 'invites', data.from), { answer: { type: answer.type, sdp: answer.sdp } });
            await listenRoomICE();
            roomChatUnsub = onSnapshot(query(collection(db, 'rooms', roomId, 'messages'), orderBy('ts', 'asc')), (snap) => {
              snap.docChanges().forEach(ch => { if (ch.type === 'added' && ch.doc.data().sender !== myId) addMessage(ch.doc.data().text, false, ch.doc.data().username); });
            });
            roomTokenUnsub = onSnapshot(query(collection(db, 'rooms', roomId, 'tokens'), orderBy('ts', 'asc')), (snap) => {
              snap.docChanges().forEach(async ch => {
                if (ch.type === 'added' && ch.doc.data().sender !== myId) {
                  const data = ch.doc.data();
                  const ttype = data.tokenType;
                  if (tokenBalances[ttype] !== undefined) {
                    tokenBalances[ttype]++;
                    updateTokenUI();
                    await saveWallet();
                    addMessage(`🎁 Received ${data.emoji} from ${data.senderUsername || 'Stranger'}!`, false);
                    const float = document.createElement('span');
                    float.className = 'gift-float';
                    float.textContent = data.emoji;
                    float.style.left = (Math.random() * 60 + 20) + '%';
                    float.style.top = '55%';
                    document.getElementById('myCamera').appendChild(float);
                    setTimeout(() => float.remove(), 1500);
                  }
                }
              });
            });
            setConnected(data.fromUsername || 'Stranger');
            inviteUnsub();
          }
        });
        unsubs.push(inviteUnsub);
      }
    }
    
    async function stopChat() {
      if (pc) { pc.close(); pc = null; }
      cleanupRoom();
      pendingICECandidates = [];
      if (roomId) {
        const rid = roomId;
        setTimeout(async () => {
          await deleteDoc(doc(db, 'rooms', rid)).catch(()=>{});
          const msgs = await getDocs(collection(db, 'rooms', rid, 'messages'));
          msgs.forEach(d => deleteDoc(d.ref).catch(()=>{}));
          const tokens = await getDocs(collection(db, 'rooms', rid, 'tokens'));
          tokens.forEach(d => deleteDoc(d.ref).catch(()=>{}));
          const ice = await getDocs(collection(db, 'rooms', rid, 'ice'));
          ice.forEach(d => deleteDoc(d.ref).catch(()=>{}));
        }, 8000);
        roomId = null;
      }
      await deleteDoc(doc(db, 'waiting', myId)).catch(()=>{});
      await deleteDoc(doc(db, 'invites', myId)).catch(()=>{});
      setDisconnected();
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
        document.getElementById('myFeed').style.display = 'none';
        document.getElementById('myFeed').srcObject = null;
        document.getElementById('myPlaceholder').style.display = '';
        document.getElementById('myCamera').classList.remove('active');
      }
      chatMessages.innerHTML = '';
      chatBox.classList.add('hidden');
      chatVisible = false;
    }
    
    function toggleMute() {
      if (!localStream) return;
      const audio = localStream.getAudioTracks()[0];
      if (audio) {
        isMuted = !isMuted;
        audio.enabled = !isMuted;
        document.getElementById('micBtn').classList.toggle('muted', isMuted);
        document.getElementById('micBtnDesktop')?.classList.toggle('muted', isMuted);
        const icon = isMuted ? 'fa-microphone-slash' : 'fa-microphone';
        document.getElementById('micBtn').querySelector('i').className = `fas ${icon}`;
        document.getElementById('micBtnDesktop').querySelector('i').className = `fas ${icon}`;
      }
    }
    
    document.getElementById('startStopBtn').onclick = () => { if (document.getElementById('startStopBtn').classList.contains('stop-state')) stopChat(); else startChat(); };
    document.getElementById('startStopBtnDesktop').onclick = () => { if (document.getElementById('startStopBtnDesktop').classList.contains('stop-state')) stopChat(); else startChat(); };
    document.getElementById('nextBtn').onclick = () => { stopChat(); setTimeout(startChat, 500); };
    document.getElementById('nextBtnDesktop').onclick = () => { stopChat(); setTimeout(startChat, 500); };
    document.getElementById('micBtn').onclick = toggleMute;
    document.getElementById('micBtnDesktop').onclick = toggleMute;
    
    window.addEventListener('beforeunload', () => { if (pc) pc.close(); if (localStream) localStream.getTracks().forEach(t => t.stop()); saveWallet(); });
  </script>
</body>
