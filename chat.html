<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overscroll-behavior:none; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    
    .scrollable-page {
      flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
      display:flex;flex-direction:column;background:#000;
      padding-bottom:6rem;
    }
    .scrollable-page::-webkit-scrollbar { width:0;height:0; }
    .scrollable-page { scrollbar-width:none;-ms-overflow-style:none; }

    .top-icons {
      width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;
      padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0;position:relative;background:#000;
      margin:0 auto;
    }
    .corner-btn {
      width:2.4rem;height:2.4rem;background:#1a1a1a;border-radius:50%;color:#fff;
      font-size:1rem;display:flex;align-items:center;justify-content:center;
      text-decoration:none;border:1px solid #333;cursor:pointer;transition:all 0.3s;
    }
    .top-brand {
      font-size:2rem;font-weight:700;color:#fff;letter-spacing:3px;
      font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;
      position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;
      line-height:1;font-style:italic;
    }

    .chat-header {
      display:flex;align-items:center;gap:0.6rem;
      padding:0.3rem 1rem 0.5rem 1rem;
      background:#000;flex-shrink:0;
    }
    .chat-back {
      width:2.4rem;height:2.4rem;min-width:2.4rem;
      background:#1a1a1a;border-radius:50%;color:#fff;font-size:1rem;
      display:none;align-items:center;justify-content:center;
      border:1px solid #333;cursor:pointer;
    }
    .chat-back.show {display:flex;}
    .chat-partner-info {flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;justify-content:center;}
    .chat-partner-name {font-size:0.95rem;font-weight:600;color:#fff;}
    .chat-partner-status {font-size:0.65rem;color:#4ade80;display:flex;align-items:center;gap:0.2rem;}
    .chat-partner-status .dot {width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block;}
    .call-btns {display:none;align-items:center;gap:0.5rem;}
    .call-btns.show {display:flex;}
    .call-btn {width:2.2rem;height:2.2rem;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;cursor:pointer;border:none;transition:all 0.2s;}
    .call-btn.video-call {color:#4ade80;}.call-btn.audio-call {color:#60a5fa;}

    .search-bar-container {padding:0.3rem 1rem 0.5rem 1rem;background:#000;flex-shrink:0;}
    .search-bar {display:flex;align-items:center;gap:0.5rem;background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:1.5rem;padding:0.45rem 0.8rem;}
    .search-bar i {color:#666;font-size:0.75rem;}
    .search-bar input {flex:1;background:transparent;border:none;color:#fff;font-size:0.8rem;outline:none;}
    .search-bar input::placeholder {color:#555;}

    .chat-list-full {display:flex;flex-direction:column;flex:1;min-height:0;}
    .chat-list-full.hidden {display:none;}
    .chat-list-header {padding:0.5rem 1rem;font-size:0.6rem;color:#666;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .user-list-item {display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.02);}
    .user-list-item.active {background:rgba(255,252,0,0.06);}
    .user-avatar {width:48px;height:48px;border-radius:50%;background:#1a1a1a;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;font-weight:700;flex-shrink:0;}
    .user-avatar img {width:100%;height:100%;object-fit:cover;}
    .user-info {flex:1;min-width:0;}
    .user-name-row {display:flex;align-items:center;justify-content:space-between;}
    .user-name {font-size:0.85rem;color:#fff;font-weight:500;cursor:pointer;}
    .user-name:hover {color:#3897f0;}
    .user-time {font-size:0.6rem;color:#555;flex-shrink:0;}
    .user-msg-row {display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
    .user-last-msg {font-size:0.7rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
    .user-last-msg.unread-msg {color:#fff;font-weight:500;}
    .unread-count {background:#FFFC00;color:#000;font-size:0.6rem;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    .chat-view {display:none;flex-direction:column;flex:1;min-height:0;}
    .chat-view.show {display:flex;}
    .messages-container {flex:1;overflow-y:auto;padding:0.8rem 0.8rem 0.5rem 0.8rem;display:flex;flex-direction:column;gap:0.2rem;background:#000;}
    .messages-container::-webkit-scrollbar {width:0;}
    .message-wrapper {display:flex;max-width:85%;animation:fadeInUp 0.25s ease-out;}
    .message-wrapper.sent {align-self:flex-end;flex-direction:row-reverse;}
    .message-wrapper.received {align-self:flex-start;}
    @keyframes fadeInUp {from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .message-bubble {padding:0.55rem 0.8rem;border-radius:1.2rem;font-size:0.85rem;line-height:1.3;word-break:break-word;}
    .sent .message-bubble {background:#FFFC00;color:#000;border-bottom-right-radius:0.3rem;}
    .received .message-bubble {background:#111;color:#fff;border-bottom-left-radius:0.3rem;}
    .message-time {font-size:0.55rem;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem;}
    .sent .message-time {justify-content:flex-end;color:rgba(0,0,0,0.45);}
    .received .message-time {color:rgba(255,255,255,0.35);}
    .voice-msg {display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.8rem;cursor:pointer;min-width:180px;}
    .voice-play-btn {width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.2);border:none;color:#fff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sent .voice-play-btn {color:#000;background:rgba(0,0,0,0.15);}
    .voice-wave-container {flex:1;display:flex;align-items:center;gap:1px;height:28px;}
    .voice-wave-bar {width:2px;border-radius:1px;opacity:0.6;}
    .sent .voice-wave-bar {background:#000;}.received .voice-wave-bar {background:#fff;}
    .voice-duration {font-size:0.55rem;opacity:0.7;min-width:60px;text-align:right;}
    .message-image {max-width:200px;max-height:200px;border-radius:0.8rem;object-fit:cover;cursor:pointer;}

    .recording-bar {display:none;align-items:center;gap:0.5rem;padding:0.4rem 1rem;background:#0a0a0a;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
    .recording-bar.show {display:flex;}
    .recording-dot {width:10px;height:10px;border-radius:50%;background:#ef4444;animation:recPulse 0.8s infinite;}
    @keyframes recPulse {0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
    .recording-time-text {color:#ef4444;font-size:0.85rem;font-weight:600;}
    .recording-cancel {margin-left:auto;background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer;}
    .recording-send {width:38px;height:38px;border-radius:50%;background:#FFFC00;border:none;color:#000;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    .typing-bubble {display:none;align-self:flex-start;padding:0.45rem 0.8rem;background:#111;border-radius:1rem;gap:0.2rem;}
    .typing-bubble.show {display:flex;align-items:center;}
    .typing-bubble .tb-dot {width:5px;height:5px;border-radius:50%;background:#888;animation:typingBounce 0.5s infinite alternate;}
    .typing-bubble .tb-dot:nth-child(2) {animation-delay:0.15s;}.typing-bubble .tb-dot:nth-child(3) {animation-delay:0.3s;}
    @keyframes typingBounce {0%{transform:translateY(0);opacity:0.4;}100%{transform:translateY(-4px);opacity:1;}}

    .chat-input-area {display:none;align-items:center;gap:0.4rem;padding:0.5rem 0.8rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));background:#000;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:50;}
    .chat-input-area.show {display:flex;}
    .camera-btn,.mic-btn {width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
    .chat-input {flex:1;padding:0.6rem 1rem;border-radius:1.5rem;border:1px solid rgba(255,255,255,0.12);background:#0a0a0a;color:#fff;font-size:0.85rem;outline:none;}
    .chat-input:focus {border-color:#FFFC00;}
    .send-btn {width:38px;height:38px;border-radius:50%;background:#FFFC00;border:none;color:#000;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}

    .empty-chat {flex:1;display:flex;align-items:center;justify-content:center;color:#333;font-size:0.8rem;}

    .contacts-overlay {position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:400;display:none;align-items:center;justify-content:center;padding:1rem;}
    .contacts-overlay.show {display:flex;}
    .contacts-modal {background:#111;border-radius:1rem;padding:1.2rem;width:100%;max-width:360px;max-height:70vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.1);}
    .contacts-modal h3 {font-size:0.9rem;color:#fff;margin-bottom:0.8rem;text-align:center;}
    .contacts-modal input {width:100%;padding:0.6rem 0.8rem;border-radius:0.5rem;border:1px solid #222;background:#0a0a0a;color:#fff;font-size:0.8rem;margin-bottom:0.6rem;outline:none;}
    .contact-item {display:flex;align-items:center;gap:0.6rem;padding:0.6rem;border-radius:0.5rem;cursor:pointer;color:#fff;font-size:0.8rem;}
    .contact-avatar {width:32px;height:32px;border-radius:50%;background:#1a1a1a;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.7rem;flex-shrink:0;}
    .contact-avatar img {width:100%;height:100%;object-fit:cover;}
    .contact-name {flex:1;}
    .contact-close {text-align:center;margin-top:0.6rem;color:#ef4444;cursor:pointer;font-size:0.75rem;padding:0.4rem;}

    .loading-screen {position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem;}
    .loading-screen i {font-size:2rem;color:#3897f0;animation:spin 1s infinite;}
    .loading-screen span {font-size:0.75rem;color:#888;}

    .floating-nav { 
      position:fixed;bottom:max(1rem,env(safe-area-inset-bottom,1rem));
      left:50%;transform:translateX(-50%);width:92%;max-width:500px;
      background:rgba(10,10,10,0.1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,0.05);z-index:100;
      box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.03);transition:all 0.3s ease;
    }
    .floating-nav:hover {background:rgba(10,10,10,0.15);}
    .floating-nav.hidden {display:none;}
    .nav-center {display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem;}
    .nav-center a {color:rgba(255,255,255,0.8);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative;background:transparent;}
    .nav-center a:hover {color:#fff;background:rgba(255,255,255,0.15);transform:translateY(-2px);}
    .nav-center a::before {content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s;}
    .nav-center a.active {color:#fff;background:rgba(255,255,255,0.2);box-shadow:0 0 20px rgba(255,255,255,0.15);}
    .nav-center a.active::before {transform:translateX(-50%) scale(1);}
    .nav-upload,.nav-search {display:none !important;}

    @media (min-width:1024px) {
      .top-icons {display:none;}
      .nav-upload,.nav-search{display:flex!important}
      .floating-nav{position:fixed;top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column;background:rgba(10,10,10,0.1);backdrop-filter:blur(20px);}
      .floating-nav.hidden{display:flex!important}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .page{padding:0 0 0 5.5rem}
      .scrollable-page{max-width:550px;margin:0 auto;width:100%}
    }
    @media (max-width:380px) {
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:max(0.8rem,env(safe-area-inset-bottom,0.8rem));background:rgba(10,10,10,0.1);}
      .nav-center a{font-size:1.1rem;width:2rem;height:2rem}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen"><i class="fas fa-spinner"></i><span>Loading...</span></div>
  <div class="page" id="mainPage" style="display:none;">
    <div class="scrollable-page" id="scrollablePage">
      <div class="top-icons">
        <a href="hart.html" class="corner-btn" title="Likes"><i class="fas fa-heart"></i></a>
        <span class="top-brand">massages</span>
        <button class="corner-btn" id="newChatBtn" onclick="showNewChatModal()"><i class="fas fa-plus"></i></button>
      </div>

      <div class="chat-header">
        <button class="chat-back" id="backBtn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-partner-info" id="partnerInfo" onclick="goToPartnerProfile()">
          <div class="chat-partner-name" id="partnerName"></div>
          <div class="chat-partner-status" id="partnerStatus"></div>
        </div>
        <div class="call-btns" id="callBtns">
          <button class="call-btn audio-call" onclick="startCall('audio')"><i class="fas fa-phone"></i></button>
          <button class="call-btn video-call" onclick="startCall('video')"><i class="fas fa-video"></i></button>
        </div>
      </div>

      <div class="search-bar-container" id="searchBarContainer">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="chatSearchInput" placeholder="Search messages..." oninput="filterChatList()">
        </div>
      </div>

      <div class="chat-list-full" id="chatListFull">
        <div class="chat-list-header">Messages <span id="chatCount"></span></div>
        <div id="userList"></div>
      </div>
      <div class="chat-view" id="chatView">
        <div class="messages-container" id="messagesContainer">
          <div class="empty-chat" id="emptyChat">Send a message!</div>
          <div class="typing-bubble" id="typingBubble"><div class="tb-dot"></div><div class="tb-dot"></div><div class="tb-dot"></div></div>
        </div>
        <div class="recording-bar" id="recordingBar"><div class="recording-dot"></div><span class="recording-time-text" id="recTime">00:00</span><button class="recording-cancel" onclick="cancelVoice()">✕</button><button class="recording-send" onclick="sendVoice()"><i class="fas fa-paper-plane"></i></button></div>
      </div>
    </div>

    <div class="chat-input-area" id="chatInputArea">
      <button class="camera-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
      <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
      <button class="mic-btn" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div class="contacts-overlay" id="newChatModal">
      <div class="contacts-modal">
        <h3>👥 New Chat</h3>
        <input type="text" id="contactSearch" placeholder="Search users..." oninput="filterContacts()">
        <div id="contactList"></div>
        <div class="contact-close" onclick="closeNewChatModal()">Close ✕</div>
      </div>
    </div>
    
    <nav class="floating-nav" id="floatingNav">
      <div class="nav-center">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="web.html"><i class="fas fa-globe"></i></a>
        <a href="reel.html"><i class="fas fa-film"></i></a>
        <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
        <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
      </div>
    </nav>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, updateDoc, increment, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    if(!localStorage.getItem("uid")){window.location.replace("login.html");}
    const currentUser=localStorage.getItem('currentUser')||'@anonymous',currentUserId=currentUser.replace('@','');
    let chatPartner=null,chatId=null,unsubMessages=null,unsubChatList=null,allUsersList=[],chatListData=[],userProfiles={};
    let mediaRecorder=null,audioChunks=[],voiceTimer=null,voiceSeconds=0,isRecording=false;
    
    document.getElementById('loadingScreen').style.display='none';document.getElementById('mainPage').style.display='flex';
    loadAllUsers();setupRealtimeChatList();
    
    function cleanName(u){return(u||'').replace(/^@/,'');}
    function formatDuration(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
    window.goToPartnerProfile=function(){if(chatPartner)window.location.href='profile.html?user='+encodeURIComponent(chatPartner);};
    window.filterChatList=function(){const s=document.getElementById('chatSearchInput').value.toLowerCase();renderChatList(s?chatListData.filter(c=>dispName(c.username).toLowerCase().includes(s)||(c.lastMsg&&c.lastMsg.toLowerCase().includes(s))):chatListData);};
    
    async function loadAllUsers(){allUsersList=[];userProfiles={};try{const snap=await getDocs(collection(db,'users'));snap.forEach(doc=>{const d=doc.data();if(d.username!==currentUser){const c=cleanName(d.username);allUsersList.push({username:d.username,displayName:c,avatar:d.avatar||null});userProfiles[d.username]={name:c,avatar:d.avatar||null};}});}catch(e){}const profile=JSON.parse(localStorage.getItem('userProfile')||'{}');[...(profile.friends||[]),...(profile.besties||[])].forEach(f=>{const u=f.name;if(u&&u!==currentUser){if(!allUsersList.find(x=>x.username===u)){allUsersList.push({username:u,displayName:cleanName(u),avatar:f.avatar||null});}if(!userProfiles[u])userProfiles[u]={name:cleanName(u),avatar:null};if(f.avatar)userProfiles[u].avatar=f.avatar;}});}
    function avatarHTML(u){const p=userProfiles[u];if(p&&p.avatar&&p.avatar!=='null'&&p.avatar!=='undefined'){return`<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='${cleanName(u).charAt(0).toUpperCase()}';"/>`;}return cleanName(u).charAt(0).toUpperCase();}
    function dispName(u){const p=userProfiles[u];return p?p.name:cleanName(u);}
    
    window.showNewChatModal=function(){document.getElementById('newChatModal').classList.add('show');document.getElementById('contactSearch').value='';renderContactList(allUsersList);};
    window.closeNewChatModal=function(){document.getElementById('newChatModal').classList.remove('show');};
    window.filterContacts=function(){const s=document.getElementById('contactSearch').value.toLowerCase();renderContactList(allUsersList.filter(u=>u.displayName.toLowerCase().includes(s)));};
    function renderContactList(users){const l=document.getElementById('contactList');if(users.length===0){l.innerHTML='<p style="color:#666;text-align:center;padding:1rem;font-size:0.75rem;">No users found</p>';return;}l.innerHTML=users.map(u=>`<div class="contact-item" onclick="startNewChat('${u.username}')"><div class="contact-avatar">${avatarHTML(u.username)}</div><span class="contact-name">${u.displayName}</span><i class="fas fa-comment" style="color:#FFFC00;font-size:0.7rem;"></i></div>`).join('');}
    window.startNewChat=function(u){closeNewChatModal();openChat(u);};
    document.getElementById('newChatModal').addEventListener('click',function(e){if(e.target===this)closeNewChatModal();});
    
    // ✅ FIXED: Chat list with proper query for current user's chats
    function setupRealtimeChatList(){
      if(unsubChatList)unsubChatList();
      
      // Query all chats and filter client-side for ones containing current user
      const q = query(
        collection(db,'chats'),
        orderBy('lastTime','desc')
      );
      
      unsubChatList = onSnapshot(q,(snap)=>{
        const chats = [];
        
        snap.forEach(docSnap=>{
          const data = docSnap.data();
          const ids = docSnap.id.split('_');
          
          // Only show chats where current user is a participant
          if(ids.includes(currentUserId)){
            const partnerId = ids.find(i=>i!==currentUserId);
            if(partnerId && data.lastMessage !== undefined){
              chats.push({
                username:'@'+partnerId,
                lastMsg: data.lastType==='image'?'📷 Photo':
                         data.lastType==='audio'?'🎤 Voice':
                         data.lastMessage || '',
                lastTime: data.lastTime?.toDate() || new Date(0),
                unreadCount: data['unread_'+currentUserId] || 0
              });
            }
          }
        });
        
        chatListData = chats;
        renderChatList(chats);
      },(error)=>{
        console.error('Chat list error:',error);
      });
    }
    
    function renderChatList(cu){const l=document.getElementById('userList'),cnt=document.getElementById('chatCount');const tu=cu.reduce((s,c)=>s+c.unreadCount,0);cnt.textContent=cu.length>0?'('+cu.length+')':'';if(cu.length===0){l.innerHTML='<div style="text-align:center;color:#555;padding:3rem;font-size:0.8rem;">No messages yet</div>';return;}l.innerHTML=cu.map(c=>{const ts=c.lastTime.getTime()>0?fmtTime(c.lastTime):'';const dn=dispName(c.username);return`<div class="user-list-item ${chatPartner===c.username?'active':''}" onclick="openChat('${c.username}')"><div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.username)}'">${avatarHTML(c.username)}</div><div class="user-info"><div class="user-name-row"><span class="user-name" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.username)}'">${dn}</span><span class="user-time">${ts}</span></div><div class="user-msg-row"><span class="user-last-msg ${c.unreadCount>0?'unread-msg':''}">${c.lastMsg||'No messages'}</span>${c.unreadCount>0?`<span class="unread-count">${c.unreadCount}</span>`:''}</div></div></div>`;}).join('');}
    function fmtTime(d){if(!d||d.getTime()===0)return'';const n=new Date(),df=n-d;if(df<60000)return'Now';if(df<3600000)return Math.floor(df/60000)+'m';if(d.toDateString()===n.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(n-d<604800000)return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];return d.toLocaleDateString([],{month:'short',day:'numeric'});}
    
    window.openChat=function(u){
      chatPartner=u;
      chatId=[currentUserId,u.replace('@','')].sort().join('_');
      
      // Reset unread count for current user
      updateDoc(doc(db,'chats',chatId),{
        ['unread_'+currentUserId]: 0
      }).catch(()=>{});
      
      document.getElementById('chatListFull').classList.add('hidden');
      document.getElementById('chatView').classList.add('show');
      document.getElementById('backBtn').classList.add('show');
      document.getElementById('searchBarContainer').style.display='none';
      document.getElementById('callBtns').classList.add('show');
      document.getElementById('partnerName').textContent=dispName(u);
      document.getElementById('partnerStatus').innerHTML='<span class="dot"></span> online';
      document.getElementById('chatInputArea').classList.add('show');
      document.getElementById('floatingNav').classList.add('hidden');
      const c=document.getElementById('messagesContainer');
      c.querySelectorAll('.message-wrapper').forEach(el=>el.remove());
      document.getElementById('emptyChat').style.display='flex';
      listenToMessages();
      listenToTyping();
      scrollToBottom();
    };
    
    window.goBack=function(){
      chatPartner=null;chatId=null;
      if(unsubMessages){unsubMessages();unsubMessages=null;}
      stopVoice(true);
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('backBtn').classList.remove('show');
      document.getElementById('searchBarContainer').style.display='block';
      document.getElementById('callBtns').classList.remove('show');
      document.getElementById('partnerName').textContent='';
      document.getElementById('partnerStatus').textContent='';
      document.getElementById('chatInputArea').classList.remove('show');
      document.getElementById('floatingNav').classList.remove('hidden');
    };
    
    window.toggleVoice=function(){if(isRecording){window.sendVoice();}else{startVoice();}};
    async function startVoice(){if(!chatId)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,sampleRate:44100}});const opts={audioBitsPerSecond:128000};if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))opts.mimeType='audio/webm;codecs=opus';else opts.mimeType='audio/webm';mediaRecorder=new MediaRecorder(stream,opts);audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());};mediaRecorder.start(100);isRecording=true;voiceSeconds=0;document.getElementById('recordingBar').classList.add('show');document.getElementById('micBtn').style.display='none';document.getElementById('sendBtn').style.display='none';document.getElementById('chatInput').style.display='none';document.getElementById('recTime').textContent='00:00';voiceTimer=setInterval(()=>{voiceSeconds++;document.getElementById('recTime').textContent=formatDuration(voiceSeconds);},1000);}catch(e){}}
    function stopVoice(c){if(mediaRecorder&&isRecording){if(c)audioChunks=[];if(mediaRecorder.state==='recording')mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block';}}
    window.cancelVoice=function(){stopVoice(true);};
    
    // ✅ FIXED: Creates chat doc if doesn't exist, then updates
    async function ensureChatDoc(){
      const chatRef = doc(db,'chats',chatId);
      const chatSnap = await getDoc(chatRef);
      if(!chatSnap.exists()){
        // Create chat document with both users
        await setDoc(chatRef,{
          users: [currentUserId, chatPartner.replace('@','')],
          unread_adil: 0,
          unread_rahul: 0,
          lastMessage: '',
          lastType: 'text',
          lastTime: serverTimestamp()
        });
      }
    }
    
    window.sendVoice=async function(){
      if(!mediaRecorder||!isRecording)return;
      if(voiceSeconds<1){stopVoice(true);return;}
      mediaRecorder.onstop=async()=>{
        const mimeType=mediaRecorder.mimeType||'audio/webm';
        const blob=new Blob(audioChunks,{type:mimeType});
        const reader=new FileReader();
        reader.onload=async function(e){
          try{
            await ensureChatDoc();
            
            await addDoc(collection(db,'chats',chatId,'messages'),{
              audioUrl:e.target.result,
              audioDuration:voiceSeconds,
              audioMime:mimeType,
              sender:currentUserId,
              createdAt:serverTimestamp(),
              seen:false
            });
            
            await updateDoc(doc(db,'chats',chatId),{
              lastMessage:'🎤 Voice message',
              lastType:'audio',
              lastTime:serverTimestamp(),
              ['unread_'+chatPartner.replace('@','')]: increment(1)
            });
          }catch(err){console.error('Send voice error:',err);}
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.stop();
      isRecording=false;
      clearInterval(voiceTimer);
      document.getElementById('recordingBar').classList.remove('show');
      document.getElementById('micBtn').style.display='flex';
      document.getElementById('sendBtn').style.display='flex';
      document.getElementById('chatInput').style.display='block';
    };
    
    window.playVoice=function(el){const audioUrl=el.getAttribute('data-audio');const btn=el.querySelector('.voice-play-btn i');const ds=el.querySelector('.voice-duration');const td=parseFloat(el.getAttribute('data-duration')||'0');document.querySelectorAll('.voice-msg').forEach(m=>{if(m!==el&&m._audio){m._audio.pause();const ob=m.querySelector('.voice-play-btn i');if(ob)ob.className='fas fa-play';const od=m.querySelector('.voice-duration');if(od&&m._totalDur)od.textContent='0:00 / '+formatDuration(m._totalDur);}});if(!el._audio){el._audio=new Audio(audioUrl);el._totalDur=td;if(ds)ds.textContent='0:00 / '+formatDuration(td);el._audio.ontimeupdate=()=>{if(ds&&el._audio&&el._totalDur)ds.textContent=formatDuration(el._audio.currentTime)+' / '+formatDuration(el._totalDur);};el._audio.onended=()=>{btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent='0:00 / '+formatDuration(el._totalDur);};}const audio=el._audio;if(audio.paused){audio.play().catch(()=>{});btn.className='fas fa-pause';}else{audio.pause();btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent=formatDuration(audio.currentTime)+' / '+formatDuration(el._totalDur);}};
    
    function listenToMessages(){if(unsubMessages){unsubMessages();unsubMessages=null;}const messagesRef=collection(db,'chats',chatId,'messages');const q=query(messagesRef,orderBy('createdAt','asc'));getDocs(q).then(snap=>{const c=document.getElementById('messagesContainer');const ec=document.getElementById('emptyChat');if(snap.empty){ec.style.display='flex';}else{ec.style.display='none';c.querySelectorAll('.message-wrapper').forEach(el=>el.remove());snap.forEach(doc=>{renderMsg(doc.id,doc.data());});scrollToBottom();}}).catch(err=>{console.error(err);});unsubMessages=onSnapshot(q,(snap)=>{const c=document.getElementById('messagesContainer');const ec=document.getElementById('emptyChat');if(snap.empty){ec.style.display='flex';return;}ec.style.display='none';snap.docChanges().forEach(ch=>{if(ch.type==='added'&&!document.getElementById('msg-'+ch.doc.id)){renderMsg(ch.doc.id,ch.doc.data());scrollToBottom();}});},(error)=>{console.error(error);});}
    function renderMsg(id,msg){const c=document.getElementById('messagesContainer');const tb=document.getElementById('typingBubble');const isSent=msg.sender===currentUserId;if(document.getElementById('msg-'+id))return;const w=document.createElement('div');w.className='message-wrapper '+(isSent?'sent':'received');w.id='msg-'+id;let time='';if(msg.createdAt){try{time=new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch(e){}}if(msg.imageUrl){w.innerHTML=`<div class="message-bubble"><img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')" loading="lazy"><div class="message-time">${time}</div></div>`;}else if(msg.audioUrl){const dur=msg.audioDuration||0;w.innerHTML=`<div class="message-bubble voice-msg" data-audio="${msg.audioUrl}" data-duration="${dur}" onclick="playVoice(this)"><button class="voice-play-btn"><i class="fas fa-play"></i></button><div class="voice-wave-container">${genBars(18)}</div><span class="voice-duration">0:00 / ${formatDuration(dur)}</span><div class="message-time">${time}</div></div>`;}else{w.innerHTML=`<div class="message-bubble">${msg.text||''}<div class="message-time">${time}</div></div>`;}c.insertBefore(w,tb);if(!isSent&&!msg.seen){setDoc(doc(db,'chats',chatId,'messages',id),{seen:true},{merge:true}).catch(()=>{});}}
    function genBars(n){let h='';for(let i=0;i<n;i++){h+=`<div class="voice-wave-bar" style="height:${Math.floor(Math.random()*22)+4}px;"></div>`;}return h;}
    
    // ✅ FIXED: Creates chat doc if doesn't exist
    window.sendImage=async function(e){
      const file=e.target.files[0];
      if(!file||!chatId)return;
      const r=new FileReader();
      r.onload=async function(ev){
        try{
          await ensureChatDoc();
          
          await addDoc(collection(db,'chats',chatId,'messages'),{
            imageUrl:ev.target.result,
            sender:currentUserId,
            createdAt:serverTimestamp(),
            seen:false
          });
          
          await updateDoc(doc(db,'chats',chatId),{
            lastMessage:'📷 Photo',
            lastType:'image',
            lastTime:serverTimestamp(),
            ['unread_'+chatPartner.replace('@','')]: increment(1)
          });
        }catch(err){console.error('Send image error:',err);}
      };
      r.readAsDataURL(file);
      e.target.value='';
    };
    
    // ✅ FIXED: Creates chat doc if doesn't exist
    window.sendMessage=async function(){
      const input=document.getElementById('chatInput');
      const text=input.value.trim();
      if(!text||!chatId)return;
      input.value='';
      try{
        await ensureChatDoc();
        
        await addDoc(collection(db,'chats',chatId,'messages'),{
          text,
          sender:currentUserId,
          createdAt:serverTimestamp(),
          seen:false
        });
        
        await updateDoc(doc(db,'chats',chatId),{
          lastMessage:text,
          lastType:'text',
          lastTime:serverTimestamp(),
          ['unread_'+chatPartner.replace('@','')]: increment(1)
        });
      }catch(e){console.error('Send message error:',e);}
    };
    
    function listenToTyping(){const pid=chatPartner.replace('@','');onSnapshot(doc(db,'chats',chatId,'typing',pid),snap=>{const d=snap.data();const st=document.getElementById('partnerStatus');const tb=document.getElementById('typingBubble');if(d&&d.typing){st.innerHTML='<span class="dot"></span> typing...';tb.classList.add('show');}else{st.innerHTML='<span class="dot"></span> online';tb.classList.remove('show');}});}
    let typingTimeout;document.getElementById('chatInput').addEventListener('input',function(){if(!chatId)return;setDoc(doc(db,'chats',chatId,'typing',currentUserId),{typing:true,updatedAt:serverTimestamp()});clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>{setDoc(doc(db,'chats',chatId,'typing',currentUserId),{typing:false,updatedAt:serverTimestamp()});},2000);});
    document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
    function scrollToBottom(){const c=document.getElementById('messagesContainer');setTimeout(()=>{if(c)c.scrollTop=c.scrollHeight;},100);}
  </script>
</body>
</html>
