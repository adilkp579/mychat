<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Watch Live Stream</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .page {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    /* Header overlay */
    .live-header {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top, 1rem));
      left: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      pointer-events: none;
    }
    .live-header > * {
      pointer-events: auto;
    }
    .live-badge-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .live-text {
      color: #ef4444;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .viewer-count {
      color: #ccc;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .host-name {
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    /* Close button */
    .close-btn {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top, 1rem));
      right: 1rem;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .close-btn:hover {
      background: rgba(239,68,68,0.3);
    }
    /* Main video container - full screen host video */
    .main-video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      width: 100%;
      height: 100%;
    }
    .main-video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
    /* Video placeholder */
    .video-placeholder {
      text-align: center;
      color: #555;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .video-placeholder i {
      font-size: 4rem;
      display: block;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    .video-placeholder p {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    /* Bottom actions */
    .bottom-actions {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2rem;
      z-index: 20;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1.4rem;
      transition: all 0.2s;
      padding: 0.3rem;
    }
    .action-btn span {
      font-size: 0.6rem;
      font-weight: 500;
      opacity: 0.8;
    }
    .action-btn:hover {
      transform: scale(1.1);
    }
    .action-btn.liked {
      color: #ef4444;
    }
    .action-btn.liked i {
      animation: heartBeat 0.3s ease;
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    /* Comment section */
    .comment-section {
      position: absolute;
      bottom: 7rem;
      left: 1rem;
      right: 1rem;
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .comment-list {
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 0 0.3rem;
      pointer-events: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .comment-list::-webkit-scrollbar {
      display: none;
    }
    .comment-item {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      padding: 0.4rem 0.8rem;
      border-radius: 1.2rem;
      color: #fff;
      font-size: 0.8rem;
      align-self: flex-start;
      max-width: 85%;
      word-break: break-word;
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }
    .comment-username {
      font-weight: 700;
      color: #fbbf24;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .comment-input-row {
      display: flex;
      gap: 0.5rem;
      pointer-events: auto;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      padding: 0.5rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .comment-input-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .comment-input-row input::placeholder {
      color: #aaa;
    }
    .comment-send-btn {
      background: #ef4444;
      border: none;
      color: #fff;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .comment-send-btn:hover {
      background: #dc2626;
    }
    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      gap: 0.8rem;
    }
    .loading-overlay i {
      font-size: 2.5rem;
      color: #ef4444;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-overlay span {
      font-size: 0.85rem;
      color: #ccc;
    }
    .loading-overlay button {
      margin-top: 1rem;
      padding: 0.6rem 2rem;
      border-radius: 2rem;
      border: none;
      background: #333;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .loading-overlay button:hover {
      background: #444;
    }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 10rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      z-index: 60;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toast.show {
      opacity: 1;
    }
    @media (max-width: 380px) {
      .bottom-actions {
        gap: 1.5rem;
        padding: 0.7rem 1.5rem;
      }
      .comment-section {
        bottom: 6rem;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="mainPage" style="display:none;">
    <!-- Header -->
    <div class="live-header">
      <div class="live-badge-row">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
        <span class="viewer-count" id="viewerCount">0 watching</span>
      </div>
      <div class="host-name" id="hostName">@user</div>
    </div>

    <!-- Close button -->
    <button class="close-btn" onclick="closeLive()">
      <i class="fas fa-times"></i>
    </button>
    
    <!-- Main video container (host only) -->
    <div class="main-video-container" id="videoContainer">
      <div class="video-placeholder" id="videoPlaceholder">
        <i class="fas fa-video"></i>
        <p>Waiting for stream...</p>
      </div>
      <video id="remoteVideo" autoplay playsinline style="display:none;"></video>
    </div>

    <!-- Comment section (replaces self-view) -->
    <div class="comment-section">
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-row">
        <input type="text" id="commentInput" placeholder="Add a comment..." maxlength="150" autocomplete="off" />
        <button class="comment-send-btn" onclick="sendComment()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Bottom actions: only like and share (no mic/camera) -->
    <div class="bottom-actions">
      <button class="action-btn" id="likeBtn" onclick="toggleLike()">
        <i class="far fa-heart"></i>
        <span id="likeCount">Like</span>
      </button>
      <button class="action-btn" onclick="shareLive()">
        <i class="fas fa-share"></i>
        <span>Share</span>
      </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    <span id="loadingText">Connecting to live stream...</span>
    <button onclick="window.location.href='index.html'" style="display:none;" id="goBackBtn">Go Back</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      onSnapshot, 
      setDoc, 
      updateDoc, 
      increment, 
      serverTimestamp,
      deleteDoc,
      collection,
      addDoc,
      query,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc123"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get parameters
    const urlParams = new URLSearchParams(window.location.search);
    const liveUser = urlParams.get('user') || localStorage.getItem('currentUser') || '@user';
    const viewerId = crypto.randomUUID();
    const currentUser = localStorage.getItem('currentUser') || 'viewer';

    // Set host name
    document.getElementById('hostName').textContent = liveUser;
    document.getElementById('loadingText').textContent = `Joining ${liveUser}'s live stream...`;

    let pc = null;
    let isLiked = false;
    let likeCount = 0;
    let commentsListener = null;
    let liveRef = null;

    // Toast function
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Create peer connection (receive only, no local media)
    function createPeerConnection() {
      const configuration = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun2.l.google.com:19302" }
        ]
      };

      pc = new RTCPeerConnection(configuration);

      // Handle incoming remote stream (host video)
      pc.ontrack = (event) => {
        console.log('Received remote track');
        if (event.streams && event.streams[0]) {
          const remoteVideo = document.getElementById('remoteVideo');
          const placeholder = document.getElementById('videoPlaceholder');
          
          remoteVideo.srcObject = event.streams[0];
          remoteVideo.style.display = 'block';
          placeholder.style.display = 'none';
          
          // Hide loading and show main page
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('mainPage').style.display = 'flex';
          
          showToast('Live stream connected! 🔴');
        }
      };

      // Connection state changes
      pc.onconnectionstatechange = () => {
        console.log('Connection state:', pc.connectionState);
        if (pc.connectionState === 'connected') {
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('mainPage').style.display = 'flex';
        } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
          showErrorState('Connection lost. The stream may have ended.');
        }
      };

      pc.oniceconnectionstatechange = () => {
        console.log('ICE connection state:', pc.iceConnectionState);
        if (pc.iceConnectionState === 'failed') {
          showErrorState('Connection failed. Please try again.');
        }
      };

      return pc;
    }

    function showErrorState(message) {
      document.getElementById('loadingOverlay').style.display = 'flex';
      document.getElementById('loadingText').textContent = message;
      document.getElementById('loadingOverlay').querySelector('i').style.color = '#fbbf24';
      document.getElementById('goBackBtn').style.display = 'block';
    }

    // Load comments from Firestore
    function loadComments() {
      const commentsQuery = query(
        collection(db, 'live_comments', liveUser.replace('@', ''), 'messages'),
        orderBy('timestamp', 'asc'),
        limit(50)
      );
      
      commentsListener = onSnapshot(commentsQuery, (snapshot) => {
        const commentList = document.getElementById('commentList');
        commentList.innerHTML = '';
        snapshot.forEach((doc) => {
          const data = doc.data();
          const commentDiv = document.createElement('div');
          commentDiv.className = 'comment-item';
          commentDiv.innerHTML = `<span class="comment-username">${data.username || 'user'}</span> ${data.text}`;
          commentList.appendChild(commentDiv);
        });
        // Auto-scroll to bottom
        commentList.scrollTop = commentList.scrollHeight;
      });
    }

    // Send comment
    window.sendComment = async function() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      
      try {
        await addDoc(collection(db, 'live_comments', liveUser.replace('@', ''), 'messages'), {
          username: currentUser,
          text: text,
          timestamp: serverTimestamp()
        });
      } catch (e) {
        console.error('Error sending comment:', e);
        showToast('Failed to send comment');
      }
    };

    // Allow sending comment with Enter key
    document.addEventListener('DOMContentLoaded', () => {
      const commentInput = document.getElementById('commentInput');
      if (commentInput) {
        commentInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            window.sendComment();
          }
        });
      }
    });

    // Main connection logic (no local media)
    async function connectToLive() {
      try {
        // Check if host is live
        liveRef = doc(db, 'live', liveUser.replace('@', ''));
        const liveSnap = await getDoc(liveRef);
        
        if (!liveSnap.exists() || !liveSnap.data()?.active) {
          showErrorState('This live stream has ended.');
          return;
        }

        // Update like count from Firestore
        const liveData = liveSnap.data();
        likeCount = liveData?.likes || 0;
        document.getElementById('likeCount').textContent = likeCount > 0 ? likeCount : 'Like';

        // Create peer connection (receive only)
        createPeerConnection();
        
        // Create offer (receive only)
        const offer = await pc.createOffer({
          offerToReceiveVideo: true,
          offerToReceiveAudio: true
        });
        await pc.setLocalDescription(offer);
        
        // Store viewer offer in Firestore
        const viewerDocRef = doc(db, 'live_viewers', viewerId);
        
        const viewerData = {
          liveUser: liveUser,
          viewerId: viewerId,
          viewerName: currentUser,
          offer: {
            type: offer.type,
            sdp: offer.sdp
          },
          createdAt: serverTimestamp(),
          active: true
        };
        
        await setDoc(viewerDocRef, viewerData);

        // Update viewer count
        await updateDoc(liveRef, { 
          viewers: increment(1),
          lastViewerJoin: serverTimestamp()
        });

        // Listen for host's answer
        onSnapshot(viewerDocRef, async (snap) => {
          const data = snap.data();
          
          if (data?.answer && pc.signalingState !== 'stable') {
            try {
              await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
              console.log('Remote description set successfully');
            } catch (e) {
              console.error('Error setting remote description:', e);
            }
          }
          
          // Check if host ended the stream
          if (data?.streamEnded) {
            showErrorState('Host ended the live stream.');
            if (pc) pc.close();
          }
        });

        // Listen for live status changes
        onSnapshot(liveRef, (snap) => {
          const liveData = snap.data();
          if (liveData && !liveData.active) {
            showErrorState('Live stream has ended.');
            if (pc) pc.close();
          }
          
          // Update viewer count display
          if (liveData?.viewers) {
            document.getElementById('viewerCount').textContent = 
              `${liveData.viewers} watching`;
          }
          
          // Update like count
          if (liveData?.likes !== undefined) {
            likeCount = liveData.likes;
            document.getElementById('likeCount').textContent = likeCount > 0 ? likeCount : 'Like';
          }
        });

        // Load comments
        loadComments();

      } catch (e) {
        console.error('Connection error:', e);
        showErrorState('Unable to connect to live stream. Please try again.');
      }
    }

    // Close live
    window.closeLive = async function() {
      try {
        if (pc) {
          pc.close();
          pc = null;
        }
        
        // Remove viewer document
        const viewerDocRef = doc(db, 'live_viewers', viewerId);
        await deleteDoc(viewerDocRef).catch(() => {});
        
        // Update viewer count
        if (liveRef) {
          await updateDoc(liveRef, { 
            viewers: increment(-1) 
          }).catch(() => {});
        }
        
        // Remove comments listener
        if (commentsListener) {
          commentsListener();
        }
        
      } catch (e) {
        console.error('Error closing live:', e);
      }
      
      window.location.href = 'index.html';
    };

    // Toggle like
    window.toggleLike = async function() {
      const likeBtn = document.getElementById('likeBtn');
      const icon = likeBtn.querySelector('i');
      
      if (!isLiked) {
        isLiked = true;
        likeBtn.classList.add('liked');
        icon.className = 'fas fa-heart';
        
        try {
          if (liveRef) {
            await updateDoc(liveRef, { likes: increment(1) });
          }
        } catch (e) {
          console.error('Error updating like:', e);
        }
        showToast('❤️ You liked this stream!');
      } else {
        // Unlike
        isLiked = false;
        likeBtn.classList.remove('liked');
        icon.className = 'far fa-heart';
        
        try {
          if (liveRef) {
            await updateDoc(liveRef, { likes: increment(-1) });
          }
        } catch (e) {
          console.error('Error updating unlike:', e);
        }
        showToast('Like removed');
      }
    };

    // Share live
    window.shareLive = async function() {
      const url = window.location.href;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: `🔴 LIVE: ${liveUser}`,
            text: `Watch ${liveUser}'s live stream!`,
            url: url
          });
        } catch (e) {
          console.log('Share cancelled');
        }
      } else {
        try {
          await navigator.clipboard.writeText(url);
          showToast('Link copied! 📋');
        } catch (e) {
          showToast('Unable to share');
        }
      }
    };

    // Handle page unload
    window.addEventListener('beforeunload', () => {
      if (pc) pc.close();
      const viewerDocRef = doc(db, 'live_viewers', viewerId);
      deleteDoc(viewerDocRef).catch(() => {});
      if (liveRef) {
        updateDoc(liveRef, { viewers: increment(-1) }).catch(() => {});
      }
      if (commentsListener) {
        commentsListener();
      }
    });

    // Start connection
    connectToLive();
  </script>
</body>
</html>
