<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Reel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    
    .reel-wrapper { flex:1;position:relative;overflow-y:scroll;scroll-snap-type:y mandatory;padding-bottom:5rem; }
    .reel-wrapper::-webkit-scrollbar { width:0; }
    
    .reel-slide { width:100%;height:100%;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000; }
    .reel-slide video { width:100%;height:100%;object-fit:contain;background:#000; }
    
    .user-tag { position:absolute;top:1rem;left:1rem;display:flex;align-items:center;gap:0.5rem;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:0.4rem 0.8rem;border-radius:1.5rem;z-index:10;border:1px solid rgba(255,255,255,0.1); }
    .user-tag .avatar { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.7rem; }
    .user-tag .name { font-size:0.8rem;font-weight:500;color:#fff; }
    
    .actions-bar { position:absolute;right:0.8rem;bottom:50%;transform:translateY(50%);display:flex;flex-direction:column;align-items:center;gap:1.5rem;z-index:10; }
    .action-btn { display:flex;flex-direction:column;align-items:center;gap:0.2rem;background:none;border:none;color:#fff;cursor:pointer;font-size:1.5rem;transition:all 0.2s; }
    .action-btn span { font-size:0.65rem;font-weight:500; }
    .action-btn.liked { color:#ef4444; }
    
    .caption-bar { position:absolute;bottom:1rem;left:1rem;right:5rem;z-index:10; }
    .caption-text { color:#fff;font-size:0.8rem;background:rgba(0,0,0,0.4);padding:0.5rem 0.8rem;border-radius:0.5rem;display:inline-block;max-width:100%; }
    
    .play-overlay { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;color:rgba(255,255,255,0.4);pointer-events:none;z-index:5; }

    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap; }
    .toast.show { opacity:1; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }

    @media (max-width:380px) { .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem} }
    @media (min-width:1024px) {
      .floating-nav{top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .reel-wrapper{padding-bottom:0;margin-left:5rem}.actions-bar{right:2rem}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="reel-wrapper" id="reelWrapper"></div>
    <div class="toast" id="toast"></div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html" class="active"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
    </div></nav>
  </div>

  <script>
    const allReels = [
      { id:'d1', username:'@traveler', caption:'Beautiful sunset 🌅 #nature', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4', likes:245, comments:18, liked:false },
      { id:'d2', username:'@dancer_pro', caption:'New dance moves 💃🔥', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4', likes:520, comments:42, liked:false },
      { id:'d3', username:'@chef_master', caption:'Quick recipe 🍳 #food', src:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4', likes:189, comments:12, liked:false },
    ];

    function renderReels() {
      const wrapper = document.getElementById('reelWrapper');
      wrapper.innerHTML = allReels.map((reel, i) => `
        <div class="reel-slide" id="slide${i}">
          <video id="video${i}" src="${reel.src}" muted loop playsinline preload="metadata" onclick="togglePlay(${i})"></video>
          <div class="play-overlay" id="overlay${i}"><i class="fas fa-play-circle"></i></div>
          <div class="user-tag">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <span class="name">${reel.username}</span>
          </div>
          <div class="actions-bar">
            <button class="action-btn ${reel.liked?'liked':''}" onclick="toggleLike(${i})">
              <i class="${reel.liked?'fas':'far'} fa-heart"></i>
              <span id="likes${i}">${reel.likes}</span>
            </button>
            <button class="action-btn" onclick="showToast('Comments coming soon! 💬')">
              <i class="far fa-comment"></i>
              <span>${reel.comments}</span>
            </button>
            <button class="action-btn" onclick="shareReel('${reel.src}')">
              <i class="far fa-share-square"></i>
              <span>Share</span>
            </button>
          </div>
          <div class="caption-bar"><div class="caption-text">${reel.caption}</div></div>
        </div>
      `).join('');
      
      setTimeout(() => {
        const v = document.getElementById('video0');
        if (v) { v.play(); document.getElementById('overlay0').style.display='none'; }
      }, 500);
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const idx = entry.target.id.replace('slide','');
          const video = document.getElementById('video'+idx);
          const overlay = document.getElementById('overlay'+idx);
          if (entry.isIntersecting) { if(video){video.play();if(overlay)overlay.style.display='none';} }
          else { if(video){video.pause();if(overlay)overlay.style.display='flex';} }
        });
      }, { threshold: 0.6 });
      document.querySelectorAll('.reel-slide').forEach(s => observer.observe(s));
    }

    window.togglePlay = function(i) {
      const v = document.getElementById('video'+i), o = document.getElementById('overlay'+i);
      v.paused ? (v.play(), o.style.display='none') : (v.pause(), o.style.display='flex');
    };
    window.toggleLike = function(i) {
      allReels[i].liked = !allReels[i].liked;
      allReels[i].likes += allReels[i].liked ? 1 : -1;
      document.getElementById('likes'+i).textContent = allReels[i].likes;
      const btns = document.querySelectorAll('.action-btn');
      const lb = btns[i * 3];
      lb.classList.toggle('liked', allReels[i].liked);
      lb.querySelector('i').className = allReels[i].liked ? 'fas fa-heart' : 'far fa-heart';
      showToast(allReels[i].liked ? 'Liked! ❤️' : 'Unliked');
    };
    window.shareReel = async function(url) {
      if (navigator.share) { try { await navigator.share({ title:'Check this reel!', url }); } catch(e) {} }
      else { try { await navigator.clipboard.writeText(url); showToast('Link copied! 📋'); } catch(e) {} }
    };
    window.showToast = function(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000);
    };

    renderReels();
  </script>
</body>
</html>
