<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#0a0a0a;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#0a0a0a;display:flex;flex-direction:column;position:relative;overflow:hidden; }

    .chat-header {
      display:flex;align-items:center;gap:0.8rem;
      padding:0.8rem 1rem;
      background:#0a0a0a;
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;z-index:50;
    }
    .chat-back {
      width:2.2rem;height:2.2rem;border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:none;align-items:center;justify-content:center;
      color:#fff;font-size:0.9rem;cursor:pointer;
      border:none;
    }
    .chat-back.show { display:flex; }
    .chat-avatar {
      width:36px;height:36px;border-radius:50%;
      background:#333;display:flex;align-items:center;justify-content:center;
      font-size:0.85rem;color:#fff;flex-shrink:0;
    }
    .chat-partner-info { flex:1;min-width:0; }
    .chat-partner-name { font-size:0.9rem;font-weight:600;color:#fff; }
    .chat-partner-status {
      font-size:0.65rem;color:#4ade80;
      display:flex;align-items:center;gap:0.2rem;
    }
    .chat-partner-status .dot { width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block; }

    .header-new-chat-btn {
      width:2.2rem;height:2.2rem;border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:0.85rem;cursor:pointer;
      border:none;flex-shrink:0;
    }
    .header-new-chat-btn.hidden { display:none; }

    .contacts-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.85);
      z-index:300;display:none;
      align-items:center;justify-content:center;
      padding:1rem;
    }
    .contacts-overlay.show { display:flex; }
    .contacts-modal {
      background:#1a1a1a;border-radius:1rem;
      padding:1.2rem;width:100%;max-width:360px;
      max-height:70vh;overflow-y:auto;
      border:1px solid rgba(255,255,255,0.1);
    }
    .contacts-modal h3 { font-size:0.9rem;color:#fff;margin-bottom:0.8rem;text-align:center; }
    .contacts-modal input {
      width:100%;padding:0.6rem 0.8rem;border-radius:0.5rem;
      border:1px solid #333;background:#111;color:#fff;
      font-size:0.8rem;margin-bottom:0.6rem;outline:none;
    }
    .contacts-modal input:focus { border-color:#FFFC00; }
    .contact-item {
      display:flex;align-items:center;gap:0.6rem;
      padding:0.6rem;border-radius:0.5rem;
      cursor:pointer;color:#fff;font-size:0.8rem;
    }
    .contact-item:hover { background:rgba(255,255,255,0.05); }
    .contact-avatar {
      width:32px;height:32px;border-radius:50%;
      background:linear-gradient(135deg,#FFFC00,#FFD600);
      display:flex;align-items:center;justify-content:center;
      color:#000;font-weight:700;font-size:0.7rem;flex-shrink:0;
    }
    .contact-name { flex:1; }
    .contact-close { text-align:center;margin-top:0.6rem;color:#ef4444;cursor:pointer;font-size:0.75rem;padding:0.4rem; }

    /* ===== WHATSAPP-STYLE CHAT LIST ===== */
    .chat-list-full {
      flex:1;display:flex;flex-direction:column;
      overflow:hidden;
    }
    .chat-list-full.hidden { display:none; }
    .chat-list-scroll {
      flex:1;overflow-y:auto;
      padding-bottom:6rem;
      -webkit-overflow-scrolling:touch;
    }
    .chat-list-scroll::-webkit-scrollbar { width:0; }
    .chat-list-header {
      padding:0.5rem 1rem;
      font-size:0.6rem;color:#666;
      text-transform:uppercase;letter-spacing:1px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .user-list-item {
      display:flex;align-items:center;gap:0.7rem;
      padding:0.7rem 1rem;
      cursor:pointer;
      border-bottom:1px solid rgba(255,255,255,0.02);
    }
    .user-list-item:active { background:rgba(255,255,255,0.03); }
    .user-list-item.active { background:rgba(255,252,0,0.06); }
    .user-avatar {
      width:48px;height:48px;border-radius:50%;
      background:linear-gradient(135deg,#FFFC00,#FFD600);
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;color:#000;font-weight:700;
      flex-shrink:0;position:relative;
    }
    .user-info { flex:1;min-width:0; }
    .user-name-row { display:flex;align-items:center;justify-content:space-between; }
    .user-name { font-size:0.85rem;color:#fff;font-weight:500; }
    .user-time { font-size:0.6rem;color:#555;flex-shrink:0; }
    .user-msg-row { display:flex;align-items:center;justify-content:space-between;margin-top:2px; }
    .user-last-msg {
      font-size:0.7rem;color:#666;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:180px;
    }
    .user-last-msg.unread-msg { color:#fff;font-weight:500; }
    .unread-count {
      background:#FFFC00;color:#000;
      font-size:0.6rem;font-weight:700;
      min-width:18px;height:18px;border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }

    /* ===== CHAT VIEW ===== */
    .chat-view {
      flex:1;display:none;flex-direction:column;
      overflow:hidden;
    }
    .chat-view.show { display:flex; }
    .messages-container {
      flex:1;overflow-y:auto;
      padding:0.8rem 0.8rem 0.5rem 0.8rem;
      display:flex;flex-direction:column;gap:0.2rem;
      -webkit-overflow-scrolling:touch;
      background:#0a0a0a;
    }
    .messages-container::-webkit-scrollbar { width:0; }

    .message-wrapper {
      display:flex;max-width:85%;
      animation:fadeInUp 0.25s ease-out;
    }
    .message-wrapper.sent { align-self:flex-end;flex-direction:row-reverse; }
    .message-wrapper.received { align-self:flex-start; }
    @keyframes fadeInUp {
      from { opacity:0;transform:translateY(10px); }
      to { opacity:1;transform:translateY(0); }
    }
    .message-bubble {
      padding:0.55rem 0.8rem;border-radius:1.2rem;
      font-size:0.85rem;line-height:1.3;word-break:break-word;
    }
    .sent .message-bubble { background:#FFFC00;color:#000;border-bottom-right-radius:0.3rem; }
    .received .message-bubble { background:#1c1c1e;color:#fff;border-bottom-left-radius:0.3rem; }
    .message-time {
      font-size:0.55rem;margin-top:0.1rem;
      display:flex;align-items:center;gap:0.15rem;
    }
    .sent .message-time { justify-content:flex-end;color:rgba(0,0,0,0.45); }
    .received .message-time { color:rgba(255,255,255,0.35); }

    .typing-bubble {
      display:none;align-self:flex-start;
      padding:0.45rem 0.8rem;background:#1c1c1e;
      border-radius:1rem;border-bottom-left-radius:0.3rem;
      gap:0.2rem;
    }
    .typing-bubble.show { display:flex;align-items:center; }
    .typing-bubble .tb-dot {
      width:5px;height:5px;border-radius:50%;background:#888;
      animation:typingBounce 0.5s infinite alternate;
    }
    .typing-bubble .tb-dot:nth-child(2) { animation-delay:0.15s; }
    .typing-bubble .tb-dot:nth-child(3) { animation-delay:0.3s; }
    @keyframes typingBounce {
      0% { transform:translateY(0);opacity:0.4; }
      100% { transform:translateY(-4px);opacity:1; }
    }

    .chat-input-area {
      display:flex;align-items:center;gap:0.5rem;
      padding:0.5rem 0.8rem;
      padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));
      background:#0a0a0a;
      border-top:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;z-index:50;
    }
    .chat-input {
      flex:1;padding:0.6rem 1rem;border-radius:1.5rem;
      border:1px solid rgba(255,255,255,0.12);background:#1c1c1e;
      color:#fff;font-size:0.85rem;outline:none;
    }
    .chat-input:focus { border-color:#FFFC00; }
    .chat-input::placeholder { color:#666; }
    .send-btn {
      width:38px;height:38px;border-radius:50%;
      background:#FFFC00;border:none;color:#000;
      font-size:0.9rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:all 0.15s;
    }
    .send-btn:active { transform:scale(0.9); }

    .empty-chat {
      flex:1;display:flex;align-items:center;justify-content:center;
      color:#444;font-size:0.8rem;text-align:center;
    }

    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:0.5rem; }
    .loading-screen i { font-size:2rem;color:#3897f0;animation:spin 1s infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .loading-screen span { font-size:0.75rem;color:#888; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .floating-nav.hidden { display:none; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    .nav-upload, .nav-search { display:none !important; }

    @media (min-width:1024px) {
      .nav-upload, .nav-search { display:flex !important; }
      .floating-nav { top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column; }
      .floating-nav.hidden { display:flex !important; }
      .nav-center { flex-direction:column;gap:1.2rem;max-width:none; }
      .nav-center a { font-size:1.4rem;width:2.6rem;height:2.6rem; }
      .nav-center a::before { bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0); }
      .nav-center a.active::before { transform:translateY(-50%) scale(1); }
      .page { padding-left:5.5rem; }
      .chat-header { padding-left:1.5rem;padding-right:1.5rem; }
      .messages-container { padding-left:1.2rem;padding-right:1.2rem; }
      .chat-input-area { padding-left:1.2rem;padding-right:1.2rem; }
      .chat-list-header { padding-left:1.5rem;padding-right:1.5rem; }
      .user-list-item { padding-left:1.5rem;padding-right:1.5rem; }
    }
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <i class="fas fa-spinner"></i>
    <span>Loading...</span>
  </div>

  <div class="page" id="mainPage" style="display:none;">
    <div class="chat-header">
      <button class="chat-back" id="backBtn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
      <div class="chat-avatar" id="partnerAvatar"><i class="fas fa-comment-dots"></i></div>
      <div class="chat-partner-info">
        <div class="chat-partner-name" id="partnerName">Chats</div>
        <div class="chat-partner-status" id="partnerStatus"></div>
      </div>
      <button class="header-new-chat-btn" id="newChatBtn" onclick="showNewChatModal()"><i class="fas fa-plus"></i></button>
    </div>

    <!-- ===== CHAT LIST (Only messaged users) ===== -->
    <div class="chat-list-full" id="chatListFull">
      <div class="chat-list-header">Messages <span id="chatCount"></span></div>
      <div class="chat-list-scroll" id="userList"></div>
    </div>

    <!-- ===== CHAT VIEW ===== -->
    <div class="chat-view" id="chatView">
      <div class="messages-container" id="messagesContainer">
        <div class="empty-chat" id="emptyChat">Send a message!</div>
        <div class="typing-bubble" id="typingBubble">
          <div class="tb-dot"></div><div class="tb-dot"></div><div class="tb-dot"></div>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
        <button class="send-btn" onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- ===== NEW CHAT MODAL ===== -->
    <div class="contacts-overlay" id="newChatModal">
      <div class="contacts-modal">
        <h3>👥 New Chat</h3>
        <input type="text" id="contactSearch" placeholder="Search users..." oninput="filterContacts()">
        <div id="contactList"></div>
        <div class="contact-close" onclick="closeNewChatModal()">Close ✕</div>
      </div>
    </div>

    <nav class="floating-nav" id="floatingNav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="friend.html" class="nav-upload"><i class="fas fa-user-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDocs, limit } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    if (!localStorage.getItem("uid")) { window.location.replace("login.html"); }

    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    const currentUserId = currentUser.replace('@', '');
    let chatPartner = null;
    let chatId = null;
    let unsubMessages = null;
    let unsubAllChats = null;
    let allUsersList = [];
    let chatListData = [];

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    
    loadAllUsers();
    setupRealtimeChatList();

    // ===== LOAD ALL USERS FOR NEW CHAT =====
    async function loadAllUsers() {
      allUsersList = [];
      try {
        const snap = await getDocs(collection(db, 'users'));
        snap.forEach(doc => {
          const d = doc.data();
          if (d.username !== currentUser) {
            allUsersList.push({ username: d.username, name: d.name || d.username });
          }
        });
      } catch(e) {
        const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
        const friends = (profile.friends || []).map(f => ({ username: f.name, name: f.name }));
        const besties = (profile.besties || []).map(b => ({ username: b.name, name: b.name }));
        allUsersList = [...friends, ...besties].filter((v,i,a) => a.findIndex(t => t.username === v.username) === i);
      }
    }

    window.showNewChatModal = function() {
      document.getElementById('newChatModal').classList.add('show');
      document.getElementById('contactSearch').value = '';
      renderContactList(allUsersList);
    };

    window.closeNewChatModal = function() {
      document.getElementById('newChatModal').classList.remove('show');
    };

    window.filterContacts = function() {
      const q = document.getElementById('contactSearch').value.toLowerCase();
      const filtered = allUsersList.filter(u => (u.name || u.username).toLowerCase().includes(q));
      renderContactList(filtered);
    };

    function renderContactList(users) {
      const list = document.getElementById('contactList');
      if (users.length === 0) {
        list.innerHTML = '<p style="color:#666;text-align:center;padding:1rem;font-size:0.75rem;">No users found</p>';
        return;
      }
      list.innerHTML = users.map(u => `
        <div class="contact-item" onclick="startNewChat('${u.username}')">
          <div class="contact-avatar">${(u.name || u.username).charAt(0).toUpperCase()}</div>
          <span class="contact-name">${u.name || u.username}</span>
          <i class="fas fa-comment" style="color:#FFFC00;font-size:0.7rem;"></i>
        </div>
      `).join('');
    }

    window.startNewChat = function(username) {
      closeNewChatModal();
      openChat(username);
    };

    document.getElementById('newChatModal').addEventListener('click', function(e) {
      if (e.target === this) closeNewChatModal();
    });

    // ===== REAL-TIME CHAT LIST (Only messaged users) =====
    function setupRealtimeChatList() {
      if (unsubAllChats) unsubAllChats();
      unsubAllChats = onSnapshot(collection(db, 'chats'), (snap) => {
        loadChatList(snap);
      });
    }

    async function loadChatList(snap) {
      let chatUsers = [];
      const processedPartners = [];
      
      snap.forEach(chatDoc => {
        const cid = chatDoc.id;
        const ids = cid.split('_');
        if (ids.includes(currentUserId)) {
          const partnerId = ids.find(id => id !== currentUserId);
          if (partnerId && !processedPartners.includes(partnerId)) {
            processedPartners.push(partnerId);
          }
        }
      });
      
      for (const partnerId of processedPartners) {
        const cid = [currentUserId, partnerId].sort().join('_');
        try {
          const allMsgSnap = await getDocs(query(
            collection(db, 'chats', cid, 'messages'),
            orderBy('createdAt', 'desc')
          ));
          
          let lastMsg = '', lastTime = new Date(0), unreadCount = 0;
          
          if (!allMsgSnap.empty) {
            const lastMsgData = allMsgSnap.docs[0].data();
            lastMsg = lastMsgData.text || '';
            lastTime = lastMsgData.createdAt ? lastMsgData.createdAt.toDate() : new Date(0);
            
            allMsgSnap.forEach(doc => {
              const msg = doc.data();
              if (msg.sender !== currentUserId && !msg.seen) unreadCount++;
            });
          }
          
          chatUsers.push({ username: '@' + partnerId, lastMsg, lastTime, unreadCount });
        } catch(e) {}
      }
      
      // SORT: Most recent first
      chatUsers.sort((a, b) => b.lastTime - a.lastTime);
      chatListData = chatUsers;
      renderChatList(chatUsers);
    }

    function renderChatList(chatUsers) {
      const list = document.getElementById('userList');
      const count = document.getElementById('chatCount');
      const totalUnread = chatUsers.reduce((sum, c) => sum + c.unreadCount, 0);
      
      count.textContent = chatUsers.length > 0 ? '(' + chatUsers.length + ')' : '';
      
      if (totalUnread > 0) {
        document.getElementById('partnerName').textContent = 'Chats (' + totalUnread + ')';
      } else {
        document.getElementById('partnerName').textContent = 'Chats';
      }
      
      if (chatUsers.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#555;padding:3rem;font-size:0.8rem;">No messages yet<br><br>Tap <b style="color:#FFFC00;">+</b> to start a chat</div>';
        return;
      }

      list.innerHTML = chatUsers.map(c => {
        const timeStr = c.lastTime.getTime() > 0 ? formatTime(c.lastTime) : '';
        const name = c.username.replace('@','');
        const isActive = chatPartner === c.username;
        
        return `
          <div class="user-list-item ${isActive ? 'active' : ''}" onclick="openChat('${c.username}')">
            <div class="user-avatar">${name.charAt(0).toUpperCase()}</div>
            <div class="user-info">
              <div class="user-name-row">
                <span class="user-name">${c.username}</span>
                <span class="user-time">${timeStr}</span>
              </div>
              <div class="user-msg-row">
                <span class="user-last-msg ${c.unreadCount > 0 ? 'unread-msg' : ''}">${c.lastMsg || 'No messages'}</span>
                ${c.unreadCount > 0 ? `<span class="unread-count">${c.unreadCount}</span>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function formatTime(date) {
      if (!date || date.getTime() === 0) return '';
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return 'Now';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm';
      if (date.toDateString() === now.toDateString()) {
        return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      }
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      if (now - date < 604800000) return days[date.getDay()];
      return date.toLocaleDateString([], {month:'short',day:'numeric'});
    }

    // ===== OPEN CHAT =====
    window.openChat = function(username) {
      chatPartner = username;
      const partnerId = username.replace('@', '');
      chatId = [currentUserId, partnerId].sort().join('_');

      document.getElementById('chatListFull').classList.add('hidden');
      document.getElementById('chatView').classList.add('show');
      document.getElementById('backBtn').classList.add('show');
      document.getElementById('newChatBtn').classList.add('hidden');
      document.getElementById('partnerName').textContent = username;
      document.getElementById('partnerAvatar').innerHTML = username.replace('@','').charAt(0).toUpperCase();
      document.getElementById('partnerStatus').innerHTML = '<span class="dot"></span> online';
      
      const container = document.getElementById('messagesContainer');
      container.querySelectorAll('.message-wrapper').forEach(el => el.remove());
      document.getElementById('emptyChat').style.display = 'flex';
      
      renderChatList(chatListData);
      listenToMessages();
      listenToTyping();
      scrollToBottom();
    };

    window.goBack = function() {
      chatPartner = null;
      chatId = null;
      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('backBtn').classList.remove('show');
      document.getElementById('newChatBtn').classList.remove('hidden');
      document.getElementById('partnerName').textContent = 'Chats';
      document.getElementById('partnerAvatar').innerHTML = '<i class="fas fa-comment-dots"></i>';
      document.getElementById('partnerStatus').textContent = '';
      
      loadAllUsers();
      setupRealtimeChatList();
    };

    function listenToMessages() {
      if (unsubMessages) unsubMessages();
      unsubMessages = onSnapshot(query(collection(db, 'chats', chatId, 'messages'), orderBy('createdAt', 'asc')), (snap) => {
        const container = document.getElementById('messagesContainer');
        const emptyChat = document.getElementById('emptyChat');
        if (snap.empty) { emptyChat.style.display = 'flex'; return; }
        emptyChat.style.display = 'none';
        snap.docChanges().forEach(change => {
          if (change.type === 'added' && !document.getElementById('msg-' + change.doc.id)) {
            renderMessage(change.doc.id, change.doc.data());
          }
        });
        scrollToBottom();
      });
    }

    function renderMessage(id, msg) {
      const container = document.getElementById('messagesContainer');
      const typingBubble = document.getElementById('typingBubble');
      const isSent = msg.sender === currentUserId;
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper ' + (isSent ? 'sent' : 'received');
      wrapper.id = 'msg-' + id;
      const time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
      wrapper.innerHTML = `<div class="message-bubble">${msg.text || ''}<div class="message-time">${time}</div></div>`;
      container.insertBefore(wrapper, typingBubble);
      if (!isSent && !msg.seen) {
        setDoc(doc(db, 'chats', chatId, 'messages', id), { seen: true }, { merge: true });
      }
    }

    window.sendMessage = async function() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !chatId) return;
      input.value = '';
      try {
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
          text, sender: currentUserId, createdAt: serverTimestamp(), seen: false
        });
      } catch(e) {}
    };

    function listenToTyping() {
      const partnerId = chatPartner.replace('@', '');
      onSnapshot(doc(db, 'chats', chatId, 'typing', partnerId), (snap) => {
        const data = snap.data();
        const status = document.getElementById('partnerStatus');
        const tb = document.getElementById('typingBubble');
        if (data && data.typing) {
          status.innerHTML = '<span class="dot"></span> typing...';
          tb.classList.add('show');
        } else {
          status.innerHTML = '<span class="dot"></span> online';
          tb.classList.remove('show');
        }
      });
    }

    let typingTimeout;
    document.getElementById('chatInput').addEventListener('input', function() {
      if (!chatId) return;
      setDoc(doc(db, 'chats', chatId, 'typing', currentUserId), { typing: true, updatedAt: serverTimestamp() });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        setDoc(doc(db, 'chats', chatId, 'typing', currentUserId), { typing: false, updatedAt: serverTimestamp() });
      }, 2000);
    });

    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function scrollToBottom() {
      const c = document.getElementById('messagesContainer');
      setTimeout(() => { c.scrollTop = c.scrollHeight; }, 100);
    }
  </script>
</body>
</html>
