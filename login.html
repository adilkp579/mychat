<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:2rem;gap:1rem; }
    .auth-box { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:1.5rem;padding:2rem;width:100%;max-width:360px;text-align:center; }
    .icon-circle { width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem; }
    h2 { font-weight:500;font-size:1.3rem;margin-bottom:1.2rem; }
    .input-group { position:relative;margin-bottom:0.8rem;text-align:left; }
    .input-group i { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#666;font-size:0.9rem; }
    .input-group input { width:100%;padding:0.8rem 0.8rem 0.8rem 2.5rem;border-radius:0.5rem;border:1px solid #333;background:#111;color:#fff;font-size:0.85rem;outline:none; }
    .input-group input:focus { border-color:#3897f0; }
    .auth-btn { width:100%;padding:0.8rem;border-radius:1.5rem;border:none;background:#3897f0;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:0.5rem; }
    .auth-btn:disabled { opacity:0.5; }
    .alt-link { color:#3897f0;font-size:0.8rem;margin-top:1.2rem;display:block;text-decoration:none; }
    .error-msg { color:#ef4444;font-size:0.7rem;min-height:1rem; }
    .success-msg { color:#4ade80;font-size:0.7rem;min-height:1rem; }
    .saved-users { margin-top:1rem;text-align:left;border-top:1px solid rgba(255,255,255,0.1);padding-top:0.8rem; }
    .saved-users small { color:#888;font-size:0.65rem;display:block;margin-bottom:0.4rem; }
    .saved-user { display:flex;align-items:center;gap:0.5rem;padding:0.5rem;background:rgba(255,255,255,0.03);border-radius:0.5rem;margin-bottom:0.2rem;cursor:pointer;font-size:0.75rem; }
    .saved-user:hover { background:rgba(255,255,255,0.08); }
    .back-link { position:absolute;top:1.5rem;left:1.5rem;color:#888;font-size:0.8rem;text-decoration:none; }
  </style>
</head>
<body>
  <div class="page">
    <a href="profile.html" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="auth-box">
      <div class="icon-circle"><i class="fas fa-sign-in-alt"></i></div>
      <h2>Sign In</h2>
      <div class="input-group"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="Username or Email"></div>
      <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password"></div>
      <div class="error-msg" id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>
      <button class="auth-btn" id="loginBtn" onclick="login()">Sign In</button>
      <a href="signup.html" class="alt-link">Don't have an account? Sign Up</a>
      <div class="saved-users" id="savedSection" style="display:none;"><small>Saved</small><div id="savedList"></div></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    function hashPassword(pw) { let h=0; for(let i=0;i<pw.length;i++){const c=pw.charCodeAt(i);h=((h<<5)-h)+c;h=h&h;} return 'h_'+Math.abs(h).toString(16); }

    const savedUsers = JSON.parse(localStorage.getItem('savedUsers')||'[]');
    if(savedUsers.length > 0) {
      document.getElementById('savedSection').style.display='block';
      document.getElementById('savedList').innerHTML = savedUsers.map(u => `<div class="saved-user" onclick="quickLogin('${u}')"><i class="fas fa-user-circle"></i> ${u}</div>`).join('');
    }

    window.quickLogin = function(u) { document.getElementById('loginUsername').value = u; };

    window.login = async function() {
      const ue=document.getElementById('loginUsername').value.trim(),pw=document.getElementById('loginPassword').value;
      const err=document.getElementById('loginError'),suc=document.getElementById('loginSuccess'),btn=document.getElementById('loginBtn');
      err.textContent='';suc.textContent='';
      if(!ue||!pw){err.textContent='❌ Enter username/email and password';return;}
      btn.disabled=true;btn.textContent='Signing In...';
      try {
        let q=query(collection(db,'users'),where('username','==',ue.startsWith('@')?ue:'@'+ue));
        let snap=await getDocs(q);
        if(snap.empty){q=query(collection(db,'users'),where('email','==',ue));snap=await getDocs(q);}
        if(snap.empty){err.textContent='❌ Account not found';btn.disabled=false;btn.textContent='Sign In';return;}
        const d=snap.docs[0].data();
        if(d.password!==hashPassword(pw)){err.textContent='❌ Wrong password';btn.disabled=false;btn.textContent='Sign In';return;}
        
        // Load existing profile OR create fresh one
        let profile = JSON.parse(localStorage.getItem('userProfile')||'{}');
        if(!profile.username || profile.username !== d.username) {
          // Fresh profile for this user
          profile = { username:d.username, name:d.name||'', bio:d.bio||'', website:d.website||'', avatar:d.avatar||null, friends:[], besties:[], posts:[] };
        }
        localStorage.setItem('userProfile', JSON.stringify(profile));
        localStorage.setItem('currentUser', d.username);
        
        const su=JSON.parse(localStorage.getItem('savedUsers')||'[]');
        if(!su.includes(d.username)){su.push(d.username);localStorage.setItem('savedUsers',JSON.stringify(su));}
        
        suc.textContent='✅ Login successful!';
        setTimeout(()=>{window.location.href='profile.html';},800);
      }catch(e){err.textContent='❌ Error: '+e.message;btn.disabled=false;btn.textContent='Sign In';}
    };
  </script>
</body>
</html>
