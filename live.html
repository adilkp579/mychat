<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Live Stream</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background:#000; 
      font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height:100vh; 
      display:flex; 
      align-items:center; 
      justify-content:center;
      overflow: hidden;
    }
    
    .page { 
      width:100%; 
      height:100vh; 
      height:100dvh; 
      background:#000; 
      display:flex; 
      flex-direction:column; 
      position:relative; 
      overflow:hidden;
    }
    
    /* Header overlay */
    .live-header { 
      position:absolute;
      top:max(1rem, env(safe-area-inset-top, 1rem));
      left:1rem;
      right:1rem;
      display:flex;
      align-items:center;
      justify-content:space-between;
      z-index:20;
      pointer-events: none;
    }
    
    .live-header > * {
      pointer-events: auto;
    }
    
    .live-badge-row { 
      display:flex;
      align-items:center;
      gap:0.5rem;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(20px);
      padding:0.4rem 0.8rem;
      border-radius:2rem;
      border:1px solid rgba(255,255,255,0.15);
    }
    
    .live-dot { 
      width:8px;
      height:8px;
      background:#ef4444;
      border-radius:50%;
      animation:blink 1s infinite; 
    }
    
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    
    .live-text { 
      color:#ef4444;
      font-size:0.75rem;
      font-weight:700;
      letter-spacing:1px;
    }
    
    .viewer-count { 
      color:#ccc;
      font-size:0.7rem;
      font-weight:500;
    }
    
    .host-name { 
      color:#fff;
      font-size:0.8rem;
      font-weight:600;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(20px);
      padding:0.4rem 0.8rem;
      border-radius:2rem;
      border:1px solid rgba(255,255,255,0.15);
    }
    
    /* Close button */
    .close-btn { 
      position:absolute;
      top:max(1rem, env(safe-area-inset-top, 1rem));
      right:1rem;
      width:2.5rem;
      height:2.5rem;
      border-radius:50%;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.15);
      color:#fff;
      font-size:1rem;
      cursor:pointer;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: all 0.2s;
    }
    
    .close-btn:hover {
      background:rgba(239,68,68,0.3);
    }
    
    /* Main video container - full screen stranger/host video */
    .main-video-container { 
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      position:relative;
      width:100%;
      height:100%;
    }
    
    .main-video-container video { 
      width:100%;
      height:100%;
      object-fit:cover;
      position:absolute;
      top:0;
      left:0;
    }
    
    /* Self-view small box */
    .self-view-container {
      position: absolute;
      bottom: 6rem;
      right: 1rem;
      width: 120px;
      height: 160px;
      border-radius: 0.8rem;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
      background: #1a1a1a;
      z-index: 15;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: all 0.3s;
    }
    
    .self-view-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .self-view-container:hover {
      border-color: rgba(255,255,255,0.5);
      transform: scale(1.02);
    }
    
    /* Placeholder */
    .video-placeholder { 
      text-align:center;
      color:#555;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .video-placeholder i { 
      font-size:4rem;
      display:block;
      margin-bottom:0.5rem;
      opacity: 0.5;
    }
    
    .video-placeholder p { 
      font-size:0.8rem;
      opacity: 0.7;
    }
    
    /* Bottom actions */
    .bottom-actions { 
      position:absolute;
      bottom:2rem;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:2rem;
      z-index:20;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(20px);
      padding:0.8rem 2rem;
      border-radius:3rem;
      border:1px solid rgba(255,255,255,0.1);
    }
    
    .action-btn { 
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0.2rem;
      background:none;
      border:none;
      color:#fff;
      cursor:pointer;
      font-size:1.4rem;
      transition:all 0.2s;
      padding: 0.3rem;
    }
    
    .action-btn span { 
      font-size:0.6rem;
      font-weight:500;
      opacity: 0.8;
    }
    
    .action-btn:hover {
      transform: scale(1.1);
    }
    
    .action-btn.liked { 
      color:#ef4444; 
    }
    
    .action-btn.liked i {
      animation: heartBeat 0.3s ease;
    }
    
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    
    /* Loading overlay */
    .loading-overlay { 
      position:absolute;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:rgba(0,0,0,0.95);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:50;
      gap:0.8rem;
    }
    
    .loading-overlay i { 
      font-size:2.5rem;
      color:#ef4444;
      animation:spin 1s linear infinite; 
    }
    
    @keyframes spin { 
      from{transform:rotate(0deg)} 
      to{transform:rotate(360deg)} 
    }
    
    .loading-overlay span { 
      font-size:0.85rem;
      color:#ccc;
    }
    
    .loading-overlay button {
      margin-top: 1rem;
      padding: 0.6rem 2rem;
      border-radius: 2rem;
      border: none;
      background: #333;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .loading-overlay button:hover {
      background: #444;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 8rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      z-index: 60;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .toast.show {
      opacity: 1;
    }
    
    @media (max-width: 380px) {
      .self-view-container {
        width: 100px;
        height: 140px;
        bottom: 5.5rem;
        right: 0.8rem;
      }
      .bottom-actions {
        gap: 1.5rem;
        padding: 0.7rem 1.5rem;
      }
    }
    
    @media (min-width: 768px) {
      .self-view-container {
        width: 150px;
        height: 200px;
        bottom: 7rem;
        right: 2rem;
      }
      .bottom-actions {
        gap: 3rem;
        padding: 1rem 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="mainPage" style="display:none;">
    <!-- Header -->
    <div class="live-header">
      <div class="live-badge-row">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
        <span class="viewer-count" id="viewerCount">0 watching</span>
      </div>
      <div class="host-name" id="hostName">@user</div>
    </div>

    <!-- Close button -->
    <button class="close-btn" onclick="closeLive()">
      <i class="fas fa-times"></i>
    </button>
    
    <!-- Main video container (stranger/host) -->
    <div class="main-video-container" id="videoContainer">
      <div class="video-placeholder" id="videoPlaceholder">
        <i class="fas fa-video"></i>
        <p>Waiting for stream...</p>
      </div>
      <video id="remoteVideo" autoplay playsinline style="display:none;"></video>
    </div>

    <!-- Self-view small box -->
    <div class="self-view-container" id="selfViewContainer">
      <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <!-- Bottom actions -->
    <div class="bottom-actions">
      <button class="action-btn" id="likeBtn" onclick="toggleLike()">
        <i class="far fa-heart"></i>
        <span id="likeCount">Like</span>
      </button>
      <button class="action-btn" onclick="shareLive()">
        <i class="fas fa-share"></i>
        <span>Share</span>
      </button>
      <button class="action-btn" id="micBtn" onclick="toggleMic()">
        <i class="fas fa-microphone"></i>
        <span>Mic</span>
      </button>
      <button class="action-btn" id="cameraBtn" onclick="toggleCamera()">
        <i class="fas fa-video"></i>
        <span>Camera</span>
      </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    <span id="loadingText">Connecting to live stream...</span>
    <button onclick="window.location.href='index.html'" style="display:none;" id="goBackBtn">Go Back</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      onSnapshot, 
      setDoc, 
      updateDoc, 
      increment, 
      serverTimestamp,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
      authDomain: "mychat-a97bf.firebaseapp.com",
      projectId: "mychat-a97bf",
      storageBucket: "mychat-a97bf.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc123"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get parameters
    const urlParams = new URLSearchParams(window.location.search);
    const liveUser = urlParams.get('user') || localStorage.getItem('currentUser') || '@user';
    const viewerId = crypto.randomUUID();
    const currentUser = localStorage.getItem('currentUser') || 'viewer';

    // Set host name
    document.getElementById('hostName').textContent = liveUser;
    document.getElementById('loadingText').textContent = `Joining ${liveUser}'s live stream...`;

    let pc = null;
    let localStream = null;
    let isMicOn = true;
    let isCameraOn = true;
    let viewerDocRef = null;
    let answerListener = null;

    // Toast function
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Get user media (camera & mic)
    async function getUserMedia() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { 
            width: { ideal: 320 },
            height: { ideal: 240 },
            facingMode: "user"
          }, 
          audio: true 
        });
        
        const localVideo = document.getElementById('localVideo');
        localVideo.srcObject = localStream;
        localVideo.muted = true;
        
        return localStream;
      } catch (e) {
        console.warn('Camera/mic access denied:', e);
        // Try audio only
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ 
            video: false, 
            audio: true 
          });
          return localStream;
        } catch (e2) {
          console.warn('Audio only also failed:', e2);
          return null;
        }
      }
    }

    // Create peer connection
    function createPeerConnection() {
      const configuration = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun2.l.google.com:19302" }
        ]
      };

      pc = new RTCPeerConnection(configuration);

      // Add local stream tracks to peer connection
      if (localStream) {
        localStream.getTracks().forEach(track => {
          pc.addTrack(track, localStream);
        });
      }

      // Handle incoming remote stream (host video)
      pc.ontrack = (event) => {
        console.log('Received remote track');
        if (event.streams && event.streams[0]) {
          const remoteVideo = document.getElementById('remoteVideo');
          const placeholder = document.getElementById('videoPlaceholder');
          
          remoteVideo.srcObject = event.streams[0];
          remoteVideo.style.display = 'block';
          placeholder.style.display = 'none';
          
          // Hide loading and show main page
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('mainPage').style.display = 'flex';
          
          showToast('Live stream connected! 🔴');
        }
      };

      // ICE candidate handling
      pc.onicecandidate = (event) => {
        if (event.candidate && viewerDocRef) {
          // Send ICE candidate to host
          updateDoc(viewerDocRef, {
            iceCandidates: increment(0) // Trigger update
          }).catch(() => {});
          
          // Store candidate locally
          const candidates = JSON.parse(localStorage.getItem(`ice_${viewerId}`) || '[]');
          candidates.push(event.candidate);
          localStorage.setItem(`ice_${viewerId}`, JSON.stringify(candidates));
        }
      };

      // Connection state changes
      pc.onconnectionstatechange = () => {
        console.log('Connection state:', pc.connectionState);
        
        if (pc.connectionState === 'connected') {
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('mainPage').style.display = 'flex';
        } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
          showErrorState('Connection lost. The stream may have ended.');
        }
      };

      pc.oniceconnectionstatechange = () => {
        console.log('ICE connection state:', pc.iceConnectionState);
        if (pc.iceConnectionState === 'failed') {
          showErrorState('Connection failed. Please try again.');
        }
      };

      return pc;
    }

    function showErrorState(message) {
      document.getElementById('loadingOverlay').style.display = 'flex';
      document.getElementById('loadingText').textContent = message;
      document.getElementById('loadingOverlay').querySelector('i').style.color = '#fbbf24';
      document.getElementById('goBackBtn').style.display = 'block';
    }

    // Main connection logic
    async function connectToLive() {
      try {
        // Get user media first
        await getUserMedia();
        
        // Check if host is live
        const liveRef = doc(db, 'live', liveUser.replace('@', ''));
        const liveSnap = await getDoc(liveRef);
        
        if (!liveSnap.exists() || !liveSnap.data()?.active) {
          showErrorState('This live stream has ended.');
          return;
        }

        // Create peer connection
        createPeerConnection();
        
        // Create offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // Store viewer offer in Firestore
        viewerDocRef = doc(db, 'live_viewers', viewerId);
        
        const viewerData = {
          liveUser: liveUser,
          viewerId: viewerId,
          viewerName: currentUser,
          offer: {
            type: offer.type,
            sdp: offer.sdp
          },
          createdAt: serverTimestamp(),
          active: true
        };
        
        await setDoc(viewerDocRef, viewerData);

        // Update viewer count
        await updateDoc(liveRef, { 
          viewers: increment(1),
          lastViewerJoin: serverTimestamp()
        });

        // Listen for host's answer
        answerListener = onSnapshot(viewerDocRef, async (snap) => {
          const data = snap.data();
          
          if (data?.answer && pc.signalingState !== 'stable') {
            try {
              await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
              console.log('Remote description set successfully');
              
              // Apply stored ICE candidates
              const candidates = JSON.parse(localStorage.getItem(`ice_${viewerId}`) || '[]');
              for (const candidate of candidates) {
                try {
                  await pc.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (e) {
                  console.warn('Error adding ICE candidate:', e);
                }
              }
              
              // Clear stored candidates
              localStorage.removeItem(`ice_${viewerId}`);
              
            } catch (e) {
              console.error('Error setting remote description:', e);
            }
          }
          
          // Check if host ended the stream
          if (data?.streamEnded) {
            showErrorState('Host ended the live stream.');
            if (pc) pc.close();
          }
        });

        // Listen for live status changes
        onSnapshot(liveRef, (snap) => {
          const liveData = snap.data();
          if (liveData && !liveData.active) {
            showErrorState('Live stream has ended.');
            if (pc) pc.close();
          }
          
          // Update viewer count display
          if (liveData?.viewers) {
            document.getElementById('viewerCount').textContent = 
              `${liveData.viewers} watching`;
          }
        });

      } catch (e) {
        console.error('Connection error:', e);
        showErrorState('Unable to connect to live stream. Please try again.');
      }
    }

    // Close live
    window.closeLive = async function() {
      try {
        // Clean up peer connection
        if (pc) {
          pc.close();
          pc = null;
        }
        
        // Stop local stream
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
          localStream = null;
        }
        
        // Remove viewer document
        if (viewerDocRef) {
          await deleteDoc(viewerDocRef).catch(() => {});
        }
        
        // Update viewer count
        const liveRef = doc(db, 'live', liveUser.replace('@', ''));
        await updateDoc(liveRef, { 
          viewers: increment(-1) 
        }).catch(() => {});
        
        // Remove listener
        if (answerListener) {
          answerListener();
        }
        
        // Clear stored candidates
        localStorage.removeItem(`ice_${viewerId}`);
        
      } catch (e) {
        console.error('Error closing live:', e);
      }
      
      window.location.href = 'index.html';
    };

    // Toggle like
    window.toggleLike = function() {
      const likeBtn = document.getElementById('likeBtn');
      const icon = likeBtn.querySelector('i');
      
      likeBtn.classList.toggle('liked');
      
      if (likeBtn.classList.contains('liked')) {
        icon.className = 'fas fa-heart';
        likeBtn.querySelector('span').textContent = 'Liked';
        showToast('❤️ You liked this stream!');
      } else {
        icon.className = 'far fa-heart';
        likeBtn.querySelector('span').textContent = 'Like';
      }
    };

    // Toggle microphone
    window.toggleMic = function() {
      if (!localStream) return;
      
      const audioTrack = localStream.getAudioTracks()[0];
      const micBtn = document.getElementById('micBtn');
      
      if (audioTrack) {
        isMicOn = !isMicOn;
        audioTrack.enabled = isMicOn;
        
        if (isMicOn) {
          micBtn.querySelector('i').className = 'fas fa-microphone';
          micBtn.style.color = '#fff';
          showToast('Microphone on 🎤');
        } else {
          micBtn.querySelector('i').className = 'fas fa-microphone-slash';
          micBtn.style.color = '#ef4444';
          showToast('Microphone off 🔇');
        }
      }
    };

    // Toggle camera
    window.toggleCamera = function() {
      if (!localStream) return;
      
      const videoTrack = localStream.getVideoTracks()[0];
      const cameraBtn = document.getElementById('cameraBtn');
      
      if (videoTrack) {
        isCameraOn = !isCameraOn;
        videoTrack.enabled = isCameraOn;
        
        if (isCameraOn) {
          cameraBtn.querySelector('i').className = 'fas fa-video';
          cameraBtn.style.color = '#fff';
          document.getElementById('selfViewContainer').style.display = 'block';
          showToast('Camera on 📹');
        } else {
          cameraBtn.querySelector('i').className = 'fas fa-video-slash';
          cameraBtn.style.color = '#ef4444';
          document.getElementById('selfViewContainer').style.display = 'none';
          showToast('Camera off 🚫');
        }
      }
    };

    // Share live
    window.shareLive = async function() {
      const url = window.location.href;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: `🔴 LIVE: ${liveUser}`,
            text: `Watch ${liveUser}'s live stream!`,
            url: url
          });
        } catch (e) {
          console.log('Share cancelled');
        }
      } else {
        try {
          await navigator.clipboard.writeText(url);
          showToast('Link copied! 📋');
        } catch (e) {
          showToast('Unable to share');
        }
      }
    };

    // Handle page unload
    window.addEventListener('beforeunload', () => {
      if (pc) pc.close();
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      if (viewerDocRef) {
        deleteDoc(viewerDocRef).catch(() => {});
      }
      const liveRef = doc(db, 'live', liveUser.replace('@', ''));
      updateDoc(liveRef, { viewers: increment(-1) }).catch(() => {});
    });

    // Start connection
    connectToLive();
  </script>
</body>
</html>
