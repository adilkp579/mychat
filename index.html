<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Home · Ultra Optimized</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0 0 5.5rem 0;overflow-y:auto;background:#000; }
    .content::-webkit-scrollbar { width:0; }

    .top-icons { width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0;position:relative;background:#000; }
    .corner-btn { width:2.4rem;height:2.4rem;background:#1a1a1a;border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid #333; }
    .top-brand { font-size:2rem;font-weight:700;color:#fff;letter-spacing:3px;font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;line-height:1;font-style:italic; }
    
    .stories-section { width:100%;max-width:500px;flex-shrink:0;background:#000; }
    .stories-bar { display:flex;gap:0.8rem;padding:0.3rem 0.8rem 0.5rem 0.8rem;overflow-x:auto;border-bottom:1px solid #1a1a1a;background:#000; }
    .stories-bar::-webkit-scrollbar { height:0; }
    .story-item { display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;flex-shrink:0; }
    .story-ring { width:62px;height:62px;border-radius:50%;padding:2px;display:flex;align-items:center;justify-content:center; }
    .story-ring.friend { background:linear-gradient(45deg,#f59e0b,#ef4444,#e91e63); }
    .story-ring.bestie { background:linear-gradient(45deg,#8b5cf6,#ec4899,#f59e0b); }
    .story-avatar { width:54px;height:54px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid #000;color:#fff;overflow:hidden; }
    .story-avatar img { width:100%;height:100%;object-fit:cover; }
    .story-name { font-size:0.6rem;color:#999;max-width:65px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .no-stories { padding:0.5rem 0.8rem;color:#555;font-size:0.7rem;text-align:center;width:100%;background:#000; }

    .feed-section { width:100%;max-width:500px;flex-shrink:0;background:#000; }
    .feed-card { width:100%;background:#000;border-bottom:1px solid #1a1a1a;margin-bottom:1rem; }
    .feed-header { display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.8rem;background:#000; }
    .feed-avatar { width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.8rem;overflow:hidden;cursor:pointer;flex-shrink:0; }
    .feed-avatar img { width:100%;height:100%;object-fit:cover; }
    .feed-username { font-size:0.8rem;font-weight:600;color:#3897f0;cursor:pointer; }
    .feed-time { font-size:0.6rem;color:#888;margin-left:auto; }
    .feed-image { width:100%;aspect-ratio:1/1;object-fit:cover;background:#0a0a0a;cursor:pointer; }
    .feed-image img { width:100%;height:100%;object-fit:cover; }
    .feed-actions { display:flex;gap:1.2rem;padding:0.6rem 0.8rem;background:#000; }
    .feed-action { background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:0; }
    .feed-action.liked { color:#ef4444; }
    .feed-likes { font-size:0.7rem;font-weight:600;padding:0 0.8rem;margin-bottom:0.2rem;background:#000; }
    .feed-caption { padding:0 0.8rem 0.3rem 0.8rem;font-size:0.75rem;background:#000; }
    .feed-caption span { font-weight:600;color:#3897f0;cursor:pointer;margin-right:0.3rem; }
    .view-comments-btn { padding:0 0.8rem 0.5rem 0.8rem;font-size:0.65rem;color:#888;cursor:pointer;background:#000; }

    .comments-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:700;display:none;flex-direction:column; }
    .comments-overlay.show { display:flex; }
    .comments-header { display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0; }
    .comments-header h3 { font-size:0.9rem;font-weight:600;color:#fff; }
    .comments-close { width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .comments-list { flex:1;overflow-y:auto;padding:0.5rem 1rem;-webkit-overflow-scrolling:touch; }
    .comments-list::-webkit-scrollbar { width:0; }
    
    .cmt-block { padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.02); }
    .cmt-row { display:flex;gap:0.5rem;align-items:flex-start; }
    .cmt-avatar { width:28px;height:28px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:#fff;overflow:hidden;flex-shrink:0; }
    .cmt-avatar img { width:100%;height:100%;object-fit:cover; }
    .cmt-body { flex:1;min-width:0; }
    .cmt-username { font-size:0.7rem;font-weight:600;color:#fff; }
    .cmt-content { font-size:0.75rem;color:#ddd;margin-top:0.1rem;word-break:break-word; }
    .cmt-meta { display:flex;align-items:center;gap:0.6rem;margin-top:0.2rem;flex-wrap:wrap; }
    .cmt-time { font-size:0.55rem;color:#666; }
    .cmt-btn { font-size:0.55rem;cursor:pointer;background:none;border:none;padding:0.15rem 0.3rem;color:#888; }
    .cmt-btn.reply-btn { color:#3897f0; }
    .cmt-btn.del-btn { color:#ef4444;display:none; }
    .cmt-btn.del-btn.show { display:inline; }
    
    .cmt-thread { margin-left:1.5rem;padding-left:0.5rem;border-left:1px solid rgba(255,255,255,0.06); }
    
    .reply-box { display:none;align-items:center;gap:0.3rem;margin-top:0.3rem;padding:0.2rem 0; }
    .reply-box.show { display:flex; }
    .reply-input-wrap { flex:1;display:flex;align-items:center;background:#1a1a1a;border-radius:0.8rem;border:1px solid rgba(255,255,255,0.12);overflow:hidden; }
    .reply-input-wrap:focus-within { border-color:#FFFC00; }
    .reply-input { flex:1;padding:0.35rem;border:none;background:transparent;color:#fff;font-size:0.65rem;outline:none; }
    .reply-post-btn { background:#FFFC00;border:none;color:#000;font-size:0.6rem;font-weight:600;padding:0.35rem 0.6rem;border-radius:0.8rem;cursor:pointer;flex-shrink:0; }

    .cmt-input-area { display:flex;align-items:center;gap:0.3rem;padding:0.5rem 1rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:#0a0a0a; }
    .cmt-input-wrap { flex:1;display:flex;align-items:center;background:#1a1a1a;border-radius:1.2rem;border:1px solid rgba(255,255,255,0.12);overflow:hidden; }
    .cmt-input-wrap:focus-within { border-color:#FFFC00; }
    .cmt-input { flex:1;padding:0.5rem;border:none;background:transparent;color:#fff;font-size:0.8rem;outline:none; }
    .cmt-post-btn { background:#FFFC00;border:none;color:#000;font-size:0.7rem;font-weight:600;padding:0.45rem 0.9rem;border-radius:1.2rem;cursor:pointer;flex-shrink:0; }
    .cmt-post-btn:disabled { opacity:0.4; }

    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;padding:0.4rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:800;opacity:0;transition:all 0.3s;font-weight:600;pointer-events:none; }
    .toast.show { opacity:1; }.toast.error { background:#ef4444;color:#fff; }

    /* Glass effect floating navbar with 90% transparency */
    .floating-nav { 
      position:fixed;
      bottom:max(1rem,env(safe-area-inset-bottom,1rem));
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:500px;
      background:rgba(10, 10, 10, 0.1);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-radius:2.5rem;
      padding:0.7rem 1.5rem;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255, 255, 255, 0.05);
      z-index:100;
      box-shadow:0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
    }
    .floating-nav:hover { background:rgba(10, 10, 10, 0.15); }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255, 255, 255, 0.8);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative;background:transparent; }
    .nav-center a:hover { color:#fff;background:rgba(255, 255, 255, 0.15);transform: translateY(-2px); }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255, 255, 255, 0.2);box-shadow: 0 0 20px rgba(255, 255, 255, 0.15); }
    
    /* Mobile: hide upload & search */
    .nav-upload, .nav-search { display:none !important; }

    @media (min-width:1024px) {
      .top-icons{display:none}
      /* Desktop: show upload & search in navbar */
      .nav-upload, .nav-search { display:flex !important; }
      
      .floating-nav{
        position:fixed;
        top:50%;
        left:1.5rem;
        bottom:auto;
        transform:translateY(-50%);
        width:3.8rem;
        height:auto;
        max-width:none;
        border-radius:2.5rem;
        padding:1rem 0.6rem;
        flex-direction:column;
        background:rgba(10,10,10,0.1);
        backdrop-filter:blur(20px);
        -webkit-backdrop-filter:blur(20px);
        border:1px solid rgba(255,255,255,0.05);
        box-shadow:0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03);
      }
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}
      .nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}
      .nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .content{padding:0.5rem 0 1rem 5.5rem}
      .stories-section{max-width:550px}
      .feed-section{max-width:550px}
    }
    
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:max(0.8rem,env(safe-area-inset-bottom,0.8rem));background:rgba(10,10,10,0.1);backdrop-filter:blur(20px);}
      .nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .content{padding:0 0 5rem 0}
    }
  </style>
</head>
<body>
  <div class="page" id="mainPage">
    <div class="content" id="mainContent">
      <div class="top-icons"><a href="upload.html" class="corner-btn"><i class="fas fa-plus"></i></a><span class="top-brand">Choicho</span><a href="search.html" class="corner-btn"><i class="fas fa-search"></i></a></div>
      <div class="stories-section"><div class="stories-bar" id="storiesBar"></div><div class="no-stories" id="noStories" style="display:none;">No recent stories</div></div>
      <div class="feed-section" id="feedContainer"></div>
    </div>
    <div class="comments-overlay" id="commentsOverlay">
      <div class="comments-header"><h3>Comments</h3><button class="comments-close" onclick="closeComments()">✕</button></div>
      <div class="comments-list" id="commentsList"></div>
      <div class="cmt-input-area">
        <div class="cmt-input-wrap">
          <input type="text" class="cmt-input" id="cmtInput" placeholder="Add a comment...">
        </div>
        <button class="cmt-post-btn" id="cmtPostBtn" onclick="postMainComment()">Post</button>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <nav class="floating-nav">
      <div class="nav-center">
        <a href="index.html" class="active"><i class="fas fa-home"></i></a>
        <a href="web.html"><i class="fas fa-globe"></i></a>
        <a href="reel.html"><i class="fas fa-film"></i></a>
        <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
        <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
      </div>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, getDoc, addDoc, serverTimestamp, increment, updateDoc, where, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    const auth = getAuth(app);

    const userCache = new Map();
    const PAGE_SIZE = 10;
    let lastVisiblePost = null;
    let allPostsLoaded = false;
    let isLoadingPosts = false;
    let activePostId = null;
    const currentUser = localStorage.getItem('currentUser') || '@anonymous';

    function cname(u) { return (u || '').replace(/^@/, ''); }
    function timeAgo(d) { if (!d) return ''; const n = new Date(); const df = n - d; if (df < 60000) return 'now'; if (df < 3600000) return Math.floor(df/60000)+'m'; if (df < 86400000) return Math.floor(df/3600000)+'h'; if (df < 604800000) return Math.floor(df/86400000)+'d'; return d.toLocaleDateString(); }

    function loadUserFromLocalCache(username) {
      if (!username || username === '@anonymous') return null;
      const key = 'profile_' + username.replace('@','');
      const cached = localStorage.getItem(key);
      if (cached) { try { const data = JSON.parse(cached); return { avatar: data.avatar || null, name: data.name || username }; } catch(e) {} }
      const up = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (up.username === username) return { avatar: up.avatar || null, name: up.name || username };
      return null;
    }

    async function batchLoadProfiles(usernames) {
      const uniqueUsers = [...new Set(usernames)].filter(u => u && u !== '@anonymous' && !userCache.has(u));
      if (uniqueUsers.length === 0) return;
      for (const u of uniqueUsers) { const local = loadUserFromLocalCache(u); if (local) userCache.set(u, local); }
      const firestoreUsers = uniqueUsers.filter(u => !userCache.has(u));
      for (let i = 0; i < firestoreUsers.length; i += 10) {
        const batch = firestoreUsers.slice(i, i + 10);
        try {
          const q = query(collection(db, 'users'), where('username', 'in', batch));
          const snap = await getDocs(q);
          snap.forEach(doc => { const d = doc.data(); userCache.set(d.username, { avatar: d.avatar || null, name: d.name || d.username }); localStorage.setItem('profile_' + d.username.replace('@',''), JSON.stringify(d)); });
        } catch(e) {}
      }
      updateAllAvatars();
    }

    function getAvtFromCache(username) {
      const p = userCache.get(username);
      if (p?.avatar && p.avatar !== 'null' && p.avatar !== 'undefined') return `<img src="${p.avatar}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>';">`;
      return '<i class="fas fa-user"></i>';
    }

    function updateAllAvatars() { document.querySelectorAll('[data-avatar-user]').forEach(el => { el.innerHTML = getAvtFromCache(el.dataset.avatarUser); }); }

    function showToast(m, e) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast '+(e?'error':''); t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }

    // ✅ RECURSIVE THREADED COMMENTS
    async function renderAllComments(postId) {
      const list = document.getElementById('commentsList');
      list.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;">Loading comments...</div>';
      try {
        const commentsRef = collection(db, 'posts', postId, 'comments');
        const q = query(commentsRef, orderBy('createdAt', 'asc'));
        const snap = await getDocs(q);
        if (snap.empty) { list.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;">No comments yet. Be the first!</div>'; return; }
        const allComments = [];
        snap.forEach(doc => { allComments.push({ id: doc.id, ...doc.data() }); });
        await batchLoadProfiles(allComments.map(c => c.username));
        const topLevel = allComments.filter(c => !c.parentId);
        list.innerHTML = '';
        topLevel.forEach(cmt => { renderCommentWithReplies(cmt, allComments, list, 0); });
      } catch(e) { console.error(e); list.innerHTML = '<div style="text-align:center;color:#ef4444;padding:2rem;">Failed to load comments</div>'; }
    }

    function renderCommentWithReplies(cmt, allComments, parentEl, depth) {
      const block = document.createElement('div');
      block.className = 'cmt-block';
      block.id = 'cmt-' + cmt.id;
      block.style.marginLeft = depth > 0 ? '1.5rem' : '0';
      if (depth > 0) block.style.borderLeft = '1px solid rgba(255,255,255,0.06)';
      if (depth > 0) block.style.paddingLeft = '0.5rem';
      const timeStr = cmt.createdAt ? timeAgo(cmt.createdAt.toDate()) : '';
      const isOwner = cmt.username === currentUser;
      block.innerHTML = `<div class="cmt-row"><div class="cmt-avatar" data-avatar-user="${cmt.username}">${getAvtFromCache(cmt.username)}</div><div class="cmt-body"><div class="cmt-username">${cname(cmt.username)}</div><div class="cmt-content">${cmt.text || ''}</div><div class="cmt-meta"><span class="cmt-time">${timeStr}</span><button class="cmt-btn reply-btn" onclick="toggleReplyBox('${cmt.id}')">Reply</button><button class="cmt-btn del-btn ${isOwner?'show':''}" onclick="deleteComment('${activePostId}','${cmt.id}')">Delete</button></div><div class="reply-box" id="replyBox-${cmt.id}"><div class="reply-input-wrap"><input type="text" class="reply-input" id="replyInput-${cmt.id}" placeholder="Reply to ${cname(cmt.username)}..."></div><button class="reply-post-btn" onclick="postReply('${activePostId}','${cmt.id}')">Reply</button></div><div class="replies-container" id="replies-${cmt.id}"></div></div></div>`;
      parentEl.appendChild(block);
      const childReplies = allComments.filter(c => c.parentId === cmt.id);
      if (childReplies.length > 0) {
        const repliesContainer = block.querySelector('.replies-container');
        childReplies.forEach(child => { renderCommentWithReplies(child, allComments, repliesContainer, depth + 1); });
      }
    }

    window.toggleReplyBox = function(cmtId) { const box = document.getElementById('replyBox-' + cmtId); if (box) { box.classList.toggle('show'); if (box.classList.contains('show')) setTimeout(() => { const input = document.getElementById('replyInput-' + cmtId); if (input) input.focus(); }, 100); } };
    window.postMainComment = async function() { const input = document.getElementById('cmtInput'); const text = input.value.trim(); if (!text || !activePostId) return; try { await addDoc(collection(db, 'posts', activePostId, 'comments'), { text, username: currentUser, createdAt: serverTimestamp(), parentId: null }); await updateDoc(doc(db, 'posts', activePostId), { comments: increment(1) }); input.value = ''; await renderAllComments(activePostId); showToast('Comment posted! 💬'); } catch(e) { showToast('Failed to post comment', true); } };
    window.postReply = async function(postId, parentId) { const input = document.getElementById('replyInput-' + parentId); const text = input?.value.trim(); if (!text || !postId) return; try { await addDoc(collection(db, 'posts', postId, 'comments'), { text, username: currentUser, parentId, createdAt: serverTimestamp() }); await updateDoc(doc(db, 'posts', postId), { comments: increment(1) }); input.value = ''; document.getElementById('replyBox-' + parentId)?.classList.remove('show'); await renderAllComments(postId); showToast('Reply posted! 💬'); } catch(e) { showToast('Failed to post reply', true); } };
    window.deleteComment = async function(postId, cmtId) { if (!confirm('Delete this comment?')) return; try { const allSnap = await getDocs(collection(db, 'posts', postId, 'comments')); const toDelete = [cmtId]; const findReplies = (parentIds) => { allSnap.forEach(doc => { if (parentIds.includes(doc.data().parentId)) { toDelete.push(doc.id); findReplies([doc.id]); } }); }; findReplies([cmtId]); for (const id of toDelete) { await deleteDoc(doc(db, 'posts', postId, 'comments', id)); } await updateDoc(doc(db, 'posts', postId), { comments: increment(-toDelete.length) }); await renderAllComments(postId); showToast('Comment deleted'); } catch(e) { showToast('Failed to delete', true); } };
    window.openComments = async function(pid) { activePostId = pid; document.getElementById('commentsOverlay').classList.add('show'); document.getElementById('cmtInput').value = ''; await renderAllComments(pid); };
    window.closeComments = function() { document.getElementById('commentsOverlay').classList.remove('show'); activePostId = null; };

    function isImagePost(src, type) { if (!src) return false; if (type === 'reel' || type === 'video') return false; if (src.startsWith('data:video/')) return false; if (src.match(/\.(mp4|webm|mov|avi|mkv)($|\?)/i)) return false; return true; }

    async function loadMorePosts() {
      if (isLoadingPosts || allPostsLoaded) return; isLoadingPosts = true;
      try {
        let q; if (lastVisiblePost) { q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), startAfter(lastVisiblePost), limit(PAGE_SIZE)); } else { q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(PAGE_SIZE)); }
        const snap = await getDocs(q);
        if (snap.empty) { allPostsLoaded = true; if (!lastVisiblePost) document.getElementById('feedContainer').innerHTML = '<div style="text-align:center;color:#555;padding:3rem;">No posts yet</div>'; return; }
        const posts = [];
        snap.forEach(doc => { const dt = doc.data(); const src = dt.data || dt.url || ''; const type = dt.type || ''; if (src && isImagePost(src, type)) { posts.push({ id: doc.id, userId: dt.username || dt.userId || '@anonymous', caption: dt.caption || '', src, likes: dt.likes || 0, comments: dt.comments || 0, time: dt.createdAt ? timeAgo(dt.createdAt.toDate()) : 'Recently' }); } });
        lastVisiblePost = snap.docs[snap.docs.length - 1];
        if (posts.length > 0) { await batchLoadProfiles(posts.map(p => p.userId)); renderPostsToFeed(posts); }
      } catch(e) { console.error(e); } finally { isLoadingPosts = false; }
    }

    function renderPostsToFeed(posts) {
      const container = document.getElementById('feedContainer');
      posts.forEach(p => {
        const card = document.createElement('div'); card.className = 'feed-card';
        card.innerHTML = `<div class="feed-header"><div class="feed-avatar" data-avatar-user="${p.userId}" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${getAvtFromCache(p.userId)}</div><div><div class="feed-username" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cname(p.userId)}</div></div><span class="feed-time">${p.time}</span></div><div class="feed-image" onclick="openImageViewer('${p.src}')"><img src="${p.src}" alt="post" loading="lazy"></div><div class="feed-actions"><button class="feed-action" id="likeBtn-${p.id}" onclick="toggleLike('${p.id}')"><i class="far fa-heart"></i></button><button class="feed-action" onclick="openComments('${p.id}')"><i class="far fa-comment"></i></button><button class="feed-action" onclick="sharePost('${p.src}')"><i class="far fa-share-square"></i></button></div><div class="feed-likes" id="likes-${p.id}">${p.likes||0} likes</div><div class="feed-caption"><span onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cname(p.userId)}</span>${p.caption}</div><div class="view-comments-btn" onclick="openComments('${p.id}')">View all ${p.comments||0} comments</div>`;
        container.appendChild(card);
      });
    }

    function setupInfiniteScroll() { const content = document.getElementById('mainContent'); let ticking = false; content.addEventListener('scroll', () => { if (!ticking) { requestAnimationFrame(() => { if (content.scrollHeight - content.scrollTop - content.clientHeight < 500) loadMorePosts(); ticking = false; }); ticking = true; } }, { passive: true }); }
    window.toggleLike = async function(pid) { const b = document.getElementById('likeBtn-'+pid), l = document.getElementById('likes-'+pid); if (!b||!l) return; const liked = b.classList.contains('liked'); if (liked) { b.classList.remove('liked'); b.querySelector('i').className='far fa-heart'; l.textContent=(Math.max(0,parseInt(l.textContent)-1))+' likes'; try { await updateDoc(doc(db,'posts',pid),{likes:increment(-1)}); } catch(e) {} } else { b.classList.add('liked'); b.querySelector('i').className='fas fa-heart'; l.textContent=(parseInt(l.textContent)+1)+' likes'; try { await updateDoc(doc(db,'posts',pid),{likes:increment(1)}); } catch(e) {} } };
    window.sharePost = function(s) { if (navigator.share) navigator.share({url:s}); else { navigator.clipboard.writeText(s); showToast('Link copied!'); } };
    window.openImageViewer = function(s) { const o = document.createElement('div'); o.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:800;display:flex;align-items:center;justify-content:center;'; o.innerHTML = `<img src="${s}" style="max-width:95%;max-height:90vh;object-fit:contain;"><button style="position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:1rem;cursor:pointer;">✕</button>`; o.querySelector('button').onclick = () => o.remove(); o.onclick = e => { if (e.target === o) o.remove(); }; document.body.appendChild(o); };

    async function renderStories() {
      const p = JSON.parse(localStorage.getItem('userProfile')||'{}');
      const ps = [...(p.friends||[]).map(f=>({name:f.name,type:'friend'})),...(p.besties||[]).map(b=>({name:b.name,type:'bestie'}))];
      const bar = document.getElementById('storiesBar'), ns = document.getElementById('noStories');
      if (ps.length === 0) { bar.style.display = 'none'; ns.style.display = 'block'; return; }
      bar.style.display = 'flex'; ns.style.display = 'none';
      await batchLoadProfiles(ps.map(s => s.name));
      bar.innerHTML = ps.map(s => `<div class="story-item" onclick="window.location.href='profile.html?user=${encodeURIComponent(s.name)}'"><div class="story-ring ${s.type}"><div class="story-avatar">${getAvtFromCache(s.name)}</div></div><span class="story-name">${cname(s.name)}</span></div>`).join('');
    }

    document.getElementById('cmtInput').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postMainComment(); } });
    document.getElementById('commentsOverlay').addEventListener('click', function(e) { if (e.target === this) closeComments(); });

    async function bootApp() {
      const hasLocalUid = localStorage.getItem("uid");
      if (!hasLocalUid && !auth.currentUser) { await new Promise(resolve => { const unsub = onAuthStateChanged(auth, (user) => { unsub(); if (user) localStorage.setItem("uid", user.uid); resolve(); }); }); }
      if (!localStorage.getItem("uid") && !auth.currentUser) { window.location.replace("login.html"); return; }
      document.getElementById('mainPage').style.display = 'flex';
      const lp = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (lp.username) userCache.set(lp.username, { avatar: lp.avatar || null, name: lp.name || lp.username });
      renderStories(); setupInfiniteScroll(); loadMorePosts();
    }

    bootApp();
  </script>
</body>
</html>
