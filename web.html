<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web • Live Chat — Refined Layout</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    .page {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    /* ===== MAIN SPACING (important) ===== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 72px 14px 90px; /* top header + bottom nav gap */
      gap: 10px;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    /* ===== CAMERA AREA ===== */
    .camera-area {
      flex: 1;
      display: flex;
      gap: 10px;
      min-height: 0;
    }

    /* Stranger big */
    .stranger-section {
      width: 62%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .stranger-camera {
      flex: 1;
      background: #111;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* You small */
    .you-section {
      width: 38%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .my-camera {
      height: 42%;
      background: #111;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
    }

    /* ===== TOKEN STACK (exact side alignment) ===== */
    .token-stack {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: flex-start;
    }

    .token-btn {
      height: 34px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .token-btn:active {
      transform: scale(0.94);
    }

    .token-btn .token-emoji {
      font-size: 14px;
    }

    .token-btn .token-label {
      font-size: 11px;
    }

    /* individual token colors preserved */
    .token-chicken { background: rgba(245,158,11,0.2); border-color: #f59e0b; }
    .token-chicken .token-label { color: #f59e0b; }
    .token-lion { background: rgba(239,68,68,0.2); border-color: #ef4444; }
    .token-lion .token-label { color: #ef4444; }
    .token-fish { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
    .token-fish .token-label { color: #3b82f6; }
    .token-bike { background: rgba(168,85,247,0.2); border-color: #a855f7; }
    .token-bike .token-label { color: #a855f7; }

    /* ===== LABELS ===== */
    .section-label {
      font-size: 13px;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ===== CONTROLS ===== */
    .control-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .ctrl-btn {
      height: 36px;
      border-radius: 18px;
      font-size: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .ctrl-btn:active {
      transform: scale(0.95);
    }

    .live-btn {
      background: rgba(74,222,128,0.15);
      border-color: #4ade80;
      color: #4ade80;
    }

    .live-btn.active {
      background: rgba(239,68,68,0.25);
      border-color: #ef4444;
      color: #ef4444;
      animation: livePulse 1.8s infinite;
    }

    .start-btn.stop-state {
      background: rgba(239,68,68,0.2);
      border-color: #ef4444;
      color: #ef4444;
    }

    .next-btn {
      display: none;
    }

    .next-btn.visible {
      display: inline-flex;
    }

    .mic-btn {
      display: none;
      width: 36px;
      border-radius: 18px;
      justify-content: center;
    }

    .mic-btn.visible {
      display: inline-flex;
    }

    .mic-btn.muted {
      background: rgba(239,68,68,0.25);
      border-color: #ef4444;
      color: #ef4444;
    }

    /* video elements */
    #strangerFeed, #myFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
      transform: rotateY(180deg);
    }

    .stranger-placeholder, .my-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }

    .stranger-placeholder i, .my-placeholder i {
      font-size: 1.8rem;
    }

    .stranger-placeholder.searching-text {
      color: #fbbf24;
    }

    .my-camera.active {
      border-color: #ef4444;
    }

    .stranger-camera.connected {
      border-color: #4ade80;
      box-shadow: 0 0 8px rgba(74,222,128,0.3);
    }

    .stranger-camera.live-active {
      border-color: #ef4444;
      animation: livePulse 2s infinite;
    }

    /* ===== TOP ICONS POSITION EXACT ===== */
    .top-left-icon,
    .top-right-icon {
      position: fixed;
      top: 18px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      z-index: 200;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }

    .top-left-icon:active, .top-right-icon:active {
      transform: scale(0.92);
    }

    .top-left-icon {
      left: 14px;
      color: #ef4444;
    }

    .top-right-icon {
      right: 14px;
      color: #4ade80;
    }

    /* ===== BOTTOM NAV GAP FIX ===== */
    .floating-nav {
      position: fixed;
      bottom: 18px !important;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      background: rgba(20, 20, 25, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .nav-center {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 340px;
      gap: 0.3rem;
    }

    .nav-center a {
      color: rgba(255,255,255,0.7);
      font-size: 1.3rem;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
      text-decoration: none;
    }

    .nav-center a.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .nav-center a:active {
      transform: scale(0.92);
    }

    .nav-upload, .nav-search {
      display: none !important;
    }

    /* gift animation */
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }

    @keyframes giftFloat {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
    }

    .gift-float {
      position: absolute;
      font-size: 2rem;
      pointer-events: none;
      animation: giftFloat 1.2s ease-out forwards;
      z-index: 60;
    }

    .https-warning {
      display: none;
      background: #ef4444;
      color: white;
      text-align: center;
      font-size: 0.65rem;
      padding: 4px;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 250;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      gap: 8px;
      flex-direction: column;
    }

    /* desktop adjustments */
    @media (min-width: 1024px) {
      .main-content {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        padding: 80px 24px 100px;
      }
      .floating-nav {
        left: 1.5rem;
        top: 50%;
        bottom: auto !important;
        transform: translateY(-50%);
        width: 4rem;
        flex-direction: column;
        padding: 1rem 0.5rem;
        border-radius: 2.5rem;
      }
      .nav-center {
        flex-direction: column;
        gap: 1rem;
        max-width: none;
      }
      .top-left-icon, .top-right-icon {
        display: none;
      }
      .nav-upload, .nav-search {
        display: flex !important;
      }
      .stranger-camera {
        min-height: 400px;
      }
    }

    @media (max-width: 420px) {
      .main-content {
        padding: 68px 12px 85px;
      }
      .token-btn {
        height: 32px;
        font-size: 10px;
      }
      .ctrl-btn {
        height: 34px;
        font-size: 11px;
        padding: 0 12px;
      }
      .section-label {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
<div class="https-warning" id="httpsWarning">⚠️ Camera needs HTTPS <a href="#" onclick="switchToHTTPS()">switch</a></div>
<div class="loading-screen" id="loadingScreen"><i class="fas fa-spinner fa-pulse"></i><span>Loading...</span></div>
<div class="page" id="mainPage" style="display:none;">
  <!-- top icons exact position -->
  <a href="#" class="top-left-icon" id="liveTopIcon"><i class="fas fa-broadcast-tower"></i></a>
  <a href="#" class="top-right-icon" id="walletTopIcon"><i class="fas fa-wallet"></i></a>

  <div class="main-content">
    <div class="camera-area">
      <!-- Stranger section 62% -->
      <div class="stranger-section">
        <span class="section-label">Stranger</span>
        <div class="stranger-camera" id="strangerCamera">
          <video id="strangerFeed" autoplay playsinline></video>
          <div class="stranger-placeholder" id="strangerPlaceholder">
            <i class="fas fa-user-secret"></i>
            <span>???</span>
          </div>
        </div>
      </div>

      <!-- You section 38% -->
      <div class="you-section">
        <span class="section-label">You</span>
        <div class="my-camera" id="myCamera">
          <video id="myFeed" autoplay playsinline muted></video>
          <div class="my-placeholder" id="myPlaceholder">
            <i class="fas fa-video"></i>
            <span>off</span>
          </div>
        </div>
        <div class="token-stack" id="tokenStack">
          <button class="token-btn token-chicken" data-emoji="🍗" data-name="Chicken">
            <span class="token-emoji">🍗</span><span class="token-label">Chicken</span>
          </button>
          <button class="token-btn token-lion" data-emoji="🦁" data-name="Lion">
            <span class="token-emoji">🦁</span><span class="token-label">Lion</span>
          </button>
          <button class="token-btn token-fish" data-emoji="🐟" data-name="Fish">
            <span class="token-emoji">🐟</span><span class="token-label">Fish</span>
          </button>
          <button class="token-btn token-bike" data-emoji="🏍️" data-name="Bike">
            <span class="token-emoji">🏍️</span><span class="token-label">Bike</span>
          </button>
        </div>
      </div>
    </div>

    <div class="control-row">
      <button class="ctrl-btn live-btn" id="liveBtn"><i class="fas fa-circle"></i><span>Live</span></button>
      <button class="ctrl-btn start-btn" id="startStopBtn"><i class="fas fa-play"></i><span>Start</span></button>
      <button class="ctrl-btn next-btn" id="nextBtn"><i class="fas fa-forward"></i><span>Next</span></button>
      <button class="ctrl-btn mic-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
    </div>
  </div>

  <nav class="floating-nav">
    <div class="nav-center">
      <a href="#"><i class="fas fa-home"></i></a>
      <a href="#" class="active"><i class="fas fa-globe"></i></a>
      <a href="#"><i class="fas fa-film"></i></a>
      <a href="#"><i class="fas fa-comment-dots"></i></a>
      <a href="#"><i class="fas fa-user"></i></a>
      <a href="#" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="#" class="nav-search"><i class="fas fa-search"></i></a>
    </div>
  </nav>
</div>

<script>
  (function() {
    // init localStorage fallback for demo
    if (!localStorage.getItem("uid")) {
      localStorage.setItem("uid", "user_" + Math.floor(Math.random() * 10000));
      localStorage.setItem("currentUser", "@webUser");
    }
    const currentUser = localStorage.getItem("currentUser") || "@anonymous";

    // DOM elements
    const strangerVideo = document.getElementById("strangerFeed");
    const strangerPlaceholder = document.getElementById("strangerPlaceholder");
    const strangerContainer = document.getElementById("strangerCamera");
    const myVideo = document.getElementById("myFeed");
    const myPlaceholder = document.getElementById("myPlaceholder");
    const myCameraDiv = document.getElementById("myCamera");
    const startStopBtn = document.getElementById("startStopBtn");
    const nextBtn = document.getElementById("nextBtn");
    const micBtn = document.getElementById("micBtn");
    const liveBtn = document.getElementById("liveBtn");

    let localStream = null;
    let isCallActive = false;
    let isLiveMode = false;
    let isMuted = false;
    let fakeInterval = null;
    let fakeStream = null;
    let searchingTimeout = null;

    function updateCallUI(active) {
      if (active) {
        startStopBtn.classList.add("stop-state");
        startStopBtn.innerHTML = '<i class="fas fa-stop"></i><span>Stop</span>';
        nextBtn.classList.add("visible");
        micBtn.classList.add("visible");
        strangerContainer.classList.add("connected");
      } else {
        startStopBtn.classList.remove("stop-state");
        startStopBtn.innerHTML = '<i class="fas fa-play"></i><span>Start</span>';
        nextBtn.classList.remove("visible");
        micBtn.classList.remove("visible");
        strangerContainer.classList.remove("connected");
        strangerContainer.classList.remove("live-active");
      }
    }

    function resetStrangerView() {
      if (fakeInterval) clearInterval(fakeInterval);
      if (fakeStream) {
        fakeStream.getTracks().forEach(t => t.stop());
        fakeStream = null;
      }
      strangerVideo.style.display = "none";
      strangerVideo.srcObject = null;
      strangerPlaceholder.innerHTML = '<i class="fas fa-user-secret"></i><span>???</span>';
      strangerPlaceholder.classList.remove("searching-text");
      strangerContainer.classList.remove("connected");
    }

    function showSearching() {
      strangerPlaceholder.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span style="color:#fbbf24;">Searching...</span>';
      strangerPlaceholder.classList.add("searching-text");
    }

    async function startLocalCamera() {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 480 }, facingMode: "user" },
          audio: { echoCancellation: true, noiseSuppression: true }
        });
        localStream = stream;
        myVideo.srcObject = stream;
        myVideo.style.display = "block";
        myPlaceholder.style.display = "none";
        myCameraDiv.classList.add("active");
        await myVideo.play();
        if (isMuted) {
          const audioTrack = localStream.getAudioTracks()[0];
          if (audioTrack) audioTrack.enabled = false;
        }
        return true;
      } catch (err) {
        console.warn("Camera error", err);
        myPlaceholder.innerHTML = '<i class="fas fa-video-slash"></i><span>no cam</span>';
        return false;
      }
    }

    function stopLocalCamera() {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      myVideo.style.display = "none";
      myVideo.srcObject = null;
      myPlaceholder.style.display = "flex";
      myCameraDiv.classList.remove("active");
    }

    function toggleMute() {
      if (!localStream) return;
      const audioTrack = localStream.getAudioTracks()[0];
      if (audioTrack) {
        isMuted = !isMuted;
        audioTrack.enabled = !isMuted;
        micBtn.classList.toggle("muted", isMuted);
        micBtn.querySelector("i").className = isMuted ? "fas fa-microphone-slash" : "fas fa-microphone";
      }
    }

    // simulate stranger stream (canvas effect)
    function startStrangerSimulation() {
      if (fakeInterval) clearInterval(fakeInterval);
      const canvas = document.createElement("canvas");
      canvas.width = 640;
      canvas.height = 480;
      const ctx = canvas.getContext("2d");
      let frame = 0;
      const stream = canvas.captureStream(15);
      fakeStream = stream;
      strangerVideo.srcObject = stream;
      strangerVideo.style.display = "block";
      strangerPlaceholder.innerHTML = "";
      strangerContainer.classList.add("connected");

      fakeInterval = setInterval(() => {
        if (!isCallActive && !isLiveMode) {
          return;
        }
        ctx.fillStyle = "#0a0a1a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 26px 'Segoe UI'";
        ctx.fillStyle = "#4ade80";
        ctx.fillText("✨ STRANGER", 40, 90);
        ctx.font = "18px system-ui";
        ctx.fillStyle = "#aaa";
        ctx.fillText("connected • live video", 40, 150);
        ctx.font = "14px monospace";
        ctx.fillStyle = "#f59e0b";
        ctx.fillText("🟢 random peer", 40, 210);
        ctx.fillStyle = "#888";
        ctx.fillText("tap next to reconnect", 40, 270);
        frame++;
      }, 60);
    }

    function stopChat() {
      if (searchingTimeout) clearTimeout(searchingTimeout);
      if (fakeInterval) {
        clearInterval(fakeInterval);
        fakeInterval = null;
      }
      if (fakeStream) {
        fakeStream.getTracks().forEach(t => t.stop());
        fakeStream = null;
      }
      if (isCallActive) {
        isCallActive = false;
        resetStrangerView();
        updateCallUI(false);
      }
      if (!isLiveMode) {
        stopLocalCamera();
      } else {
        // keep camera for live
        if (localStream) {
          myVideo.srcObject = localStream;
          myVideo.style.display = "block";
          myPlaceholder.style.display = "none";
        }
      }
    }

    async function startChat() {
      if (isLiveMode) {
        alert("Please end Live broadcast before starting chat.");
        return;
      }
      if (isCallActive) return;
      const camOk = await startLocalCamera();
      if (!camOk) {
        alert("Camera access required for chat");
        return;
      }
      showSearching();
      isCallActive = true;
      if (searchingTimeout) clearTimeout(searchingTimeout);
      searchingTimeout = setTimeout(() => {
        if (isCallActive) {
          startStrangerSimulation();
          updateCallUI(true);
        }
      }, 1000);
    }

    function handleStartStop() {
      if (isLiveMode) {
        alert("End Live mode first");
        return;
      }
      if (isCallActive) {
        stopChat();
      } else {
        startChat();
      }
    }

    function handleNext() {
      if (isLiveMode) return;
      if (isCallActive) {
        // disconnect and reconnect
        stopChat();
        setTimeout(() => {
          startChat();
        }, 400);
      }
    }

    // Live mode logic
    async function toggleLive() {
      if (isCallActive) {
        alert("Stop current chat before going live");
        return;
      }
      if (!isLiveMode) {
        const camOk = await startLocalCamera();
        if (!camOk) {
          alert("Enable camera to go live");
          return;
        }
        isLiveMode = true;
        liveBtn.classList.add("active");
        liveBtn.innerHTML = '<i class="fas fa-stop-circle"></i><span>End</span>';
        strangerContainer.classList.add("live-active");
        strangerPlaceholder.innerHTML = '<i class="fas fa-broadcast-tower"></i><span style="color:#ef4444;">LIVE NOW</span>';
        strangerPlaceholder.classList.remove("searching-text");
        startStopBtn.disabled = true;
        startStopBtn.style.opacity = "0.5";
      } else {
        // end live
        isLiveMode = false;
        liveBtn.classList.remove("active");
        liveBtn.innerHTML = '<i class="fas fa-circle"></i><span>Live</span>';
        strangerContainer.classList.remove("live-active");
        resetStrangerView();
        startStopBtn.disabled = false;
        startStopBtn.style.opacity = "1";
        if (!isCallActive) {
          stopLocalCamera();
        } else {
          // if call active keep cam
        }
      }
    }

    // token send with gift animation
    function sendTokenAnimation(emoji) {
      const container = strangerContainer;
      const gift = document.createElement("div");
      gift.className = "gift-float";
      gift.textContent = emoji;
      gift.style.left = (Math.random() * 60 + 20) + "%";
      gift.style.top = "45%";
      container.appendChild(gift);
      setTimeout(() => gift.remove(), 1200);
    }

    document.querySelectorAll(".token-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const emoji = btn.getAttribute("data-emoji") || "🎁";
        sendTokenAnimation(emoji);
        if (!isCallActive && !isLiveMode) {
          const original = strangerPlaceholder.innerHTML;
          strangerPlaceholder.innerHTML = `<i class="fas fa-gift"></i><span>+${emoji}</span>`;
          setTimeout(() => {
            if (!isCallActive && !isLiveMode && strangerPlaceholder.innerHTML.includes("+")) {
              strangerPlaceholder.innerHTML = original;
            }
          }, 800);
        }
      });
    });

    // event binding
    startStopBtn.addEventListener("click", handleStartStop);
    nextBtn.addEventListener("click", handleNext);
    micBtn.addEventListener("click", toggleMute);
    liveBtn.addEventListener("click", toggleLive);

    // top icons dummy actions
    document.getElementById("liveTopIcon")?.addEventListener("click", (e) => { e.preventDefault(); if(!isLiveMode) toggleLive(); else alert("Already live"); });
    document.getElementById("walletTopIcon")?.addEventListener("click", (e) => { e.preventDefault(); alert("Wallet: 0 coins • send gifts!"); });
    document.querySelectorAll(".nav-center a").forEach(a => a.addEventListener("click", e => e.preventDefault()));

    // https warning
    window.switchToHTTPS = function() {
      if (location.protocol === "http:") location.href = location.href.replace("http://", "https://");
    };
    if (location.protocol === "http:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
      document.getElementById("httpsWarning").style.display = "block";
    }

    // finish loading
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("mainPage").style.display = "flex";
    resetStrangerView();
    updateCallUI(false);
    window.addEventListener("beforeunload", () => {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (fakeStream) fakeStream.getTracks().forEach(t => t.stop());
    });
  })();
</script>
</body>
</html>
