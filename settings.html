<!DOCTYPE html>
<html lang="en">

    .chat-input-area { display:flex;align-items:center;gap:0.4rem;padding:0.5rem 0.8rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));background:#000;border-top:1px solid rgba(255,255,255,0.06); }
    .camera-btn-s,.mic-btn-s { width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .chat-input { flex:1;padding:0.5rem 0.8rem;border-radius:1.2rem;border:1px solid rgba(255,255,255,0.1);background:#111;color:#fff;font-size:0.8rem;outline:none; }
    .send-btn { width:36px;height:36px;border-radius:50%;background:#a78bfa;border:none;color:#fff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .add-users-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:350;display:none;align-items:flex-end;justify-content:center; }

    .sheet-list { flex:1;overflow-y:auto;padding:0.5rem 0; }
    .toast { position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none; }
    .toast.show { opacity:1; }

    .recording-dot { width:10px;height:10px;border-radius:50%;background:#ef4444;animation:recPulse 0.8s infinite; }

    .recording-send-btn { width:38px;height:38px;border-radius:50%;background:#a78bfa;border:none;color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .lock-badge { font-size:0.45rem;color:#a78bfa;margin-top:0.1rem;display:flex;align-items:center;gap:0.15rem; }
    .message-image { max-width:200px;max-height:200px;border-radius:0.8rem;object-fit:cover;cursor:pointer; }
    .voice-msg { display:flex;align-items:center;gap:0.5rem;cursor:pointer;min-width:150px; }
    .voice-play-btn { width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.3);border:none;color:#fff;font-size:0.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .voice-wave-container { flex:1;display:flex;align-items:center;gap:1px;height:24px; }
    .voice-wave-bar { width:2px;border-radius:1px;opacity:0.6;background:#fff; }
    .voice-duration { font-size:0.5rem;opacity:0.6;min-width:50px;text-align:right; }
  </style>
</head>
<body>
  <div class="page" id="mainPage">
    <div class="scrollable-content">
      <div class="top-icons">
        <button class="corner-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
        <span class="top-brand">Settings</span>
        <div style="width:2.4rem;"></div>
      </div>
      <div class="content" id="mainView">
        <button class="create-btn" id="createLockBtn"><i class="fas fa-plus-circle"></i> Create New Lock</button>
        <div class="numpad-section">

          <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>

            <button class="numpad-key" data-num="1">1</button><button class="numpad-key" data-num="2">2</button><button class="numpad-key" data-num="3">3</button>
            <button class="numpad-key" data-num="4">4</button><button class="numpad-key" data-num="5">5</button><button class="numpad-key" data-num="6">6</button>
            <button class="numpad-key" data-num="7">7</button><button class="numpad-key" data-num="8">8</button><button class="numpad-key" data-num="9">9</button>
            <button class="numpad-key empty"></button><button class="numpad-key" data-num="0">0</button>
            <button class="numpad-key delete-btn" id="mainDeleteBtn"><i class="fas fa-delete-left"></i></button>
          </div>
        </div>
      </div>
      <div class="content" id="lockDetailView" style="display:none;">
        <div class="lock-info-bar"><span><i class="fas fa-shield-halved"></i></span><span style="font-size:0.7rem;color:#FFFC00;" id="lockInfoText">🔒 Lock</span></div>
        <div style="font-size:0.6rem;color:#888;width:100%;">Users <span id="lockUserCount"></span></div>
        <div class="users-list" id="lockUsersList"></div>
        <button class="add-user-btn" id="addUserBtn"><i class="fas fa-user-plus"></i> Add Users to Lock</button>
        <button class="btn-delete" id="deleteLockBtn"><i class="fas fa-trash"></i> Delete Lock</button>
      </div>
    </div>

    <div class="chat-fullscreen" id="chatFullscreen">
      <div class="chat-header-bar">
        <button class="chat-back-btn" id="chatBackBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-avatar" id="chatAvatar"><i class="fas fa-user"></i></div>
        <div class="chat-partner-info" id="chatPartnerInfo">
          <div class="chat-partner-name" id="chatPartnerName">User</div>
          <div class="chat-partner-status"><span style="width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block;"></span> online</div>
        </div>
        <div class="call-btns">
          <button class="call-btn" id="audioCallBtn" style="color:#60a5fa;"><i class="fas fa-phone"></i></button>
          <button class="call-btn" id="videoCallBtn" style="color:#4ade80;"><i class="fas fa-video"></i></button>
        </div>
      </div>
      <div class="messages-container" id="messagesContainer"><div class="empty-chat-full">Send a message!</div></div>
      <div class="recording-bar" id="recordingBar">
        <div class="recording-dot"></div><span class="recording-time-text" id="recTime">00:00</span>
        <button class="recording-cancel" id="cancelVoiceBtn">✕</button>
        <button class="recording-send-btn" id="sendVoiceBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
      <div class="chat-input-area">
        <button class="camera-btn-s" id="cameraBtn"><i class="fas fa-camera"></i></button>

      </div>
    </div>

    <div class="modal-overlay" id="createLockModal">
      <div class="modal">
        <h3>🔐 Create New Lock</h3>
        <p style="color:#888;font-size:0.65rem;">Enter a 4-digit PIN</p>
        <div class="pin-dots" id="createPinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <p style="color:#ef4444;font-size:0.6rem;min-height:1rem;" id="createErrorMsg"></p>
        <div class="numpad-grid" id="createNumpad">
          <button class="numpad-key" data-cnum="1">1</button><button class="numpad-key" data-cnum="2">2</button><button class="numpad-key" data-cnum="3">3</button>
          <button class="numpad-key" data-cnum="4">4</button><button class="numpad-key" data-cnum="5">5</button><button class="numpad-key" data-cnum="6">6</button>
          <button class="numpad-key" data-cnum="7">7</button><button class="numpad-key" data-cnum="8">8</button><button class="numpad-key" data-cnum="9">9</button>
          <button class="numpad-key empty"></button><button class="numpad-key" data-cnum="0">0</button>

    <div class="add-users-overlay" id="addUsersOverlay">
      <div class="add-users-sheet">
        <div class="sheet-header"><h3 style="font-size:0.85rem;color:#fff;">👥 Add Users</h3><button id="closeSheetBtn" style="background:none;border:none;color:#fff;font-size:1rem;cursor:pointer;"><i class="fas fa-times"></i></button></div>
        <div style="padding:0.5rem 1rem;"><input type="text" id="userSearchInput" placeholder="🔍 Search users..." style="width:100%;padding:0.5rem;border-radius:0.5rem;border:1px solid rgba(255,255,255,0.1);background:#111;color:#fff;font-size:0.75rem;outline:none;"></div>
        <div class="sheet-tabs" id="sheetTabs">
          <div class="sheet-tab active" data-tab="besties">⭐ Besties</div>
          <div class="sheet-tab" data-tab="friends">👥 Friends</div>
          <div class="sheet-tab" data-tab="all">🌐 All</div>
        </div>
        <div class="sheet-list" id="usersSheetList"></div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    if(!localStorage.getItem("uid")){window.location.replace("login.html");}
    const currentUser=localStorage.getItem('currentUser')||'@anonymous',currentUserId=currentUser.replace('@','');
    
    let locks=[],currentLockIndex=-1,currentView='main',accessPin='',createPin='',createConfirmPin='',isCreateConfirmStep=false;
    let currentUserTab='besties',allUsersList=[],friendsList=[],bestiesList=[],chatPartner=null,chatId=null,unsubMessages=null,userProfiles={};
    let mediaRecorder=null,audioChunks=[],voiceTimer=null,voiceSeconds=0,isRecording=false;
    let lockCheckCache={},lockCheckCacheTime={};
    const addUserFromChat=sessionStorage.getItem('settingsAddUser'),newLockFlag=sessionStorage.getItem('settingsNewLock');

    function isBothLocked(id){const n=Date.now();if(lockCheckCache[id]&&(n-lockCheckCacheTime[id]<30000))return lockCheckCache[id];let r=false;try{const d=localStorage.getItem('chat_locks_'+id);if(d)r=JSON.parse(d).some(l=>(l.users||[]).some(u=>u.username===currentUser))}catch(e){}lockCheckCache[id]=r;lockCheckCacheTime[id]=n;return r}
    function loadLocks(){const s=localStorage.getItem('chat_locks_'+currentUserId);if(s){try{locks=JSON.parse(s)}catch(e){locks=[]}}else{locks=[]}}
    function saveLocks(){localStorage.setItem('chat_locks_'+currentUserId,JSON.stringify(locks));lockCheckCache={};}
    function loadUserLists(){const p=JSON.parse(localStorage.getItem('userProfile')||'{}');bestiesList=(p.besties||[]).map(f=>({name:(f.name||'').replace('@',''),username:f.name||'',avatar:f.avatar||null,type:'bestie'}));friendsList=(p.friends||[]).map(f=>({name:(f.name||'').replace('@',''),username:f.name||'',avatar:f.avatar||null,type:'friend'}));const m={};[...bestiesList,...friendsList].forEach(u=>{if(!m[u.username]){m[u.username]=u;userProfiles[u.username]={name:u.name,avatar:u.avatar}}});allUsersList=Object.values(m)}
    function avatarHTML(u){const p=userProfiles[u];if(p&&p.avatar&&p.avatar!=='null')return`<img src="${p.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;">`;return(u||'U').replace('@','').charAt(0).toUpperCase()}
    function dispName(u){const p=userProfiles[u];return p?p.name:(u||'').replace('@','')}
    function formatDuration(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}

    // ✅ ALL EVENT BINDINGS
    document.getElementById('backBtn').addEventListener('click',()=>{if(currentView==='lockDetail'){document.getElementById('lockDetailView').style.display='none';document.getElementById('mainView').style.display='flex';currentLockIndex=-1;currentView='main'}else{window.history.back()}});
    document.getElementById('createLockBtn').addEventListener('click',()=>{createPin='';createConfirmPin='';isCreateConfirmStep=false;document.getElementById('createLockConfirm').textContent='Create';document.getElementById('createLockConfirm').disabled=true;document.getElementById('createErrorMsg').textContent='';updateCDots();document.getElementById('createLockModal').classList.add('show')});
    
    // Main numpad
    document.querySelectorAll('#mainNumpad .numpad-key[data-num]').forEach(btn=>{btn.addEventListener('click',()=>{if(accessPin.length<4){accessPin+=btn.dataset.num;updateDots();if(accessPin.length===4)setTimeout(checkPin,300)}})});
    document.getElementById('mainDeleteBtn').addEventListener('click',()=>{accessPin=accessPin.slice(0,-1);document.getElementById('errorMsg').textContent='';updateDots()});
    
    // Create numpad
    document.querySelectorAll('#createNumpad .numpad-key[data-cnum]').forEach(btn=>{btn.addEventListener('click',()=>{if(isCreateConfirmStep){if(createConfirmPin.length<4){createConfirmPin+=btn.dataset.cnum;updateCDots();if(createConfirmPin.length===4)document.getElementById('createLockConfirm').disabled=false}}else{if(createPin.length<4){createPin+=btn.dataset.cnum;updateCDots();if(createPin.length===4)setTimeout(()=>{isCreateConfirmStep=true;document.getElementById('createLockConfirm').textContent='Create Lock';document.getElementById('createLockConfirm').disabled=true;updateCDots()},200)}}})});
    document.getElementById('createDeleteBtn').addEventListener('click',()=>{if(isCreateConfirmStep)createConfirmPin=createConfirmPin.slice(0,-1);else createPin=createPin.slice(0,-1);document.getElementById('createLockConfirm').disabled=true;updateCDots()});
    
    document.getElementById('cancelLockBtn').addEventListener('click',()=>{document.getElementById('createLockModal').classList.remove('show')});
    document.getElementById('createLockConfirm').addEventListener('click',()=>{
      if(createPin.length===4&&createConfirmPin.length===4&&createPin===createConfirmPin){
        if(locks.some(l=>l.pin===createPin)){document.getElementById('createErrorMsg').textContent='❌ PIN exists!';return}
        const nl={name:'Lock '+(locks.length+1),pin:createPin,users:[],createdAt:new Date().toISOString()};
        if(addUserFromChat&&newLockFlag){nl.users.push({username:addUserFromChat,name:addUserFromChat.replace('@',''),avatar:null});sessionStorage.removeItem('settingsAddUser');sessionStorage.removeItem('settingsNewLock')}
        locks.push(nl);saveLocks();document.getElementById('createLockModal').classList.remove('show');showToast('✅ Lock created!');
        if(addUserFromChat&&newLockFlag){currentLockIndex=locks.length-1;document.getElementById('mainView').style.display='none';document.getElementById('lockDetailView').style.display='flex';document.getElementById('lockInfoText').textContent='🔒 '+nl.name;currentView='lockDetail';renderLockUsers()}
      }else{document.getElementById('createErrorMsg').textContent='❌ PINs mismatch!'}
    });
    document.getElementById('createLockModal').addEventListener('click',function(e){if(e.target===this)document.getElementById('createLockModal').classList.remove('show')});

    document.getElementById('addUserBtn').addEventListener('click',()=>{loadUserLists();currentUserTab='besties';document.querySelectorAll('#sheetTabs .sheet-tab').forEach((t,i)=>t.classList.toggle('active',i===0));document.getElementById('userSearchInput').value='';renderUsersSheet(bestiesList);document.getElementById('addUsersOverlay').classList.add('show')});
    document.getElementById('closeSheetBtn').addEventListener('click',()=>document.getElementById('addUsersOverlay').classList.remove('show'));
    document.getElementById('userSearchInput').addEventListener('input',()=>{const s=document.getElementById('userSearchInput').value.toLowerCase();let src=currentUserTab==='besties'?bestiesList:currentUserTab==='friends'?friendsList:allUsersList;renderUsersSheet(src.filter(u=>u.name.toLowerCase().includes(s)||u.username.toLowerCase().includes(s)))});
    document.querySelectorAll('#sheetTabs .sheet-tab').forEach(tab=>{tab.addEventListener('click',function(){currentUserTab=this.dataset.tab;document.querySelectorAll('#sheetTabs .sheet-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.getElementById('userSearchInput').value='';if(currentUserTab==='besties')renderUsersSheet(bestiesList);else if(currentUserTab==='friends')renderUsersSheet(friendsList);else renderUsersSheet(allUsersList)})});
    document.getElementById('addUsersOverlay').addEventListener('click',function(e){if(e.target===this)document.getElementById('addUsersOverlay').classList.remove('show')});
    document.getElementById('deleteLockBtn').addEventListener('click',()=>{if(currentLockIndex<0)return;if(confirm('Delete this lock?')){locks.splice(currentLockIndex,1);saveLocks();document.getElementById('lockDetailView').style.display='none';document.getElementById('mainView').style.display='flex';currentLockIndex=-1;currentView='main';showToast('Lock deleted')}});

    // Chat
    document.getElementById('chatBackBtn').addEventListener('click',()=>{if(unsubMessages){unsubMessages();unsubMessages=null}stopVoice(true);chatPartner=null;chatId=null;document.getElementById('chatFullscreen').classList.remove('show')});
    document.getElementById('chatPartnerInfo').addEventListener('click',()=>{if(chatPartner)window.location.href='profile.html?user='+encodeURIComponent(chatPartner)});
    document.getElementById('audioCallBtn').addEventListener('click',()=>showToast('📞 Audio call...'));
    document.getElementById('videoCallBtn').addEventListener('click',()=>showToast('📹 Video call...'));
    document.getElementById('sendBtn').addEventListener('click',()=>sendMsg());
    document.getElementById('micBtn').addEventListener('click',()=>{if(isRecording){sendVoiceMsg()}else{startVoice()}});
    document.getElementById('cameraBtn').addEventListener('click',()=>document.getElementById('imageInput').click());
    document.getElementById('imageInput').addEventListener('change',(e)=>sendImageMsg(e));
    document.getElementById('cancelVoiceBtn').addEventListener('click',()=>{stopVoice(true)});
    document.getElementById('sendVoiceBtn').addEventListener('click',()=>sendVoiceMsg());
    document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMsg()}});

    function updateDots(){document.querySelectorAll('#pinDots .pin-dot').forEach((dot,i)=>{dot.classList.remove('filled','error');if(i<accessPin.length)dot.classList.add('filled')})}
    function updateCDots(){const cp=isCreateConfirmStep?createConfirmPin:createPin;document.querySelectorAll('#createPinDots .pin-dot').forEach((dot,i)=>{dot.classList.remove('filled','error');if(i<cp.length)dot.classList.add('filled')})}
    function checkPin(){const pin=accessPin;accessPin='';updateDots();const i=locks.findIndex(l=>l.pin===pin);if(i>=0){currentLockIndex=i;document.getElementById('errorMsg').textContent='';document.getElementById('mainView').style.display='none';document.getElementById('lockDetailView').style.display='flex';document.getElementById('lockInfoText').textContent='🔒 '+locks[i].name;currentView='lockDetail';renderLockUsers()}else{document.getElementById('errorMsg').textContent='❌ Wrong PIN!';document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.add('error'));setTimeout(()=>{document.getElementById('errorMsg').textContent='';document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.remove('error'))},1200)}}

    function renderUsersSheet(users){const ex=(locks[currentLockIndex]?.users||[]).map(u=>u.username);const c=document.getElementById('usersSheetList');if(!users||users.length===0){c.innerHTML='<div style="text-align:center;color:#555;padding:2rem;">No users</div>';return}c.innerHTML=users.map(u=>{const added=ex.includes(u.username);return`<div style="display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1rem;cursor:pointer;"><div style="width:36px;height:36px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.8rem;overflow:hidden;">${u.avatar&&u.avatar!=='null'?`<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;">`:u.name.charAt(0).toUpperCase()}</div><div style="flex:1;"><div style="font-size:0.8rem;">${u.name}</div><div style="font-size:0.6rem;color:#888;">@${u.username.replace('@','')}</div></div>${added?'<span style="color:#4ade80;"><i class="fas fa-check-circle"></i></span>':`<button onclick="window.addUserFromSheet('${u.username}','${u.name}','${u.avatar||''}')" style="background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);color:#a78bfa;width:28px;height:28px;border-radius:50%;font-size:0.7rem;cursor:pointer;"><i class="fas fa-plus"></i></button>`}</div>`}).join('')}
    
    window.addUserFromSheet=function(username,name,avatar){if(currentLockIndex<0)return;const lock=locks[currentLockIndex];if(!lock.users)lock.users=[];if(lock.users.some(u=>u.username===username)){showToast('Already added!');return}lock.users.push({username,name,avatar:avatar&&avatar!=='null'?avatar:null});if(avatar)userProfiles[username]={name,avatar};saveLocks();renderLockUsers();showToast('✅ User added!')};

    function renderLockUsers(){if(currentLockIndex<0)return;const lock=locks[currentLockIndex];const c=document.getElementById('lockUsersList');document.getElementById('lockUserCount').textContent=lock.users?'('+lock.users.length+')':'(0)';if(!lock.users||lock.users.length===0){c.innerHTML='<div style="text-align:center;color:#555;padding:3rem;">No users yet</div>';return}c.innerHTML=lock.users.map((u,i)=>`<div class="user-list-item" onclick="openChatWith('${u.username}','${(u.name||u.username).replace('@','')}','${u.avatar||''}')"><div class="user-avatar">${avatarHTML(u.username)}</div><div class="user-info"><div class="user-name">${(u.name||u.username).replace('@','')}</div></div><button style="background:rgba(239,68,68,0.15);color:#ef4444;border:none;width:28px;height:28px;border-radius:50%;font-size:0.6rem;cursor:pointer;" onclick="event.stopPropagation();removeUser(${i})"><i class="fas fa-times"></i></button></div>`).join('')}
    
    window.openChatWith=function(username,displayName,avatarUrl){chatPartner=username;chatId=[currentUserId,username.replace('@','')].sort().join('_');const ae=document.getElementById('chatAvatar');if(avatarUrl&&avatarUrl!=='null'){ae.innerHTML=`<img src="${avatarUrl}" alt="" style="width:100%;height:100%;object-fit:cover;">`}else{ae.innerHTML=displayName.charAt(0).toUpperCase()}document.getElementById('chatPartnerName').textContent=displayName;document.getElementById('chatFullscreen').classList.add('show');listenMsgs()};
    function removeUser(i){if(currentLockIndex<0)return;locks[currentLockIndex].users.splice(i,1);saveLocks();renderLockUsers();showToast('User removed')}

    // Messages
    async function ensureDoc(){const ref=doc(db,'chats',chatId);if(!(await getDoc(ref)).exists())await setDoc(ref,{users:[currentUserId,chatPartner.replace('@','')],lastMessage:'',lastType:'text',lastTime:serverTimestamp()})}
    function listenMsgs(){if(unsubMessages){unsubMessages();unsubMessages=null}const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','asc'),limit(50));getDocs(q).then(snap=>{const c=document.getElementById('messagesContainer');c.innerHTML='';if(snap.empty){c.innerHTML='<div class="empty-chat-full">Send a message!</div>'}else{const f=document.createDocumentFragment();snap.forEach(d=>{const el=createMsg(d.id,d.data());if(el)f.appendChild(el)});c.appendChild(f)}c.scrollTop=c.scrollHeight});unsubMessages=onSnapshot(q,(snap)=>{const c=document.getElementById('messagesContainer');const ee=c.querySelector('.empty-chat-full');if(ee&&!snap.empty)c.innerHTML='';snap.docChanges().forEach(ch=>{if(ch.type==='added'&&!document.getElementById('m-'+ch.doc.id)){const el=createMsg(ch.doc.id,ch.doc.data());if(el){c.appendChild(el);c.scrollTop=c.scrollHeight}}})});}
    function createMsg(id,msg){const isSent=msg.sender===currentUserId;if(document.getElementById('m-'+id))return null;const w=document.createElement('div');w.className='message-wrapper '+(isSent?'sent':'received');w.id='m-'+id;const b=document.createElement('div');b.className='message-bubble';let time='';if(msg.createdAt)try{time=new Date(msg.createdAt.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}catch(e){}if(msg.imageUrl){b.innerHTML=`<img src="${msg.imageUrl}" style="max-width:180px;max-height:180px;border-radius:0.5rem;cursor:pointer;" onclick="window.open('${msg.imageUrl}')"><div class="message-time">${time}</div><div class="lock-badge"><i class="fas fa-shield-halved"></i> Private</div>`}else if(msg.audioUrl){const dur=msg.audioDuration||0;b.innerHTML=`<div class="voice-msg" data-audio="${msg.audioUrl}" data-duration="${dur}" onclick="playVoice(this)"><button class="voice-play-btn"><i class="fas fa-play"></i></button><div class="voice-wave-container">${genBars(16)}</div><span class="voice-duration">0:00 / ${formatDuration(dur)}</span></div><div class="message-time">${time}</div><div class="lock-badge"><i class="fas fa-shield-halved"></i> Private</div>`}else{b.textContent=msg.text||'';const te=document.createElement('div');te.className='message-time';te.textContent=time;b.appendChild(te);const badge=document.createElement('div');badge.className='lock-badge';badge.innerHTML='<i class="fas fa-shield-halved"></i> Private';b.appendChild(badge)}w.appendChild(b);return w}
    function genBars(n){let h='';for(let i=0;i<n;i++)h+=`<div class="voice-wave-bar" style="height:${Math.floor(Math.random()*20)+4}px;"></div>`;return h}

    async function sendMsg(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||!chatId)return;input.value='';try{const ri=chatPartner.replace('@','');if(isBothLocked(ri)){const pr=doc(db,'private_chats',chatId);const snap=await getDoc(pr);if(!snap.exists())await setDoc(pr,{users:[currentUserId,ri],lastMessage:'',lastTime:serverTimestamp()});await addDoc(collection(db,'private_chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(pr,{lastMessage:text,lastTime:serverTimestamp(),['unread_'+ri]:increment(1)})}else{await ensureDoc();await addDoc(collection(db,'chats',chatId,'messages'),{text,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});await updateDoc(doc(db,'chats',chatId),{lastMessage:'🔒 '+text,lastType:'text',lastTime:serverTimestamp(),['unread_'+ri]:increment(1),source:'settings'})}}catch(e){}}
    async function sendImageMsg(e){const file=e.target.files[0];if(!file||!chatId)return;const r=new FileReader();r.onload=async function(ev){try{const ri=chatPartner.replace('@','');if(isBothLocked(ri)){const pr=doc(db,'private_chats',chatId);if(!(await getDoc(pr)).exists())await setDoc(pr,{users:[currentUserId,ri],lastMessage:'',lastTime:serverTimestamp()});await addDoc(collection(db,'private_chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(pr,{lastMessage:'📷 Photo',lastTime:serverTimestamp(),['unread_'+ri]:increment(1)})}else{await ensureDoc();await addDoc(collection(db,'chats',chatId,'messages'),{imageUrl:ev.target.result,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});await updateDoc(doc(db,'chats',chatId),{lastMessage:'📷 Photo',lastType:'image',lastTime:serverTimestamp(),['unread_'+ri]:increment(1),source:'settings'})}}catch(err){}};r.readAsDataURL(file);e.target.value=''}

    async function startVoice(){if(!chatId)return;try{const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop())};mediaRecorder.start(100);isRecording=true;voiceSeconds=0;document.getElementById('recordingBar').classList.add('show');document.getElementById('micBtn').style.display='none';document.getElementById('sendBtn').style.display='none';document.getElementById('chatInput').style.display='none';document.getElementById('recTime').textContent='00:00';voiceTimer=setInterval(()=>{voiceSeconds++;document.getElementById('recTime').textContent=formatDuration(voiceSeconds)},1000)}catch(e){}}
    function stopVoice(c){if(mediaRecorder&&isRecording){if(c)audioChunks=[];if(mediaRecorder.state==='recording')mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block'}}
    async function sendVoiceMsg(){if(!mediaRecorder||!isRecording)return;if(voiceSeconds<1){stopVoice(true);return}mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:'audio/webm'});const reader=new FileReader();reader.onload=async function(e){try{const ri=chatPartner.replace('@','');if(isBothLocked(ri)){const pr=doc(db,'private_chats',chatId);if(!(await getDoc(pr)).exists())await setDoc(pr,{users:[currentUserId,ri],lastMessage:'',lastTime:serverTimestamp()});await addDoc(collection(db,'private_chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,sender:currentUserId,createdAt:serverTimestamp(),seen:false});await updateDoc(pr,{lastMessage:'🎤 Voice',lastTime:serverTimestamp(),['unread_'+ri]:increment(1)})}else{await ensureDoc();await addDoc(collection(db,'chats',chatId,'messages'),{audioUrl:e.target.result,audioDuration:voiceSeconds,sender:currentUserId,createdAt:serverTimestamp(),seen:false,source:'settings'});await updateDoc(doc(db,'chats',chatId),{lastMessage:'🎤 Voice',lastType:'audio',lastTime:serverTimestamp(),['unread_'+ri]:increment(1),source:'settings'})}}catch(err){}};reader.readAsDataURL(blob)};mediaRecorder.stop();isRecording=false;clearInterval(voiceTimer);document.getElementById('recordingBar').classList.remove('show');document.getElementById('micBtn').style.display='flex';document.getElementById('sendBtn').style.display='flex';document.getElementById('chatInput').style.display='block'}

    window.playVoice=function(el){const audioUrl=el.getAttribute('data-audio');const btn=el.querySelector('.voice-play-btn i');const ds=el.querySelector('.voice-duration');const td=parseFloat(el.getAttribute('data-duration')||'0');document.querySelectorAll('.voice-msg').forEach(m=>{if(m!==el&&m._audio){m._audio.pause();const ob=m.querySelector('.voice-play-btn i');if(ob)ob.className='fas fa-play'}});if(!el._audio){el._audio=new Audio(audioUrl);el._totalDur=td;if(ds)ds.textContent='0:00 / '+formatDuration(td);el._audio.ontimeupdate=()=>{if(ds&&el._audio&&el._totalDur)ds.textContent=formatDuration(el._audio.currentTime)+' / '+formatDuration(el._totalDur)};el._audio.onended=()=>{btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent='0:00 / '+formatDuration(el._totalDur)}}const audio=el._audio;if(audio.paused){audio.play().catch(()=>{});btn.className='fas fa-pause'}else{audio.pause();btn.className='fas fa-play';if(ds&&el._totalDur)ds.textContent=formatDuration(audio.currentTime)+' / '+formatDuration(el._totalDur)}}

    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}

    loadLocks();loadUserLists();
    if(addUserFromChat&&!newLockFlag){if(locks.length>0){showToast('🔐 Enter PIN to add @'+addUserFromChat.replace('@',''))}else{setTimeout(()=>document.getElementById('createLockBtn').click(),500)}}
    if(addUserFromChat&&newLockFlag){setTimeout(()=>document.getElementById('createLockBtn').click(),500)}
  </script>
</body>
</html>
