<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Web • Live Chat • Glass</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { 
      background: radial-gradient(circle at 30% 10%, #1a1a2e, #0f0f1a);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overscroll-behavior: none;
      overflow: hidden;
    }
    
    /* ✅ Glass background base – subtle animated gradient */
    .page { 
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: transparent;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    
    /* Glass morphism utility – frosted glass with subtle border */
    .glass-card {
      background: rgba(20, 20, 35, 0.45);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-radius: 18px;
    }
    
    .glass-circle {
      background: rgba(25, 25, 45, 0.5);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    @keyframes livePulse { 
      0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.8), 0 10px 25px rgba(0,0,0,0.5)} 
      50%{box-shadow:0 0 0 12px rgba(239,68,68,0), 0 15px 30px rgba(0,0,0,0.6)} 
    }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes giftFloat { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-70px) scale(1.4);opacity:0} }
    
    /* ✅ Top icons – glass circles */
    .top-left-icon {
      position:fixed; top:max(1.2rem,env(safe-area-inset-top,1.2rem)); left:max(1.2rem,env(safe-area-inset-left,1.2rem)); z-index:200;
      width:2.6rem; height:2.6rem;
      background: rgba(239,68,68,0.25);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(239,68,68,0.45);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      border-radius:50%; color:#ff8a8a; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; cursor:pointer; animation:pulse 2.5s infinite;
    }
    .top-left-icon:hover { background:rgba(239,68,68,0.45); }
    
    .top-right-icon {
      position:fixed; top:max(1.2rem,env(safe-area-inset-top,1.2rem)); right:max(1.2rem,env(safe-area-inset-right,1.2rem)); z-index:200;
      width:2.6rem; height:2.6rem;
      background: rgba(74,222,128,0.2);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(74,222,128,0.4);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      border-radius:50%; color:#86efac; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; cursor:pointer;
    }
    .top-right-icon:hover { background:rgba(74,222,128,0.35); }
    
    /* Main content padding */
    .main-content {
      flex:1; display:flex; flex-direction:column; 
      padding: 3.8rem 1.3rem 1rem 1.3rem; 
      position:relative; gap:10px;
    }
    
    .section-label {
      font-size: 0.8rem; font-weight: 600; 
      color: rgba(255,255,255,0.7); letter-spacing: 1.2px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      margin-bottom: 2px;
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,0,0,0.3);
    }
    
    .camera-area {
      display:flex; gap:10px; align-items:flex-start;
    }
    
    /* Stranger camera glass */
    .stranger-section { width:60%; display:flex; flex-direction:column; gap:6px; }
    .stranger-camera {
      width:100%; height:55vh; 
      background: rgba(10, 10, 20, 0.55);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1.5px solid rgba(255,255,255,0.2);
      box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.2);
      border-radius: 20px;
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .stranger-camera.connected { border-color: rgba(74,222,128,0.7); }
    .stranger-camera.live-active { 
      border-color: #ef4444; 
      animation:livePulse 2s infinite;
      box-shadow: 0 0 25px rgba(239,68,68,0.5);
    }
    #strangerFeed { width:100%; height:100%; object-fit:cover; display:none; background:#000; transform:rotateY(180deg); -webkit-transform:rotateY(180deg); }
    .stranger-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:rgba(255,255,255,0.35); text-shadow:0 2px 4px black; }
    .stranger-placeholder i { font-size:2.8rem; filter: drop-shadow(0 4px 6px black); }
    .stranger-placeholder span { font-size:0.9rem; font-weight:500; }
    .stranger-placeholder.searching-text { color:#fbbf24; }
    
    /* My camera glass */
    .you-section { width:35%; display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
    .my-camera {
      width:100%; height:28vh; 
      background: rgba(15, 15, 28, 0.6);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1.5px solid rgba(255,255,255,0.25);
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
      border-radius: 20px;
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    .my-camera.active { border-color: #ef4444; }
    #myFeed { width:100%; height:100%; object-fit:cover; display:none; background:#000; transform:rotateY(180deg); -webkit-transform:rotateY(180deg); }
    .my-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:rgba(255,255,255,0.45); font-size:0.7rem; }
    .my-placeholder i { font-size:1.4rem; }
    
    /* Token buttons – glass style */
    .token-stack { display:flex; flex-direction:column; gap:12px; align-items:flex-end; margin-top:6px; }
    .token-btn {
      width:95px; height:34px; border-radius: 25px;
      background: rgba(20, 20, 30, 0.5);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
      font-size:0.7rem; font-weight:600; transition:all 0.2s; color:#fff; padding:0 12px;
      letter-spacing: 0.3px;
    }
    .token-btn:active { transform:scale(0.92); }
    .token-btn .token-emoji { font-size:0.9rem; line-height:1; filter: drop-shadow(0 2px 3px black); }
    .token-btn .token-label { font-size:0.65rem; font-weight:700; }
    
    .token-btn.token-chicken { border-color: rgba(245,158,11,0.6); background: rgba(245,158,11,0.2); }
    .token-btn.token-chicken .token-label { color:#fcd34d; }
    .token-btn.token-lion { border-color: rgba(239,68,68,0.6); background: rgba(239,68,68,0.2); }
    .token-btn.token-lion .token-label { color:#fca5a5; }
    .token-btn.token-fish { border-color: rgba(59,130,246,0.6); background: rgba(59,130,246,0.2); }
    .token-btn.token-fish .token-label { color:#93c5fd; }
    .token-btn.token-bike { border-color: rgba(168,85,247,0.6); background: rgba(168,85,247,0.2); }
    .token-btn.token-bike .token-label { color:#c4b5fd; }
    
    .gift-float { position:absolute; font-size:2.2rem; pointer-events:none; animation:giftFloat 1.5s ease-out forwards; z-index:50; filter: drop-shadow(0 0 8px white); }
    
    /* Control row glass */
    .control-row { display:flex; gap:12px; align-items:center; margin-top: 4px; }
    .ctrl-btn {
      height: 38px; border-radius: 30px;
      background: rgba(25, 25, 40, 0.55);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      display:inline-flex; align-items:center; justify-content:center; gap:5px;
      cursor:pointer; outline:none;
      font-size:0.75rem; font-weight:600; padding:0 18px; color:#fff;
      transition:all 0.25s; touch-action:manipulation; user-select:none;
    }
    .ctrl-btn:active { transform:scale(0.94); }
    .live-btn { background: rgba(74,222,128,0.25); border-color: rgba(74,222,128,0.5); color:#86efac; }
    .live-btn.active { background: rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.7); color:#fca5a5; animation:livePulse 2s infinite; }
    .start-btn { background: rgba(74,222,128,0.25); border-color: rgba(74,222,128,0.5); color:#86efac; }
    .start-btn.stop-state { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.55); color:#fca5a5; }
    
    .next-btn { display:none; width:70px; }
    .next-btn.visible { display:inline-flex; }
    .mic-btn { display:none; width:38px; height:38px; border-radius:50%; }
    .mic-btn.visible { display:inline-flex; }
    .mic-btn.muted { background: rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.6); color:#f87171; }

    .https-warning { display:none; background:#ef4444; color:#fff; text-align:center; padding:5px; font-size:0.6rem; font-weight:600; z-index:200; width:100%; backdrop-filter: blur(8px); }
    .https-warning.show { display:block; }
    .loading-screen { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); backdrop-filter: blur(12px); display:flex; align-items:center; justify-content:center; z-index:500; flex-direction:column; gap:10px; }
    .loading-screen i { font-size:2.4rem; color:#a78bfa; animation:spin 1s infinite; }
    .loading-screen span { font-size:0.8rem; color:#ccc; }

    /* Navbar glass */
    .floating-nav { 
      position:fixed; bottom:max(1.2rem,env(safe-area-inset-bottom,1.2rem));
      left:50%; transform:translateX(-50%); width:92%; max-width:500px;
      background: rgba(15, 15, 25, 0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 3rem; padding:0.8rem 1.6rem; display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 15px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
      z-index:100;
    }
    .nav-center { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:380px; gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.75); font-size:1.4rem; display:flex; align-items:center; justify-content:center; width:2.6rem; height:2.6rem; border-radius:50%; transition:all 0.3s; text-decoration:none; background:transparent; }
    .nav-center a:hover { color:#fff; background:rgba(255,255,255,0.2); }
    .nav-center a.active { color:#fff; background:rgba(255,255,255,0.25); box-shadow:0 0 22px rgba(255,255,255,0.3); }
    .nav-upload,.nav-search { display:none !important; }

    @media (min-width:1024px) {
      .nav-upload,.nav-search { display:flex !important; }
      .top-left-icon,.top-right-icon { display:none !important; }
      .floating-nav{position:fixed;top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:4rem;max-width:none;border-radius:2.8rem;padding:1.2rem 0.7rem;flex-direction:column;}
      .nav-center{flex-direction:column;gap:1.4rem;}.nav-center a{font-size:1.5rem;width:2.8rem;height:2.8rem}
      .page{padding-left:5.5rem}
      .main-content{max-width:850px;margin:0 auto;width:100%;}
    }
  </style>
</head>
<body>

  </div>
  <script>
    if (!localStorage.getItem("uid")) { window.location.replace("login.html"); }
    if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      document.getElementById('httpsWarning').classList.add('show');
    }
    window.switchToHTTPS = function() { window.location.href = window.location.href.replace('http://', 'https://'); };
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, addDoc, onSnapshot, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainPage').style.display = 'flex';
    startWebChat();

    window.sendToken = function(emoji, name) {
      const strangerCam = document.getElementById('strangerCamera');
      const float = document.createElement('span');
      float.className = 'gift-float';
      float.textContent = emoji;
      float.style.left = (Math.random() * 60 + 20) + '%';
      float.style.top = '50%';
      strangerCam.appendChild(float);
      setTimeout(() => float.remove(), 1500);
    };

    function startWebChat() {
      const myFeed=document.getElementById('myFeed'),myPlaceholder=document.getElementById('myPlaceholder'),myCameraEl=document.getElementById('myCamera');
      const strangerFeed=document.getElementById('strangerFeed'),strangerPlaceholder=document.getElementById('strangerPlaceholder'),strangerCamera=document.getElementById('strangerCamera');
      const startStopBtn=document.getElementById('startStopBtn'),nextBtn=document.getElementById('nextBtn'),micBtn=document.getElementById('micBtn'),liveBtn=document.getElementById('liveBtn');
      const myId=crypto.randomUUID?crypto.randomUUID():'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);
      const currentUser=localStorage.getItem('currentUser')||'@anonymous',liveUserId=currentUser.replace('@','');
      let localStream,pc,roomId,unsubs=[],isMuted=false,isLive=false,strangerStream=null,liveViewers={},liveUnsub=null;
      const servers={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};
      
      liveBtn.onclick=toggleLive;startStopBtn.onclick=handleStartStop;nextBtn.onclick=()=>{stopChat();setTimeout(()=>startChat(),500);};micBtn.onclick=toggleMute;
      function setButtonState(state){startStopBtn.classList.remove('stop-state');if(state==='start'){startStopBtn.innerHTML='<i class="fas fa-play"></i><span>Start</span>';}else{startStopBtn.classList.add('stop-state');startStopBtn.innerHTML='<i class="fas fa-stop"></i><span>Stop</span>';}}
      function handleStartStop(){if(startStopBtn.classList.contains('stop-state')){stopChat();}else{startChat();}}
      function updateLiveButton(){if(isLive){liveBtn.innerHTML='<i class="fas fa-stop-circle"></i><span>End</span>';liveBtn.classList.add('active');}else{liveBtn.innerHTML='<i class="fas fa-circle"></i><span>Live</span>';liveBtn.classList.remove('active');}}
      async function startLive(){if(!localStream)return;isLive=true;updateLiveButton();try{await setDoc(doc(db,'live',liveUserId),{userId:currentUser,active:true,startedAt:serverTimestamp(),viewers:0});strangerCamera.classList.add('live-active');liveUnsub=onSnapshot(collection(db,'live_viewers'),(snap)=>{snap.docChanges().forEach(async(c)=>{const vd=c.doc.data();if(c.type==='added'&&vd.liveUser===currentUser&&vd.offer)await handleNewViewer(c.doc.id,vd);if(c.type==='modified'&&vd.streamEnded)cleanupViewer(c.doc.id);});});}catch(e){isLive=false;updateLiveButton();}}
      async function handleNewViewer(vid,vd){try{const vpc=new RTCPeerConnection(servers);if(localStream)localStream.getTracks().forEach(t=>vpc.addTrack(t,localStream));vpc.onicecandidate=async(e)=>{if(e.candidate){const s=await getDoc(doc(db,'live_viewers',vid));const ex=s.data()?.hostCandidates||[];ex.push(e.candidate.toJSON());await setDoc(doc(db,'live_viewers',vid),{hostCandidates:ex},{merge:true});}};await vpc.setRemoteDescription(new RTCSessionDescription(vd.offer));const a=await vpc.createAnswer();await vpc.setLocalDescription(a);await setDoc(doc(db,'live_viewers',vid),{answer:{type:a.type,sdp:a.sdp}},{merge:true});liveViewers[vid]=vpc;}catch(e){}}
      function cleanupViewer(vid){if(liveViewers[vid]){liveViewers[vid].close();delete liveViewers[vid];}}
      async function endLive(){isLive=false;updateLiveButton();Object.keys(liveViewers).forEach(id=>{if(liveViewers[id])liveViewers[id].close();});liveViewers={};await deleteDoc(doc(db,'live',liveUserId)).catch(()=>{});if(liveUnsub){liveUnsub();liveUnsub=null;}strangerCamera.classList.remove('live-active');}
      async function toggleLive(){if(isLive){await endLive();}else{if(!localStream){if(!await startCamera())return;}await startLive();}}
      async function startCamera(){try{if(localStream)localStream.getTracks().forEach(t=>t.stop());localStream=await navigator.mediaDevices.getUserMedia({video:{width:480,height:640,facingMode:'user'},audio:{echoCancellation:true,noiseSuppression:true}});myFeed.srcObject=localStream;await myFeed.play();myFeed.style.display='block';myPlaceholder.style.display='none';myCameraEl.classList.add('active');return true;}catch(e){return false;}}
      function stopCamera(){if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}myFeed.style.display='none';myFeed.srcObject=null;myPlaceholder.style.display='';myCameraEl.classList.remove('active');}
      function resetStranger(){strangerStream=null;strangerFeed.style.display='none';strangerFeed.srcObject=null;strangerPlaceholder.innerHTML='<i class="fas fa-user-secret"></i><span>???</span>';strangerPlaceholder.classList.remove('searching-text');strangerCamera.classList.remove('connected','live-active');}
      function showConnected(){setButtonState('stop');nextBtn.classList.add('visible');micBtn.classList.add('visible');}
      function showDisconnected(){setButtonState('start');nextBtn.classList.remove('visible');micBtn.classList.remove('visible');}
      function toggleMute(){if(!localStream)return;const t=localStream.getAudioTracks();if(t.length>0){isMuted=!isMuted;t.forEach(t=>t.enabled=!isMuted);micBtn.classList.toggle('muted',isMuted);micBtn.querySelector('i').className=isMuted?'fas fa-microphone-slash':'fas fa-microphone';}}
      async function createRoom(oId,isCaller){roomId=[myId,oId].sort().join('_');showConnected();if(pc){pc.close();pc=null;}unsubs.forEach(u=>u());unsubs=[];pc=new RTCPeerConnection(servers);localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=(e)=>{if(e.streams[0]){strangerStream=e.streams[0];strangerFeed.srcObject=e.streams[0];strangerFeed.style.display='block';strangerPlaceholder.innerHTML='';strangerCamera.classList.add('connected');}};pc.onicecandidate=async(e)=>{if(e.candidate)await addDoc(collection(doc(db,'rooms',roomId),'ice'),{sender:myId,candidate:e.candidate.toJSON()});};unsubs.push(onSnapshot(collection(doc(db,'rooms',roomId),'ice'),(snap)=>{snap.docChanges().forEach(async(c)=>{if(c.type==='added'&&c.doc.data().sender!==myId&&pc)try{await pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate));}catch(e){}});}));if(isCaller){const offer=await pc.createOffer({offerToReceiveVideo:true,offerToReceiveAudio:true});await pc.setLocalDescription(offer);await setDoc(doc(db,'invites',oId),{from:myId,offer:{type:offer.type,sdp:offer.sdp}});unsubs.push(onSnapshot(doc(db,'invites',oId),async(snap)=>{const d=snap.data();if(d?.answer&&!pc.currentRemoteDescription)await pc.setRemoteDescription(new RTCSessionDescription(d.answer));}));}}
      function listenForInvites(){unsubs.push(onSnapshot(doc(db,'invites',myId),async(snap)=>{if(!snap.exists())return;const d=snap.data();await deleteDoc(doc(db,'waiting',myId)).catch(()=>{});roomId=[myId,d.from].sort().join('_');showConnected();if(pc){pc.close();pc=null;}unsubs.forEach(u=>u());unsubs=[];pc=new RTCPeerConnection(servers);localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=(e)=>{if(e.streams[0]){strangerStream=e.streams[0];strangerFeed.srcObject=e.streams[0];strangerFeed.style.display='block';strangerPlaceholder.innerHTML='';strangerCamera.classList.add('connected');}};pc.onicecandidate=async(e)=>{if(e.candidate)await addDoc(collection(doc(db,'rooms',roomId),'ice'),{sender:myId,candidate:e.candidate.toJSON()});};if(d.offer&&pc.signalingState!=='closed'){await pc.setRemoteDescription(new RTCSessionDescription(d.offer));const answer=await pc.createAnswer();await pc.setLocalDescription(answer);await setDoc(doc(db,'invites',myId),{answer:{type:answer.type,sdp:answer.sdp}},{merge:true});}unsubs.push(onSnapshot(collection(doc(db,'rooms',roomId),'ice'),(snap)=>{snap.docChanges().forEach(async(c)=>{if(c.type==='added'&&c.doc.data().sender!==myId&&pc)try{await pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate));}catch(e){}});}));}));}
      async function startChat(){if(isLive){alert('Please END first.');return;}setButtonState('stop');strangerPlaceholder.innerHTML='<i class="fas fa-spinner fa-spin"></i><span style="color:#fbbf24;">Searching...</span>';strangerPlaceholder.classList.add('searching-text');if(!(await startCamera())){stopChat();return;}const snap=await getDocs(collection(db,'waiting'));let found=null;snap.forEach(d=>{if(d.data().userId!==myId&&!found)found=d.data().userId;});if(found){await deleteDoc(doc(db,'waiting',myId)).catch(()=>{});await deleteDoc(doc(db,'waiting',found)).catch(()=>{});await createRoom(found,true);}else{await setDoc(doc(db,'waiting',myId),{userId:myId});listenForInvites();}}
      function stopChat(){if(pc){pc.close();pc=null;}unsubs.forEach(u=>u());unsubs=[];if(roomId){deleteDoc(doc(db,'rooms',roomId)).catch(()=>{});roomId=null;}deleteDoc(doc(db,'waiting',myId)).catch(()=>{});deleteDoc(doc(db,'invites',myId)).catch(()=>{});if(isLive)endLive();resetStranger();stopCamera();showDisconnected();}
      window.addEventListener('beforeunload',()=>{if(isLive)endLive().catch(()=>{});if(pc)pc.close();if(localStream)localStream.getTracks().forEach(t=>t.stop());});
    }
  </script>
