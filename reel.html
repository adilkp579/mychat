<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Reels · Ultra Optimized</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overscroll-behavior:none; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }

    .reel-wrapper {
      flex:1;position:relative;
      overflow-y:scroll;
      scroll-snap-type:y mandatory;
      scroll-snap-stop:always;
      -webkit-overflow-scrolling:touch;
      height:100%;
      max-height:100vh;
      max-height:100dvh;
      overscroll-behavior:contain;
      will-change:scroll-position;
    }
    .reel-wrapper::-webkit-scrollbar { width:0; }

    .reel-slide {
      width:100%;height:100vh;
      height:100dvh;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      position:relative;
      display:flex;align-items:center;justify-content:center;
      background:#000;
      flex-shrink:0;
      will-change:transform;
    }
    .reel-slide video {
      width:100%;height:100%;
      object-fit:contain;
      background:#000;
      position:absolute;
      top:0;left:0;
    }

    .user-tag { position:absolute;top:1rem;left:1rem;display:flex;align-items:center;gap:0.5rem;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);padding:0.4rem 0.8rem;border-radius:1.5rem;z-index:10;border:1px solid rgba(255,255,255,0.1); }
    .user-tag .avatar { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.7rem; }
    .user-tag .name { font-size:0.8rem;font-weight:500;color:#fff; }

    .actions-bar { position:absolute;right:0.8rem;bottom:35%;display:flex;flex-direction:column;align-items:center;gap:1.5rem;z-index:10; }
    .action-btn { display:flex;flex-direction:column;align-items:center;gap:0.2rem;background:none;border:none;color:#fff;cursor:pointer;font-size:1.5rem;transition:all 0.2s; }
    .action-btn span { font-size:0.65rem;font-weight:500; }
    .action-btn.liked { color:#ef4444; }

    .caption-bar { position:absolute;bottom:1rem;left:1rem;right:5rem;z-index:10; }
    .caption-text { color:#fff;font-size:0.8rem;background:rgba(0,0,0,0.4);padding:0.5rem 0.8rem;border-radius:0.5rem;display:inline-block;max-width:100%; }

    .play-overlay { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;color:rgba(255,255,255,0.4);pointer-events:none;z-index:5; }

    .empty-state { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#555; }
    .empty-state i { font-size:3rem;display:block;margin-bottom:0.5rem; }

    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:0.5rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:400;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap; }
    .toast.show { opacity:1; }

    .loading-screen { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:1rem; }
    .loading-screen i { font-size:2.5rem;color:#3897f0;animation:spin 1s infinite; }
    .loading-screen span { color:#888;font-size:0.85rem; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .loading-overlay { position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:0.5rem; }
    .loading-overlay i { font-size:2rem;color:#3897f0;animation:spin 1s linear infinite; }

    .floating-nav { position:fixed;bottom:max(1rem,env(safe-area-inset-bottom,1rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(26,26,26,0.9);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    .nav-upload, .nav-search { display:none !important; }

    @media (min-width:1024px) {
      .nav-upload,.nav-search{display:flex!important}
      .floating-nav{position:fixed;top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .reel-wrapper{margin-left:5rem}
      .reel-slide{max-width:500px;margin:0 auto}
      .actions-bar{right:2rem;bottom:35%}
    }
    @media (max-width:380px) {
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:max(0.8rem,env(safe-area-inset-bottom,0.8rem))}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .actions-bar{right:0.5rem;gap:1.2rem;bottom:30%}
    }
  </style>
</head>
<body>
  <div class="page" id="mainPage">
    <div class="reel-wrapper" id="reelWrapper"></div>
    <div class="toast" id="toast"></div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html" class="active"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script>
    if (!localStorage.getItem("uid")) {
      window.location.replace("login.html");
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    // ---------- STATE ----------
    const allReels = [];
    let currentIndex = -1;
    let lastDoc = null;
    let isLoadingMore = false;
    let allLoaded = false;
    const PAGE_SIZE = 5;
    let isTransitioning = false;

    const wrapper = document.getElementById('reelWrapper');
    const toast = document.getElementById('toast');

    // ---------- TEMPLATE FUNCTION ----------
    function createSlideHTML(reel, index) {
      return `
        <div class="reel-slide" data-index="${index}" id="slide${index}">
          <video id="video${index}" muted loop playsinline webkit-playsinline preload="none"></video>
          <div class="play-overlay" id="overlay${index}"><i class="fas fa-play-circle"></i></div>
          <div class="user-tag">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <span class="name">${escapeHTML(reel.username)}</span>
          </div>
          <div class="actions-bar">
            <button class="action-btn ${reel.liked?'liked':''}" data-action="like" data-index="${index}">
              <i class="${reel.liked?'fas':'far'} fa-heart"></i>
              <span id="likes${index}">${reel.likes}</span>
            </button>
            <button class="action-btn" data-action="comment" data-index="${index}">
              <i class="far fa-comment"></i>
              <span>${reel.comments}</span>
            </button>
            <button class="action-btn" data-action="share" data-index="${index}">
              <i class="far fa-share-square"></i>
              <span>Share</span>
            </button>
          </div>
          ${reel.caption ? `<div class="caption-bar"><div class="caption-text">${escapeHTML(reel.caption)}</div></div>` : ''}
        </div>`;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- EVENT DELEGATION ----------
    wrapper.addEventListener('click', (e) => {
      const slide = e.target.closest('.reel-slide');
      if (!slide) return;
      
      const index = parseInt(slide.dataset.index);
      
      if (e.target.tagName === 'VIDEO' || e.target.closest('.play-overlay')) {
        togglePlay(index);
        return;
      }
      
      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn) {
        const action = actionBtn.dataset.action;
        if (action === 'like') toggleLike(index);
        else if (action === 'share') shareReel(index);
        return;
      }
    });

    // ---------- LOAD DATA ----------
    function loadLocalReels() {
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      (profile.posts || []).filter(p => p.type === 'video').forEach(p => {
        if (!allReels.find(r => r.src === p.src)) {
          allReels.push({
            id: 'local_' + Date.now() + Math.random(),
            username: p.username || profile.username || '@user',
            caption: p.caption || '',
            src: p.src,
            likes: p.likes || 0,
            comments: p.comments || 0,
            liked: false
          });
        }
      });
    }

    async function fetchNextPage() {
      if (isLoadingMore || allLoaded) return;
      isLoadingMore = true;
      try {
        let q;
        if (lastDoc) {
          q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), startAfter(lastDoc), limit(PAGE_SIZE));
        } else {
          q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
        }
        const snap = await getDocs(q);
        if (snap.empty) {
          allLoaded = true;
          return;
        }

        snap.forEach(doc => {
          const d = doc.data();
          const src = d.data || d.url || '';
          const username = d.username || d.userId || '@anonymous';
          const isVideo = src && (d.type === 'reel' || d.type === 'video' || src.startsWith('data:video/'));
          if (isVideo && !allReels.find(r => r.src === src)) {
            allReels.push({
              id: doc.id,
              username,
              caption: d.caption || d.fileName || '',
              src,
              likes: d.likes || 0,
              comments: d.comments || 0,
              liked: false
            });
          }
        });

        lastDoc = snap.docs[snap.docs.length - 1];
      } catch (e) {
        console.error('Fetch error:', e);
      } finally {
        isLoadingMore = false;
      }
    }

    // ---------- VIRTUAL SCROLL ----------
    function setupScrollHandler() {
      let ticking = false;
      
      wrapper.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            handleScroll();
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    }

    function handleScroll() {
      if (isTransitioning || allReels.length === 0) return;
      
      const scrollTop = wrapper.scrollTop;
      const slideHeight = wrapper.clientHeight;
      const newIndex = Math.round(scrollTop / slideHeight);
      
      if (newIndex !== currentIndex && newIndex >= 0 && newIndex < allReels.length) {
        transitionToSlide(newIndex);
      }
      
      if (newIndex >= allReels.length - 3 && !allLoaded && !isLoadingMore) {
        fetchNextPage();
      }
    }

    function transitionToSlide(newIndex) {
      if (newIndex === currentIndex || isTransitioning) return;
      isTransitioning = true;
      
      const oldIndex = currentIndex;
      currentIndex = newIndex;

      if (oldIndex >= 0) pauseVideo(oldIndex);

      requestAnimationFrame(() => {
        ensureSlideMounted(newIndex);
        if (newIndex > 0) ensureSlideMounted(newIndex - 1);
        if (newIndex < allReels.length - 1) ensureSlideMounted(newIndex + 1);

        requestAnimationFrame(() => {
          playVideo(newIndex);
          cleanupDistantSlides(newIndex);
          isTransitioning = false;
        });
      });
    }

    function ensureSlideMounted(index) {
      if (index < 0 || index >= allReels.length) return;
      if (!document.getElementById('slide' + index)) {
        mountSlide(index);
      }
    }

    function mountSlide(index) {
      const reel = allReels[index];
      const temp = document.createElement('div');
      temp.innerHTML = createSlideHTML(reel, index);
      const slide = temp.firstElementChild;
      wrapper.appendChild(slide);
    }

    function removeSlideElement(index) {
      const slide = document.getElementById('slide' + index);
      if (!slide) return;
      
      const video = slide.querySelector('video');
      if (video) {
        video.pause();
        video.removeAttribute('src');
        video.load();
      }
      slide.remove();
    }

    function cleanupDistantSlides(activeIndex) {
      const slides = wrapper.querySelectorAll('.reel-slide');
      const allowed = new Set([activeIndex - 1, activeIndex, activeIndex + 1]);
      
      for (const slide of slides) {
        const idx = parseInt(slide.dataset.index);
        if (!allowed.has(idx)) {
          removeSlideElement(idx);
        }
      }
    }

    // ---------- VIDEO PLAYBACK ----------
    function playVideo(index) {
      const video = document.getElementById('video' + index);
      const overlay = document.getElementById('overlay' + index);
      if (!video || index >= allReels.length) return;

      const targetSrc = allReels[index].src;
      if (video.src !== targetSrc || !video.src) {
        video.src = targetSrc;
      }

      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          if (overlay) overlay.style.display = 'none';
        }).catch(() => {
          if (overlay) overlay.style.display = 'none';
        });
      }
    }

    function pauseVideo(index) {
      const video = document.getElementById('video' + index);
      const overlay = document.getElementById('overlay' + index);
      if (video) {
        video.pause();
        if (overlay) overlay.style.display = 'flex';
      }
    }

    function togglePlay(index) {
      const video = document.getElementById('video' + index);
      if (!video) return;
      if (video.paused) {
        playVideo(index);
        currentIndex = index;
      } else {
        pauseVideo(index);
      }
    }

    // ---------- INTERACTIONS ----------
    async function toggleLike(index) {
      const reel = allReels[index];
      reel.liked = !reel.liked;
      reel.likes += reel.liked ? 1 : -1;

      const likesSpan = document.getElementById('likes' + index);
      if (likesSpan) likesSpan.textContent = reel.likes;
      
      const slide = document.getElementById('slide' + index);
      const likeBtn = slide?.querySelector('[data-action="like"]');
      if (likeBtn) {
        likeBtn.classList.toggle('liked', reel.liked);
        likeBtn.querySelector('i').className = reel.liked ? 'fas fa-heart' : 'far fa-heart';
      }
      
      showToast(reel.liked ? 'Liked! ❤️' : 'Unliked');

      if (!reel.id.startsWith('local_')) {
        try { 
          await updateDoc(doc(db, 'posts', reel.id), { 
            likes: increment(reel.liked ? 1 : -1) 
          }); 
        } catch(e) {}
      }
    }

    async function shareReel(index) {
      const reel = allReels[index];
      if (navigator.share) {
        try { 
          await navigator.share({ 
            title: `${reel.username}'s reel`, 
            text: reel.caption || 'Check out this reel!' 
          }); 
        } catch(e) {}
      } else {
        try { 
          await navigator.clipboard.writeText(window.location.href); 
          showToast('Link copied! 📋'); 
        } catch(e) {}
      }
    }

    function showToast(msg) {
      toast.textContent = msg; 
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ---------- INIT ----------
    async function init() {
      loadLocalReels();
      await fetchNextPage();
      
      if (allReels.length === 0) {
        wrapper.innerHTML = `<div class="empty-state"><i class="fas fa-film"></i><p>No reels yet</p></div>`;
        return;
      }

      setupScrollHandler();
      
      const count = Math.min(3, allReels.length);
      const fragment = document.createDocumentFragment();
      
      for (let i = 0; i < count; i++) {
        const temp = document.createElement('div');
        temp.innerHTML = createSlideHTML(allReels[i], i);
        fragment.appendChild(temp.firstElementChild);
      }
      
      wrapper.appendChild(fragment);
      wrapper.scrollTop = 0;
      
      requestAnimationFrame(() => {
        currentIndex = 0;
        playVideo(0);
      });
    }

    init();
  </script>
</body>
</html>
