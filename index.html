<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { 
      background:#000;font-family:-apple-system,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .page { 
      width:100%;height:100vh;height:100dvh;
      background:#000;display:flex;flex-direction:column;
      position:relative;overflow:hidden;
    }
    
    .content { 
      flex:1;display:flex;flex-direction:column;align-items:center;
      color:#fff;padding:0 0 6rem 0;overflow-y:auto;
      background:#000;
    }
    .content::-webkit-scrollbar { width:0; }

    .top-icons { 
      width:100%;max-width:500px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0;
      position:relative;
      background:#000;
    }
    .corner-btn { 
      width:2.4rem;height:2.4rem;
      background:#1a1a1a;
      border-radius:50%;color:#fff;font-size:1rem;
      display:flex;align-items:center;justify-content:center;
      text-decoration:none;border:1px solid #333;
      transition:all 0.3s;
    }
    .corner-btn:hover {
      background:#333;
      border-color:#555;
    }
    
    .top-brand {
      font-size:2rem;
      font-weight:700;
      color:#fff;
      letter-spacing:3px;
      font-family: 'Segoe Script', 'Brush Script MT', 'Apple Chancery', 'Comic Sans MS', cursive;
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      white-space:nowrap;
      line-height:1;
      font-style:italic;
    }
    
    .stories-section { 
      width:100%;max-width:500px;flex-shrink:0;
      background:#000;
    }
    .stories-bar { 
      display:flex;gap:0.8rem;padding:0.3rem 0.8rem 0.5rem 0.8rem;
      overflow-x:auto;border-bottom:1px solid #1a1a1a;
      background:#000;
    }
    .stories-bar::-webkit-scrollbar { height:0; }
    
    .story-item { display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;flex-shrink:0;position:relative; }
    .story-ring { width:62px;height:62px;border-radius:50%;padding:2px;display:flex;align-items:center;justify-content:center;position:relative; }
    .story-ring.live { background: linear-gradient(45deg, #ef4444, #dc2626, #ef4444); animation: livePulse 1.5s ease-in-out infinite; }
    .story-ring.friend { background: linear-gradient(45deg, #f59e0b, #ef4444, #e91e63); }
    .story-ring.bestie { background: linear-gradient(45deg, #8b5cf6, #ec4899, #f59e0b); }
    
    @keyframes livePulse { 
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.8), 0 0 8px rgba(239,68,68,0.4); } 
      50% { box-shadow: 0 0 0 6px rgba(239,68,68,0), 0 0 16px rgba(239,68,68,0.6); } 
    }
    
    .story-avatar { width:54px;height:54px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid #000;color:#fff;overflow:hidden; }
    .story-avatar img { width:100%;height:100%;object-fit:cover; }
    .story-avatar.live-bg { background:#ef4444; }
    .story-name { font-size:0.6rem;color:#999;max-width:65px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .live-badge { position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;font-size:0.45rem;padding:1px 5px;border-radius:4px;font-weight:600;letter-spacing:0.5px;z-index:5; }

    .no-stories { padding:0.5rem 0.8rem;color:#555;font-size:0.7rem;text-align:center;width:100%;background:#000; }

    .feed-section { width:100%;max-width:500px;flex-shrink:0;background:#000; }
    .feed-card { width:100%;background:#000;border-bottom:1px solid #1a1a1a;margin-bottom:1rem; }
    .feed-header { display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.8rem;cursor:pointer;background:#000; }
    .feed-avatar { width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.8rem;overflow:hidden; }
    .feed-avatar img { width:100%;height:100%;object-fit:cover; }
    .feed-username { font-size:0.8rem;font-weight:600;color:#3897f0;cursor:pointer; }
    .feed-username:hover { text-decoration:underline; }
    .feed-location { font-size:0.6rem;color:#888; }
    .feed-time { font-size:0.6rem;color:#888;margin-left:auto; }
    .feed-image { width:100%;aspect-ratio:1/1;object-fit:cover;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:#333;cursor:pointer; }
    .feed-image img { width:100%;height:100%;object-fit:cover; }
    .feed-actions { display:flex;gap:1.2rem;padding:0.6rem 0.8rem;background:#000; }
    .feed-action { background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:0;transition:all 0.2s; }
    .feed-action.liked { color:#ef4444; }
    .feed-likes { font-size:0.7rem;font-weight:600;padding:0 0.8rem;margin-bottom:0.2rem;background:#000; }
    .feed-caption { padding:0 0.8rem 0.6rem 0.8rem;font-size:0.75rem;background:#000; }
    .feed-caption span { font-weight:600;color:#3897f0;cursor:pointer;margin-right:0.3rem; }
    .feed-caption span:hover { text-decoration:underline; }

    /* Post Viewer */
    .post-viewer-overlay {
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.95);z-index:600;
      display:none;align-items:center;justify-content:center;
    }
    .post-viewer-overlay.show { display:flex; }
    .post-viewer-content { width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column; }
    .post-viewer-image { width:100%;max-height:60vh;display:flex;align-items:center;justify-content:center;background:#111; }
    .post-viewer-image img { width:100%;height:100%;object-fit:contain; }
    .post-viewer-info { padding:1rem;background:#0a0a0a; }
    .post-viewer-actions { display:flex;gap:1.5rem;padding:0.5rem 0; }
    .post-viewer-action { background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer; }
    .post-viewer-action.liked { color:#ef4444; }
    .post-viewer-likes { font-size:0.75rem;font-weight:600;margin-bottom:0.3rem; }
    .post-viewer-close {
      position:absolute;top:1rem;right:1rem;width:32px;height:32px;
      border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;
      font-size:1rem;cursor:pointer;z-index:10;
      display:flex;align-items:center;justify-content:center;
    }

    .floating-nav { 
      position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));
      left:50%;transform:translateX(-50%);width:92%;max-width:500px;
      background:#1a1a1a;
      border-radius:2.5rem;padding:0.7rem 1.5rem;
      display:flex;align-items:center;justify-content:center;
      border:1px solid #333;
      z-index:100;
    }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:#888;font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:#333; }
    .nav-upload, .nav-search { display:none !important; }

    .loading-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500; }
    .loading-overlay i { font-size:2rem;color:#3897f0;animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .auth-boot-loader {
      position: fixed;top: 0; left: 0; right: 0; bottom: 0;
      background: #000;z-index: 9999;
      display: flex;align-items: center;justify-content: center;
      flex-direction: column;gap: 1rem;
    }
    .auth-boot-loader i { font-size: 2.5rem;color: #3897f0;animation: spin 1s linear infinite; }
    .auth-boot-loader span { color: #888;font-size: 0.8rem; }

    @media (min-width:1024px) {
      .top-icons{display:none}.nav-upload,.nav-search{display:flex!important}
      .floating-nav{top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .content{padding:0.5rem 0 1rem 5.5rem}.stories-section{max-width:550px}.feed-section{max-width:550px}
    }
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .corner-btn{width:2rem;height:2rem;font-size:0.9rem}
      .story-ring{width:54px;height:54px}.story-avatar{width:46px;height:46px;font-size:1.1rem}
      .top-brand{font-size:1.5rem;}
    }
  </style>
</head>
<body>
  <div class="auth-boot-loader" id="authBootLoader">
    <i class="fas fa-spinner"></i>
    <span>Loading...</span>
  </div>

  <div class="loading-overlay" id="loadingOverlay" style="display:none;"><i class="fas fa-spinner"></i></div>

  <div class="page" id="mainPage" style="display:none;">
    <div class="content">
      <div class="top-icons">
        <a href="upload.html" class="corner-btn"><i class="fas fa-plus"></i></a>
        <span class="top-brand">Choicho</span>
        <a href="search.html" class="corner-btn"><i class="fas fa-search"></i></a>
      </div>
      
      <div class="stories-section">
        <div class="stories-bar" id="storiesBar"></div>
        <div class="no-stories" id="noStories" style="display:none;">No recent stories</div>
      </div>
      
      <div class="feed-section" id="feedContainer"></div>
    </div>

    <!-- Post Viewer -->
    <div class="post-viewer-overlay" id="postViewer">
      <button class="post-viewer-close" onclick="closePostViewer()">✕</button>
      <div class="post-viewer-content">
        <div class="post-viewer-image"><img id="postViewerImage" src="" alt="post"></div>
        <div class="post-viewer-info">
          <div class="post-viewer-actions">
            <button class="post-viewer-action" id="postViewerLike" onclick=""><i class="far fa-heart"></i></button>
            <button class="post-viewer-action" onclick="navigator.share?navigator.share({url:document.getElementById('postViewerImage').src}):navigator.clipboard.writeText(document.getElementById('postViewerImage').src)"><i class="far fa-share-square"></i></button>
          </div>
          <div class="post-viewer-likes" id="postViewerLikes">0 likes</div>
        </div>
      </div>
    </div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html" class="active"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Cache for user profiles
    let userProfiles = {};

    onAuthStateChanged(auth, (user) => {
      const bootLoader = document.getElementById('authBootLoader');
      if (user) {
        localStorage.setItem("uid", user.uid);
        if (bootLoader) bootLoader.style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('mainPage').style.display = 'flex';
        loadAllProfiles().then(() => {
          setupLiveListener();
          renderStories();
          renderFeed();
        });
      } else {
        const localUid = localStorage.getItem("uid");
        if (localUid) {
          if (bootLoader) bootLoader.style.display = 'none';
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('mainPage').style.display = 'flex';
          loadAllProfiles().then(() => {
            setupLiveListener();
            renderStories();
            renderFeed();
          });
        } else {
          window.location.replace("login.html");
        }
      }
    });

    async function loadAllProfiles() {
      userProfiles = {};
      try {
        const snap = await getDocs(collection(db, 'users'));
        snap.forEach(doc => {
          const d = doc.data();
          userProfiles[d.username] = { avatar: d.avatar || null, name: d.name || d.username };
        });
      } catch(e) {}
      // Also load from localStorage
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (profile.username) {
        userProfiles[profile.username] = { avatar: profile.avatar || null, name: profile.name || profile.username };
      }
      (profile.friends || []).forEach(f => {
        if (!userProfiles[f.name]) userProfiles[f.name] = { avatar: f.avatar || null, name: f.name };
      });
    }

    function getAvatarHTML(username) {
      const p = userProfiles[username];
      if (p && p.avatar && p.avatar !== 'null') {
        return `<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>';">`;
      }
      return '<i class="fas fa-user"></i>';
    }

    function cleanName(u) { return (u || '').replace(/^@/, ''); }

    function setupLiveListener() {
      const liveRef = collection(db, 'live');
      onSnapshot(liveRef, () => { renderStories(); });
    }

    async function loadLiveUsers() {
      try {
        const snap = await getDocs(collection(db, 'live'));
        const liveUsers = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (d.active) liveUsers.push({ name: d.userId, type: 'live', icon: 'fa-circle', live: true });
        });
        return liveUsers;
      } catch(e) { return []; }
    }

    async function loadProfileStories(username) {
      try {
        const ref = doc(db, 'profiles', username.replace('@', ''));
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const data = snap.data();
          const friends = (data.friends || []).map(f => ({ name: f.name, type: 'friend', icon: 'fa-user', live: false }));
          const besties = (data.besties || []).map(b => ({ name: b.name, type: 'bestie', icon: 'fa-user', live: false }));
          return [...friends, ...besties];
        }
      } catch(e) {}
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      const friends = (profile.friends || []).map(f => ({ name: f.name, type: 'friend', icon: 'fa-user', live: false }));
      const besties = (profile.besties || []).map(b => ({ name: b.name, type: 'bestie', icon: 'fa-user', live: false }));
      return [...friends, ...besties];
    }

    async function renderStories() {
      const liveUsers = await loadLiveUsers();
      const currentUser = localStorage.getItem('currentUser') || '@user';
      const profileStories = await loadProfileStories(currentUser);
      const liveNames = new Set(liveUsers.map(l => l.name));
      const filteredProfileStories = profileStories.filter(p => !liveNames.has(p.name));
      const allStories = [...liveUsers, ...filteredProfileStories];
      const bar = document.getElementById('storiesBar');
      const noStories = document.getElementById('noStories');
      if (allStories.length === 0) { bar.style.display = 'none'; noStories.style.display = 'block'; return; }
      bar.style.display = 'flex'; noStories.style.display = 'none';
      bar.innerHTML = allStories.map(s => `
        <div class="story-item" onclick="openStory('${s.name}', '${s.type}')">
          <div class="story-ring ${s.type}">
            <div class="story-avatar${s.live?' live-bg':''}">${getAvatarHTML(s.name)}</div>
          </div>
          ${s.live?'<div class="live-badge">LIVE</div>':''}
          <span class="story-name">${cleanName(s.name)}</span>
        </div>
      `).join('');
    }

    window.openStory = function(name, type) {
      if (type === 'live') { window.location.href = 'live.html?user=' + encodeURIComponent(name); }
      else { window.location.href = 'profile.html?user=' + encodeURIComponent(name); }
    };

    async function loadPosts() {
      try {
        const snap = await getDocs(query(collection(db, 'posts'), where('type', '==', 'post')));
        const posts = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (d.data || d.url) {
            const src = d.data || d.url;
            const username = d.username || d.userId || '@anonymous';
            posts.push({
              userId: username,
              caption: d.caption || '',
              src: src,
              likes: d.likes || Math.floor(Math.random()*50),
              time: 'Recently',
              id: doc.id
            });
          }
        });
        if (posts.length > 0) return posts;
      } catch(e) {}
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      return (profile.posts || []).filter(p => p.type === 'image').map(p => ({
        userId: profile.username || '@user',
        caption: p.caption || '',
        src: p.src,
        likes: p.likes || 0,
        time: 'Recently',
        id: p.id || 'local'
      }));
    }

    async function renderFeed() {
      const posts = await loadPosts();
      const container = document.getElementById('feedContainer');
      if (posts.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#555;padding:3rem;">No posts yet</div>';
        return;
      }
      container.innerHTML = posts.map((p, i) => `
        <div class="feed-card">
          <div class="feed-header">
            <div class="feed-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${getAvatarHTML(p.userId)}</div>
            <div>
              <div class="feed-username" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cleanName(p.userId)}</div>
            </div>
            <span class="feed-time">${p.time}</span>
          </div>
          <div class="feed-image" onclick="openPostViewer('${p.src}')"><img src="${p.src}" alt="post" onerror="this.style.display='none'"></div>
          <div class="feed-actions">
            <button class="feed-action liked" onclick="this.classList.toggle('liked')"><i class="fas fa-heart"></i></button>
            <button class="feed-action"><i class="far fa-comment"></i></button>
            <button class="feed-action" onclick="navigator.share?navigator.share({url:'${p.src}'}):navigator.clipboard.writeText('${p.src}')"><i class="far fa-share-square"></i></button>
          </div>
          <div class="feed-likes">${p.likes} likes</div>
          <div class="feed-caption"><span onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cleanName(p.userId)}</span>${p.caption}</div>
        </div>
      `).join('');
    }

    // Post Viewer
    window.openPostViewer = function(src) {
      document.getElementById('postViewerImage').src = src;
      document.getElementById('postViewer').classList.add('show');
    };
    window.closePostViewer = function() {
      document.getElementById('postViewer').classList.remove('show');
    };
    document.getElementById('postViewer').addEventListener('click', function(e) {
      if (e.target === this) closePostViewer();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePostViewer();
    });
  </script>
</body>
</html>
