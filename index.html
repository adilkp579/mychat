<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    .content { flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0 0 6rem 0;overflow-y:auto;background:#000; }
    .content::-webkit-scrollbar { width:0; }

    .top-icons { width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0;position:relative;background:#000; }
    .corner-btn { width:2.4rem;height:2.4rem;background:#1a1a1a;border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid #333; }
    .top-brand { font-size:2rem;font-weight:700;color:#fff;letter-spacing:3px;font-family:'Segoe Script','Brush Script MT','Apple Chancery','Comic Sans MS',cursive;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;line-height:1;font-style:italic; }
    
    .stories-section { width:100%;max-width:500px;flex-shrink:0;background:#000; }
    .stories-bar { display:flex;gap:0.8rem;padding:0.3rem 0.8rem 0.5rem 0.8rem;overflow-x:auto;border-bottom:1px solid #1a1a1a;background:#000; }
    .stories-bar::-webkit-scrollbar { height:0; }
    .story-item { display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;flex-shrink:0;position:relative; }
    .story-ring { width:62px;height:62px;border-radius:50%;padding:2px;display:flex;align-items:center;justify-content:center; }
    .story-ring.friend { background:linear-gradient(45deg,#f59e0b,#ef4444,#e91e63); }
    .story-ring.bestie { background:linear-gradient(45deg,#8b5cf6,#ec4899,#f59e0b); }
    .story-avatar { width:54px;height:54px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid #000;color:#fff;overflow:hidden; }
    .story-avatar img { width:100%;height:100%;object-fit:cover; }
    .story-name { font-size:0.6rem;color:#999;max-width:65px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .no-stories { padding:0.5rem 0.8rem;color:#555;font-size:0.7rem;text-align:center;width:100%;background:#000; }

    .feed-section { width:100%;max-width:500px;flex-shrink:0;background:#000; }
    .feed-card { width:100%;background:#000;border-bottom:1px solid #1a1a1a;margin-bottom:1rem; }
    .feed-header { display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.8rem;background:#000; }
    .feed-avatar { width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.8rem;overflow:hidden;cursor:pointer;flex-shrink:0; }
    .feed-avatar img { width:100%;height:100%;object-fit:cover; }
    .feed-username { font-size:0.8rem;font-weight:600;color:#3897f0;cursor:pointer; }
    .feed-time { font-size:0.6rem;color:#888;margin-left:auto; }
    .feed-image { width:100%;aspect-ratio:1/1;object-fit:cover;background:#0a0a0a;cursor:pointer; }
    .feed-image img { width:100%;height:100%;object-fit:cover; }
    .feed-actions { display:flex;gap:1.2rem;padding:0.6rem 0.8rem;background:#000; }
    .feed-action { background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:0; }
    .feed-action.liked { color:#ef4444; }
    .feed-likes { font-size:0.7rem;font-weight:600;padding:0 0.8rem;margin-bottom:0.2rem;background:#000; }
    .feed-caption { padding:0 0.8rem 0.3rem 0.8rem;font-size:0.75rem;background:#000; }
    .feed-caption span { font-weight:600;color:#3897f0;cursor:pointer;margin-right:0.3rem; }
    .view-comments-btn { padding:0 0.8rem 0.5rem 0.8rem;font-size:0.65rem;color:#888;cursor:pointer;background:#000; }

    .comments-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:700;display:none;flex-direction:column; }
    .comments-overlay.show { display:flex; }
    .comments-header { display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0; }
    .comments-header h3 { font-size:0.9rem;font-weight:600;color:#fff; }
    .comments-close { width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
    .comments-list { flex:1;overflow-y:auto;padding:0.5rem 1rem;-webkit-overflow-scrolling:touch; }
    .comments-list::-webkit-scrollbar { width:0; }
    
    .comment-item { padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.03); }
    .comment-main { display:flex;gap:0.5rem;align-items:flex-start; }
    .comment-avatar { width:30px;height:30px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#fff;overflow:hidden;flex-shrink:0; }
    .comment-avatar img { width:100%;height:100%;object-fit:cover; }
    .comment-body { flex:1;min-width:0; }
    .comment-username { font-size:0.7rem;font-weight:600;color:#fff; }
    .comment-text { font-size:0.75rem;color:#ddd;margin-top:0.1rem;word-break:break-word; }
    .comment-meta { display:flex;align-items:center;gap:0.5rem;margin-top:0.2rem;flex-wrap:wrap; }
    .comment-time { font-size:0.55rem;color:#666; }
    .comment-reply-btn { font-size:0.55rem;color:#888;cursor:pointer;background:none;border:none; }
    .comment-delete-btn { font-size:0.55rem;color:#ef4444;cursor:pointer;background:none;border:none;display:none; }
    .comment-delete-btn.show { display:inline; }
    .comment-mic-btn { font-size:0.55rem;color:#FFFC00;cursor:pointer;background:none;border:none;padding:0;margin-left:0.2rem; }
    .comment-mic-btn.recording { color:#ef4444;animation:recPulse 1s infinite; }
    
    .comment-replies { margin-left:1.5rem;padding-left:0.5rem;border-left:1px solid rgba(255,255,255,0.06);margin-top:0.2rem; }
    .reply-item { display:flex;gap:0.4rem;padding:0.3rem 0;align-items:flex-start; }
    .reply-avatar { width:22px;height:22px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:0.5rem;color:#fff;overflow:hidden;flex-shrink:0; }
    .reply-avatar img { width:100%;height:100%;object-fit:cover; }
    .reply-body { flex:1;min-width:0; }
    .reply-username { font-size:0.65rem;font-weight:600;color:#fff; }
    .reply-text { font-size:0.7rem;color:#ddd; }
    .reply-meta { display:flex;align-items:center;gap:0.5rem;margin-top:0.1rem;flex-wrap:wrap; }
    .reply-mic-btn { font-size:0.5rem;color:#FFFC00;cursor:pointer;background:none;border:none;padding:0; }
    .reply-mic-btn.recording { color:#ef4444;animation:recPulse 1s infinite; }
    
    .voice-comment-item { padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.03); }
    .voice-comment-main { display:flex;gap:0.5rem;align-items:flex-start; }
    .vc-play-btn { display:flex;align-items:center;gap:0.3rem;padding:0.2rem 0.5rem;background:rgba(255,252,0,0.08);border:1px solid rgba(255,252,0,0.15);border-radius:0.8rem;cursor:pointer;font-size:0.65rem;color:#FFFC00;margin-top:0.1rem;width:fit-content; }
    .vc-play-btn i { font-size:0.5rem; }
    .vc-duration { font-size:0.55rem;color:#777;margin-left:0.2rem; }

    .comments-input-area { display:flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;padding-bottom:max(0.5rem,env(safe-area-inset-bottom,0.5rem));border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:#0a0a0a; }
    .comments-input { flex:1;padding:0.5rem 0.8rem;border-radius:1.2rem;border:1px solid rgba(255,255,255,0.12);background:#1a1a1a;color:#fff;font-size:0.8rem;outline:none; }
    .comments-input:focus { border-color:#FFFC00; }
    .post-comment-btn { background:#FFFC00;border:none;color:#000;font-size:0.7rem;font-weight:600;padding:0.45rem 0.9rem;border-radius:1.2rem;cursor:pointer;flex-shrink:0; }
    .post-comment-btn:disabled { opacity:0.4; }

    .reply-input-area { display:none;align-items:center;gap:0.3rem;margin-top:0.3rem;padding:0.2rem 0; }
    .reply-input-area.show { display:flex; }
    .reply-input { flex:1;padding:0.35rem 0.5rem;border-radius:0.8rem;border:1px solid rgba(255,255,255,0.12);background:#1a1a1a;color:#fff;font-size:0.65rem;outline:none; }
    .reply-post-btn { background:#FFFC00;border:none;color:#000;font-size:0.55rem;font-weight:600;padding:0.3rem 0.6rem;border-radius:0.8rem;cursor:pointer;flex-shrink:0; }

    .global-recording-bar { display:none;align-items:center;gap:0.4rem;padding:0.35rem 1rem;background:#ef4444;position:sticky;bottom:0;z-index:10; }
    .global-recording-bar.show { display:flex; }
    .global-rec-dot { width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }
    .global-rec-timer { font-size:0.75rem;color:#fff;font-weight:600;font-family:monospace;flex:1; }
    .global-rec-cancel,.global-rec-send { width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.65rem; }
    .global-rec-cancel { background:rgba(255,255,255,0.2);color:#fff; }
    .global-rec-send { background:#fff;color:#ef4444; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:#1a1a1a;border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid #333;z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:#888;font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:#333; }
    .nav-upload,.nav-search { display:none !important; }

    .auth-boot-loader { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem; }
    .auth-boot-loader i { font-size:2.5rem;color:#3897f0;animation:spin 1s linear infinite; }
    .auth-boot-loader span { color:#888;font-size:0.8rem; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .toast { position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;padding:0.4rem 1rem;border-radius:2rem;font-size:0.7rem;z-index:800;opacity:0;transition:all 0.3s;font-weight:600;pointer-events:none; }
    .toast.show { opacity:1; }.toast.error { background:#ef4444;color:#fff; }

    @media (min-width:1024px) {
      .top-icons{display:none}.nav-upload,.nav-search{display:flex!important}
      .floating-nav{top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .content{padding:0.5rem 0 1rem 5.5rem}.stories-section{max-width:550px}.feed-section{max-width:550px}
    }
    @media (max-width:380px) { 
      .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}
      .corner-btn{width:2rem;height:2rem;font-size:0.9rem}.story-ring{width:54px;height:54px}.story-avatar{width:46px;height:46px;font-size:1.1rem}.top-brand{font-size:1.5rem;}
    }
  </style>
</head>
<body>
  <div class="auth-boot-loader" id="authBootLoader"><i class="fas fa-spinner"></i><span>Loading...</span></div>
  <div class="page" id="mainPage" style="display:none;">
    <div class="content">
      <div class="top-icons"><a href="upload.html" class="corner-btn"><i class="fas fa-plus"></i></a><span class="top-brand">Choicho</span><a href="search.html" class="corner-btn"><i class="fas fa-search"></i></a></div>
      <div class="stories-section"><div class="stories-bar" id="storiesBar"></div><div class="no-stories" id="noStories" style="display:none;">No recent stories</div></div>
      <div class="feed-section" id="feedContainer"></div>
    </div>
    <div class="comments-overlay" id="commentsOverlay">
      <div class="comments-header"><h3>Comments</h3><button class="comments-close" onclick="closeComments()">✕</button></div>
      <div class="comments-list" id="commentsList"></div>
      <div class="global-recording-bar" id="globalRecordingBar">
        <div class="global-rec-dot"></div><span class="global-rec-timer" id="globalRecTimer">00:00</span>
        <button class="global-rec-cancel" onclick="cancelGlobalRecording()">✕</button>
        <button class="global-rec-send" onclick="sendGlobalRecording()"><i class="fas fa-paper-plane"></i></button>
      </div>
      <div class="comments-input-area">
        <input type="text" class="comments-input" id="commentInput" placeholder="Add a comment...">
        <button class="post-comment-btn" id="postCommentBtn" onclick="postTextComment()">Post</button>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html" class="active"><i class="fas fa-home"></i></a><a href="web.html"><i class="fas fa-globe"></i></a><a href="reel.html"><i class="fas fa-film"></i></a><a href="chat.html"><i class="fas fa-comment-dots"></i></a><a href="profile.html"><i class="fas fa-user"></i></a><a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a><a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, addDoc, orderBy, serverTimestamp, increment, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app); const auth = getAuth(app);
    let userProfiles = {};
    const currentUser = localStorage.getItem('currentUser') || '@anonymous';
    let activeCommentPostId = null, activeReplyTo = null;
    let voiceRecorder = null, voiceChunks = [], voiceTimer = null, voiceSeconds = 0;
    const MAX_VOICE_SEC = 10;

    onAuthStateChanged(auth, (user) => {
      const bl = document.getElementById('authBootLoader');
      if (user) localStorage.setItem("uid", user.uid);
      if (user || localStorage.getItem("uid")) {
        if (bl) bl.style.display = 'none'; document.getElementById('mainPage').style.display = 'flex';
        loadAllProfiles().then(() => { renderStories(); renderFeed(); });
      } else window.location.replace("login.html");
    });

    async function loadAllProfiles() {
      userProfiles = {};
      try { const snap = await getDocs(collection(db, 'users')); snap.forEach(doc => { const d = doc.data(); userProfiles[d.username] = { avatar: d.avatar || null, name: d.name || d.username }; }); } catch(e) {}
      const lp = JSON.parse(localStorage.getItem('userProfile') || '{}');
      if (lp.username) userProfiles[lp.username] = { avatar: lp.avatar || null, name: lp.name || lp.username };
      (lp.friends||[]).forEach(f => { if (!userProfiles[f.name]) userProfiles[f.name] = { avatar: f.avatar || null, name: f.name }; });
    }

    function getAvatarHTML(u) { const p = userProfiles[u]; return (p && p.avatar && p.avatar !== 'null' && p.avatar !== 'undefined') ? `<img src="${p.avatar}" alt="" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>';">` : '<i class="fas fa-user"></i>'; }
    function cname(u) { return (u || '').replace(/^@/, ''); }
    function fmtDur(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
    function timeAgo(d) { if (!d) return ''; const now = new Date(); const diff = now - d; if (diff < 60000) return 'now'; if (diff < 3600000) return Math.floor(diff/60000)+'m'; if (diff < 86400000) return Math.floor(diff/3600000)+'h'; if (diff < 604800000) return Math.floor(diff/86400000)+'d'; return d.toLocaleDateString(); }

    async function renderStories() {
      const cu = localStorage.getItem('currentUser') || '@user'; const ps = await loadProfileStories(cu);
      const bar = document.getElementById('storiesBar'), ns = document.getElementById('noStories');
      if (ps.length === 0) { bar.style.display = 'none'; ns.style.display = 'block'; return; }
      bar.style.display = 'flex'; ns.style.display = 'none';
      bar.innerHTML = ps.map(s => `<div class="story-item" onclick="window.location.href='profile.html?user=${encodeURIComponent(s.name)}'"><div class="story-ring ${s.type}"><div class="story-avatar">${getAvatarHTML(s.name)}</div></div><span class="story-name">${cname(s.name)}</span></div>`).join('');
    }
    async function loadProfileStories(username) {
      try { const ref = doc(db, 'profiles', username.replace('@', '')); const snap = await getDoc(ref); if (snap.exists()) { const d = snap.data(); return [...(d.friends||[]).map(f=>({name:f.name,type:'friend',icon:'fa-user',live:false})),...(d.besties||[]).map(b=>({name:b.name,type:'bestie',icon:'fa-user',live:false}))]; } } catch(e) {}
      const p = JSON.parse(localStorage.getItem('userProfile')||'{}'); return [...(p.friends||[]).map(f=>({name:f.name,type:'friend',icon:'fa-user',live:false})),...(p.besties||[]).map(b=>({name:b.name,type:'bestie',icon:'fa-user',live:false}))];
    }

    async function loadPosts() {
      let posts = [];
      try { const snap = await getDocs(query(collection(db, 'posts'), orderBy('createdAt', 'desc'))); snap.forEach(doc => { const d = doc.data(); const src = d.data || d.url || ''; if (src) posts.push({ id: doc.id, userId: d.username || d.userId || '@anonymous', caption: d.caption || '', src, likes: d.likes || 0, time: d.createdAt ? timeAgo(d.createdAt.toDate()) : 'Recently' }); }); } catch(e) {}
      if (posts.length === 0) { const p = JSON.parse(localStorage.getItem('userProfile')||'{}'); posts = (p.posts||[]).filter(x=>x.type==='image').map(x=>({id:x.id||'local',userId:p.username||'@user',caption:x.caption||'',src:x.src,likes:x.likes||0,time:'Recently'})); }
      return posts;
    }

    async function renderFeed() {
      const posts = await loadPosts(); const container = document.getElementById('feedContainer');
      if (posts.length === 0) { container.innerHTML = '<div style="text-align:center;color:#555;padding:3rem;">No posts yet</div>'; return; }
      container.innerHTML = posts.map(p => `
        <div class="feed-card" id="post-${p.id}">
          <div class="feed-header"><div class="feed-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${getAvatarHTML(p.userId)}</div><div><div class="feed-username" onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cname(p.userId)}</div></div><span class="feed-time">${p.time}</span></div>
          <div class="feed-image" onclick="openImageViewer('${p.src}')"><img src="${p.src}" alt="post" onerror="this.style.display='none'"></div>
          <div class="feed-actions">
            <button class="feed-action" id="likeBtn-${p.id}" onclick="toggleLike('${p.id}')"><i class="far fa-heart"></i></button>
            <button class="feed-action" onclick="openComments('${p.id}')"><i class="far fa-comment"></i></button>
            <button class="feed-action" onclick="sharePost('${p.src}')"><i class="far fa-share-square"></i></button>
          </div>
          <div class="feed-likes" id="likes-${p.id}">${p.likes || 0} likes</div>
          <div class="feed-caption"><span onclick="window.location.href='profile.html?user=${encodeURIComponent(p.userId)}'">${cname(p.userId)}</span>${p.caption}</div>
          <div class="view-comments-btn" onclick="openComments('${p.id}')">View all comments</div>
        </div>`).join('');
    }

    window.toggleLike = async function(postId) {
      const btn = document.getElementById('likeBtn-' + postId), likesEl = document.getElementById('likes-' + postId);
      if (!btn || !likesEl) return;
      const isLiked = btn.classList.contains('liked');
      if (isLiked) { btn.classList.remove('liked'); btn.querySelector('i').className = 'far fa-heart'; likesEl.textContent = (Math.max(0, parseInt(likesEl.textContent) - 1)) + ' likes'; try { await updateDoc(doc(db, 'posts', postId), { likes: increment(-1) }); } catch(e) {} }
      else { btn.classList.add('liked'); btn.querySelector('i').className = 'fas fa-heart'; likesEl.textContent = (parseInt(likesEl.textContent) + 1) + ' likes'; try { await updateDoc(doc(db, 'posts', postId), { likes: increment(1) }); } catch(e) {} }
    };

    window.openComments = function(postId) { activeCommentPostId = postId; document.getElementById('commentsOverlay').classList.add('show'); document.getElementById('commentInput').value = ''; loadComments(postId); };
    window.closeComments = function() { document.getElementById('commentsOverlay').classList.remove('show'); cancelGlobalRecording(); activeCommentPostId = null; activeReplyTo = null; };

    async function loadComments(postId) {
      const list = document.getElementById('commentsList');
      list.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;font-size:0.7rem;">Loading...</div>';
      try {
        const postSnap = await getDoc(doc(db, 'posts', postId));
        const postOwner = postSnap.exists() ? (postSnap.data().username || postSnap.data().userId || '') : '';
        const snap = await getDocs(query(collection(db, 'posts', postId, 'comments'), orderBy('createdAt', 'asc')));
        if (snap.empty) { list.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;font-size:0.7rem;">No comments yet</div>'; return; }
        list.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const canDelete = (d.username === currentUser || postOwner === currentUser);
          const deleteBtn = canDelete ? `<button class="comment-delete-btn show" onclick="deleteComment('${postId}','${doc.id}')">🗑️</button>` : '';
          const micBtn = `<button class="comment-mic-btn" id="micBtn-${doc.id}" onclick="toggleVoiceReply('${doc.id}')">🎤</button>`;
          
          if (d.type === 'text') {
            list.innerHTML += `<div class="comment-item" id="c-${doc.id}">
              <div class="comment-main"><div class="comment-avatar">${getAvatarHTML(d.username)}</div><div class="comment-body"><div class="comment-username">${cname(d.username)}</div><div class="comment-text">${d.text||''}</div><div class="comment-meta"><span class="comment-time">${d.createdAt?timeAgo(d.createdAt.toDate()):''}</span><button class="comment-reply-btn" onclick="showReplyInput('${doc.id}')">Reply</button>${micBtn}${deleteBtn}</div></div></div>
              <div class="reply-input-area" id="replyArea-${doc.id}"><input type="text" class="reply-input" id="replyInput-${doc.id}" placeholder="Write a reply..."><button class="reply-mic-btn" id="replyMicBtn-${doc.id}" onclick="toggleVoiceReply('${doc.id}')">🎤</button><button class="reply-post-btn" onclick="postReply('${postId}','${doc.id}')">Post</button></div>
              <div class="comment-replies" id="replies-${doc.id}"></div>
            </div>`;
            loadReplies(postId, doc.id);
          } else if (d.type === 'voice') {
            const src = (d.audioData || '').replace(/'/g, "\\'");
            list.innerHTML += `<div class="voice-comment-item" id="c-${doc.id}">
              <div class="voice-comment-main"><div class="comment-avatar">${getAvatarHTML(d.username)}</div><div class="comment-body"><div class="comment-username">${cname(d.username)}</div><div class="vc-play-btn" onclick="playVC('${src}', this)"><i class="fas fa-play"></i><span>Voice</span><span class="vc-duration">${fmtDur(d.duration||0)}</span></div><div class="comment-meta"><span class="comment-time">${d.createdAt?timeAgo(d.createdAt.toDate()):''}</span><button class="comment-reply-btn" onclick="showReplyInput('${doc.id}')">Reply</button>${micBtn}${deleteBtn}</div></div></div>
              <div class="reply-input-area" id="replyArea-${doc.id}"><input type="text" class="reply-input" id="replyInput-${doc.id}" placeholder="Write a reply..."><button class="reply-mic-btn" id="replyMicBtn-${doc.id}" onclick="toggleVoiceReply('${doc.id}')">🎤</button><button class="reply-post-btn" onclick="postReply('${postId}','${doc.id}')">Post</button></div>
              <div class="comment-replies" id="replies-${doc.id}"></div>
            </div>`;
            loadReplies(postId, doc.id);
          }
        });
      } catch(e) { list.innerHTML = '<div style="text-align:center;color:#555;padding:2rem;">Error loading</div>'; }
    }

    // ===== UNLIMITED NESTED REPLIES =====
    async function loadReplies(postId, parentId, containerId, level = 0) {
      const container = document.getElementById(containerId || ('replies-' + parentId));
      if (!container || level > 10) return;
      try {
        const snap = await getDocs(query(collection(db, 'posts', postId, 'comments', parentId, 'replies'), orderBy('createdAt', 'asc')));
        if (snap.empty) return;
        container.innerHTML = '';
        for (const doc of snap.docs) {
          const d = doc.data(); const rid = doc.id;
          const nestedId = 'replies-' + rid;
          const micBtn = `<button class="reply-mic-btn" id="micBtn-${rid}" onclick="toggleVoiceReply('${rid}')">🎤</button>`;
          if (d.type === 'voice') {
            const src = (d.audioData || '').replace(/'/g, "\\'");
            container.innerHTML += `<div class="reply-item" id="r-${rid}"><div class="reply-avatar">${getAvatarHTML(d.username)}</div><div class="reply-body"><div class="reply-username">${cname(d.username)}</div><div class="vc-play-btn" onclick="playVC('${src}', this)" style="font-size:0.55rem;padding:0.15rem 0.4rem;margin-top:0.1rem;"><i class="fas fa-play"></i><span>Voice</span><span class="vc-duration">${fmtDur(d.duration||0)}</span></div><div class="reply-meta"><span class="comment-time">${d.createdAt?timeAgo(d.createdAt.toDate()):''}</span><button class="comment-reply-btn" onclick="showReplyInput('${rid}')">Reply</button>${micBtn}</div><div class="reply-input-area" id="replyArea-${rid}"><input type="text" class="reply-input" id="replyInput-${rid}" placeholder="Write a reply..."><button class="reply-mic-btn" onclick="toggleVoiceReply('${rid}')">🎤</button><button class="reply-post-btn" onclick="postReply('${postId}','${rid}')">Post</button></div><div class="comment-replies" id="${nestedId}" style="margin-left:1rem;padding-left:0.5rem;border-left:1px solid rgba(255,255,255,0.06);"></div></div></div>`;
          } else {
            container.innerHTML += `<div class="reply-item" id="r-${rid}"><div class="reply-avatar">${getAvatarHTML(d.username)}</div><div class="reply-body"><div class="reply-username">${cname(d.username)}</div><div class="reply-text">${d.text||''}</div><div class="reply-meta"><span class="comment-time">${d.createdAt?timeAgo(d.createdAt.toDate()):''}</span><button class="comment-reply-btn" onclick="showReplyInput('${rid}')">Reply</button>${micBtn}</div><div class="reply-input-area" id="replyArea-${rid}"><input type="text" class="reply-input" id="replyInput-${rid}" placeholder="Write a reply..."><button class="reply-mic-btn" onclick="toggleVoiceReply('${rid}')">🎤</button><button class="reply-post-btn" onclick="postReply('${postId}','${rid}')">Post</button></div><div class="comment-replies" id="${nestedId}" style="margin-left:1rem;padding-left:0.5rem;border-left:1px solid rgba(255,255,255,0.06);"></div></div></div>`;
          }
          loadReplies(postId, rid, nestedId, level + 1);
        }
      } catch(e) { console.error('Load replies error:', e); }
    }

    window.showReplyInput = function(commentId) {
      document.querySelectorAll('.reply-input-area').forEach(el => el.classList.remove('show'));
      const area = document.getElementById('replyArea-' + commentId);
      if (area) { area.classList.add('show'); const inp = document.getElementById('replyInput-' + commentId); if (inp) inp.focus(); }
    };

    window.postReply = async function(postId, parentId) {
      const input = document.getElementById('replyInput-' + parentId);
      const text = input.value.trim();
      if (!text || !postId || !parentId) return;
      input.value = '';
      try {
        await addDoc(collection(db, 'posts', postId, 'comments', parentId, 'replies'), { type:'text', text, username:currentUser, createdAt:serverTimestamp() });
        loadReplies(postId, parentId);
        document.getElementById('replyArea-' + parentId).classList.remove('show');
      } catch(e) {}
    };

    window.deleteComment = async function(postId, commentId) {
      if (!confirm('Delete this comment?')) return;
      try { await deleteDoc(doc(db, 'posts', postId, 'comments', commentId)); document.getElementById('c-' + commentId)?.remove(); showToast('Deleted'); } catch(e) { showToast('Failed', true); }
    };

    window.postTextComment = async function() {
      const input = document.getElementById('commentInput'); const text = input.value.trim();
      if (!text || !activeCommentPostId) return;
      input.value = '';
      try { await addDoc(collection(db, 'posts', activeCommentPostId, 'comments'), { type:'text', text, username:currentUser, createdAt:serverTimestamp() }); loadComments(activeCommentPostId); } catch(e) {}
    };

    // ===== GLOBAL VOICE RECORDING =====
    window.toggleVoiceReply = function(commentId) { if (voiceRecorder) sendGlobalRecording(); else startGlobalRecording(commentId); };

    async function startGlobalRecording(targetId) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 16000, channelCount: 1 } });
        voiceRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm', audioBitsPerSecond: 24000 });
        voiceChunks = []; voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
        voiceRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
        voiceRecorder.start(200); voiceSeconds = 0; activeReplyTo = targetId || 'main';
        document.getElementById('globalRecordingBar').classList.add('show');
        document.getElementById('globalRecTimer').textContent = '00:00';
        const micBtn = document.getElementById('micBtn-' + targetId); if (micBtn) micBtn.classList.add('recording');
        if (!targetId) document.getElementById('postCommentBtn').disabled = true;
        voiceTimer = setInterval(() => { voiceSeconds++; document.getElementById('globalRecTimer').textContent = fmtDur(voiceSeconds); if (voiceSeconds >= MAX_VOICE_SEC) sendGlobalRecording(); }, 1000);
      } catch(e) { showToast('Microphone needed!', true); }
    }

    window.cancelGlobalRecording = function() { if (voiceRecorder) { voiceChunks = []; voiceRecorder.stop(); } resetGlobalVoiceUI(); };

    window.sendGlobalRecording = async function() {
      if (!voiceRecorder || voiceSeconds < 1) { cancelGlobalRecording(); return; }
      voiceRecorder.onstop = async () => {
        voiceRecorder.stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(voiceChunks, { type: voiceRecorder.mimeType || 'audio/webm' });
        await saveVoiceComment(blob, voiceSeconds);
        resetGlobalVoiceUI(); loadComments(activeCommentPostId);
      };
      voiceRecorder.stop(); clearInterval(voiceTimer);
    };

    function resetGlobalVoiceUI() {
      clearInterval(voiceTimer); voiceRecorder = null; voiceChunks = [];
      document.getElementById('globalRecordingBar').classList.remove('show');
      document.getElementById('postCommentBtn').disabled = false;
      if (activeReplyTo && activeReplyTo !== 'main') {
        const micBtn = document.getElementById('micBtn-' + activeReplyTo); if (micBtn) micBtn.classList.remove('recording');
      }
      activeReplyTo = null;
    }

    async function saveVoiceComment(audioBlob, duration) {
      showToast('Saving...'); const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          if (activeReplyTo && activeReplyTo !== 'main') {
            await addDoc(collection(db, 'posts', activeCommentPostId, 'comments', activeReplyTo, 'replies'), { type:'voice', username:currentUser, audioData:e.target.result, duration, createdAt:serverTimestamp() });
            loadReplies(activeCommentPostId, activeReplyTo);
          } else {
            await setDoc(doc(db, 'posts', activeCommentPostId, 'comments', 'vc_' + Date.now()), { type:'voice', username:currentUser, audioData:e.target.result, duration, createdAt:serverTimestamp() });
          }
          showToast('✅ Voice added!');
        } catch(err) { showToast('❌ Failed', true); }
      };
      reader.readAsDataURL(audioBlob);
    }

    window.playVC = function(dataUrl, btn) {
      document.querySelectorAll('.vc-play-btn i').forEach(i => i.className = 'fas fa-play');
      if (btn._audio && !btn._audio.paused) { btn._audio.pause(); btn.querySelector('i').className = 'fas fa-play'; return; }
      if (!btn._audio) { btn._audio = new Audio(dataUrl); btn._audio.onended = () => { btn.querySelector('i').className = 'fas fa-play'; }; }
      btn._audio.play().catch(() => { btn.querySelector('i').className = 'fas fa-exclamation-triangle'; });
      btn.querySelector('i').className = 'fas fa-pause';
    };

    window.sharePost = function(src) { if (navigator.share) navigator.share({ url: src }); else { navigator.clipboard.writeText(src); showToast('Link copied!'); } };
    function showToast(msg, isErr) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + (isErr ? 'error' : ''); t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500); }
    window.openImageViewer = function(src) { const ov = document.createElement('div'); ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:800;display:flex;align-items:center;justify-content:center;'; ov.innerHTML = `<img src="${src}" style="max-width:95%;max-height:90vh;object-fit:contain;"><button style="position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:1rem;cursor:pointer;">✕</button>`; ov.querySelector('button').onclick = () => ov.remove(); ov.onclick = e => { if (e.target === ov) ov.remove(); }; document.body.appendChild(ov); };
    document.getElementById('commentInput').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postTextComment(); } });
  </script>
</body>
</html>
