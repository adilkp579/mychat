<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { background:#000;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .page { width:100%;height:100vh;height:100dvh;background:#000;display:flex;flex-direction:column;position:relative;overflow:hidden; }
    
    .content { flex:1;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0 0 6rem 0;overflow-y:auto; }
    .content::-webkit-scrollbar { width:0; }

    .top-icons { width:100%;max-width:500px;display:flex;justify-content:space-between;padding:0.8rem 0.8rem 0.3rem 0.8rem;flex-shrink:0; }
    .corner-btn { width:2.4rem;height:2.4rem;background:rgba(0,0,0,0.5);backdrop-filter:blur(20px);border-radius:50%;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid rgba(255,255,255,0.2);transition:all 0.3s; }
    
    .stories-section { width:100%;max-width:500px;flex-shrink:0;background:#000; }
    .stories-bar { display:flex;gap:0.8rem;padding:0.3rem 0.8rem 0.5rem 0.8rem;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.06); }
    .stories-bar::-webkit-scrollbar { height:0; }
    
    .story-item { display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;flex-shrink:0;position:relative; }
    .story-ring { width:62px;height:62px;border-radius:50%;padding:2px;display:flex;align-items:center;justify-content:center;position:relative; }
    .story-ring.live { background: linear-gradient(45deg, #ef4444, #dc2626, #ef4444); animation: livePulse 1.5s ease-in-out infinite; }
    .story-ring.friend { background: linear-gradient(45deg, #f59e0b, #ef4444, #e91e63); }
    .story-ring.bestie { background: linear-gradient(45deg, #8b5cf6, #ec4899, #f59e0b); }
    
    @keyframes livePulse { 
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.8), 0 0 8px rgba(239,68,68,0.4); } 
      50% { box-shadow: 0 0 0 6px rgba(239,68,68,0), 0 0 16px rgba(239,68,68,0.6); } 
    }
    
    .story-avatar { width:54px;height:54px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:2px solid #000;color:#fff;overflow:hidden; }
    .story-avatar.live-bg { background:#ef4444; }
    .story-name { font-size:0.6rem;color:#ccc;max-width:65px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .live-badge { position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;font-size:0.45rem;padding:1px 5px;border-radius:4px;font-weight:600;letter-spacing:0.5px;z-index:5; }

    .no-stories { padding:0.5rem 0.8rem;color:#555;font-size:0.7rem;text-align:center;width:100%; }

    .feed-section { width:100%;max-width:500px;flex-shrink:0; }
    .feed-card { width:100%;background:#000;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:1rem; }
    .feed-header { display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.8rem;cursor:pointer; }
    .feed-avatar { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.8rem; }
    .feed-username { font-size:0.8rem;font-weight:600; }
    .feed-location { font-size:0.6rem;color:#888; }
    .feed-time { font-size:0.6rem;color:#888;margin-left:auto; }
    .feed-image { width:100%;aspect-ratio:1/1;object-fit:cover;background:#111;display:flex;align-items:center;justify-content:center;color:#333; }
    .feed-image img { width:100%;height:100%;object-fit:cover; }
    .feed-actions { display:flex;gap:1.2rem;padding:0.6rem 0.8rem; }
    .feed-action { background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:0;transition:all 0.2s; }
    .feed-action.liked { color:#ef4444; }
    .feed-likes { font-size:0.7rem;font-weight:600;padding:0 0.8rem;margin-bottom:0.2rem; }
    .feed-caption { padding:0 0.8rem 0.6rem 0.8rem;font-size:0.75rem; }
    .feed-caption span { font-weight:600;margin-right:0.3rem; }

    .floating-nav { position:absolute;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);width:92%;max-width:500px;background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:2.5rem;padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 40px rgba(0,0,0,0.6);z-index:100; }
    .nav-center { display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;gap:0.3rem; }
    .nav-center a { color:rgba(255,255,255,0.6);font-size:1.3rem;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:50%;transition:all 0.3s;text-decoration:none;position:relative; }
    .nav-center a::before { content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scale(0);width:4px;height:4px;border-radius:50%;background:#fff;transition:all 0.3s; }
    .nav-center a.active::before { transform:translateX(-50%) scale(1); }
    .nav-center a.active { color:#fff;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px); }
    .nav-upload, .nav-search { display:none !important; }

    .loading-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:500; }
    .loading-overlay i { font-size:2rem;color:#3897f0;animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    @media (min-width:1024px) {
      .top-icons{display:none}.nav-upload,.nav-search{display:flex!important}
      .floating-nav{top:50%;left:1.5rem;bottom:auto;transform:translateY(-50%);width:3.8rem;height:auto;max-width:none;border-radius:2.5rem;padding:1rem 0.6rem;flex-direction:column}
      .nav-center{flex-direction:column;gap:1.2rem;max-width:none}.nav-center a{font-size:1.4rem;width:2.6rem;height:2.6rem}
      .nav-center a::before{bottom:auto;right:-4px;left:auto;top:50%;transform:translateY(-50%) scale(0)}.nav-center a.active::before{transform:translateY(-50%) scale(1)}
      .content{padding:0.5rem 0 1rem 5.5rem}.stories-section{max-width:550px}.feed-section{max-width:550px}
    }
    @media (max-width:380px) { .floating-nav{width:94%;padding:0.5rem 0.8rem;bottom:0.8rem}.nav-center a{font-size:1.1rem;width:2rem;height:2rem}.corner-btn{width:2rem;height:2rem;font-size:0.9rem}.story-ring{width:54px;height:54px}.story-avatar{width:46px;height:46px;font-size:1.1rem} }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><i class="fas fa-spinner"></i></div>

  <div class="page" id="mainPage" style="display:none;">
    <div class="content">
      <div class="top-icons">
        <a href="upload.html" class="corner-btn"><i class="fas fa-plus"></i></a>
        <a href="search.html" class="corner-btn"><i class="fas fa-search"></i></a>
      </div>
      
      <div class="stories-section">
        <div class="stories-bar" id="storiesBar"></div>
        <div class="no-stories" id="noStories" style="display:none;">No recent stories</div>
      </div>
      
      <div class="feed-section" id="feedContainer"></div>
    </div>

    <nav class="floating-nav"><div class="nav-center">
      <a href="index.html" class="active"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div></nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const app = initializeApp({apiKey:"AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",authDomain:"mychat-a97bf.firebaseapp.com",projectId:"mychat-a97bf"});
    const db = getFirestore(app);

    async function checkAuth() {
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) { window.location.href = 'login.html'; return null; }
      try {
        const q = query(collection(db, 'users'), where('username', '==', currentUser));
        const snap = await getDocs(q);
        if (snap.empty) { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; return null; }
        return currentUser;
      } catch(e) { return currentUser; }
    }

    async function loadLiveUsers() {
      try {
        const snap = await getDocs(collection(db, 'live'));
        const liveUsers = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (d.active) liveUsers.push({ name: d.userId, type: 'live', icon: 'fa-circle', live: true });
        });
        return liveUsers;
      } catch(e) { return []; }
    }

    async function loadProfileStories(username) {
      try {
        const ref = doc(db, 'profiles', username.replace('@', ''));
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const data = snap.data();
          const friends = (data.friends || []).map(f => ({ name: f.name, type: 'friend', icon: 'fa-user', live: false }));
          const besties = (data.besties || []).map(b => ({ name: b.name, type: 'bestie', icon: 'fa-user', live: false }));
          return [...friends, ...besties];
        }
      } catch(e) {}
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      const friends = (profile.friends || []).map(f => ({ name: f.name, type: 'friend', icon: 'fa-user', live: false }));
      const besties = (profile.besties || []).map(b => ({ name: b.name, type: 'bestie', icon: 'fa-user', live: false }));
      return [...friends, ...besties];
    }

    async function renderStories() {
      const liveUsers = await loadLiveUsers();
      const currentUser = localStorage.getItem('currentUser') || '@user';
      const profileStories = await loadProfileStories(currentUser);
      
      const liveNames = new Set(liveUsers.map(l => l.name));
      const filteredProfileStories = profileStories.filter(p => !liveNames.has(p.name));
      
      const allStories = [...liveUsers, ...filteredProfileStories];
      
      const bar = document.getElementById('storiesBar');
      const noStories = document.getElementById('noStories');
      
      if (allStories.length === 0) {
        bar.style.display = 'none';
        noStories.style.display = 'block';
        return;
      }
      
      bar.style.display = 'flex';
      noStories.style.display = 'none';
      
      bar.innerHTML = allStories.map(s => `
        <div class="story-item" onclick="openStory('${s.name}', '${s.type}')">
          <div class="story-ring ${s.type}">
            <div class="story-avatar${s.live?' live-bg':''}"><i class="fas ${s.icon}"></i></div>
          </div>
          ${s.live?'<div class="live-badge">LIVE</div>':''}
          <span class="story-name">${s.name}</span>
        </div>
      `).join('');
    }

    window.openStory = function(name, type) {
      if (type === 'live') window.location.href = 'web.html';
      else alert('📷 Viewing story of ' + name);
    };

    async function loadPosts() {
      try {
        const snap = await getDocs(query(collection(db, 'posts'), where('type', '==', 'post')));
        const posts = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (d.data || d.url) {
            posts.push({
              userId: d.userId || '@user',
              caption: d.fileName || d.caption || '',
              src: d.data || d.url,
              likes: d.likes || Math.floor(Math.random()*100),
              time: 'Recently',
              location: ''
            });
          }
        });
        if (posts.length > 0) return posts;
      } catch(e) {}
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      return (profile.posts || []).filter(p => p.type === 'image').map(p => ({
        userId: profile.username || '@user',
        caption: '',
        src: p.src,
        likes: 0,
        time: 'Recently',
        location: ''
      }));
    }

    async function renderFeed() {
      const posts = await loadPosts();
      const container = document.getElementById('feedContainer');
      
      if (posts.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#555;padding:3rem;">No posts yet</div>';
        return;
      }
      
      container.innerHTML = posts.map(p => `
        <div class="feed-card">
          <div class="feed-header" onclick="window.location.href='profile.html'">
            <div class="feed-avatar"><i class="fas fa-user"></i></div>
            <div><div class="feed-username">${p.userId}</div>${p.location?`<div class="feed-location">${p.location}</div>`:''}</div>
            <span class="feed-time">${p.time}</span>
          </div>
          <div class="feed-image"><img src="${p.src}" alt="post" onerror="this.style.display='none'"></div>
          <div class="feed-actions">
            <button class="feed-action liked" onclick="this.classList.toggle('liked')"><i class="fas fa-heart"></i></button>
            <button class="feed-action"><i class="far fa-comment"></i></button>
            <button class="feed-action" onclick="navigator.share?navigator.share({url:'${p.src}'}):navigator.clipboard.writeText('${p.src}')"><i class="far fa-share-square"></i></button>
          </div>
          <div class="feed-likes">${p.likes} likes</div>
          <div class="feed-caption"><span>${p.userId}</span>${p.caption}</div>
        </div>
      `).join('');
    }

    async function init() {
      const user = await checkAuth();
      if (!user) return;
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainPage').style.display = 'flex';
      await renderStories();
      await renderFeed();
    }

    init();
  </script>
</body>
</html>
